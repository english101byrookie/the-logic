<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>THE LOGIC Interactive App - Art & Our Environment</title>
    
    <meta name="theme-color" content="#064e3b">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="LOGIC App">
    <link rel="apple-touch-icon" href="https://via.placeholder.com/512/064e3b/ffffff.png?text=LOGIC">
    <link rel="icon" type="image/png" sizes="512x512" href="https://via.placeholder.com/512/064e3b/ffffff.png?text=LOGIC">
    
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    
    <style>
        @media print {
            body {
                -webkit-print-color-adjust: exact;
                print-color-adjust: exact;
                background-color: white !important;
            }
            ::-webkit-scrollbar {
                display: none;
            }
            .print-avoid-break {
                break-inside: avoid;
            }
            .print-show-all {
                display: block !important;
            }
            .print-hide {
                display: none !important;
            }
            .print-page-break {
                page-break-before: always;
            }
        }
        .bg-pattern {
            background-color: #ecfdf5;
            background-image: radial-gradient(#a7f3d0 1px, transparent 1px);
            background-size: 20px 20px;
        }
        .app-like {
            -webkit-user-select: none;
            user-select: none;
        }
        .text-selectable {
            -webkit-user-select: text;
            user-select: text;
        }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #f1f5f9; }
        ::-webkit-scrollbar-thumb { background: #6ee7b7; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #34d399; }
    </style>
</head>
<body class="app-like bg-slate-50">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const textData = [
          // Part 1: Intro (Art's Role)
          { id: 1, text: "While art can stir up a sense of beauty in us, it can also draw a spirited reaction from the public.", trans: "예술은 우리 안에 미적 감각을 불러일으킬 수도 있지만, 대중으로부터 열렬한 반응을 이끌어낼 수도 있다." },
          { id: 2, text: "An excellent artistic piece can communicate a message to us and even change our ways of looking at our surroundings.", trans: "뛰어난 예술 작품은 우리에게 메시지를 전달하고, 심지어 주변을 바라보는 우리의 방식을 바꿀 수도 있다." },
          { id: 3, text: "That is why art has played an essential role in addressing social and global issues throughout history.", trans: "그것이 예술이 역사 전반에 걸쳐 사회적, 전 지구적 문제를 다루는 데 필수적인 역할을 해 온 이유이다.", isHighlight: true, logicPoint: 1 },
          { id: 4, text: "Let us take a look at a few modern artworks that address environmental issues.", trans: "환경 문제를 다루는 몇 가지 현대 예술 작품을 살펴보자." },

          // Part 2: Benjamin Von Wong (Plastic Pollution)
          { id: 5, text: "The first art piece is a photograph by Benjamin Von Wong.", trans: "첫 번째 예술 작품은 벤자민 폰 웡의 사진이다." },
          { id: 6, text: "His artworks rally people around environmental actions.", trans: "그의 예술 작품들은 환경적 행동을 중심으로 사람들을 결집시킨다." },
          { id: 7, text: <span>In the photo on the left, titled <span className="italic font-medium">Turn Off the Plastic Tap</span>, he tries to highlight the fact that a huge amount of plastic enters the ocean every minute.</span>, trans: "'플라스틱 수도꼭지를 잠가라'라는 제목의 왼쪽 사진에서, 그는 매분 엄청난 양의 플라스틱이 바다로 흘러들어간다는 사실을 강조하려고 노력한다." },
          { id: 8, text: "He says, “You can’t order a product online without having it delivered in plastic packaging.", trans: "그는 말한다. “플라스틱 포장재로 배달되지 않고서는 온라인으로 제품을 주문할 수 없습니다." },
          { id: 9, text: "Also, the clothes you are wearing must be, at least in part, made of plastic.", trans: "또한, 당신이 입고 있는 옷도 적어도 부분적으로는 플라스틱으로 만들어졌음에 틀림없습니다." },
          { id: 10, text: "Dependence on plastic is built into the supply chain, so the individual consumer finds it harder and harder to opt out.", trans: "플라스틱에 대한 의존성은 공급망에 내재되어 있어서, 개별 소비자는 (그것에서) 빠져나오는 것이 점점 더 어렵다고 느낍니다." },
          { id: 11, text: "Of course, you can choose not to purchase products containing plastic, but that only goes so far.", trans: "물론, 당신은 플라스틱이 포함된 제품을 구매하지 않기로 선택할 수 있지만, 그것에는 한계가 있습니다." },
          { id: 12, text: "I think it is important for you to inform your friends and family of the issue because at the end of the day, you know, companies and governments can’t ignore the interest of the consumers.", trans: "결국 기업과 정부는 소비자의 관심사를 무시할 수 없기 때문에, 당신이 친구와 가족에게 이 문제를 알리는 것이 중요하다고 생각합니다." },
          { id: 13, text: "At the same time, we also need to pressure governments and corporations to do the right thing.”", trans: "동시에, 우리는 정부와 기업들이 올바른 일을 하도록 압박할 필요가 있습니다.”", isHighlight: true, logicPoint: 2 },

          // Part 3: Jenny Kendler (Ocean Acidification)
          { id: 14, text: <span>The next piece, titled <span className="italic font-medium">Forget Me Not</span>, is Jenny Kendler’s personal love letter to the sea.</span>, trans: "다음 작품인 '물망초(나를 잊지 마세요)'는 제니 켄들러가 바다에 보내는 개인적인 러브레터이다." },
          { id: 15, text: "She covered an old boom box with various shells, which took her a year to collect.", trans: "그녀는 오래된 대형 카세트 라디오(붐박스)를 다양한 조개껍데기로 덮었는데, 그것들을 수집하는 데 1년이 걸렸다." },
          { id: 16, text: "The boom box plays something you may regard as calming ocean sounds.", trans: "그 라디오는 당신이 평온한 바다 소리라고 여길지도 모르는 것을 재생한다." },
          { id: 17, text: "They are actually what she recorded as she had one of her baby teeth dissolve in acid.", trans: "그것들은 사실 그녀가 자신의 유치 중 하나를 산성에 녹이면서 녹음한 것이다." },
          { id: 18, text: "She wanted us to think of what sea creatures might go through one day if we continue burning fossil fuels carelessly.", trans: "그녀는 만약 우리가 계속해서 화석 연료를 부주의하게 태운다면 언젠가 해양 생물들이 어떤 일을 겪을지 우리가 생각해보기를 원했다." },
          { id: 19, text: "As the ocean absorbs more and more carbon dioxide, it becomes more and more acidic.", trans: "바다가 점점 더 많은 이산화탄소를 흡수함에 따라, 그것은 점점 더 산성화된다." },
          { id: 20, text: "Under this condition, the hard shells of many marine species will dissolve.", trans: "이러한 조건 하에서, 많은 해양 종들의 단단한 껍질은 녹아버릴 것이다." },
          { id: 21, text: "Kendler says, “I wanted to inspire people to raise their own awareness about what they can actually do as individuals, but at the same time, I hoped to encourage collective action and collective responsibility.", trans: "켄들러는 말한다. “저는 사람들이 개인으로서 실제로 무엇을 할 수 있는지에 대한 인식을 높이도록 영감을 주고 싶었지만, 동시에 집단적 행동과 집단적 책임을 장려하기를 바랐습니다.", isHighlight: true, logicPoint: 3 },
          { id: 22, text: "One thing that art can do really well is to help us imagine how the world might be otherwise.", trans: "예술이 정말 잘할 수 있는 한 가지는 세상이 어떻게 다를 수 있는지 우리가 상상하도록 돕는 것입니다." },
          { id: 23, text: "Certainly, we can’t get to a different place if we can’t imagine it.”", trans: "확실히, 상상할 수 없다면 우리는 다른 곳(상태)에 도달할 수 없습니다.”" },

          // Part 4: Jon Ching (Nature & Interconnectedness)
          { id: 24, text: <span>The piece below, titled <span className="italic font-medium">Homestead</span>, is a painting by Jon Ching.</span>, trans: "'홈스테드(가옥)'라는 제목의 아래 작품은 존 칭의 그림이다." },
          { id: 25, text: "Most of his work, including this painting, is a celebration of nature and a quiet appeal to humans to appreciate the world around them.", trans: "이 그림을 포함한 그의 작품 대부분은 자연에 대한 찬양이자, 인간들에게 그들 주변의 세상을 진가를 알아보라고 하는 조용한 호소이다." },
          { id: 26, text: "“I believe we’ve separated ourselves from nature and no longer see how we fit in.", trans: "“저는 우리가 우리 자신을 자연으로부터 분리시켰고, 우리가 어떻게 어울리는지 더 이상 보지 못한다고 믿습니다." },
          { id: 27, text: "Instead of helping nature thrive, we are simply consuming it,” says Ching.", trans: "자연이 번성하도록 돕는 대신, 우리는 그저 그것을 소비하고 있을 뿐입니다,” 라고 칭은 말한다." },
          { id: 28, text: "One cannot help but smile at his paintings, which are rich in color and tenderness.", trans: "색채와 다정함이 풍부한 그의 그림을 보면 미소 짓지 않을 수 없다." },
          { id: 29, text: "One of the fun aspects of his work is how he blends the features of one life form with those of another.", trans: "그의 작품의 재미있는 측면 중 하나는 그가 한 생명체의 특징을 다른 생명체의 특징과 혼합하는 방식이다." },
          { id: 30, text: "“I’ve been using my work as a means of commenting on issues and problems I’m heavily interested in.", trans: "“저는 제 작품을 제가 깊이 관심 있는 이슈와 문제들에 대해 논평하는 수단으로 사용해 왔습니다." },
          { id: 31, text: "I find it necessary to express a silver lining rather than just reflect on what’s wrong.", trans: "저는 단지 무엇이 잘못되었는지 되돌아보기보다는 희망적인 측면(한 가닥의 희망)을 표현하는 것이 필요하다고 생각합니다." },
          { id: 32, text: "I want to show that everything is connected and that protecting nature is actually protecting us.", trans: "저는 모든 것이 연결되어 있으며 자연을 보호하는 것이 곧 우리를 보호하는 것이라는 것을 보여주고 싶습니다.", isHighlight: true, logicPoint: 4 },
          { id: 33, text: "My call to action is to remember the magic and wonder of this planet.”", trans: "저의 행동 촉구는 이 행성의 마법과 경이로움을 기억하라는 것입니다.”" },

          // Part 5: Conclusion
          { id: 34, text: "Art can strike up conversations about the environment, but more importantly, it can also make a great difference by inspiring us to take action.", trans: "예술은 환경에 대한 대화를 시작할 수 있지만, 더 중요하게는, 그것은 우리가 행동을 취하도록 영감을 줌으로써 큰 변화를 만들 수도 있다." },
          { id: 35, text: "The following words from Andy Warhol, an American pop artist, ring especially true in this context.", trans: "미국의 팝 아티스트 앤디 워홀의 다음 말은 이 맥락에서 특히 사실로 들린다." },
          { id: 36, text: "“They always say time changes things, but you actually have to change them yourself.”", trans: "“사람들은 항상 시간이 상황을 바꾼다고 말하지만, 실제로 당신이 스스로 그것들을 바꿔야만 한다.”", isHighlight: true, logicPoint: 5 }
        ];

        const logicMapSteps = [
          { id: 'intro', title: "THE INTRO (예술의 역할)", desc: "사회적, 환경적 문제에 대한 메시지 전달", color: "bg-blue-100 border-blue-400 text-blue-800", icon: <i className="ph-fill ph-megaphone text-xl mb-2"></i> },
          { id: 'vonwong', title: "VON WONG (플라스틱 오염)", desc: "개인의 한계 인식과 정부/기업 압박 촉구", color: "bg-indigo-100 border-indigo-400 text-indigo-800", icon: <i className="ph-fill ph-drop text-xl mb-2"></i> },
          { id: 'kendler', title: "KENDLER (해양 산성화)", desc: "예술적 상상력을 통한 집단적 책임 강조", color: "bg-violet-100 border-violet-400 text-violet-800", icon: <i className="ph-fill ph-waves text-xl mb-2"></i> },
          { id: 'ching', title: "CHING (자연과의 연결성)", desc: "자연 보호가 곧 인류 보호라는 긍정적 메시지", color: "bg-fuchsia-100 border-fuchsia-400 text-fuchsia-800", icon: <i className="ph-fill ph-tree text-xl mb-2"></i> },
          { id: 'conclusion', title: "CONCLUSION (최종 결론)", desc: "스스로 행동하고 변화를 만들어 낼 것", color: "bg-emerald-100 border-emerald-500 text-emerald-900", icon: <i className="ph-fill ph-sparkle text-xl mb-2"></i> }
        ];

        function App() {
          const [isAuthenticated, setIsAuthenticated] = useState(false);
          const [passwordInput, setPasswordInput] = useState("");
          const [loginError, setLoginError] = useState("");
          
          const CORRECT_PASSWORD = "Made by Lee";

          const itemRefs = useRef({});

          const handleLoginSubmit = (e) => {
            e.preventDefault();
            if (passwordInput === CORRECT_PASSWORD) {
              setIsAuthenticated(true);
              setLoginError("");
            } else {
              setLoginError("올바르지 않은 암호입니다. 다시 확인해 주세요.");
              setPasswordInput("");
            }
          };

          const [activeTab, setActiveTab] = useState('text');
          const [activeLogic, setActiveLogic] = useState(null);
          
          const handleLogicClick = (point) => {
              setActiveLogic(activeLogic === point ? null : point);
              setActiveTab('text'); 
          };

          useEffect(() => {
              if (activeTab === 'text' && activeLogic !== null) {
                  const targetItem = textData.find(item => item.logicPoint === activeLogic);
                  if (targetItem && itemRefs.current[targetItem.id]) {
                      setTimeout(() => {
                          itemRefs.current[targetItem.id].scrollIntoView({ behavior: 'smooth', block: 'center' });
                      }, 150);
                  }
              }
          }, [activeLogic, activeTab]);

          const [quiz1Answered, setQuiz1Answered] = useState(null);
          const [quiz2Answered, setQuiz2Answered] = useState(null);
          const [quiz3Answered, setQuiz3Answered] = useState(null);
          const [quiz4Answered, setQuiz4Answered] = useState(null);
          const [quiz5Answered, setQuiz5Answered] = useState(null);
          const [quiz6Answered, setQuiz6Answered] = useState(null);

          const handlePrint = () => { window.print(); };

          if (!isAuthenticated) {
            return (
              <div className="min-h-screen bg-pattern flex items-center justify-center p-4">
                <div className="bg-white p-8 md:p-10 rounded-2xl shadow-2xl max-w-md w-full text-center border-t-8 border-emerald-700">
                  <div className="mx-auto bg-emerald-100 w-16 h-16 rounded-full flex items-center justify-center mb-6">
                    <i className="ph-fill ph-lock-key text-3xl text-emerald-700"></i>
                  </div>
                  <h2 className="text-2xl font-serif font-bold text-slate-800 mb-2">THE LOGIC INTERACTIVE</h2>
                  <p className="text-emerald-600 font-bold mb-6 text-sm">Art & Our Environment</p>
                  
                  <div className="bg-slate-50 border border-slate-200 rounded-lg p-4 mb-6">
                    <p className="text-slate-600 text-sm leading-relaxed">
                      이 콘텐츠는 <strong>Lee 선생님</strong>이 기획하고 제작한<br/>교육용 창작물입니다. (무단 배포 금지)<br/>
                      <span className="inline-block mt-2 font-medium text-slate-700">열람을 위해 선생님이 안내한 암호를 입력해 주세요.</span>
                    </p>
                  </div>

                  <form onSubmit={handleLoginSubmit} className="flex flex-col gap-3">
                    <input type="text" placeholder="접근 암호 (예: Made by Lee)" className="border border-slate-300 p-3 rounded-lg focus:outline-none focus:border-emerald-500 focus:ring-2 focus:ring-emerald-200 transition-all text-center font-medium text-selectable" value={passwordInput} onChange={(e) => setPasswordInput(e.target.value)} />
                    {loginError && <p className="text-red-500 text-sm font-medium animate-pulse">{loginError}</p>}
                    <button type="submit" className="bg-emerald-900 hover:bg-emerald-800 text-white font-bold py-3 rounded-lg transition-colors mt-2 shadow-md flex items-center justify-center gap-2">
                      <i className="ph-bold ph-key"></i> 잠금 해제
                    </button>
                  </form>
                  <div className="mt-8 border-t border-slate-100 pt-4">
                    <p className="text-xs text-slate-400 font-mono tracking-wider">© 2026. Made by Lee. All rights reserved.</p>
                  </div>
                </div>
              </div>
            );
          }

          return (
            <div className="flex h-screen overflow-hidden bg-slate-50 font-sans text-slate-800 print:h-auto print:bg-white">
                
                {/* 사이드바 */}
                <aside className="hidden md:flex flex-col w-72 bg-emerald-950 text-white shadow-2xl z-20 print:hidden">
                    <div className="p-6 bg-emerald-900 border-b border-emerald-800">
                        <div className="flex items-center gap-2 mb-2 opacity-80">
                            <i className="ph-fill ph-brain text-xl"></i>
                            <span className="text-xs font-bold tracking-wider">THE LOGIC INTERACTIVE</span>
                        </div>
                        <h1 className="text-2xl font-serif font-bold leading-tight">Art & Our Environment</h1>
                        <p className="text-emerald-300 text-sm mt-2 italic">Inspiring Collective Action</p>
                    </div>
                    
                    <nav className="flex-1 py-6 px-4 space-y-2 overflow-y-auto">
                        <p className="text-xs font-bold text-emerald-400 uppercase tracking-widest mb-4 ml-2">Navigation</p>
                        <button onClick={() => setActiveTab('text')} className={`w-full flex items-center gap-3 px-4 py-3 rounded-lg text-left transition-all ${activeTab === 'text' ? 'bg-emerald-600 text-white font-bold shadow-md' : 'text-emerald-200 hover:bg-emerald-800/50'}`}>
                            <i className="ph-fill ph-book-open text-xl"></i> 1. 지문 분석
                        </button>
                        <button onClick={() => setActiveTab('syntax')} className={`w-full flex items-center gap-3 px-4 py-3 rounded-lg text-left transition-all ${activeTab === 'syntax' ? 'bg-emerald-600 text-white font-bold shadow-md' : 'text-emerald-200 hover:bg-emerald-800/50'}`}>
                            <i className="ph-fill ph-highlighter-circle text-xl"></i> 2. 핵심 구문
                        </button>
                        <button onClick={() => setActiveTab('map')} className={`w-full flex items-center gap-3 px-4 py-3 rounded-lg text-left transition-all ${activeTab === 'map' ? 'bg-emerald-600 text-white font-bold shadow-md' : 'text-emerald-200 hover:bg-emerald-800/50'}`}>
                            <i className="ph-fill ph-git-merge text-xl"></i> 3. 논리 구조도
                        </button>
                        <button onClick={() => setActiveTab('quiz')} className={`w-full flex items-center gap-3 px-4 py-3 rounded-lg text-left transition-all ${activeTab === 'quiz' ? 'bg-emerald-600 text-white font-bold shadow-md' : 'text-emerald-200 hover:bg-emerald-800/50'}`}>
                            <i className="ph-fill ph-check-square-offset text-xl"></i> 4. 실전 문제
                        </button>
                    </nav>

                    <div className="p-4 border-t border-emerald-800">
                        <button onClick={handlePrint} className="w-full flex items-center justify-center gap-2 bg-emerald-800 hover:bg-emerald-700 py-3 rounded-lg font-medium transition-colors">
                            <i className="ph-bold ph-printer"></i> 전체 인쇄하기
                        </button>
                    </div>
                </aside>

                {/* 메인 영역 */}

                                                        ${quiz1Answered === null ? 'border-slate-200 hover:border-emerald-400 hover:bg-emerald-50' : 
                                                        (choice.isCorrect ? 'border-green-500 bg-green-50 text-green-800 shadow-sm' : 
                                                        (quiz1Answered === choice.id ? 'border-red-400 bg-red-50 text-red-600' : 'border-slate-100 text-slate-400 opacity-50'))}`}
                                                >
                                                    <span className="w-8 inline-block font-mono text-slate-500 print:text-black">①</span> {choice.text}
                                                </button>
                                            ))}
                                        </div>
                                        {quiz1Answered !== null && (
                                            <div className={`mt-4 p-4 rounded-lg text-sm leading-relaxed print:hidden ${quiz1Answered === 4 ? 'bg-green-50 text-green-900 border border-green-200' : 'bg-red-50 text-red-900 border border-red-200'}`}>
                                                <p className="font-bold mb-1">{quiz1Answered === 4 ? '🎉 정답입니다!' : '오답입니다.'}</p>
                                                <p><strong>해설:</strong> 제니 켄들러는 본문 21번 문장에서 사람들이 <strong>'개인으로서(as individuals)'</strong> 할 수 있는 일에 대한 인식을 높이도록 영감을 주기를 원했으며, 동시에 집단적 행동도 장려한다고 명시했습니다. 오직 정부 규제만을 촉구한다는 설명은 틀립니다.</p>
                                            </div>
                                        )}
                                    </div>

                                    {/* Quiz 2 */}
                                    <div className="border-t border-slate-200 pt-8 print:border-black print:pt-4">
                                        <div className="bg-slate-50 border border-slate-200 p-5 rounded-lg mb-4 print:bg-white print:border-none print:p-0 print:mb-4">
                                            <p className="font-bold text-slate-800 mb-2 print:text-black">Q2. 문장 삽입</p>
                                            <p className="text-sm text-slate-600 mb-4 print:text-black">글의 흐름으로 보아, 주어진 문장이 들어가기에 가장 적절한 곳을 고르시오.</p>
                                            <div className="text-md font-bold text-center bg-white p-4 border border-slate-300 rounded mb-4 print:border-slate-400 print:rounded-none print:text-black">
                                                They are actually what she recorded as she had one of her baby teeth dissolve in acid.
                                            </div>
                                            <p className="text-md leading-relaxed bg-white p-4 border border-slate-200 rounded print:border-slate-400 print:rounded-none print:text-black">
                                                She covered an old boom box with various shells, which took her a year to collect. ( ① ) The boom box plays something you may regard as calming ocean sounds. ( ② ) She wanted us to think of what sea creatures might go through one day if we continue burning fossil fuels carelessly. ( ③ ) As the ocean absorbs more and more carbon dioxide, it becomes more and more acidic. ( ④ ) Under this condition, the hard shells of many marine species will dissolve.
                                            </p>
                                        </div>
                                        <div className="grid grid-cols-4 gap-2 print:grid-cols-4 print:gap-4">
                                            {[
                                                { id: 1, text: "①" }, { id: 2, text: "②", isCorrect: true }, { id: 3, text: "③" }, { id: 4, text: "④" }
                                            ].map((choice) => (
                                                <button key={choice.id} onClick={() => setQuiz2Answered(choice.id)} disabled={quiz2Answered !== null}
                                                    className={`w-full text-center p-3 rounded-lg border font-bold transition-all duration-200 print:border-none print:p-1 print:text-black
                                                        ${quiz2Answered === null ? 'border-slate-200 hover:border-emerald-400 hover:bg-emerald-50' : 
                                                        (choice.isCorrect ? 'border-green-500 bg-green-50 text-green-800 shadow-sm' : 
                                                        (quiz2Answered === choice.id ? 'border-red-400 bg-red-50 text-red-600' : 'border-slate-100 text-slate-400 opacity-50'))}`}
                                                >
                                                    {choice.text}
                                                </button>
                                            ))}
                                        </div>
                                        {quiz2Answered !== null && (
                                            <div className={`mt-4 p-4 rounded-lg text-sm leading-relaxed print:hidden ${quiz2Answered === 2 ? 'bg-green-50 text-green-900 border border-green-200' : 'bg-red-50 text-red-900 border border-red-200'}`}>
                                                <p className="font-bold mb-1">{quiz2Answered === 2 ? '🎉 정답입니다!' : '오답입니다.'}</p>
                                                <p><strong>해설:</strong> 주어진 문장의 'They'는 바로 앞 문장에서 언급된 평온한 바다 소리(calming ocean sounds)를 지칭합니다. 붐박스에서 나는 소리가 사실은 유치를 산성에 녹일 때 나는 소리라는 반전을 설명하는 <strong>②번</strong> 자리가 가장 적절합니다.</p>
                                            </div>
                                        )}
                                    </div>
                                    
                                    {/* Quiz 3 */}
                                    <div className="border-t border-slate-200 pt-8 print:border-black print:pt-4">
                                        <div className="bg-slate-50 border border-slate-200 p-5 rounded-lg mb-4 print:bg-white print:border-none print:p-0 print:mb-4">
                                            <p className="font-bold text-slate-800 mb-2 print:text-black">Q3. 요약문 완성</p>
                                            <p className="text-sm text-slate-600 mb-4 print:text-black">다음 글의 내용을 한 문장으로 요약하고자 한다. 빈칸 (A), (B)에 들어갈 말로 가장 적절한 것은?</p>
                                            <p className="text-md leading-relaxed bg-white p-4 border border-slate-200 rounded print:border-slate-400 print:rounded-none print:text-black">
                                                Art not only raises <span className="font-bold text-emerald-700">( A )</span> about environmental crises but also inspires collective <span className="font-bold text-emerald-700">( B )</span> to protect the planet.
                                            </p>
                                        </div>
                                        <div className="space-y-2 print:space-y-3">
                                            {[
                                                { id: 1, text: "(A) doubts —— (B) isolation" },
                                                { id: 2, text: "(A) awareness —— (B) action", isCorrect: true },
                                                { id: 3, text: "(A) awareness —— (B) memory" },
                                                { id: 4, text: "(A) funding —— (B) action" }
                                            ].map((choice) => (
                                                <button key={choice.id} onClick={() => setQuiz3Answered(choice.id)} disabled={quiz3Answered !== null}
                                                    className={`w-full text-left p-4 rounded-lg border font-medium transition-all duration-200 print:border-none print:p-1 print:text-black
                                                        ${quiz3Answered === null ? 'border-slate-200 hover:border-emerald-400 hover:bg-emerald-50' : 
                                                        (choice.isCorrect ? 'border-green-500 bg-green-50 text-green-800 shadow-sm' : 
                                                        (quiz3Answered === choice.id ? 'border-red-400 bg-red-50 text-red-600' : 'border-slate-100 text-slate-400 opacity-50'))}`}
                                                >
                                                    <span className="w-8 inline-block font-mono text-slate-500 print:text-black">①</span> {choice.text}
                                                </button>
                                            ))}
                                        </div>
                                        {quiz3Answered !== null && (
                                            <div className={`mt-4 p-4 rounded-lg text-sm leading-relaxed print:hidden ${quiz3Answered === 2 ? 'bg-green-50 text-green-900 border border-green-200' : 'bg-red-50 text-red-900 border border-red-200'}`}>
                                                <p className="font-bold mb-1">{quiz3Answered === 2 ? '🎉 정답입니다!' : '오답입니다.'}</p>
                                                <p><strong>해설:</strong> 예술은 환경 위기에 대한 사람들의 <strong>인식(awareness)</strong>을 높일 뿐만 아니라, 궁극적으로 지구를 보호하기 위한 집단적 <strong>행동(action)</strong>을 하도록 영감을 준다는 것이 이 글 전체를 꿰뚫는 핵심 주제입니다.</p>
                                            </div>
                                        )}
                                    </div>

                                    {/* Quiz 4 */}
                                    <div className="border-t border-slate-200 pt-8 print:border-black print:pt-4">
                                        <div className="bg-slate-50 border border-slate-200 p-5 rounded-lg mb-4 print:bg-white print:border-none print:p-0 print:mb-4">
                                            <p className="font-bold text-slate-800 mb-2 print:text-black">Q4. 어휘 추론</p>
                                            <p className="text-sm text-slate-600 mb-4 print:text-black">문맥상 밑줄 친 단어 중 쓰임이 적절하지 <span className="underline underline-offset-4 font-bold text-red-600 print:text-black print:underline">않은</span> 것은?</p>
                                            <p className="text-md leading-relaxed bg-white p-4 border border-slate-200 rounded print:border-slate-400 print:rounded-none print:text-black">
                                                She wanted us to think of what sea creatures might go through one day if we continue burning fossil fuels ①<span className="underline underline-offset-4 font-bold print:underline">carelessly</span>. As the ocean ②<span className="underline underline-offset-4 font-bold print:underline">absorbs</span> more and more carbon dioxide, it becomes more and more acidic. Under this condition, the hard shells of many marine species will ③<span className="underline underline-offset-4 font-bold text-red-600 print:underline print:text-black">strengthen</span>. Kendler wanted to inspire people to raise their own ④<span className="underline underline-offset-4 font-bold print:underline">awareness</span>.
                                            </p>
                                        </div>
                                        <div className="grid grid-cols-2 md:grid-cols-4 gap-2 print:grid-cols-4 print:gap-4">
                                            {[
                                                { id: 1, text: "① carelessly" }, 
                                                { id: 2, text: "② absorbs" }, 
                                                { id: 3, text: "③ strengthen", isCorrect: true }, 
                                                { id: 4, text: "④ awareness" }
                                            ].map((choice) => (
                                                <button key={choice.id} onClick={() => setQuiz4Answered(choice.id)} disabled={quiz4Answered !== null}
                                                    className={`w-full text-center p-3 rounded-lg border font-medium transition-all duration-200 print:border-none print:p-1 print:text-black
                                                        ${quiz4Answered === null ? 'border-slate-200 hover:border-emerald-400 hover:bg-emerald-50' : 
                                                        (choice.isCorrect ? 'border-green-500 bg-green-50 text-green-800 shadow-sm' : 
                                                        (quiz4Answered === choice.id ? 'border-red-400 bg-red-50 text-red-600' : 'border-slate-100 text-slate-400 opacity-50'))}`}
                                                >
                                                    {['①', '②', '③', '④'][choice.id - 1]} {choice.text.substring(2)}
                                                </button>
                                            ))}
                                        </div>
                                        {quiz4Answered !== null && (
                                            <div className={`mt-4 p-4 rounded-lg text-sm leading-relaxed print:hidden ${quiz4Answered === 3 ? 'bg-green-50 text-green-900 border border-green-200' : 'bg-red-50 text-red-900 border border-red-200'}`}>
                                                <p className="font-bold mb-1">{quiz4Answered === 3 ? '🎉 정답입니다!' : '오답입니다. 다시 한번 생각해 보세요.'}</p>
                                                <p><strong>해설: ③ strengthen $\rightarrow$ dissolve</strong><br/>해양이 산성화되면 조개껍데기 같은 단단한 해양 생물의 껍질이 '강해지는(strengthen)' 것이 아니라 작가의 유치처럼 <strong>'녹아버리게(dissolve)'</strong> 됩니다.</p>
                                            </div>
                                        )}
                                    </div>

                                    {/* Quiz 5 */}
                                    <div className="border-t border-slate-200 pt-8 print:border-black print:pt-4">
                                        <div className="bg-slate-50 border border-slate-200 p-5 rounded-lg mb-4 print:bg-white print:border-none print:p-0 print:mb-4">
                                            <p className="font-bold text-slate-800 mb-2 print:text-black">Q5. 요지 파악</p>
                                            <p className="text-sm text-slate-600 mb-4 print:text-black">윗글의 요지로 가장 적절한 것은?</p>
                                        </div>
                                        <div className="space-y-2 print:space-y-3">
                                            {[
                                                { id: 1, text: "예술 작품의 가치는 그것을 구성하는 재료의 친환경성에 의해 결정된다." },
                                                { id: 2, text: "현대 예술은 과거에 비해 미적 아름다움보다 상업적 이익을 더 추구한다." },
                                                { id: 3, text: "예술은 환경 문제에 대한 인식을 높이고 사람들의 적극적인 실천을 유도할 수 있다.", isCorrect: true },
                                                { id: 4, text: "플라스틱 오염 문제를 해결하기 위해서는 새로운 입법과 강제적인 규제가 필수적이다." }
                                            ].map((choice) => (
                                                <button key={choice.id} onClick={() => setQuiz5Answered(choice.id)} disabled={quiz5Answered !== null}
                                                    className={`w-full text-left p-4 rounded-lg border font-medium transition-all duration-200 print:border-none print:p-1 print:text-black
                                                        ${quiz5Answered === null ? 'border-slate-200 hover:border-emerald-400 hover:bg-emerald-50' : 
                                                        (choice.isCorrect ? 'border-green-500 bg-green-50 text-green-800 shadow-sm' : 
                                                        (quiz5Answered === choice.id ? 'border-red-400 bg-red-50 text-red-600' : 'border-slate-100 text-slate-400 opacity-50'))}`}
                                                >
                                                    <span className="w-8 inline-block font-mono text-slate-500 print:text-black">①</span> {choice.text}
                                                </button>
                                            ))}
                                        </div>
                                        {quiz5Answered !== null && (
                                            <div className={`mt-4 p-4 rounded-lg text-sm leading-relaxed print:hidden ${quiz5Answered === 3 ? 'bg-green-50 text-green-900 border border-green-200' : 'bg-red-50 text-red-900 border border-red-200'}`}>
                                                <p className="font-bold mb-1">{quiz5Answered === 3 ? '🎉 정답입니다!' : '오답입니다.'}</p>
                                                <p><strong>해설:</strong> 여러 예술가들의 작품 사례(플라스틱 오염, 해양 산성화, 자연의 가치)를 통해, 예술이 단순히 아름다움을 넘어서 <strong>환경 문제에 대한 메시지를 전달하고 우리 스스로 행동을 바꾸도록 영감을 준다</strong>는 내용이 글 전체의 요지입니다.</p>
                                            </div>
                                        )}
                                    </div>

                                    {/* Quiz 6 */}
                                    <div className="border-t border-slate-200 pt-8 print:border-black print:pt-4">
                                        <div className="bg-slate-50 border border-slate-200 p-5 rounded-lg mb-4 print:bg-white print:border-none print:p-0 print:mb-4">
                                            <p className="font-bold text-slate-800 mb-2 print:text-black">Q6. 빈칸 추론</p>
                                            <p className="text-sm text-slate-600 mb-4 print:text-black">윗글의 내용을 바탕으로 빈칸에 들어갈 가장 적절한 말을 고르시오.</p>
                                            <p className="text-md leading-relaxed bg-white p-4 border border-slate-200 rounded print:border-slate-400 print:rounded-none print:text-black text-center">
                                                “They always say time changes things, but you actually have to change them <span className="inline-block w-40 border-b-2 border-slate-800 mx-1"></span>.”
                                            </p>
                                        </div>
                                        <div className="space-y-2 print:space-y-3">
                                            {[
                                                { id: 1, text: "slowly" },
                                                { id: 2, text: "yourself", isCorrect: true },
                                                { id: 3, text: "secretly" },
                                                { id: 4, text: "temporarily" }
                                            ].map((choice) => (
                                                <button key={choice.id} onClick={() => setQuiz6Answered(choice.id)} disabled={quiz6Answered !== null}
                                                    className={`w-full text-left p-4 rounded-lg border font-medium transition-all duration-200 print:border-none print:p-1 print:text-black
                                                        ${quiz6Answered === null ? 'border-slate-200 hover:border-emerald-400 hover:bg-emerald-50' : 
                                                        (choice.isCorrect ? 'border-green-500 bg-green-50 text-green-800 shadow-sm' : 
                                                        (quiz6Answered === choice.id ? 'border-red-400 bg-red-50 text-red-600' : 'border-slate-100 text-slate-400 opacity-50'))}`}
                                                >
                                                    <span className="w-8 inline-block font-mono text-slate-500 print:text-black">①</span> {choice.text}
                                                </button>
                                            ))}
                                        </div>
                                        {quiz6Answered !== null && (
                                            <div className={`mt-4 p-4 rounded-lg text-sm leading-relaxed print:hidden ${quiz6Answered === 2 ? 'bg-green-50 text-green-900 border border-green-200' : 'bg-red-50 text-red-900 border border-red-200'}`}>
                                                <p className="font-bold mb-1">{quiz6Answered === 2 ? '🎉 정답입니다!' : '오답입니다.'}</p>
                                                <p><strong>해설:</strong> 본문 36번 문장인 앤디 워홀의 인용구입니다. 시간이 해결해 줄 것이라 믿지 말고, 지구를 보호하기 위해 <strong>'당신 스스로(yourself)'</strong> 행동하고 변화를 만들어야 한다는 강력한 실천의 메시지를 담고 있습니다.</p>
                                            </div>
                                        )}
                                    </div>

                                </div>
                            </div>
                        </section>
                    </div>
                </main>

                {/* 모바일 하단 네비게이션 */}
                <nav className="md:hidden fixed bottom-0 w-full bg-white border-t border-slate-200 flex justify-around p-2 pb-safe z-30 shadow-[0_-5px_10px_rgba(0,0,0,0.05)] print:hidden">
                    <button onClick={() => setActiveTab('text')} className={`flex flex-col items-center p-2 min-w-[64px] transition-colors ${activeTab === 'text' ? 'text-emerald-700' : 'text-slate-400 hover:text-slate-600'}`}>
                        <i className={`${activeTab === 'text' ? 'ph-fill' : 'ph'} ph-book-open text-2xl mb-1`}></i>
                        <span className="text-[10px] font-bold">지문 분석</span>
                    </button>
                    <button onClick={() => setActiveTab('syntax')} className={`flex flex-col items-center p-2 min-w-[64px] transition-colors ${activeTab === 'syntax' ? 'text-emerald-700' : 'text-slate-400 hover:text-slate-600'}`}>
                        <i className={`${activeTab === 'syntax' ? 'ph-fill' : 'ph'} ph-highlighter-circle text-2xl mb-1`}></i>
                        <span className="text-[10px] font-bold">핵심 구문</span>
                    </button>
                    <button onClick={() => setActiveTab('map')} className={`flex flex-col items-center p-2 min-w-[64px] transition-colors ${activeTab === 'map' ? 'text-emerald-700' : 'text-slate-400 hover:text-slate-600'}`}>
                        <i className={`${activeTab === 'map' ? 'ph-fill' : 'ph'} ph-git-merge text-2xl mb-1`}></i>
                        <span className="text-[10px] font-bold">논리 구조도</span>
                    </button>
                    <button onClick={() => setActiveTab('quiz')} className={`flex flex-col items-center p-2 min-w-[64px] transition-colors ${activeTab === 'quiz' ? 'text-emerald-700' : 'text-slate-400 hover:text-slate-600'}`}>
                        <i className={`${activeTab === 'quiz' ? 'ph-fill' : 'ph'} ph-check-square-offset text-2xl mb-1`}></i>
                        <span className="text-[10px] font-bold">실전 문제</span>
                    </button>
                </nav>
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
