        const textData = [
          // Part 1: Intro & Amsterdam (Anne Frank House)
          { id: 1, text: "Before my trip to the Netherlands, all I knew of the country was that it is famous for windmills and tulips.", trans: "네덜란드 여행 전에 내가 그 나라에 대해 아는 것이라고는 풍차와 튤립으로 유명하다는 것뿐이었다." },
          { id: 2, text: "But as I cycled from place to place, I experienced many things that I hadn’t expected, and I wanted to share some of them with you.", trans: "하지만 자전거를 타고 이곳저곳을 다니면서 나는 기대하지 않았던 많은 것들을 경험했고, 그중 일부를 여러분과 공유하고 싶었다." },
          { id: 3, text: "“The Anne Frank House and the Prinsengracht in Amsterdam”", trans: "“암스테르담의 안네 프랑크의 집과 프린센흐라흐트”" },
          { id: 4, text: "My first stop was the Anne Frank House, one of the old buildings lined up along the Prinsengracht, a canal in Amsterdam.", trans: "나의 첫 번째 목적지는 암스테르담의 운하인 프린센흐라흐트를 따라 늘어선 오래된 건물들 중 하나인 안네 프랑크의 집이었다.", isHighlight: true, logicPoint: 1 },
          { id: 5, text: "Since it was close to the hotel I was staying at, I decided to rent a bike to go there.", trans: "내가 머물고 있는 호텔에서 가까웠기 때문에, 나는 자전거를 빌려 그곳에 가기로 결정했다." },
          { id: 6, text: "I enjoyed riding along the canal.", trans: "나는 운하를 따라 달리는 것을 즐겼다." },
          { id: 7, text: "The Anne Frank House is one of the most visited museums in the Netherlands.", trans: "안네 프랑크의 집은 네덜란드에서 가장 많이 방문하는 박물관 중 하나이다." },
          { id: 8, text: "It housed the secret hiding place of Anne Frank.", trans: "그곳에는 안네 프랑크의 비밀 은신처가 있었다." },
          { id: 9, text: "There was an old bookcase on the second floor.", trans: "2층에는 오래된 책장이 있었다." },
          { id: 10, text: "It looked ordinary, but behind it was a secret space where Anne and her family hid for over two years during World War II.", trans: "그것은 평범해 보였지만, 그 뒤에는 안네와 그녀의 가족이 제2차 세계 대전 동안 2년 넘게 숨어 지냈던 비밀 공간이 있었다." },
          { id: 11, text: "The steep stairs and narrow passages gave me a better understanding of what life must have been like for them back then.", trans: "가파른 계단과 좁은 통로들은 그 당시 그들의 삶이 어땠을지에 대한 더 나은 이해를 나에게 주었다." },
          { id: 12, text: "After visiting the Anne Frank House, I took a canal cruise on the Prinsengracht.", trans: "안네 프랑크의 집을 방문한 후, 나는 프린센흐라흐트에서 운하 크루즈를 탔다." },
          { id: 13, text: "The canal houses I saw along the way had mostly been built during the Dutch Golden Age, which gives them great historical value.", trans: "가는 길에 본 운하 주변의 집들은 대부분 네덜란드의 황금기 동안 지어졌으며, 이것은 그것들에 큰 역사적 가치를 부여한다." },
          { id: 14, text: "Taking the cruise was a great way to see the city from different angles.", trans: "크루즈를 타는 것은 다양한 각도에서 도시를 보는 훌륭한 방법이었다." },
          { id: 15, text: "The gentle touch of the wind made the experience even more pleasant.", trans: "부드러운 바람의 손길은 그 경험을 훨씬 더 즐겁게 만들었다." },

          // Part 2: Amsterdam (The Van Gogh Museum)
          { id: 16, text: "“The Van Gogh Museum in Amsterdam”", trans: "“암스테르담의 반 고흐 박물관”" },
          { id: 17, text: "Amsterdam is home to a lot of museums, but the Van Gogh Museum was the one I was really excited to visit.", trans: "암스테르담에는 많은 박물관이 있지만, 반 고흐 박물관은 내가 정말 방문하고 싶어 했던 곳이었다.", isHighlight: true, logicPoint: 2 },
          { id: 18, text: "The most interesting part of the museum was the way the exhibits were arranged to show how the artist’s style had changed over time.", trans: "이 박물관의 가장 흥미로운 부분은 시간이 지남에 따라 예술가의 스타일이 어떻게 변했는지를 보여주기 위해 전시물들이 배열된 방식이었다." },
          { id: 19, text: <span>The museum showed many of Vincent van Gogh’s most well-known works, including my personal favorites: <span className="italic font-medium">The Bedroom</span>, <span className="italic font-medium">Sunflowers</span>, and <span className="italic font-medium">Wheatfield with Crows</span>.</span>, trans: "이 박물관은 내가 개인적으로 가장 좋아하는 '침실', '해바라기', '까마귀가 있는 밀밭'을 포함하여 빈센트 반 고흐의 가장 잘 알려진 작품들 중 많은 것들을 보여주었다." },
          { id: 20, text: <span>The bright colors in <span className="italic font-medium">The Bedroom</span> seemed to convey a sense of relaxation.</span>, trans: "'침실'의 밝은 색상들은 편안함을 전달하는 것 같았다." },
          { id: 21, text: <span>The different shades of yellow in <span className="italic font-medium">Sunflowers</span> were just amazing.</span>, trans: "'해바라기'의 다양한 노란색 색조들은 그저 놀라웠다." },
          { id: 22, text: <span>In <span className="italic font-medium">Wheatfield with Crows</span>, the contrast between the bright yellow wheat field and the cool blue sky was striking.</span>, trans: "'까마귀가 있는 밀밭'에서 밝은 노란색 밀밭과 시원한 파란색 하늘 사이의 대조는 인상적이었다." },
          { id: 23, text: "Overall, seeing the artworks in person was a very powerful experience.", trans: "전반적으로 예술 작품들을 직접 보는 것은 매우 강력한 경험이었다." },
          { id: 24, text: "The museum also displayed the letters that Van Gogh wrote to his younger brother, Theo.", trans: "이 박물관은 또한 반 고흐가 남동생 테오에게 쓴 편지들도 전시했다." },
          { id: 25, text: "Reading those letters, I found out how much the artist loved his brother.", trans: "그 편지들을 읽으면서, 나는 그 예술가가 동생을 얼마나 사랑했는지 알게 되었다." },
          { id: 26, text: "After I bought a few postcards with Van Gogh’s art on them, I slowly cycled back to the hotel.", trans: "반 고흐의 예술 작품이 그려진 엽서 몇 장을 산 후, 나는 천천히 자전거를 타고 호텔로 돌아왔다." },
          { id: 27, text: "On my way back, I couldn’t help but admire the beautiful, calm, and scenic views of the city, especially people relaxing on the grass and enjoying the sun.", trans: "돌아오는 길에, 나는 이 도시의 아름답고 차분하며 경치 좋은 풍경, 특히 잔디밭에서 휴식을 취하며 햇살을 즐기는 사람들에 감탄하지 않을 수 없었다." },

          // Part 3: Zaanse Schans & Volendam
          { id: 28, text: "“Windmills in the Zaanse Schans and Seafood in Volendam”", trans: "“잔세스칸스의 풍차와 폴렌담의 해산물”" },
          { id: 29, text: "I highly recommend visiting the Zaanse Schans and Volendam if you want to get out of the busy city to experience traditional Dutch culture.", trans: "만약 번잡한 도시에서 벗어나 전통적인 네덜란드 문화를 경험하고 싶다면 잔세스칸스와 폴렌담을 방문할 것을 강력히 추천한다.", isHighlight: true, logicPoint: 3 },
          { id: 30, text: "A trip to the Netherlands wouldn’t be complete without a visit to the windmills.", trans: "네덜란드 여행은 풍차를 방문하지 않고는 완전하지 않을 것이다." },
          { id: 31, text: "Fortunately, you can get to the Zaanse Schans, which is famous for its windmills, in just 17 minutes by train from Amsterdam.", trans: "다행히도, 당신은 풍차로 유명한 잔세스칸스에 암스테르담에서 기차로 단 17분 만에 갈 수 있다." },
          { id: 32, text: "The moment I saw the village, its beauty took my breath away.", trans: "마을을 보는 순간, 그 아름다움이 나의 숨을 멎게 했다." },
          { id: 33, text: "Several windmills were spinning by the river in the distance.", trans: "저 멀리 강가에서 여러 개의 풍차가 돌고 있었다." },
          { id: 34, text: "Soon I felt like I was taken to a point in the past.", trans: "곧 나는 과거의 어느 시점으로 데려가진 것 같은 느낌이 들었다." },
          { id: 35, text: "I looked into one of the working windmills, and it was grinding nuts into oil with its large stone wheels.", trans: "나는 작동하고 있는 풍차 중 하나를 들여다보았고, 그것은 큰 돌바퀴로 견과류를 갈아 기름으로 만들고 있었다." },
          { id: 36, text: "Near the windmills, I found a cheese farm and a clog factory.", trans: "풍차 근처에서 나는 치즈 농장과 나막신 공장을 발견했다." },
          { id: 37, text: "I was surprised by the variety of Dutch cheeses and actually a little unsure about tasting them at first because they were mostly new to me.", trans: "나는 네덜란드 치즈의 다양성에 놀랐고, 그것들이 대부분 나에게 생소했기 때문에 처음에는 맛보는 것에 대해 사실 조금 확신이 없었다." },
          { id: 38, text: "However, when I tried some of them, they turned out to be incredibly satisfying.", trans: "하지만 몇 가지를 시식해 보았을 때, 그것들은 믿을 수 없을 정도로 만족스러운 것으로 판명되었다." },
          { id: 39, text: "I also tried on a few pairs of clogs and found them quite comfortable, which I hadn’t expected.", trans: "나는 또한 나막신 몇 켤레를 신어 보았고 예상했던 것과 달리 그것들이 꽤 편안하다는 것을 알았다." },
          { id: 40, text: "Volendam was a pretty fishing village with neat rows of brick houses with orange roofs.", trans: "폴렌담은 주황색 지붕을 가진 벽돌집들이 깔끔하게 늘어선 예쁜 어촌 마을이었다." },
          { id: 41, text: "The harbor was dotted with boats.", trans: "항구에는 배들이 점점이 떠 있었다." },
          { id: 42, text: "I rented a bike to explore Volendam, and the shop owner said, “In Volendam, do as the locals do and eat seafood.”", trans: "나는 폴렌담을 둘러보기 위해 자전거를 빌렸고, 가게 주인은 “폴렌담에서는 현지인들처럼 해산물을 드세요.”라고 말했다." },
          { id: 43, text: <span>At a restaurant, I ordered one of the Netherlands’ most popular dishes, <span className="italic font-medium">kibbeling</span>.</span>, trans: "한 식당에서 나는 네덜란드의 가장 인기 있는 요리 중 하나인 키벨링(kibbeling)을 주문했다." },
          { id: 44, text: "The fried fish snack was hot, fresh, and absolutely delicious!", trans: "그 생선튀김 간식은 뜨겁고, 신선하고, 정말 맛있었다!" },

          // Part 4: Rotterdam (Cube Houses)
          { id: 45, text: "“The Cube Houses in Rotterdam”", trans: "“로테르담의 큐브 하우스”" },
          { id: 46, text: "After being completely destroyed during World War II, Rotterdam was restored into a beautiful port city.", trans: "제2차 세계 대전 중에 완전히 파괴된 후, 로테르담은 아름다운 항구 도시로 복구되었다." },
          { id: 47, text: "Experimental and artistic constructions were used to improve the appearance of the city.", trans: "도시의 미관을 개선하기 위해 실험적이고 예술적인 건축물들이 사용되었다." },
          { id: 48, text: "The Cube Houses in Rotterdam are among the most innovative buildings in the country.", trans: "로테르담의 큐브 하우스는 이 나라에서 가장 혁신적인 건물들 중 하나이다.", isHighlight: true, logicPoint: 4 },
          { id: 49, text: "The bright yellow houses were something I had been looking forward to seeing, and they were as fantastic as I had expected.", trans: "그 밝은 노란색 집들은 내가 보기를 고대해 왔던 것이었고, 내가 기대했던 것만큼 환상적이었다." },
          { id: 50, text: "One of the key features of the Cube Houses is that the cubes are tilted by 45 degrees.", trans: "큐브 하우스의 주요 특징 중 하나는 큐브들이 45도 기울어져 있다는 것이다." },
          { id: 51, text: "I visited the Show Cube Museum to get a feel of what life in such a house was like.", trans: "나는 그런 집에서의 삶이 어떤지 느껴보기 위해 쇼 큐브 박물관을 방문했다." },
          { id: 52, text: "From the outside, it looked entirely twisted, but once I went inside, it was surprisingly quite comfortable.", trans: "밖에서 볼 때 그것은 완전히 비틀려 보였지만, 일단 안으로 들어가니 그것은 놀랍게도 꽤 편안했다." },

          // Part 5: Conclusion
          { id: 53, text: "For the last few days after the trip, I haven’t been able to get the charming sights of the Netherlands out of my mind.", trans: "여행 후 지난 며칠 동안, 나는 네덜란드의 매력적인 풍경들을 마음속에서 지울 수 없었다." },
          { id: 54, text: "If you ever plan to visit the country, I really hope that you will find my post helpful.", trans: "만약 당신이 이 나라를 방문할 계획이 있다면, 내 글이 도움이 되기를 진심으로 바란다.", isHighlight: true, logicPoint: 5 }
        ];

        const logicMapSteps = [

          { id: 'amsterdam2', title: "AMSTERDAM 2 (예술과 정서)", desc: "반 고흐 박물관 & 편지 전시", color: "bg-indigo-100 border-indigo-400 text-indigo-800", icon: <i className="ph-fill ph-palette text-xl mb-2"></i> },
          { id: 'tradition', title: "TRADITION (전통 문화 체험)", desc: "잔세스칸스의 풍차, 폴렌담의 어촌", color: "bg-orange-100 border-orange-400 text-orange-800", icon: <i className="ph-fill ph-windmill text-xl mb-2"></i> },
          { id: 'rotterdam', title: "ROTTERDAM (혁신과 재건)", desc: "파괴 후 재건된 큐브 하우스", color: "bg-teal-100 border-teal-400 text-teal-800", icon: <i className="ph-fill ph-buildings text-xl mb-2"></i> },
          { id: 'conclusion', title: "CONCLUSION (마무리)", desc: "네덜란드의 매력 회상과 추천", color: "bg-emerald-100 border-emerald-500 text-emerald-900", icon: <i className="ph-fill ph-camera text-xl mb-2"></i> }

            }

              setActiveTab('text'); 
          };

              if (activeTab === 'text' && activeLogic !== null) {

                  if (targetItem && itemRefs.current[targetItem.id]) {
                      setTimeout(() => {
                          itemRefs.current[targetItem.id].scrollIntoView({ behavior: 'smooth', block: 'center' });
                      }, 150);
                  }
              }
          }, [activeLogic, activeTab]);

          const [quiz1Answered, setQuiz1Answered] = useState(null);
          const [quiz2Answered, setQuiz2Answered] = useState(null);
          const [quiz3Answered, setQuiz3Answered] = useState(null);
          const [quiz4Answered, setQuiz4Answered] = useState(null);
          const [quiz5Answered, setQuiz5Answered] = useState(null);
          const [quiz6Answered, setQuiz6Answered] = useState(null);

          const handlePrint = () => { window.print(); };

          if (!isAuthenticated) {
            return (
              <div className="min-h-screen bg-pattern flex items-center justify-center p-4">
                <div className="bg-white p-8 md:p-10 rounded-2xl shadow-2xl max-w-md w-full text-center border-t-8 border-emerald-700">
                  <div className="mx-auto bg-emerald-100 w-16 h-16 rounded-full flex items-center justify-center mb-6">
                    <i className="ph-fill ph-lock-key text-3xl text-emerald-700"></i>

                    <button onClick={() => setActiveTab('quiz')} className={`flex flex-col items-center p-2 min-w-[64px] transition-colors ${activeTab === 'quiz' ? 'text-emerald-700' : 'text-slate-400 hover:text-slate-600'}`}>
                        <i className={`${activeTab === 'quiz' ? 'ph-fill' : 'ph'} ph-check-square-offset text-2xl mb-1`}></i>
                        <span className="text-[10px] font-bold">실전 문제</span>
                    </button>
                </nav>
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
