<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>THE LOGIC Interactive App - Digital Literacy</title>
    
    <meta name="theme-color" content="#064e3b">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="LOGIC App">
    <link rel="apple-touch-icon" href="https://via.placeholder.com/512/064e3b/ffffff.png?text=LOGIC">
    <link rel="icon" type="image/png" sizes="512x512" href="https://via.placeholder.com/512/064e3b/ffffff.png?text=LOGIC">
    
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    
    <style>
        @media print {
            body {
                -webkit-print-color-adjust: exact;
                print-color-adjust: exact;
                background-color: white !important;
            }
            ::-webkit-scrollbar {
                display: none;
            }
            .print-avoid-break {
                break-inside: avoid;
            }
            .print-show-all {
                display: block !important;
            }
            .print-hide {
                display: none !important;
            }
            .print-page-break {
                page-break-before: always;
            }
        }
        .bg-pattern {
            background-color: #ecfdf5;
            background-image: radial-gradient(#a7f3d0 1px, transparent 1px);
            background-size: 20px 20px;
        }
        .app-like {
            -webkit-user-select: none;
            user-select: none;
        }
        .text-selectable {
            -webkit-user-select: text;
            user-select: text;
        }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #f1f5f9; }
        ::-webkit-scrollbar-thumb { background: #6ee7b7; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #34d399; }
    </style>
</head>
<body class="app-like bg-slate-50">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const textData = [
          // Part 1: The Experiment
          { id: 1, text: "British writer Oobah Butler wanted to experiment with how easily one can manipulate public opinion online.", trans: "영국 작가 Oobah Butler는 온라인에서 여론을 얼마나 쉽게 조작할 수 있는지 실험하고 싶었다." },
          { id: 2, text: "He created a fake restaurant called The Shed at Dulwich.", trans: "그는 The Shed at Dulwich라는 가짜 식당을 만들었다." },
          { id: 3, text: "Butler set up an account for his “restaurant” on a popular online review site.", trans: "Butler는 유명한 온라인 리뷰 사이트에 자신의 “식당” 계정을 설정했다." },
          { id: 4, text: "He did not provide an exact address and wrote it was reservations only.", trans: "그는 정확한 주소를 제공하지 않았고 예약제로만 운영된다고 적었다." },
          { id: 5, text: "He did this to make people think The Shed was a special restaurant.", trans: "그는 사람들이 The Shed를 특별한 식당이라고 생각하게 만들기 위해 이렇게 했다." },
          { id: 6, text: "He faked photos of The Shed’s food with shaving cream, whitening tablets, and even his own foot.", trans: "그는 면도 크림, 표백제, 심지어 자신의 발을 사용하여 The Shed의 음식 사진을 위조했다." },
          { id: 7, text: "He then asked his friends to write favorable fake reviews on the review site.", trans: "그런 다음 그는 친구들에게 리뷰 사이트에 호의적인 가짜 리뷰를 써달라고 부탁했다." },
          { id: 8, text: "Things quickly got, in Butler’s words, “a little out of hand.”", trans: "Butler의 표현에 따르면, 상황은 곧 “약간 통제 불능”이 되었다." },
          { id: 9, text: "From the lowest of the charts of the review site, The Shed continuously climbed the London rankings.", trans: "리뷰 사이트 차트의 최하위에서 시작하여, The Shed는 런던 순위를 계속해서 올라갔다." },
          { id: 10, text: "He started getting e-mails and phone calls requesting reservations.", trans: "그는 예약을 요청하는 이메일과 전화를 받기 시작했다." },
          { id: 11, text: "Interest further increased when he told callers The Shed was “fully booked for the next six weeks.”", trans: "그가 전화한 사람들에게 The Shed가 “앞으로 6주 동안 예약이 꽉 찼다”고 말하자 관심은 더욱 커졌다." },
          { id: 12, text: "Even funnier, food suppliers started guessing The Shed’s address and sent him free samples, and many job applications came in.", trans: "더욱 재미있는 것은, 식자재 공급업자들이 The Shed의 주소를 추측하여 그에게 무료 샘플을 보내기 시작했고, 많은 구직 지원서가 들어왔다는 것이다." },
          { id: 13, text: "These things happened without Butler serving a single meal.", trans: "이 모든 일들은 Butler가 단 한 끼의 식사도 제공하지 않은 상태에서 일어났다." },
          { id: 14, text: "The Shed eventually became London’s number-one restaurant on one of the most trusted restaurant review sites.", trans: "The Shed는 결국 가장 신뢰받는 식당 리뷰 사이트 중 하나에서 런던 1위의 식당이 되었다.", isHighlight: true, logicPoint: 1, logic: 'experiment' },
          { id: 15, text: "According to Butler, The Shed held that ranking for two weeks.", trans: "Butler에 따르면, The Shed는 2주 동안 그 순위를 유지했다." },

          // Part 2: The Concept
          { id: 16, text: "Butler’s story shows that much of what we see on the Internet cannot be trusted.", trans: "Butler의 이야기는 우리가 인터넷에서 보는 많은 것을 신뢰할 수 없다는 것을 보여준다." },
          { id: 17, text: "This emphasizes the importance of digital literacy.", trans: "이것은 디지털 리터러시의 중요성을 강조한다.", isHighlight: true, logicPoint: 2, logic: 'concept' },
          { id: 18, text: "Digital literacy is about more than just using computers.", trans: "디지털 리터러시는 단순히 컴퓨터를 사용하는 것 이상에 관한 것이다." },
          { id: 19, text: "It is the ability to use digital technology to find, evaluate, create, and communicate information.", trans: "그것은 디지털 기술을 사용하여 정보를 찾고, 평가하고, 생성하고, 소통하는 능력이다." },
          { id: 20, text: "To become digitally literate, we need to develop an attitude and knowledge that enable us to detect false information online.", trans: "디지털 리터러시를 갖추기 위해, 우리는 온라인에서 거짓 정보를 탐지할 수 있게 해주는 태도와 지식을 기를 필요가 있다." },
          { id: 21, text: "False information is any information that misinforms or deceives people.", trans: "거짓 정보는 사람들에게 잘못된 정보를 주거나 속이는 모든 정보이다." },
          { id: 22, text: "It can be about anything such as health, the environment, and economics across many platforms.", trans: "그것은 많은 플랫폼에 걸쳐 건강, 환경, 경제 등 어떤 것에 관한 것일 수도 있다." },
          { id: 23, text: "It can be influential, as The Shed incident shows.", trans: "The Shed 사건이 보여주듯이, 그것은 영향력이 클 수 있다." },

          // Part 3: The Harm
          { id: 24, text: "If people had been digitally literate, they would not have been fooled by The Shed experiment so easily.", trans: "만약 사람들이 디지털 리터러시를 갖추고 있었다면, 그들은 The Shed 실험에 그렇게 쉽게 속지 않았을 것이다." },
          { id: 25, text: "Digitally literate people would have carefully considered information about The Shed without being distracted by other people’s reactions.", trans: "디지털 리터러시를 갖춘 사람들은 다른 사람들의 반응에 주의를 빼앗기지 않고 The Shed에 대한 정보를 신중하게 고려했을 것이다." },
          { id: 26, text: "They would have been suspicious that the restaurant did not have an address.", trans: "그들은 그 식당이 주소가 없다는 것을 의심했을 것이다." },
          { id: 27, text: "They would have wondered why reviews on the restaurant did not appear in other more credible media.", trans: "그들은 왜 그 식당에 대한 리뷰가 더 신뢰할 수 있는 다른 매체에 나타나지 않는지 궁금해했을 것이다." },
          { id: 28, text: "If they had done these things, they would likely have suspected that something was not right.", trans: "만약 그들이 이렇게 했다면, 그들은 아마 무언가 잘못되었다고 의심했을 것이다." },
          { id: 29, text: "Fortunately, The Shed incident was an experiment that caused little damage.", trans: "다행히도, The Shed 사건은 피해를 거의 일으키지 않은 실험이었다." },
          { id: 30, text: "However, false information can cause emotional or financial harm to people.", trans: "하지만, 거짓 정보는 사람들에게 감정적이거나 재정적인 피해를 일으킬 수 있다.", isHighlight: true, logicPoint: 3, logic: 'harm' },
          { id: 31, text: "For example, false information about a certain gender or belief group can stir up hatred against that group.", trans: "예를 들어, 특정 성별이나 신념 집단에 대한 거짓 정보는 그 집단에 대한 증오를 불러일으킬 수 있다." },
          { id: 32, text: "It can cause fights between those who support the group and those who do not.", trans: "그것은 그 집단을 지지하는 사람들과 그렇지 않은 사람들 사이에 싸움을 일으킬 수 있다." },
          { id: 33, text: "In addition, misleading online reviews about questionable products often trick people into wasting money.", trans: "게다가, 의심스러운 제품에 대한 오해를 불러일으키는 온라인 리뷰는 종종 사람들을 속여 돈을 낭비하게 만든다." },

          // Part 4: The Action
          { id: 34, text: "To avoid being deceived by false information, we need to develop a habit of critically evaluating what we see online.", trans: "거짓 정보에 속지 않기 위해, 우리는 온라인에서 보는 것을 비판적으로 평가하는 습관을 기를 필요가 있다.", isHighlight: true, logicPoint: 4, logic: 'action' },
          { id: 35, text: "If you see a story that looks too good or too bad to be true, check the source first.", trans: "만약 사실이기에 너무 좋거나 너무 나빠 보이는 이야기를 본다면, 먼저 출처를 확인하라." },
          { id: 36, text: "Look at the website the story comes from.", trans: "이야기가 나온 웹사이트를 보라." },
          { id: 37, text: "Does it look real? Are there spelling errors? Does it have other stories or just the one you read?", trans: "그것이 진짜처럼 보이는가? 철자 오류가 있는가? 당신이 읽은 하나의 이야기만 있는가 아니면 다른 이야기들도 있는가?" },
          { id: 38, text: "Check that the story contains references and links to other information.", trans: "이야기에 다른 정보에 대한 출처와 링크가 포함되어 있는지 확인하라." },
          { id: 39, text: "Click on those links and see if the other information looks reliable.", trans: "그 링크들을 클릭해 보고 다른 정보가 신뢰할 만한지 확인하라." },
          { id: 40, text: "Websites with false information often do not have many real stories about other topics.", trans: "거짓 정보가 있는 웹사이트들은 종종 다른 주제에 대한 진짜 이야기를 많이 가지고 있지 않다." },
          { id: 41, text: "They also often have lots of advertisements that pop up when you visit the sites.", trans: "그것들은 또한 당신이 사이트를 방문할 때 나타나는 많은 팝업 광고를 가지고 있는 경우가 많다." },
          { id: 42, text: "You should then check the credibility of the content creator.", trans: "그런 다음 당신은 콘텐츠 제작자의 신뢰성을 확인해야 한다." },
          { id: 43, text: "If a story has no writer’s name, this could be a sign that its content is questionable.", trans: "만약 이야기에 작가의 이름이 없다면, 이것은 그 내용이 의심스럽다는 신호일 수 있다." },
          { id: 44, text: "If there is a name, find out what and where the person has reported before.", trans: "이름이 있다면, 그 사람이 이전에 무엇을 어디에 보도했는지 알아보라." },
          { id: 45, text: "If the person has not written anything else or writes for a website that looks unreliable, think twice before believing the content.", trans: "만약 그 사람이 다른 것을 쓰지 않았거나 신뢰할 수 없어 보이는 웹사이트에 글을 쓴다면, 그 내용을 믿기 전에 다시 한번 생각하라." },
          { id: 46, text: "Finally, check who else is reporting the story.", trans: "마지막으로, 다른 누가 그 이야기를 보도하고 있는지 확인하라." },
          { id: 47, text: "If no other media are reporting the same story, the story may not be true.", trans: "만약 다른 매체가 같은 이야기를 보도하고 있지 않다면, 그 이야기는 사실이 아닐 수 있다." },
          { id: 48, text: "Pick a few keywords from the story and put them in a search site to see if other media are supporting the story.", trans: "이야기에서 몇 가지 키워드를 골라 검색 사이트에 넣고 다른 매체가 그 이야기를 뒷받침하고 있는지 확인하라." },

          // Part 5: Conclusion
          { id: 49, text: "Sorting through the vast amount of information created and shared online is challenging.", trans: "온라인에서 생성되고 공유되는 방대한 양의 정보를 분류하는 것은 어려운 일이다." },
          { id: 50, text: "However, it is important that we know what false information is and how it spreads.", trans: "하지만, 우리가 거짓 정보가 무엇이고 그것이 어떻게 퍼지는지 아는 것은 중요하다." },
          { id: 51, text: "The better we recognize false information, the better we will be at avoiding it and helping others do the same.", trans: "우리가 거짓 정보를 더 잘 인식할수록, 우리는 그것을 더 잘 피하고 다른 사람들도 그렇게 하도록 더 잘 도울 것이다.", isHighlight: true, logicPoint: 5, logic: 'conclusion' }
        ];

        const logicMapSteps = [
          { id: 'experiment', title: "THE EXPERIMENT (실험과 결과)", desc: "The Shed의 거짓 성공 사례", color: "bg-blue-100 border-blue-400 text-blue-800", icon: <i className="ph-fill ph-flask text-xl mb-2"></i> },
          { id: 'concept', title: "THE CONCEPT (개념 정의)", desc: "디지털 리터러시와 거짓 정보", color: "bg-indigo-100 border-indigo-400 text-indigo-800", icon: <i className="ph-fill ph-book-bookmark text-xl mb-2"></i> },
          { id: 'harm', title: "THE HARM (거짓 정보의 폐해)", desc: "정서적 및 재정적 피해 발생", color: "bg-red-100 border-red-400 text-red-800", icon: <i className="ph-fill ph-warning-circle text-xl mb-2"></i> },
          { id: 'action', title: "THE ACTION (실천 방안)", desc: "출처, 제작자, 교차 검증", color: "bg-teal-100 border-teal-400 text-teal-800", icon: <i className="ph-fill ph-magnifying-glass text-xl mb-2"></i> },
          { id: 'conclusion', title: "CONCLUSION (최종 결론)", desc: "인식을 통한 거짓 정보 회피", color: "bg-emerald-100 border-emerald-500 text-emerald-900", icon: <i className="ph-fill ph-shield-check text-xl mb-2"></i> }
        ];

        function App() {
          const [isAuthenticated, setIsAuthenticated] = useState(false);
          const [passwordInput, setPasswordInput] = useState("");
          const [loginError, setLoginError] = useState("");
          
          const CORRECT_PASSWORD = "Made by Lee";

          const itemRefs = useRef({});

          const handleLoginSubmit = (e) => {
            e.preventDefault();
            if (passwordInput === CORRECT_PASSWORD) {
              setIsAuthenticated(true);
              setLoginError("");
            } else {
              setLoginError("올바르지 않은 암호입니다. 다시 확인해 주세요.");
              setPasswordInput("");
            }
          };

          const [activeTab, setActiveTab] = useState('text');
          const [activeLogic, setActiveLogic] = useState(null);
          
          const handleLogicClick = (point) => {
              setActiveLogic(activeLogic === point ? null : point);
              setActiveTab('text'); 
          };

          useEffect(() => {
              if (activeTab === 'text' && activeLogic !== null) {
                  const targetItem = textData.find(item => item.logicPoint === activeLogic);
                  if (targetItem && itemRefs.current[targetItem.id]) {
                      setTimeout(() => {
                          itemRefs.current[targetItem.id].scrollIntoView({ behavior: 'smooth', block: 'center' });
                      }, 150);
                  }
              }
          }, [activeLogic, activeTab]);

          const [quiz1Answered, setQuiz1Answered] = useState(null);
          const [quiz2Answered, setQuiz2Answered] = useState(null);
          const [quiz3Answered, setQuiz3Answered] = useState(null);
          const [quiz4Answered, setQuiz4Answered] = useState(null);
          const [quiz5Answered, setQuiz5Answered] = useState(null);
          const [quiz6Answered, setQuiz6Answered] = useState(null);

          const handlePrint = () => { window.print(); };

          if (!isAuthenticated) {
            return (
              <div className="min-h-screen bg-pattern flex items-center justify-center p-4">
                <div className="bg-white p-8 md:p-10 rounded-2xl shadow-2xl max-w-md w-full text-center border-t-8 border-emerald-700">
                  <div className="mx-auto bg-emerald-100 w-16 h-16 rounded-full flex items-center justify-center mb-6">
                    <i className="ph-fill ph-lock-key text-3xl text-emerald-700"></i>
                  </div>
                  <h2 className="text-2xl font-serif font-bold text-slate-800 mb-2">THE LOGIC INTERACTIVE</h2>
                  <p className="text-emerald-600 font-bold mb-6 text-sm">Fake or Fact, That Is the Question</p>
                  
                  <div className="bg-slate-50 border border-slate-200 rounded-lg p-4 mb-6">
                    <p className="text-slate-600 text-sm leading-relaxed">
                      이 콘텐츠는 <strong>Lee 선생님</strong>이 기획하고 제작한<br/>교육용 창작물입니다. (무단 배포 금지)<br/>
                      <span className="inline-block mt-2 font-medium text-slate-700">열람을 위해 선생님이 안내한 암호를 입력해 주세요.</span>
                    </p>
                  </div>

                  <form onSubmit={handleLoginSubmit} className="flex flex-col gap-3">
                    <input type="text" placeholder="접근 암호 (예: Made by Lee)" className="border border-slate-300 p-3 rounded-lg focus:outline-none focus:border-emerald-500 focus:ring-2 focus:ring-emerald-200 transition-all text-center font-medium text-selectable" value={passwordInput} onChange={(e) => setPasswordInput(e.target.value)} />
                    {loginError && <p className="text-red-500 text-sm font-medium animate-pulse">{loginError}</p>}
                    <button type="submit" className="bg-emerald-900 hover:bg-emerald-800 text-white font-bold py-3 rounded-lg transition-colors mt-2 shadow-md flex items-center justify-center gap-2">
                      <i className="ph-bold ph-key"></i> 잠금 해제
                    </button>
                  </form>
                  <div className="mt-8 border-t border-slate-100 pt-4">
                    <p className="text-xs text-slate-400 font-mono tracking-wider">© 2026. Made by Lee. All rights reserved.</p>
                  </div>
                </div>
              </div>
            );
          }

          return (
            <div className="flex h-screen overflow-hidden bg-slate-50 font-sans text-slate-800 print:h-auto print:bg-white">
                
                {/* 사이드바 */}
                <aside className="hidden md:flex flex-col w-72 bg-emerald-950 text-white shadow-2xl z-20 print:hidden">
                    <div className="p-6 bg-emerald-900 border-b border-emerald-800">
                        <div className="flex items-center gap-2 mb-2 opacity-80">
                            <i className="ph-fill ph-brain text-xl"></i>
                            <span className="text-xs font-bold tracking-wider">THE LOGIC INTERACTIVE</span>
                        </div>
                        <h1 className="text-2xl font-serif font-bold leading-tight">Fake or Fact</h1>
                        <p className="text-emerald-300 text-sm mt-2 italic">That Is the Question</p>
                    </div>

                                    {/* Quiz 1 */}
                                    <div>
                                        <div className="bg-slate-50 border border-slate-200 p-5 rounded-lg mb-4 print:bg-white print:border-none print:p-0 print:mb-4">
                                            <p className="font-bold text-slate-800 mb-2 print:text-black">Q1. 내용 불일치 파악</p>
                                            <p className="text-sm text-slate-600 print:text-black">윗글의 내용과 일치하지 <span className="font-bold text-red-600 print:text-black">않는</span> 것은?</p>
                                        </div>
                                        <div className="space-y-2 print:space-y-3">
                                            {[
                                                { id: 1, text: "Oobah Butler는 온라인 리뷰 사이트에 실제로 존재하지 않는 식당을 등록했다." },
                                                { id: 2, text: "The Shed는 Butler가 정성껏 만든 요리로 사람들의 입소문을 타기 시작했다.", isCorrect: true },
                                                { id: 3, text: "거짓 정보는 특정 신념 집단에 대한 혐오감을 불러일으킬 수 있다." },
                                                { id: 4, text: "디지털 리터러시를 통해 우리는 거짓 정보를 판별하는 능력을 기를 수 있다." }
                                            ].map((choice) => (
                                                <button key={choice.id} onClick={() => setQuiz1Answered(choice.id)} disabled={quiz1Answered !== null}
                                                    className={`w-full text-left p-4 rounded-lg border font-medium transition-all duration-200 print:border-none print:p-1 print:text-black
                                                        ${quiz1Answered === null ? 'border-slate-200 hover:border-emerald-400 hover:bg-emerald-50' : 
                                                        (choice.isCorrect ? 'border-green-500 bg-green-50 text-green-800 shadow-sm' : 
                                                        (quiz1Answered === choice.id ? 'border-red-400 bg-red-50 text-red-600' : 'border-slate-100 text-slate-400 opacity-50'))}`}
                                                >
                                                    <span className="w-8 inline-block font-mono text-slate-500 print:text-black">①</span> {choice.text}
                                                </button>
                                            ))}
                                        </div>
                                        {quiz1Answered !== null && (
                                            <div className={`mt-4 p-4 rounded-lg text-sm leading-relaxed print:hidden ${quiz1Answered === 2 ? 'bg-green-50 text-green-900 border border-green-200' : 'bg-red-50 text-red-900 border border-red-200'}`}>
                                                <p className="font-bold mb-1">{quiz1Answered === 2 ? '🎉 정답입니다!' : '오답입니다.'}</p>
                                                <p><strong>해설:</strong> 본문 13번 문장에서 <strong>"Butler가 단 한 끼의 식사도 제공하지 않은 상태에서(without serving a single meal)"</strong> 일어난 일이라고 명시되어 있습니다. 면도 크림 등으로 사진만 조작했을 뿐 요리를 제공하지 않았습니다.</p>
                                            </div>
                                        )}
                                    </div>

                                    {/* Quiz 2 */}
                                    <div className="border-t border-slate-200 pt-8 print:border-black print:pt-4">
                                        <div className="bg-slate-50 border border-slate-200 p-5 rounded-lg mb-4 print:bg-white print:border-none print:p-0 print:mb-4">
                                            <p className="font-bold text-slate-800 mb-2 print:text-black">Q2. 문장 삽입</p>
                                            <p className="text-sm text-slate-600 mb-4 print:text-black">글의 흐름으로 보아, 주어진 문장이 들어가기에 가장 적절한 곳을 고르시오.</p>
                                            <div className="text-md font-bold text-center bg-white p-4 border border-slate-300 rounded mb-4 print:border-slate-400 print:rounded-none print:text-black">
                                                However, false information can cause emotional or financial harm to people.
                                            </div>
                                            <p className="text-md leading-relaxed bg-white p-4 border border-slate-200 rounded print:border-slate-400 print:rounded-none print:text-black">
                                                If they had done these things, they would likely have suspected that something was not right. ( ① ) Fortunately, The Shed incident was an experiment that caused little damage. ( ② ) For example, false information about a certain gender or belief group can stir up hatred against that group. ( ③ ) It can cause fights between those who support the group and those who do not. ( ④ ) In addition, misleading online reviews about questionable products often trick people into wasting money.
                                            </p>
                                        </div>
                                        <div className="grid grid-cols-4 gap-2 print:grid-cols-4 print:gap-4">
                                            {[
                                                { id: 1, text: "①" }, { id: 2, text: "②", isCorrect: true }, { id: 3, text: "③" }, { id: 4, text: "④" }
                                            ].map((choice) => (
                                                <button key={choice.id} onClick={() => setQuiz2Answered(choice.id)} disabled={quiz2Answered !== null}
                                                    className={`w-full text-center p-3 rounded-lg border font-bold transition-all duration-200 print:border-none print:p-1 print:text-black
                                                        ${quiz2Answered === null ? 'border-slate-200 hover:border-emerald-400 hover:bg-emerald-50' : 
                                                        (choice.isCorrect ? 'border-green-500 bg-green-50 text-green-800 shadow-sm' : 
                                                        (quiz2Answered === choice.id ? 'border-red-400 bg-red-50 text-red-600' : 'border-slate-100 text-slate-400 opacity-50'))}`}
                                                >
                                                    {choice.text}
                                                </button>
                                            ))}
                                        </div>
                                        {quiz2Answered !== null && (
                                            <div className={`mt-4 p-4 rounded-lg text-sm leading-relaxed print:hidden ${quiz2Answered === 2 ? 'bg-green-50 text-green-900 border border-green-200' : 'bg-red-50 text-red-900 border border-red-200'}`}>
                                                <p className="font-bold mb-1">{quiz2Answered === 2 ? '🎉 정답입니다!' : '오답입니다.'}</p>
                                                <p><strong>해설:</strong> 앞선 문장에서 'The Shed 사건은 피해가 거의 없었다'고 안심시킨 뒤, 주어진 문장의 <strong>However(하지만)</strong>를 통해 화제를 전환하여 '일반적인 거짓 정보가 유발하는 심각한 피해'를 이야기합니다. 뒤이어 증오(emotional)나 돈 낭비(financial) 예시가 이어지므로 <strong>②번</strong> 자리가 적절합니다.</p>
                                            </div>
                                        )}
                                    </div>
                                    
                                    {/* Quiz 3 */}
                                    <div className="border-t border-slate-200 pt-8 print:border-black print:pt-4">
                                        <div className="bg-slate-50 border border-slate-200 p-5 rounded-lg mb-4 print:bg-white print:border-none print:p-0 print:mb-4">
                                            <p className="font-bold text-slate-800 mb-2 print:text-black">Q3. 요약문 완성</p>
                                            <p className="text-sm text-slate-600 mb-4 print:text-black">다음 글의 내용을 한 문장으로 요약하고자 한다. 빈칸 (A), (B)에 들어갈 말로 가장 적절한 것은?</p>
                                            <p className="text-md leading-relaxed bg-white p-4 border border-slate-200 rounded print:border-slate-400 print:rounded-none print:text-black">
                                                Because it is easy to <span className="font-bold text-emerald-700">( A )</span> public opinion online, developing digital literacy is crucial to <span className="font-bold text-emerald-700">( B )</span> evaluate information and avoid potential harm.
                                            </p>
                                        </div>
                                        <div className="space-y-2 print:space-y-3">
                                            {[
                                                { id: 1, text: "(A) manipulate —— (B) critically", isCorrect: true },
                                                { id: 2, text: "(A) manipulate —— (B) emotionally" },
                                                { id: 3, text: "(A) represent —— (B) favorably" },
                                                { id: 4, text: "(A) measure —— (B) passively" }
                                            ].map((choice) => (
                                                <button key={choice.id} onClick={() => setQuiz3Answered(choice.id)} disabled={quiz3Answered !== null}
                                                    className={`w-full text-left p-4 rounded-lg border font-medium transition-all duration-200 print:border-none print:p-1 print:text-black
                                                        ${quiz3Answered === null ? 'border-slate-200 hover:border-emerald-400 hover:bg-emerald-50' : 
                                                        (choice.isCorrect ? 'border-green-500 bg-green-50 text-green-800 shadow-sm' : 
                                                        (quiz3Answered === choice.id ? 'border-red-400 bg-red-50 text-red-600' : 'border-slate-100 text-slate-400 opacity-50'))}`}
                                                >
                                                    <span className="w-8 inline-block font-mono text-slate-500 print:text-black">①</span> {choice.text}
                                                </button>
                                            ))}
                                        </div>
                                        {quiz3Answered !== null && (
                                            <div className={`mt-4 p-4 rounded-lg text-sm leading-relaxed print:hidden ${quiz3Answered === 1 ? 'bg-green-50 text-green-900 border border-green-200' : 'bg-red-50 text-red-900 border border-red-200'}`}>
                                                <p className="font-bold mb-1">{quiz3Answered === 1 ? '🎉 정답입니다!' : '오답입니다.'}</p>
                                                <p><strong>해설:</strong> 온라인 여론을 <strong>조작하는(manipulate)</strong> 것이 쉽기 때문에, 정보를 <strong>비판적으로(critically)</strong> 평가하여 피해를 방지하는 디지털 리터러시 능력이 중요하다는 것이 전체 글의 핵심 요지입니다.</p>
                                            </div>
                                        )}
                                    </div>

                                    {/* Quiz 4 */}
                                    <div className="border-t border-slate-200 pt-8 print:border-black print:pt-4">
                                        <div className="bg-slate-50 border border-slate-200 p-5 rounded-lg mb-4 print:bg-white print:border-none print:p-0 print:mb-4">
                                            <p className="font-bold text-slate-800 mb-2 print:text-black">Q4. 어휘 추론</p>
                                            <p className="text-sm text-slate-600 mb-4 print:text-black">문맥상 밑줄 친 단어 중 쓰임이 적절하지 <span className="font-bold text-red-600 print:text-black">않은</span> 것은?</p>
                                            <p className="text-md leading-relaxed bg-white p-4 border border-slate-200 rounded print:border-slate-400 print:rounded-none print:text-black">
                                                If people had been digitally literate, they would not have been ①<span className="font-bold">fooled</span> by The Shed experiment so easily. Digitally literate people would have carefully considered information without being ②<span className="font-bold">distracted</span> by other people’s reactions. They would have wondered why reviews did not appear in other more ③<span className="font-bold">credible</span> media. If they had done these things, they would likely have ④<span className="font-bold text-red-600">trusted</span> that something was not right.
                                            </p>
                                        </div>
                                        <div className="grid grid-cols-2 md:grid-cols-4 gap-2 print:grid-cols-4 print:gap-4">
                                            {[
                                                { id: 1, text: "① fooled" }, 
                                                { id: 2, text: "② distracted" }, 
                                                { id: 3, text: "③ credible" }, 
                                                { id: 4, text: "④ trusted", isCorrect: true }
                                            ].map((choice) => (
                                                <button key={choice.id} onClick={() => setQuiz4Answered(choice.id)} disabled={quiz4Answered !== null}
                                                    className={`w-full text-center p-3 rounded-lg border font-medium transition-all duration-200 print:border-none print:p-1 print:text-black
                                                        ${quiz4Answered === null ? 'border-slate-200 hover:border-emerald-400 hover:bg-emerald-50' : 
                                                        (choice.isCorrect ? 'border-green-500 bg-green-50 text-green-800 shadow-sm' : 
                                                        (quiz4Answered === choice.id ? 'border-red-400 bg-red-50 text-red-600' : 'border-slate-100 text-slate-400 opacity-50'))}`}
                                                >
                                                    {['①', '②', '③', '④'][choice.id - 1]} {choice.text.substring(2)}
                                                </button>
                                            ))}
                                        </div>
                                        {quiz4Answered !== null && (
                                            <div className={`mt-4 p-4 rounded-lg text-sm leading-relaxed print:hidden ${quiz4Answered === 4 ? 'bg-green-50 text-green-900 border border-green-200' : 'bg-red-50 text-red-900 border border-red-200'}`}>
                                                <p className="font-bold mb-1">{quiz4Answered === 4 ? '🎉 정답입니다!' : '오답입니다. 다시 한번 생각해 보세요.'}</p>
                                                <p><strong>해설: ④ trusted $\rightarrow$ suspected</strong><br/>이러한 확인 과정을 거쳤다면, 사람들은 무언가 잘못되었다는 것을 '신뢰한(trusted)' 것이 아니라 당연히 <strong>'의심했을(suspected)'</strong> 것입니다.</p>
                                            </div>
                                        )}
                                    </div>

                                    {/* Quiz 5 */}
                                    <div className="border-t border-slate-200 pt-8 print:border-black print:pt-4">
                                        <div className="bg-slate-50 border border-slate-200 p-5 rounded-lg mb-4 print:bg-white print:border-none print:p-0 print:mb-4">
                                            <p className="font-bold text-slate-800 mb-2 print:text-black">Q5. 요지 파악</p>
                                            <p className="text-sm text-slate-600 mb-4 print:text-black">윗글의 요지로 가장 적절한 것은?</p>
                                        </div>
                                        <div className="space-y-2 print:space-y-3">
                                            {[
                                                { id: 1, text: "식당을 개업할 때는 온라인 마케팅과 긍정적인 초기 리뷰 확보가 필수적이다." },
                                                { id: 2, text: "과도한 팝업 광고를 포함하는 웹사이트는 기술적인 결함이 있을 확률이 높다." },
                                                { id: 3, text: "온라인 상의 거짓 정보에 속지 않기 위해 비판적 정보 평가 능력을 길러야 한다.", isCorrect: true },
                                                { id: 4, text: "언론 매체는 자신들이 보도하는 내용의 출처를 투명하게 공개해야 할 의무가 있다." }
                                            ].map((choice) => (
                                                <button key={choice.id} onClick={() => setQuiz5Answered(choice.id)} disabled={quiz5Answered !== null}
                                                    className={`w-full text-left p-4 rounded-lg border font-medium transition-all duration-200 print:border-none print:p-1 print:text-black
                                                        ${quiz5Answered === null ? 'border-slate-200 hover:border-emerald-400 hover:bg-emerald-50' : 
                                                        (choice.isCorrect ? 'border-green-500 bg-green-50 text-green-800 shadow-sm' : 
                                                        (quiz5Answered === choice.id ? 'border-red-400 bg-red-50 text-red-600' : 'border-slate-100 text-slate-400 opacity-50'))}`}
                                                >
                                                    <span className="w-8 inline-block font-mono text-slate-500 print:text-black">①</span> {choice.text}
                                                </button>
                                            ))}
                                        </div>
                                        {quiz5Answered !== null && (
                                            <div className={`mt-4 p-4 rounded-lg text-sm leading-relaxed print:hidden ${quiz5Answered === 3 ? 'bg-green-50 text-green-900 border border-green-200' : 'bg-red-50 text-red-900 border border-red-200'}`}>
                                                <p className="font-bold mb-1">{quiz5Answered === 3 ? '🎉 정답입니다!' : '오답입니다.'}</p>
                                                <p><strong>해설:</strong> 가짜 식당 실험을 도입부로 삼아, 인터넷 정보의 신뢰성 부족을 지적하고 나아가 디지털 리터러시를 통해 정보를 <strong>비판적으로 평가하는 습관</strong>을 길러 거짓 정보를 피해가자는 것이 이 글의 분명한 목적이자 요지입니다.</p>
                                            </div>
                                        )}
                                    </div>

                                    {/* Quiz 6 */}
                                    <div className="border-t border-slate-200 pt-8 print:border-black print:pt-4">
                                        <div className="bg-slate-50 border border-slate-200 p-5 rounded-lg mb-4 print:bg-white print:border-none print:p-0 print:mb-4">
                                            <p className="font-bold text-slate-800 mb-2 print:text-black">Q6. 빈칸 추론</p>
                                            <p className="text-sm text-slate-600 mb-4 print:text-black">윗글의 내용을 바탕으로 빈칸에 들어갈 가장 적절한 말을 고르시오.</p>
                                            <p className="text-md leading-relaxed bg-white p-4 border border-slate-200 rounded print:border-slate-400 print:rounded-none print:text-black text-center">
                                                "To avoid being deceived by false information, we need to develop a habit of <span className="inline-block w-40 border-b-2 border-slate-800 mx-1"></span> what we see online."
                                            </p>
                                        </div>
                                        <div className="space-y-2 print:space-y-3">
                                            {[
                                                { id: 1, text: "blindly trusting" },
                                                { id: 2, text: "critically evaluating", isCorrect: true },
                                                { id: 3, text: "rapidly sharing" },
                                                { id: 4, text: "completely ignoring" }
                                            ].map((choice) => (
                                                <button key={choice.id} onClick={() => setQuiz6Answered(choice.id)} disabled={quiz6Answered !== null}
                                                    className={`w-full text-left p-4 rounded-lg border font-medium transition-all duration-200 print:border-none print:p-1 print:text-black
                                                        ${quiz6Answered === null ? 'border-slate-200 hover:border-emerald-400 hover:bg-emerald-50' : 
                                                        (choice.isCorrect ? 'border-green-500 bg-green-50 text-green-800 shadow-sm' : 
                                                        (quiz6Answered === choice.id ? 'border-red-400 bg-red-50 text-red-600' : 'border-slate-100 text-slate-400 opacity-50'))}`}
                                                >
                                                    <span className="w-8 inline-block font-mono text-slate-500 print:text-black">①</span> {choice.text}
                                                </button>
                                            ))}
                                        </div>
                                        {quiz6Answered !== null && (
                                            <div className={`mt-4 p-4 rounded-lg text-sm leading-relaxed print:hidden ${quiz6Answered === 2 ? 'bg-green-50 text-green-900 border border-green-200' : 'bg-red-50 text-red-900 border border-red-200'}`}>
                                                <p className="font-bold mb-1">{quiz6Answered === 2 ? '🎉 정답입니다!' : '오답입니다.'}</p>
                                                <p><strong>해설:</strong> 본문 34번 문장과 일치합니다. 거짓 정보에 속지 않기 위해서는 정보를 맹신하거나 무시하는 것이 아니라, 출처를 따지고 교차 검증을 하는 등 <strong>'비판적으로 평가하는(critically evaluating)'</strong> 습관이 필요합니다.</p>
                                            </div>
                                        )}
                                    </div>

                                </div>
                            </div>
                        </section>
                    </div>
                </main>

                {/* 모바일 하단 네비게이션 */}
                <nav className="md:hidden fixed bottom-0 w-full bg-white border-t border-slate-200 flex justify-around p-2 pb-safe z-30 shadow-[0_-5px_10px_rgba(0,0,0,0.05)] print:hidden">
                    <button onClick={() => setActiveTab('text')} className={`flex flex-col items-center p-2 min-w-[64px] transition-colors ${activeTab === 'text' ? 'text-emerald-700' : 'text-slate-400 hover:text-slate-600'}`}>
                        <i className={`${activeTab === 'text' ? 'ph-fill' : 'ph'} ph-book-open text-2xl mb-1`}></i>
                        <span className="text-[10px] font-bold">지문 분석</span>
                    </button>
                    <button onClick={() => setActiveTab('syntax')} className={`flex flex-col items-center p-2 min-w-[64px] transition-colors ${activeTab === 'syntax' ? 'text-emerald-700' : 'text-slate-400 hover:text-slate-600'}`}>
                        <i className={`${activeTab === 'syntax' ? 'ph-fill' : 'ph'} ph-highlighter-circle text-2xl mb-1`}></i>
                        <span className="text-[10px] font-bold">핵심 구문</span>
                    </button>
                    <button onClick={() => setActiveTab('map')} className={`flex flex-col items-center p-2 min-w-[64px] transition-colors ${activeTab === 'map' ? 'text-emerald-700' : 'text-slate-400 hover:text-slate-600'}`}>
                        <i className={`${activeTab === 'map' ? 'ph-fill' : 'ph'} ph-git-merge text-2xl mb-1`}></i>
                        <span className="text-[10px] font-bold">논리 구조도</span>
                    </button>
                    <button onClick={() => setActiveTab('quiz')} className={`flex flex-col items-center p-2 min-w-[64px] transition-colors ${activeTab === 'quiz' ? 'text-emerald-700' : 'text-slate-400 hover:text-slate-600'}`}>
                        <i className={`${activeTab === 'quiz' ? 'ph-fill' : 'ph'} ph-check-square-offset text-2xl mb-1`}></i>
                        <span className="text-[10px] font-bold">실전 문제</span>
                    </button>
                </nav>
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
