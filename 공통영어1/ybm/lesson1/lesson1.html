<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE LOGIC Interactive App - Growth Mindset</title>
    
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    
    <style>
        @media print {
            body {
                -webkit-print-color-adjust: exact;
                print-color-adjust: exact;
                background-color: white !important;
            }
            ::-webkit-scrollbar {
                display: none;
            }
            .print-avoid-break {
                break-inside: avoid;
            }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        const textData = [
          // Part 1: The Choice (1~6)
          { id: 1, text: "Think of an ordinary boy who likes playing sports like you and your friends.", trans: "여러분과 여러분의 친구들처럼 스포츠를 좋아하는 평범한 소년을 상상해 보세요." },
          { id: 2, text: "One day, as he returns from school, his mom and dad are waiting outside and pointing at the garage. His mom smiles and says, “We have a surprise for you.”", trans: "어느 날, 그가 학교에서 돌아왔을 때, 엄마와 아빠가 밖에서 기다리며 차고를 가리키고 있습니다. 엄마가 미소를 지으며 말합니다. “너를 위한 깜짝 선물이 있단다.”" },
          { id: 3, text: "When his dad pulls the garage door open, there is a table-tennis table inside! The boy is excited.", trans: "아빠가 차고 문을 열자, 그 안에 탁구대가 있습니다! 소년은 신이 납니다." },
          { id: 4, text: "He recently joined the school’s table-tennis club and wanted to practice more. He rushes to the other side of the net and challenges his dad to a match.", trans: "그는 최근 학교 탁구 클럽에 가입했고 더 많이 연습하고 싶었습니다. 그는 네트 반대편으로 달려가 아빠에게 시합을 도전합니다.", isHighlight: true, logicPoint: 1 },
          { id: 5, text: "Let’s pause the story here. The boy now faces a big choice.", trans: "여기서 이야기를 잠시 멈춰 봅시다. 소년은 이제 큰 선택에 직면합니다.", logic: 'choice' },
          { id: 6, text: "He could choose to challenge himself to grow and face difficulties with endurance and courage. Or he could avoid new and challenging experiences and choose an easy, familiar path.", trans: "그는 인내와 용기를 가지고 어려움에 맞서며 성장하기 위해 스스로에게 도전하는 것을 선택할 수 있습니다. 아니면 새롭고 도전적인 경험을 피하고 쉽고 익숙한 길을 선택할 수도 있습니다." },

          // Part 2: Fixed Mindset (7~13)
          { id: 7, text: "Let’s start with the path of avoidance. The boy waits for his dad and concentrates hard.", trans: "회피의 길부터 시작해 봅시다. 소년은 아빠를 기다리며 열심히 집중합니다." },
          { id: 8, text: "When the ball comes flying across the net rapidly, he misses it completely. He puts his hands on his knees and sighs.", trans: "공이 네트를 넘어 빠르게 날아올 때, 그는 공을 완전히 놓칩니다. 그는 무릎에 손을 얹고 한숨을 쉽니다." },
          { id: 9, text: "“Never mind,” says his dad, “Try again. Practice makes perfect.”", trans: "“신경 쓰지 마라,” 아빠가 말합니다. “다시 해보렴. 연습이 완벽을 만든단다.”" },
          { id: 10, text: "When the boy serves the ball, it returns with full force, hitting and bruising his elbow.", trans: "소년이 서브를 넣자, 공이 전속력으로 돌아와 그의 팔꿈치를 치고 멍들게 합니다." },
          { id: 11, text: "The boy is not having much fun. He sets the paddle on the table, saying, “I have had enough,” and leaves for his room.", trans: "소년은 별로 재미가 없습니다. 그는 탁구대에 패들을 내려놓으며, “할 만큼 했어요”라고 말하고 자신의 방으로 가버립니다.", logic: 'avoidance' },
          { id: 12, text: "His dad asks for another game the next week, but the boy still has some pain in his elbow and just does not feel like taking up the challenge. When his mom suggests playing against his older brother, he turns down her suggestion because his brother is very tough.", trans: "아빠가 다음 주에 다시 게임을 하자고 하지만, 소년은 여전히 팔꿈치에 통증이 있고 도전을 받아들일 기분이 아닙니다. 엄마가 형과 경기해 보라고 제안했을 때, 형이 매우 강하기 때문에 그는 제안을 거절합니다." },
          { id: 13, text: "“No, thanks,” sighs the boy. “He’s going to be better than me anyway.” In his eyes, challenges are nothing more than obstacles, and he holds onto the belief that they are best avoided.", trans: "“아뇨, 괜찮아요,” 소년이 한숨을 쉽니다. “어차피 형이 나보다 더 잘할 거예요.” 그의 눈에 도전은 장애물에 불과하며, 그는 도전을 피하는 것이 최선이라는 믿음을 고수합니다.", isHighlight: true, logicPoint: 2, logic: 'obstacle' },

          // Part 3: Growth Mindset (14~23)
          { id: 14, text: "Let’s rewind to the point when the boy first faces his dad across the net.", trans: "소년이 네트를 사이에 두고 처음 아빠를 마주했던 시점으로 되감아 봅시다." },
          { id: 15, text: "His first attempt does not go any better, and he still gets hit on the elbow on his second try. However, he picks up the ball and tries again anyway.", trans: "그의 첫 번째 시도도 더 낫지 않았고, 두 번째 시도에서도 여전히 팔꿈치를 맞습니다. 하지만, 그는 어쨌든 공을 줍고 다시 시도합니다.", logic: 'retry' },
          { id: 16, text: "An hour later, his dad still keeps winning easily, but the boy is learning from the experience.", trans: "한 시간 후, 아빠는 여전히 쉽게 계속 이기고 있지만, 소년은 그 경험으로부터 배우고 있습니다.", isHighlight: true, logicPoint: 3 },
          { id: 17, text: "Every now and then, he even surprises himself with a decent return, and a few times, he almost hits the ball past his dad.", trans: "때때로, 그는 괜찮은 리턴으로 스스로를 놀라게 하기도 하고, 몇 번은 아빠를 지나쳐 공을 칠 뻔하기도 합니다." },
          { id: 18, text: "The boy later on decides to challenge his older brother. His brother is a better player, but the boy likes the idea that he can work even harder.", trans: "소년은 나중에 형에게 도전하기로 결심합니다. 형이 더 뛰어난 선수지만, 소년은 자신이 훨씬 더 열심히 할 수 있다는 사실을 좋아합니다." },
          { id: 19, text: "The boy learns from his mistakes and develops new skills by practicing.", trans: "소년은 실수로부터 배우고 연습을 통해 새로운 기술을 개발합니다." },
          { id: 20, text: "He practices hard after school, on weekends, and on holidays until he is able to join the regional team.", trans: "그는 지역 팀에 합류할 수 있을 때까지 방과 후, 주말, 휴일에도 열심히 연습합니다.", isHighlight: true, logicPoint: 4 },
          { id: 21, text: "Eventually, he participates in the national championship and makes it all the way to the finals. He finds his opponent to be skillful and smart, but he plays hard.", trans: "마침내, 그는 전국 선수권 대회에 참가하여 결승전까지 진출합니다. 그는 상대가 기술이 뛰어나고 영리하다는 것을 알게 되지만, 열심히 경기합니다." },
          { id: 22, text: "He finds himself at match point, and the audience holds its breath. He realizes how far he has come.", trans: "그는 매치 포인트 상황에 놓이게 되고, 관중들은 숨을 죽입니다. 그는 자신이 얼마나 멀리 왔는지 깨닫습니다.", isHighlight: true, logicPoint: 5 },
          { id: 23, text: "For years he has gotten up early to practice and has loved the challenge of improving his game. He serves for the match and sneaks the ball past his opponent. He punches the air in triumph. He has become truly awesome!", trans: "수년 동안 그는 연습을 위해 일찍 일어났고 자신의 경기를 향상시키는 도전을 사랑했습니다. 그는 매치를 위한 서브를 넣고 상대방을 지나쳐 공을 성공시킵니다. 그는 승리의 기쁨에 허공에 주먹을 뻗습니다. 그는 진정으로 멋진 사람이 되었습니다!", logic: 'champion' },

          // Part 4: The Real Magic (24~29)
          { id: 24, text: "You may have the idea that this is simply a fictional tale.", trans: "이것이 그저 허구의 이야기라고 생각할지도 모릅니다." },
          { id: 25, text: "However, this is the true story of Matthew Syed, a former member of the British national table-tennis team.", trans: "하지만, 이것은 영국 국가대표 탁구팀의 전 멤버인 매튜 사이드의 실제 이야기입니다." },
          { id: 26, text: "His tale shows how an ordinary boy developed his passion for table tennis and eventually became the national champion.", trans: "그의 이야기는 어떻게 평범한 소년이 탁구에 대한 열정을 발전시켜 마침내 전국 챔피언이 되었는지를 보여줍니다." },
          { id: 27, text: "Because he had a growth mindset, he tried something new, discovered what he truly desired, and then became tough when he faced a difficult task.", trans: "성장 마인드셋을 가지고 있었기 때문에, 그는 새로운 것을 시도했고, 자신이 진정으로 원하는 것을 발견했으며, 어려운 과제에 직면했을 때 강인해졌습니다." },
          { id: 28, text: "How about you? Do you see yourself in the story? You, too, can find your own “table tennis.” It might be a hobby, a career, or a personal goal.", trans: "여러분은 어떤가요? 이야기 속에서 여러분 자신의 모습을 보나요? 여러분도 자신만의 '탁구'를 찾을 수 있습니다. 그것은 취미일 수도, 직업일 수도, 아니면 개인적인 목표일 수도 있습니다." },
          { id: 29, text: "What is important is that you embrace the challenge and never give up on what you want to achieve. Go out there and achieve your goal!", trans: "중요한 것은 도전을 받아들이고 자신이 성취하고자 하는 것을 결코 포기하지 않는다는 것입니다. 밖으로 나가 목표를 달성하세요!", isHighlight: true, logicPoint: 6, logic: 'takeaway' }
        ];

        const logicMapSteps = [
          { id: 'choice', title: "THE CROSSROADS (선택의 기로)", desc: "Challenge to grow vs. Easy path", color: "bg-slate-100 border-slate-400 text-slate-800", icon: <i className="ph-fill ph-git-merge text-xl mb-2"></i> },
          { id: 'obstacle', title: "FIXED MINDSET (고정 마인드셋)", desc: "Challenges = Obstacles to avoid", color: "bg-red-100 border-red-400 text-red-800", icon: <i className="ph-fill ph-wall text-xl mb-2"></i> },
          { id: 'retry', title: "GROWTH MINDSET (성장 마인드셋)", desc: "Learn from mistakes & Try again", color: "bg-emerald-100 border-emerald-400 text-emerald-800", icon: <i className="ph-fill ph-plant text-xl mb-2"></i> },
          { id: 'champion', title: "THE RESULT (성장과 성취)", desc: "National Champion", color: "bg-teal-100 border-teal-400 text-teal-800", icon: <i className="ph-fill ph-trophy text-xl mb-2"></i> },
          { id: 'takeaway', title: "THE TAKEAWAY (교훈)", desc: "Find your 'table tennis' & Embrace challenge", color: "bg-green-100 border-green-400 text-green-800", icon: <i className="ph-fill ph-star text-xl mb-2"></i> }
        ];

        function App() {
          const [activeTab, setActiveTab] = useState(1);
          const [activeLogic, setActiveLogic] = useState(null);
          const [mapStep, setMapStep] = useState(0);
          const [quiz1Answered, setQuiz1Answered] = useState(null);
          const [quiz2Answered, setQuiz2Answered] = useState(null);
          const [quiz3Answered, setQuiz3Answered] = useState(null);
          const [quiz4Answered, setQuiz4Answered] = useState(null);

          const handleLogicClick = (point) => setActiveLogic(activeLogic === point ? null : point);
          const nextMapStep = () => { if (mapStep < logicMapSteps.length) setMapStep(mapStep + 1); };
          const resetMap = () => setMapStep(0);

          const handlePrint = () => {
            window.print();
          };

          return (
            <div className="min-h-screen bg-slate-50 font-sans text-slate-800 p-4 md:p-8 flex justify-center print:bg-white print:p-0">
              <div className="max-w-4xl w-full flex flex-col gap-6 print:flex print:flex-col print:gap-6 print:max-w-none">
                
                {/* 헤더 */}
                <div className="bg-white p-6 rounded-xl shadow-sm border-t-4 border-emerald-700 print:shadow-none print:border-t-4 print:border-black print:rounded-none flex justify-between items-start">
                  <div>
                    <h1 className="text-sm font-bold text-emerald-800 tracking-wider mb-2 print:text-black">THE LOGIC INTERACTIVE</h1>
                    <h2 className="text-3xl font-serif font-bold text-slate-900 print:text-black">The Magic of Believing That You Can Grow</h2>
                    <p className="text-slate-500 italic mt-1 font-serif print:text-gray-600">"Embrace the Challenge"</p>
                  </div>
                  <button 
                    onClick={handlePrint}
                    className="print:hidden flex items-center gap-2 bg-slate-800 hover:bg-slate-700 text-white px-4 py-2 rounded-lg font-bold transition-colors shadow-sm"
                  >
                    <i className="ph-bold ph-printer text-lg"></i> 인쇄하기
                  </button>
                </div>

                {/* 탭 네비게이션 */}
                <div className="flex bg-white rounded-xl shadow-sm overflow-hidden print:hidden">
                  <button 
                    onClick={() => setActiveTab(1)}
                    className={`flex-1 py-4 px-2 text-center font-bold text-base md:text-lg transition-all duration-300 border-b-4 ${activeTab === 1 ? 'bg-emerald-50 text-emerald-800 border-emerald-700' : 'text-slate-400 border-transparent hover:bg-slate-50 hover:text-slate-600'}`}
                  >
                    <i className="ph-fill ph-book-open mr-2"></i>
                    1. 지문 및 구문 분석
                  </button>
                  <button 
                    onClick={() => setActiveTab(2)}
                    className={`flex-1 py-4 px-2 text-center font-bold text-base md:text-lg transition-all duration-300 border-b-4 ${activeTab === 2 ? 'bg-teal-50 text-teal-800 border-teal-600' : 'text-slate-400 border-transparent hover:bg-slate-50 hover:text-slate-600'}`}
                  >
                    <i className="ph-fill ph-puzzle-piece mr-2"></i>
                    2. 논리 구조 및 실전 문제
                  </button>
                </div>

                {/* === TAB 1: 지문 및 구문 분석 영역 === */}
                <div className={`space-y-6 print:space-y-4 ${activeTab === 1 ? 'block' : 'hidden print:block'}`}>
                  {/* 1. 지문 영역 */}
                  <div className="bg-white p-6 md:p-8 rounded-xl shadow-sm print:shadow-none print:border print:border-slate-300 print:rounded-none">
                    <h3 className="text-xl font-bold text-emerald-800 border-b-2 border-slate-100 pb-3 mb-4 flex items-center gap-2 print:text-black print:border-black">
                      <i className="ph-fill ph-book-open text-2xl print:text-black"></i> PART 1. Text Analysis
                    </h3>
                    
                    <div className="space-y-8 print:space-y-6">
                      {/* 파트 A: 서론 (1~6번) */}
                      <div>
                        <div className="inline-block bg-slate-800 text-white text-sm font-bold px-3 py-1 rounded mb-3 print:bg-slate-200 print:text-black print:border print:border-slate-800">
                          ▶ The Choice (탁구대와 선택의 기로)
                        </div>
                        <div className="space-y-2 print:space-y-1">
                          {textData.slice(0, 6).map((item) => (
                            <div 
                              key={item.id} 
                              className={`p-2 rounded-lg transition-all duration-300 group cursor-pointer print:p-0 print:mb-2
                                ${activeLogic === item.logicPoint ? 'bg-emerald-50 border border-emerald-200 shadow-inner print:bg-transparent print:border-none print:shadow-none' : 'hover:bg-slate-50 border border-transparent print:border-none'}
                              `}
                            >
                              <p className="text-base md:text-lg leading-relaxed print:text-base print:text-black">
                                <span className="font-bold text-emerald-800 mr-2 text-sm print:text-black">[{item.id.toString().padStart(2, '0')}]</span>
                                <span className={`${activeLogic === item.logicPoint ? 'font-bold text-emerald-700 print:text-black print:underline print:underline-offset-4' : ''}`}>
                                  {item.text}
                                </span>
                              </p>
                              <p className="text-sm text-slate-500 mt-1 opacity-0 group-hover:opacity-100 transition-opacity duration-300 ml-9 print:hidden">
                                {item.trans}
                              </p>
                            </div>
                          ))}
                        </div>
                      </div>

                      {/* 파트 B: 고정 마인드셋 (7~13번) */}
                      <div className="border-t border-dashed border-slate-300 pt-6 print:border-black print:pt-4">
                        <div className="inline-block bg-red-700 text-white text-sm font-bold px-3 py-1 rounded mb-3 print:bg-slate-200 print:text-black print:border print:border-slate-800">
                          ▶ The Fixed Mindset (쉬운 길을 택한 소년)
                        </div>
                        <div className="space-y-2 print:space-y-1">
                          {textData.slice(6, 13).map((item) => (
                            <div 
                              key={item.id} 
                              className={`p-2 rounded-lg transition-all duration-300 group cursor-pointer print:p-0 print:mb-2
                                ${activeLogic === item.logicPoint ? 'bg-red-50 border border-red-200 shadow-inner print:bg-transparent print:border-none print:shadow-none' : 'hover:bg-slate-50 border border-transparent print:border-none'}
                              `}
                            >
                              <p className="text-base md:text-lg leading-relaxed print:text-base print:text-black">
                                <span className="font-bold text-red-800 mr-2 text-sm print:text-black">[{item.id.toString().padStart(2, '0')}]</span>
                                <span className={`${activeLogic === item.logicPoint ? 'font-bold text-red-700 print:text-black print:underline print:underline-offset-4' : ''}`}>
                                  {item.text}
                                </span>
                              </p>
                              <p className="text-sm text-slate-500 mt-1 opacity-0 group-hover:opacity-100 transition-opacity duration-300 ml-9 print:hidden">
                                {item.trans}
                              </p>
                            </div>
                          ))}
                        </div>
                      </div>

                      {/* 파트 C: 성장 마인드셋 (14~23번) */}
                      <div className="border-t border-dashed border-slate-300 pt-6 print:border-black print:pt-4">
                        <div className="inline-block bg-emerald-600 text-white text-sm font-bold px-3 py-1 rounded mb-3 print:bg-slate-200 print:text-black print:border print:border-slate-800">
                          ▶ The Growth Mindset (도전을 껴안은 소년)
                        </div>
                        <div className="space-y-2 print:space-y-1">
                          {textData.slice(13, 23).map((item) => (
                            <div 
                              key={item.id} 
                              className={`p-2 rounded-lg transition-all duration-300 group cursor-pointer print:p-0 print:mb-2
                                ${activeLogic === item.logicPoint ? 'bg-teal-50 border border-teal-200 shadow-inner print:bg-transparent print:border-none print:shadow-none' : 'hover:bg-slate-50 border border-transparent print:border-none'}
                              `}
                            >
                              <p className="text-base md:text-lg leading-relaxed print:text-base print:text-black">
                                <span className="font-bold text-emerald-800 mr-2 text-sm print:text-black">[{item.id.toString().padStart(2, '0')}]</span>
                                <span className={`${activeLogic === item.logicPoint ? 'font-bold text-teal-700 print:text-black print:underline print:underline-offset-4' : ''}`}>
                                  {item.text}
                                </span>
                              </p>
                              <p className="text-sm text-slate-500 mt-1 opacity-0 group-hover:opacity-100 transition-opacity duration-300 ml-9 print:hidden">
                                {item.trans}
                              </p>
                            </div>
                          ))}
                        </div>
                      </div>

                      {/* 파트 D: 실화 공개 및 결론 (24~29번) */}
                      <div className="border-t border-dashed border-slate-300 pt-6 print:border-black print:pt-4">

                        `}>
                          <p className="font-bold mb-1">
                            {quiz2Answered === 3 ? '🎉 정답입니다!' : '오답입니다. 다시 한번 생각해 보세요.'}
                          </p>
                          <p>
                            <strong>해설:</strong> 매튜 사이드에게 탁구는 단순한 스포츠가 아니라 '어려움에 직면했을 때 포기하지 않고 도전하여 성장하게 만든 매개체'였습니다. 따라서 글쓴이가 독자에게 찾으라고 권유하는 '너만의 탁구'는 '열정을 바쳐 성취하고 싶은 취미, 직업, 또는 개인적 목표'를 은유적으로 표현한 것입니다.
                          </p>
                          <button onClick={() => setQuiz2Answered(null)} className="mt-3 text-sm underline opacity-70 hover:opacity-100">
                            다시 풀기
                          </button>
                        </div>
                      )}
                    </div>

                    <hr className="my-8 border-slate-200 print:border-black" />

                    {/* Q3. 요지 파악 */}
                    <div className="mb-8">
                      <div className="bg-slate-50 border border-slate-200 p-5 rounded-lg mb-4 print:bg-white print:border-none print:p-0 print:mb-6">
                        <p className="font-bold text-slate-800 mb-2 print:text-black">Q3. 글의 요지 파악</p>
                        <p className="text-sm text-slate-600 mb-4 print:text-black">윗글을 통해 필자가 전달하고자 하는 핵심 요지로 가장 적절한 것은?</p>
                      </div>

                      <div className="space-y-2 print:space-y-3">
                        {[
                          { id: 1, text: "재능이 없는 분야는 일찍 포기하는 것이 현명하다." },
                          { id: 2, text: "실패를 두려워하지 않고 도전하는 태도가 성장을 이끈다.", isCorrect: true },
                          { id: 3, text: "훌륭한 코치와의 만남이 스포츠 선수의 성공을 결정짓는다." },
                          { id: 4, text: "과도한 경쟁심은 개인의 인간관계를 해칠 수 있다." }
                        ].map((choice) => (
                          <button
                            key={choice.id}
                            onClick={() => setQuiz3Answered(choice.id)}
                            disabled={quiz3Answered !== null}
                            className={`w-full text-left p-3 rounded-lg border flex items-center transition-all duration-200
                              print:border-none print:p-1 print:text-black
                              ${quiz3Answered === null ? 'border-slate-200 hover:border-emerald-400 hover:bg-emerald-50' : 
                                (choice.isCorrect ? 'border-green-500 bg-green-50 text-green-800 font-bold shadow-sm' : 
                                  (quiz3Answered === choice.id ? 'border-red-400 bg-red-50 text-red-500' : 'border-slate-100 text-slate-400 opacity-50'))
                              }
                            `}
                          >
                            <span className="w-8 inline-block font-mono text-slate-500 print:text-black">{['①', '②', '③', '④'][choice.id - 1]}</span> 
                            {choice.text}
                            {quiz3Answered !== null && choice.isCorrect && <i className="ph-fill ph-check-circle text-lg ml-auto text-green-500 print:hidden"></i>}
                          </button>
                        ))}
                      </div>

                      {quiz3Answered !== null && (
                        <div className={`mt-4 p-4 rounded-lg text-sm leading-relaxed animate-fade-in print:hidden
                          ${quiz3Answered === 2 ? 'bg-green-100 text-green-900 border border-green-300' : 'bg-red-100 text-red-900 border border-red-300'}
                        `}>
                          <p className="font-bold mb-1">
                            {quiz3Answered === 2 ? '🎉 정답입니다!' : '오답입니다. 다시 한번 생각해 보세요.'}
                          </p>
                          <p>
                            <strong>해설:</strong> 고정 마인드셋을 가진 소년은 실패를 장애물로 여기고 포기하지만, 성장 마인드셋을 가진 소년(매튜 사이드)은 실수를 통해 배우고 끝까지 도전하여 국가대표 챔피언이라는 성장을 이루어냅니다. "What is important is that you embrace the challenge"라는 결론에서도 명확히 드러납니다.
                          </p>
                          <button onClick={() => setQuiz3Answered(null)} className="mt-3 text-sm underline opacity-70 hover:opacity-100">
                            다시 풀기
                          </button>
                        </div>
                      )}
                    </div>

                    <hr className="my-8 border-slate-200 print:border-black" />

                    {/* Q4. 요약문 완성 */}
                    <div>
                      <div className="bg-slate-50 border border-slate-200 p-5 rounded-lg mb-4 print:bg-white print:border-none print:p-0 print:mb-6">
                        <p className="font-bold text-slate-800 mb-2 print:text-black">Q4. 요약문 완성</p>
                        <p className="text-sm text-slate-600 mb-4 print:text-black">다음 글의 내용을 한 문장으로 요약하고자 한다. 빈칸 (A), (B)에 들어갈 말로 가장 적절한 것은?</p>
                        <p className="text-md leading-relaxed bg-white p-4 border border-slate-200 rounded print:border-slate-400 print:rounded-none print:text-black">
                          Matthew Syed's story demonstrates that unlike someone who views difficulties as <span className="font-bold text-emerald-800">( A )</span>, a person with a growth mindset embraces challenges and achieves remarkable <span className="font-bold text-emerald-800">( B )</span> through perseverance.
                        </p>
                      </div>

                      <div className="space-y-2 print:space-y-3">
                        {[
                          { id: 1, text: "(A) opportunities —— (B) disappointment" },
                          { id: 2, text: "(A) obstacles —— (B) growth", isCorrect: true },
                          { id: 3, text: "(A) motivation —— (B) failure" },
                          { id: 4, text: "(A) obstacles —— (B) isolation" }
                        ].map((choice) => (
                          <button
                            key={choice.id}
                            onClick={() => setQuiz4Answered(choice.id)}
                            disabled={quiz4Answered !== null}
                            className={`w-full text-left p-3 rounded-lg border flex items-center transition-all duration-200
                              print:border-none print:p-1 print:text-black
                              ${quiz4Answered === null ? 'border-slate-200 hover:border-emerald-400 hover:bg-emerald-50' : 
                                (choice.isCorrect ? 'border-green-500 bg-green-50 text-green-800 font-bold shadow-sm' : 
                                  (quiz4Answered === choice.id ? 'border-red-400 bg-red-50 text-red-500' : 'border-slate-100 text-slate-400 opacity-50'))
                              }
                            `}
                          >
                            <span className="w-8 inline-block font-mono text-slate-500 print:text-black">{['①', '②', '③', '④'][choice.id - 1]}</span> 
                            {choice.text}
                            {quiz4Answered !== null && choice.isCorrect && <i className="ph-fill ph-check-circle text-lg ml-auto text-green-500 print:hidden"></i>}
                          </button>
                        ))}
                      </div>

                      {quiz4Answered !== null && (
                        <div className={`mt-4 p-4 rounded-lg text-sm leading-relaxed animate-fade-in print:hidden
                          ${quiz4Answered === 2 ? 'bg-green-100 text-green-900 border border-green-300' : 'bg-red-100 text-red-900 border border-red-300'}
                        `}>
                          <p className="font-bold mb-1">
                            {quiz4Answered === 2 ? '🎉 정답입니다!' : '오답입니다. 다시 한번 생각해 보세요.'}
                          </p>
                          <p>
                            <strong>해설:</strong> 쉬운 길을 택하는 사람은 도전을 그저 피해야 할 <strong>장애물(obstacles)</strong>로 봅니다. 반면, 성장 마인드셋을 가진 매튜 사이드는 끊임없는 인내를 통해 놀라운 <strong>성장(growth)</strong>과 성취를 이루어 냈습니다.
                          </p>
                          <button onClick={() => setQuiz4Answered(null)} className="mt-3 text-sm underline opacity-70 hover:opacity-100">
                            다시 풀기
                          </button>
                        </div>
                      )}
                    </div>

                  </div>
                </div>

              </div>
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
