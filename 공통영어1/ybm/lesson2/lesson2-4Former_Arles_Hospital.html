<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE LOGIC Interactive App - Arles Part 4</title>
    
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    
    <style>
        @media print {
            body {
                -webkit-print-color-adjust: exact;
                print-color-adjust: exact;
                background-color: white !important;
            }
            ::-webkit-scrollbar {
                display: none;
            }
            .print-avoid-break {
                break-inside: avoid;
            }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        const textData = [
          // Part 1: Hardship & Outlet (1~4)
          { id: 1, text: "In December 1888, Vincent suffered from a mental illness and was sent to the hospital in Arles.", trans: "1888년 12월, 빈센트는 정신 질환을 앓고 아를에 있는 병원으로 보내졌다.", logic: 'crisis' },
          { id: 2, text: "He stayed there for five months.", trans: "그는 그곳에 5개월 동안 머물렀다." },
          { id: 3, text: "During this time, his mental stability improved, and the doctors allowed him to paint outdoors.", trans: "이 기간 동안 그의 정신적 안정이 향상되었고, 의사들은 그가 야외에서 그림을 그릴 수 있도록 허락했다." },
          { id: 4, text: "Vincent took advantage of this freedom and produced several beautiful landscapes, such as The Garden of the Hospital in Arles.", trans: "빈센트는 이 자유를 활용하여 '아를 병원의 정원'과 같은 아름다운 풍경화를 여러 점 그렸다.", isHighlight: true, logicPoint: 1, logic: 'outlet' },

          // Part 2: Contrast & Inner Feelings (5~9)
          { id: 5, text: "The picture illustrates a spring garden filled with flowers and trees with different colors and tones.", trans: "그 그림은 다양한 색과 색조를 가진 꽃과 나무로 가득 찬 봄의 정원을 보여준다." },
          { id: 6, text: "The flowers are in full bloom, and the small trees are leafy.", trans: "꽃들은 만발해 있고, 작은 나무들은 잎이 무성하다." },
          { id: 7, text: "The big trees, however, have few leaves.", trans: "그러나 큰 나무들에는 잎이 거의 없다." },
          { id: 8, text: "This is rather odd given that the season is spring.", trans: "계절이 봄이라는 점을 고려하면 이것은 다소 이상하다.", isHighlight: true, logicPoint: 2 },
          { id: 9, text: "Perhaps this contrast reflects the painter’s complex feelings during the most difficult time of his life.", trans: "아마도 이 대조는 인생에서 가장 어려운 시기 동안 화가의 복잡한 심경을 반영하는 것일지도 모른다.", isHighlight: true, logicPoint: 3, logic: 'expression' },

          // Part 3: The Legacy (10~11)
          { id: 10, text: "The hospital closed in the 1980s, and the building reopened as a library and exhibition space, with a café and gift shops.", trans: "그 병원은 1980년대에 문을 닫았고, 건물은 카페와 기념품 가게가 있는 도서관과 전시 공간으로 다시 문을 열었다." },
          { id: 11, text: "The garden was renovated to resemble Vincent’s painting as much as possible.", trans: "정원은 빈센트의 그림과 최대한 비슷해 보이도록 개조되었다." },

          // Part 4: Conclusion (12~15)
          { id: 12, text: "Arles and its provincial countryside inspired Vincent to create brighter, more exciting landscapes.", trans: "아를과 그 시골 지역은 빈센트가 더 밝고 흥미로운 풍경화를 창작하도록 영감을 주었다." },
          { id: 13, text: "He had searched for brighter colors and softer light in Paris. In Arles, he found them.", trans: "그는 파리에서 더 밝은 색과 더 부드러운 빛을 찾았었다. 아를에서, 그는 그것들을 찾았다." },
          { id: 14, text: "Today, more than 200 years later, this beautiful city remains just as attractive.", trans: "오늘날, 200년이 넘게 지난 지금도 이 아름다운 도시는 여전히 매력적이다." },
          { id: 15, text: "The combination of Roman historic sites and Vincent’s story creates a unique mood that will inspire you just as the city had inspired Vincent.", trans: "로마 시대의 유적지와 빈센트의 이야기의 결합은 도시가 빈센트에게 영감을 주었던 것과 꼭 마찬가지로 여러분에게 영감을 줄 독특한 분위기를 만들어낸다.", isHighlight: true, logicPoint: 4, logic: 'inspiration' }
        ];

        const logicMapSteps = [
          { id: 'crisis', title: "THE CRISIS (고난)", desc: "Mental illness in Arles", color: "bg-slate-200 border-slate-500 text-slate-800", icon: <i className="ph-fill ph-bandaids text-xl mb-2"></i> },
          { id: 'outlet', title: "THE OUTLET (탈출구)", desc: "Allowed to paint outdoors", color: "bg-teal-100 border-teal-400 text-teal-800", icon: <i className="ph-fill ph-palette text-xl mb-2"></i> },
          { id: 'expression', title: "INNER EXPRESSION (표현)", desc: "Flowers vs Leafless trees", color: "bg-emerald-100 border-emerald-400 text-emerald-800", icon: <i className="ph-fill ph-tree text-xl mb-2"></i> },
          { id: 'inspiration', title: "THE INSPIRATION (결론)", desc: "Arles will inspire you too", color: "bg-cyan-100 border-cyan-400 text-cyan-800", icon: <i className="ph-fill ph-sparkle text-xl mb-2"></i> }
        ];

        function App() {
          const [activeTab, setActiveTab] = useState(1);
          const [activeLogic, setActiveLogic] = useState(null);
          const [mapStep, setMapStep] = useState(0);
          const [quiz1Answered, setQuiz1Answered] = useState(null);
          const [quiz2Answered, setQuiz2Answered] = useState(null);
          const [quiz3Answered, setQuiz3Answered] = useState(null);

          const handleLogicClick = (point) => setActiveLogic(activeLogic === point ? null : point);
          const nextMapStep = () => { if (mapStep < logicMapSteps.length) setMapStep(mapStep + 1); };
          const resetMap = () => setMapStep(0);

          const handlePrint = () => {
            window.print();
          };

          return (
            <div className="min-h-screen bg-slate-50 font-sans text-slate-800 p-4 md:p-8 flex justify-center print:bg-white print:p-0">
              <div className="max-w-4xl w-full flex flex-col gap-6 print:flex print:flex-col print:gap-6 print:max-w-none">
                
                {/* 헤더 */}
                <div className="bg-white p-6 rounded-xl shadow-sm border-t-4 border-emerald-600 print:shadow-none print:border-t-4 print:border-black print:rounded-none flex justify-between items-start">
                  <div>
                    <h1 className="text-sm font-bold text-emerald-800 tracking-wider mb-2 print:text-black">THE LOGIC INTERACTIVE</h1>
                    <h2 className="text-3xl font-serif font-bold text-slate-900 print:text-black">Arles, the City of Light and Art</h2>
                    <p className="text-slate-500 italic mt-1 font-serif print:text-gray-600">Part 4: Former Arles Hospital & Conclusion</p>
                  </div>
                  <button 
                    onClick={handlePrint}
                    className="print:hidden flex items-center gap-2 bg-slate-800 hover:bg-slate-700 text-white px-4 py-2 rounded-lg font-bold transition-colors shadow-sm"
                  >
                    <i className="ph-bold ph-printer text-lg"></i> 인쇄하기
                  </button>
                </div>

                {/* 탭 네비게이션 */}
                <div className="flex bg-white rounded-xl shadow-sm overflow-hidden print:hidden">
                  <button 
                    onClick={() => setActiveTab(1)}
                    className={`flex-1 py-4 px-2 text-center font-bold text-base md:text-lg transition-all duration-300 border-b-4 ${activeTab === 1 ? 'bg-emerald-50 text-emerald-800 border-emerald-600' : 'text-slate-400 border-transparent hover:bg-slate-50 hover:text-slate-600'}`}
                  >
                    <i className="ph-fill ph-book-open mr-2"></i>
                    1. 지문 및 구문 분석
                  </button>
                  <button 
                    onClick={() => setActiveTab(2)}
                    className={`flex-1 py-4 px-2 text-center font-bold text-base md:text-lg transition-all duration-300 border-b-4 ${activeTab === 2 ? 'bg-teal-50 text-teal-800 border-teal-600' : 'text-slate-400 border-transparent hover:bg-slate-50 hover:text-slate-600'}`}
                  >
                    <i className="ph-fill ph-puzzle-piece mr-2"></i>
                    2. 논리 구조 및 실전 문제
                  </button>
                </div>

                {/* === TAB 1: 지문 및 구문 분석 영역 === */}
                <div className={`space-y-6 print:space-y-4 ${activeTab === 1 ? 'block' : 'hidden print:block'}`}>
                  {/* 1. 지문 영역 */}
                  <div className="bg-white p-6 md:p-8 rounded-xl shadow-sm print:shadow-none print:border print:border-slate-300 print:rounded-none">
                    <h3 className="text-xl font-bold text-emerald-700 border-b-2 border-slate-100 pb-3 mb-4 flex items-center gap-2 print:text-black print:border-black">
                      <i className="ph-fill ph-book-open text-2xl print:text-black"></i> PART 1. Text Analysis
                    </h3>
                    
                    <div className="space-y-8 print:space-y-6">
                      
                      {/* 파트 A: 고난과 탈출구 (1~4번) */}
                      <div>
                        <div className="inline-block bg-slate-800 text-white text-sm font-bold px-3 py-1 rounded mb-3 print:bg-slate-200 print:text-black print:border print:border-slate-800">
                          ▶ Hardship & Outlet (질병과 그림이라는 탈출구)
                        </div>
                        <div className="space-y-2 print:space-y-1">
                          {textData.slice(0, 4).map((item) => (
                            <div 
                              key={item.id} 
                              className={`p-2 rounded-lg transition-all duration-300 group cursor-pointer print:p-0 print:mb-2
                                ${activeLogic === item.logicPoint ? 'bg-emerald-50 border border-emerald-200 shadow-inner print:bg-transparent print:border-none print:shadow-none' : 'hover:bg-slate-50 border border-transparent print:border-none'}
                              `}
                            >
                              <p className="text-base md:text-lg leading-relaxed print:text-base print:text-black">
                                <span className="font-bold text-emerald-700 mr-2 text-sm print:text-black">[{item.id.toString().padStart(2, '0')}]</span>
                                <span className={`${activeLogic === item.logicPoint ? 'font-bold text-emerald-800 print:text-black print:underline print:underline-offset-4' : ''}`}>
                                  {item.text}
                                </span>
                              </p>
                              <p className="text-sm text-slate-500 mt-1 opacity-0 group-hover:opacity-100 transition-opacity duration-300 ml-9 print:hidden">
                                {item.trans}
                              </p>
                            </div>
                          ))}
                        </div>
                      </div>

                      {/* 파트 B: 대조적 표현 (5~9번) */}
                      <div className="border-t border-dashed border-slate-300 pt-6 print:border-black print:pt-4">
                        <div className="inline-block bg-teal-600 text-white text-sm font-bold px-3 py-1 rounded mb-3 print:bg-slate-200 print:text-black print:border print:border-slate-800">
                          ▶ Inner Feelings (자연의 대조에 투영된 복잡한 심경)
                        </div>
                        <div className="space-y-2 print:space-y-1">
                          {textData.slice(4, 9).map((item) => (
                            <div 
                              key={item.id} 
                              className={`p-2 rounded-lg transition-all duration-300 group cursor-pointer print:p-0 print:mb-2
                                ${activeLogic === item.logicPoint ? 'bg-teal-50 border border-teal-200 shadow-inner print:bg-transparent print:border-none print:shadow-none' : 'hover:bg-slate-50 border border-transparent print:border-none'}
                              `}
                            >
                              <p className="text-base md:text-lg leading-relaxed print:text-base print:text-black">
                                <span className="font-bold text-emerald-700 mr-2 text-sm print:text-black">[{item.id.toString().padStart(2, '0')}]</span>
                                <span className={`${activeLogic === item.logicPoint ? 'font-bold text-teal-800 print:text-black print:underline print:underline-offset-4' : ''}`}>
                                  {item.text}
                                </span>
                              </p>
                              <p className="text-sm text-slate-500 mt-1 opacity-0 group-hover:opacity-100 transition-opacity duration-300 ml-9 print:hidden">
                                {item.trans}
                              </p>
                            </div>
                          ))}
                        </div>
                      </div>

                      {/* 파트 C: 오늘날의 유산 (10~11번) */}
                      <div className="border-t border-dashed border-slate-300 pt-6 print:border-black print:pt-4">
                        <div className="inline-block bg-cyan-700 text-white text-sm font-bold px-3 py-1 rounded mb-3 print:bg-slate-200 print:text-black print:border print:border-slate-800">
                          ▶ The Legacy (오늘날 아를 병원의 모습)
                        </div>
                        <div className="space-y-2 print:space-y-1">
                          {textData.slice(9, 11).map((item) => (
                            <div 
                              key={item.id} 
                              className={`p-2 rounded-lg transition-all duration-300 group cursor-pointer print:p-0 print:mb-2
                                ${activeLogic === item.logicPoint ? 'bg-cyan-50 border border-cyan-200 shadow-inner print:bg-transparent print:border-none print:shadow-none' : 'hover:bg-slate-50 border border-transparent print:border-none'}
                              `}
                            >
                              <p className="text-base md:text-lg leading-relaxed print:text-base print:text-black">
                                <span className="font-bold text-emerald-700 mr-2 text-sm print:text-black">[{item.id.toString().padStart(2, '0')}]</span>
                                <span className={`${activeLogic === item.logicPoint ? 'font-bold text-cyan-800 print:text-black print:underline print:underline-offset-4' : ''}`}>
                                  {item.text}
                                </span>
                              </p>
                              <p className="text-sm text-slate-500 mt-1 opacity-0 group-hover:opacity-100 transition-opacity duration-300 ml-9 print:hidden">
                                {item.trans}
                              </p>
                            </div>
                          ))}
                        </div>
                      </div>

                      {/* 파트 D: 전체 결론 (12~15번) */}
                      <div className="border-t border-dashed border-slate-300 pt-6 print:border-black print:pt-4">
                        <div className="inline-block bg-emerald-800 text-white text-sm font-bold px-3 py-1 rounded mb-3 print:bg-slate-200 print:text-black print:border print:border-slate-800">
                          ▶ The Conclusion (아를이 주는 영원한 영감)
                        </div>
                        <div className="space-y-2 print:space-y-1">
                          {textData.slice(11, 15).map((item) => (
                            <div 
                              key={item.id} 
                              className={`p-2 rounded-lg transition-all duration-300 group cursor-pointer print:p-0 print:mb-2
                                ${activeLogic === item.logicPoint ? 'bg-emerald-50 border border-emerald-200 shadow-inner print:bg-transparent print:border-none print:shadow-none' : 'hover:bg-slate-50 border border-transparent print:border-none'}
                              `}
                            >
                              <p className="text-base md:text-lg leading-relaxed print:text-base print:text-black">
                                <span className="font-bold text-emerald-700 mr-2 text-sm print:text-black">[{item.id.toString().padStart(2, '0')}]</span>
                                <span className={`${activeLogic === item.logicPoint ? 'font-bold text-emerald-800 print:text-black print:underline print:underline-offset-4' : ''}`}>
                                  {item.text}
                                </span>
                              </p>
                              <p className="text-sm text-slate-500 mt-1 opacity-0 group-hover:opacity-100 transition-opacity duration-300 ml-9 print:hidden">
                                {item.trans}
                              </p>
                            </div>
                          ))}
                        </div>
                      </div>

                    </div>
                  </div>

                  {/* 2. 구문 로직 영역 */}
                  <div className="bg-white p-6 md:p-8 rounded-xl shadow-sm print:shadow-none print:border print:border-slate-300 print:rounded-none print-avoid-break">
                    <h3 className="text-xl font-bold text-emerald-800 border-b-2 border-slate-100 pb-3 mb-6 print:text-black print:border-black">
                      PART 2. The Logic Syntax
                    </h3>
                    <p className="text-sm text-slate-500 mb-6 print:hidden">💡 아래의 포인트를 클릭하면 지문의 해당 문장이 강조됩니다.</p>
                    
                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4 print:grid-cols-1 print:gap-6">
                      
                      {/* POINT 1 */}
                      <button 
                        onClick={() => handleLogicClick(1)}
                        className={`text-left border-2 rounded-lg overflow-hidden transition-all duration-300 print:border-2 print:border-slate-800 print:shadow-none print:transform-none print:rounded-none
                          ${activeLogic === 1 ? 'border-teal-600 shadow-md transform -translate-y-1' : 'border-slate-200 hover:border-teal-400'}
                        `}
                      >
                        <div className={`px-4 py-2 font-bold print:bg-slate-100 print:text-black ${activeLogic === 1 ? 'bg-teal-600 text-white' : 'bg-teal-50 text-teal-800'}`}>
                          POINT 01. 기회의 활용: take advantage of
                        </div>
                        <div className="p-4 bg-white h-full">
                          <p className="mb-2"><span className="font-semibold text-slate-700 print:text-black">Structure:</span> Vincent [took advantage of] this freedom and produced...</p>
                          <p className="text-sm text-slate-600 leading-relaxed print:text-black">
                            "~을 (적극적으로) 활용/이용하다"라는 뜻입니다. 정신병원이라는 제약 속에서도 야외에서 그릴 수 있는 작은 자유를 <strong>예술적 승화의 기회</strong>로 삼았음을 보여줍니다.
                          </p>
                        </div>
                      </button>

                      {/* POINT 2 */}
                      <button 
                        onClick={() => handleLogicClick(2)}
                        className={`text-left border-2 rounded-lg overflow-hidden transition-all duration-300 print:border-2 print:border-slate-800 print:shadow-none print:transform-none print:rounded-none
                          ${activeLogic === 2 ? 'border-emerald-600 shadow-md transform -translate-y-1' : 'border-slate-200 hover:border-emerald-400'}
                        `}
                      >
                        <div className={`px-4 py-2 font-bold print:bg-slate-100 print:text-black ${activeLogic === 2 ? 'bg-emerald-600 text-white' : 'bg-emerald-50 text-emerald-800'}`}>
                          POINT 02. 조건을 제시하는 전치사구: given that
                        </div>
                        <div className="p-4 bg-white h-full">
                          <p className="mb-2"><span className="font-semibold text-slate-700 print:text-black">Structure:</span> This is rather odd [given that] the season is spring.</p>
                          <p className="text-sm text-slate-600 leading-relaxed print:text-black">
                            "~라는 점을 고려하면"이라는 뜻입니다. 배경이 생명력이 넘치는 '봄'이라는 점을 고려했을 때, 잎이 없는 큰 나무가 그려진 것이 <strong>시각적 모순</strong>임을 논리적으로 짚어줍니다.
                          </p>
                        </div>
                      </button>

                      {/* POINT 3 */}
                      <button 
                        onClick={() => handleLogicClick(3)}
                        className={`text-left border-2 rounded-lg overflow-hidden transition-all duration-300 print:border-2 print:border-slate-800 print:shadow-none print:transform-none print:rounded-none
                          ${activeLogic === 3 ? 'border-teal-600 shadow-md transform -translate-y-1' : 'border-slate-200 hover:border-teal-400'}
                        `}
                      >
                        <div className={`px-4 py-2 font-bold print:bg-slate-100 print:text-black ${activeLogic === 3 ? 'bg-teal-600 text-white' : 'bg-teal-50 text-teal-800'}`}>
                          POINT 03. 은유적 투영: reflect
                        </div>
                        <div className="p-4 bg-white h-full">
                          <p className="mb-2"><span className="font-semibold text-slate-700 print:text-black">Structure:</span> this contrast [reflects] the painter’s complex feelings...</p>
                          <p className="text-sm text-slate-600 leading-relaxed print:text-black">
                            앞서 발견한 시각적 대조(봄꽃 vs 마른 나무)가 단순한 실수가 아니라, 가장 힘든 시기를 보내던 고흐의 <strong>'복잡한 심경(complex feelings)'을 투영(반영)한 것</strong>이라는 문학적 해석을 제시합니다.
                          </p>
                        </div>
                      </button>

                      {/* POINT 4 */}
                      <button 
                        onClick={() => handleLogicClick(4)}
                        className={`text-left border-2 rounded-lg overflow-hidden transition-all duration-300 print:border-2 print:border-slate-800 print:shadow-none print:transform-none print:rounded-none
                          ${activeLogic === 4 ? 'border-cyan-600 shadow-md transform -translate-y-1' : 'border-slate-200 hover:border-cyan-400'}
                        `}
                      >
                        <div className={`px-4 py-2 font-bold print:bg-slate-100 print:text-black ${activeLogic === 4 ? 'bg-cyan-600 text-white' : 'bg-cyan-50 text-cyan-800'}`}>
                          POINT 04. 비유와 결론의 접속사: just as
                        </div>
                        <div className="p-4 bg-white h-full">
                          <p className="mb-2"><span className="font-semibold text-slate-700 print:text-black">Structure:</span> will inspire you [just as] the city had inspired Vincent.</p>
                          <p className="text-sm text-slate-600 leading-relaxed print:text-black">
                            "꼭 ~가 ...했던 것처럼"이라는 의미입니다. 과거 아를이 고흐에게 주었던 영감이 시공간을 넘어 오늘날의 우리에게도 동일하게 주어질 것이라는 <strong>시리즈 전체의 웅장한 결론</strong>을 맺습니다.
                          </p>
                        </div>
                      </button>

                    </div>

                    <div className="mt-8 text-center print:hidden">
                       <button onClick={() => setActiveTab(2)} className="bg-emerald-800 hover:bg-emerald-700 text-white px-8 py-3 rounded-full font-bold shadow-md transition-colors flex items-center gap-2 mx-auto">
                         구문 분석 완료! 실전 문제로 이동 <i className="ph-bold ph-arrow-right"></i>
                       </button>
                    </div>
                  </div>
                </div>

                {/* === TAB 2: 논리 구조도 및 퀴즈 영역 === */}
                <div className={`space-y-6 print:space-y-4 print:mt-4 ${activeTab === 2 ? 'block' : 'hidden print:block'}`}>
                  
                  {/* 3. 로직 맵 */}
                  <div className="bg-white p-6 rounded-xl shadow-sm border-t-4 border-teal-600 print:shadow-none print:border print:border-slate-300 print:border-t-4 print:border-t-black print:rounded-none print-avoid-break">
                    <div className="flex justify-between items-center border-b-2 border-slate-100 pb-3 mb-6 print:border-black">
                      <h3 className="text-xl font-bold text-slate-800 flex items-center gap-2 print:text-black">
                        <i className="ph-fill ph-play-circle text-2xl text-teal-600 print:text-black"></i> PART 3. Logic Map
                      </h3>
                      <div className="print:hidden">
                        {mapStep > 0 && mapStep < logicMapSteps.length && (
                          <button onClick={nextMapStep} className="bg-teal-100 hover:bg-teal-200 text-teal-800 px-3 py-1 rounded text-sm font-bold transition-colors">
                            Next Step ➔
                          </button>
                        )}
                        {mapStep === logicMapSteps.length && (
                           <button onClick={resetMap} className="text-slate-400 hover:text-slate-600 text-sm underline">
                            Reset
                           </button>
                        )}
                      </div>
                    </div>
                    
                    <div 
                      className={`h-64 flex-col items-center justify-center border-2 border-dashed border-slate-200 rounded-lg bg-slate-50 text-center p-6 cursor-pointer hover:bg-teal-50 transition-colors 
                        ${mapStep === 0 ? 'flex' : 'hidden'} print:!hidden
                      `} 
                      onClick={nextMapStep}
                    >
                      <i className="ph-fill ph-play-circle text-5xl text-teal-400 mb-4"></i>
                      <p className="text-slate-600 font-medium">클릭하여 아를 시리즈의 결론 논리를<br/>단계별로 파악해 보세요.</p>
                    </div>
                    
                    <div className={`flex-col items-center gap-2 py-4 ${mapStep > 0 ? 'flex' : 'hidden'} print:!flex`}>
                      {logicMapSteps.map((step, idx) => (
                        <React.Fragment key={step.id}>
                          <div 
                            className={`w-full max-w-sm border-2 rounded-lg p-4 flex flex-col items-center text-center transition-all duration-500 transform
                              print:!opacity-100 print:!translate-y-0 print:!flex print:border-slate-800 print:rounded-none print:bg-white print:text-black
                              ${idx < mapStep ? `opacity-100 translate-y-0 ${step.color}` : 'opacity-0 translate-y-8 hidden'}
                            `}
                          >
                            <div className="print:hidden">{step.icon}</div>
                            <span className="font-bold text-sm mb-1 print:text-black">{step.title}</span>
                            <span className="text-sm opacity-90 print:text-black">{step.desc}</span>
                          </div>
                          <div 
                            className={`flex-col items-center opacity-100 animate-pulse 
                              print:!flex print:!opacity-100 print:animate-none
                              ${idx < logicMapSteps.length - 1 && idx < mapStep ? 'flex' : 'hidden'}
                            `}
                          >
                            <div className="w-0.5 h-6 bg-slate-300 print:bg-slate-800"></div>
                            {/* 화살표 라벨 추가 */}
                            {idx === 0 ? (
                              <div className="bg-slate-200 text-slate-700 text-xs font-bold px-2 py-1 rounded-full my-1 border border-slate-400 print:bg-white print:text-black print:border-slate-800 print:rounded-none">
                                Sublimated by
                              </div>
                            ) : idx === 1 ? (
                              <div className="bg-teal-100 text-teal-700 text-xs font-bold px-2 py-1 rounded-full my-1 border border-teal-300 print:bg-white print:text-black print:border-slate-800 print:rounded-none">
                                Expressed through
                              </div>
                            ) : idx === 2 ? (
                              <div className="bg-emerald-100 text-emerald-700 text-xs font-bold px-2 py-1 rounded-full my-1 border border-emerald-300 print:bg-white print:text-black print:border-slate-800 print:rounded-none">
                                Leaving eternal
                              </div>
                            ) : null}
                            <i className="ph-bold ph-arrow-right text-base text-slate-400 transform rotate-90 print:text-slate-800"></i>
                          </div>
                        </React.Fragment>
                      ))}
                    </div>
                  </div>

                  {/* 4. 실전 변형 문제 */}
                  <div className="bg-white p-6 rounded-xl shadow-sm print:shadow-none print:border print:border-slate-300 print:rounded-none print-avoid-break">
                    <h3 className="text-xl font-bold text-slate-800 border-b-2 border-slate-100 pb-3 mb-6 flex items-center gap-2 print:text-black print:border-black">
                      <i className="ph-fill ph-check-circle text-2xl text-teal-600 print:text-black"></i> PART 4. Challenge
                    </h3>
                    
                    {/* Q1. 내용 일치 */}
                    <div className="mb-8">
                      <div className="bg-slate-50 border border-slate-200 p-5 rounded-lg mb-4 print:bg-white print:border-none print:p-0 print:mb-6">
                        <p className="font-bold text-slate-800 mb-2 print:text-black">Q1. 내용 불일치 파악</p>
                        <p className="text-sm text-slate-600 mb-4 print:text-black">윗글의 내용과 일치하지 <u>않는</u> 것은?</p>
                      </div>

                      <div className="space-y-2 print:space-y-3">
                        {[
                          { id: 1, text: "빈센트는 아를의 병원에서 5개월 동안 머물렀다." },
                          { id: 2, text: "의사들은 그의 정신 상태가 호전되자 야외에서 그림을 그릴 수 있게 허락했다." },
                          { id: 3, text: "그림 속 큰 나무들은 봄을 맞이하여 잎이 무성하게 피어 있다.", isCorrect: true },
                          { id: 4, text: "병원 정원은 빈센트의 그림과 최대한 비슷해 보이도록 개조되었다." }
                        ].map((choice) => (
                          <button
                            key={choice.id}
                            onClick={() => setQuiz1Answered(choice.id)}
                            disabled={quiz1Answered !== null}
                            className={`w-full text-left p-3 rounded-lg border flex items-center transition-all duration-200
                              print:border-none print:p-1 print:text-black
                              ${quiz1Answered === null ? 'border-slate-200 hover:border-teal-400 hover:bg-teal-50' : 
                                (choice.isCorrect ? 'border-green-500 bg-green-50 text-green-800 font-bold shadow-sm' : 
                                  (quiz1Answered === choice.id ? 'border-red-400 bg-red-50 text-red-500' : 'border-slate-100 text-slate-400 opacity-50'))
                              }
                            `}
                          >
                            <span className="w-8 inline-block font-mono text-slate-500 print:text-black">{['①', '②', '③', '④'][choice.id - 1]}</span> 
                            {choice.text}
                            {quiz1Answered !== null && choice.isCorrect && <i className="ph-fill ph-check-circle text-lg ml-auto text-green-500 print:hidden"></i>}
                          </button>
                        ))}
                      </div>

                      {quiz1Answered !== null && (
                        <div className={`mt-4 p-4 rounded-lg text-sm leading-relaxed animate-fade-in print:hidden
                          ${quiz1Answered === 3 ? 'bg-green-100 text-green-900 border border-green-300' : 'bg-red-100 text-red-900 border border-red-300'}
                        `}>
                          <p className="font-bold mb-1">
                            {quiz1Answered === 3 ? '🎉 정답입니다!' : '오답입니다. 다시 한번 생각해 보세요.'}
                          </p>
                          <p>
                            <strong>해설:</strong> 본문 6~7번 문장에 따르면 꽃이 만발하고 작은 나무들은 잎이 무성하지만, <strong>큰 나무들에는 잎이 거의 없다(The big trees, however, have few leaves)</strong>고 설명하고 있습니다. 이 대조적인 모습이 고흐의 복잡한 내면을 반영하는 장치입니다.
                          </p>
                          <button onClick={() => setQuiz1Answered(null)} className="mt-3 text-sm underline opacity-70 hover:opacity-100">
                            다시 풀기
                          </button>
                        </div>
                      )}
                    </div>

                    <hr className="my-8 border-slate-200 print:border-black" />

                    {/* Q2. 문장 삽입 */}
                    <div className="mb-8">
                      <div className="bg-slate-50 border border-slate-200 p-5 rounded-lg mb-4 print:bg-white print:border-none print:p-0 print:mb-6">
                        <p className="font-bold text-slate-800 mb-2 print:text-black">Q2. 문장 삽입</p>
                        <p className="text-sm text-slate-600 mb-4 print:text-black">글의 흐름으로 보아, 주어진 문장이 들어가기에 가장 적절한 곳을 고르시오.</p>
                        <div className="text-md font-bold text-center bg-white p-4 border border-slate-200 rounded mb-4 print:border-slate-400 print:rounded-none print:text-black">
                          This is rather odd given that the season is spring.
                        </div>
                        <p className="text-md leading-relaxed bg-white p-4 border border-slate-200 rounded print:border-slate-400 print:rounded-none print:text-black">
                          The picture illustrates a spring garden filled with flowers and trees with different colors and tones. The flowers are in full bloom, and the small trees are leafy. ( ① ) The big trees, however, have few leaves. ( ② ) Perhaps this contrast reflects the painter’s complex feelings during the most difficult time of his life. ( ③ ) The hospital closed in the 1980s, and the building reopened as a library and exhibition space. ( ④ ) The garden was renovated to resemble Vincent’s painting as much as possible.
                        </p>
                      </div>

                      <div className="grid grid-cols-2 md:grid-cols-4 gap-2 print:grid-cols-4 print:gap-4">
                        {[
                          { id: 1, text: "①" },
                          { id: 2, text: "②", isCorrect: true },
                          { id: 3, text: "③" },
                          { id: 4, text: "④" }
                        ].map((choice) => (
                          <button
                            key={choice.id}
                            onClick={() => setQuiz2Answered(choice.id)}
                            disabled={quiz2Answered !== null}
                            className={`w-full text-center p-3 rounded-lg border font-medium transition-all duration-200
                              print:border-none print:p-1 print:text-black
                              ${quiz2Answered === null ? 'border-slate-200 hover:border-emerald-400 hover:bg-emerald-50' : 
                                (choice.isCorrect ? 'border-green-500 bg-green-50 text-green-800 shadow-sm' : 
                                  (quiz2Answered === choice.id ? 'border-red-400 bg-red-50 text-red-500' : 'border-slate-100 text-slate-400 opacity-50'))
                              }
                            `}
                          >
                            {choice.text}
                          </button>
                        ))}
                      </div>

                      {quiz2Answered !== null && (
                        <div className={`mt-4 p-4 rounded-lg text-sm leading-relaxed animate-fade-in print:hidden
                          ${quiz2Answered === 2 ? 'bg-green-100 text-green-900 border border-green-300' : 'bg-red-100 text-red-900 border border-red-300'}
                        `}>
                          <p className="font-bold mb-1">
                            {quiz2Answered === 2 ? '🎉 정답입니다!' : '오답입니다. 다시 한번 생각해 보세요.'}
                          </p>
                          <p>
                            <strong>해설:</strong> 주어진 문장의 <strong>'This(이것)'</strong>가 무엇인지 파악해야 합니다. 봄의 정원에서 꽃이 만발한 것은 정상이지만, <strong>큰 나무에 잎이 거의 없다는 것(few leaves)</strong>이 봄이라는 계절을 감안할 때 '이상한(odd)' 일입니다. 따라서 잎이 없다는 묘사 바로 뒤이자, 이 대조(contrast)가 심경을 반영한다는 해석 바로 앞인 <strong>②번</strong> 위치가 완벽합니다.
                          </p>
                          <button onClick={() => setQuiz2Answered(null)} className="mt-3 text-sm underline opacity-70 hover:opacity-100">
                            다시 풀기
                          </button>
                        </div>
                      )}
                    </div>

                    <hr className="my-8 border-slate-200 print:border-black" />

                    {/* Q3. 요약문 완성 */}
                    <div>
                      <div className="bg-slate-50 border border-slate-200 p-5 rounded-lg mb-4 print:bg-white print:border-none print:p-0 print:mb-6">
                        <p className="font-bold text-slate-800 mb-2 print:text-black">Q3. 요약문 완성</p>
                        <p className="text-sm text-slate-600 mb-4 print:text-black">다음 글의 내용을 한 문장으로 요약하고자 한다. 빈칸 (A), (B)에 들어갈 말로 가장 적절한 것은?</p>
                        <p className="text-md leading-relaxed bg-white p-4 border border-slate-200 rounded print:border-slate-400 print:rounded-none print:text-black">
                          Despite his emotional <span className="font-bold text-emerald-800">( A )</span> during his stay at the hospital, Van Gogh was able to create masterpieces that expressed his complex feelings, and his artistic legacy continues to <span className="font-bold text-emerald-800">( B )</span> visitors today.
                        </p>
                      </div>

                      <div className="space-y-2 print:space-y-3">
                        {[
                          { id: 1, text: "(A) excitement —— (B) disappoint" },
                          { id: 2, text: "(A) struggles —— (B) inspire", isCorrect: true },
                          { id: 3, text: "(A) struggles —— (B) confuse" },
                          { id: 4, text: "(A) stability —— (B) inspire" }
                        ].map((choice) => (
                          <button
                            key={choice.id}
                            onClick={() => setQuiz3Answered(choice.id)}
                            disabled={quiz3Answered !== null}
                            className={`w-full text-left p-3 rounded-lg border flex items-center transition-all duration-200
                              print:border-none print:p-1 print:text-black
                              ${quiz3Answered === null ? 'border-slate-200 hover:border-emerald-400 hover:bg-emerald-50' : 
                                (choice.isCorrect ? 'border-green-500 bg-green-50 text-green-800 font-bold shadow-sm' : 
                                  (quiz3Answered === choice.id ? 'border-red-400 bg-red-50 text-red-500' : 'border-slate-100 text-slate-400 opacity-50'))
                              }
                            `}
                          >
                            <span className="w-8 inline-block font-mono text-slate-500 print:text-black">{['①', '②', '③', '④'][choice.id - 1]}</span> 
                            {choice.text}
                            {quiz3Answered !== null && choice.isCorrect && <i className="ph-fill ph-check-circle text-lg ml-auto text-green-500 print:hidden"></i>}
                          </button>
                        ))}
                      </div>

                      {quiz3Answered !== null && (
                        <div className={`mt-4 p-4 rounded-lg text-sm leading-relaxed animate-fade-in print:hidden
                          ${quiz3Answered === 2 ? 'bg-green-100 text-green-900 border border-green-300' : 'bg-red-100 text-red-900 border border-red-300'}
                        `}>
                          <p className="font-bold mb-1">
                            {quiz3Answered === 2 ? '🎉 정답입니다!' : '오답입니다. 다시 한번 생각해 보세요.'}
                          </p>
                          <p>
                            <strong>해설:</strong> 빈센트 반 고흐는 아를의 병원에서 정서적인 <strong>어려움과 고난(struggles/mental illness)</strong>을 겪었음에도 불구하고 자신의 복잡한 감정을 담은 명작을 만들어냈으며, 아를과 그의 이야기는 오늘날까지 사람들에게 <strong>영감을 주고(inspire)</strong> 있습니다. 아를 시리즈의 서론부터 4부까지 이어져 온 완벽한 결론 요약입니다.
                          </p>
                          <button onClick={() => setQuiz3Answered(null)} className="mt-3 text-sm underline opacity-70 hover:opacity-100">
                            다시 풀기
                          </button>
                        </div>
                      )}
                    </div>

                  </div>
                </div>

              </div>
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
