<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE LOGIC Interactive App - Arles Part 3</title>
    
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    
    <style>
        @media print {
            body {
                -webkit-print-color-adjust: exact;
                print-color-adjust: exact;
                background-color: white !important;
            }
            ::-webkit-scrollbar {
                display: none;
            }
            .print-avoid-break {
                break-inside: avoid;
            }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        const textData = [
          // Part 1: The Masterpiece (1~2)
          { id: 1, text: "Vincent painted the world-famous Café Terrace at Night in September 1888.", trans: "빈센트는 1888년 9월 세계적으로 유명한 '밤의 카페 테라스'를 그렸다.", logic: 'creation' },
          { id: 2, text: "He created this work while sitting outside the Café van Gogh at night.", trans: "그는 밤에 카페 반 고흐 밖에 앉아 이 작품을 만들었다.", isHighlight: true, logicPoint: 1 },

          // Part 2: The Norm (3~4)
          { id: 3, text: "This was unusual because most painters did their night scenes from memory and worked during the daytime.", trans: "대부분의 화가들은 기억에 의존해 밤 풍경을 그리고 낮에 작업했기 때문에 이것은 이례적이었다.", logic: 'norm' },
          { id: 4, text: "As such, they used a lot of black paint.", trans: "따라서, 그들은 검은색 물감을 많이 사용했다.", isHighlight: true, logicPoint: 2 },

          // Part 3: The Innovation (5~6)
          { id: 5, text: "Vincent, however, believed that night scenes contained diverse and vibrant colors.", trans: "하지만 빈센트는 밤 풍경에 다양하고 생동감 넘치는 색이 포함되어 있다고 믿었다.", logic: 'vision' },
          { id: 6, text: "Indeed, the Café Terrace at Night has such a rich harmony of yellows, blues, and oranges that Vincent did not have to use a single drop of black paint.", trans: "실제로, '밤의 카페 테라스'는 노란색, 파란색, 주황색의 매우 풍부한 조화를 이루고 있어서 빈센트는 검은색 물감을 단 한 방울도 사용할 필요가 없었다.", isHighlight: true, logicPoint: 3, logic: 'masterpiece' },

          // Part 4: The Legacy (7~10)
          { id: 7, text: "Even today, there is still a café at the site of Vincent’s painting.", trans: "오늘날에도 빈센트의 그림 속 그 장소에는 여전히 카페가 있다." },
          { id: 8, text: "It was renovated in the 1990s and painted yellow to look like the café in the painting.", trans: "그것은 1990년대에 그림 속 카페처럼 보이도록 노란색으로 개조되고 칠해졌다." },
          { id: 9, text: "However, it is uncertain whether the color of the original café was yellow or not.", trans: "하지만 원래 카페의 색이 노란색이었는지 아닌지는 불확실하다.", isHighlight: true, logicPoint: 4 },
          { id: 10, text: "The reason is that Vincent painted the wall of the café yellow to show the lamp light.", trans: "그 이유는 빈센트가 램프 불빛을 보여주기 위해 카페 벽을 노란색으로 칠했기 때문이다.", logic: 'truth' }
        ];

        const logicMapSteps = [
          { id: 'norm', title: "THE NORM (통념)", desc: "Painting from memory, using black", color: "bg-slate-200 border-slate-500 text-slate-800", icon: <i className="ph-fill ph-moon text-xl mb-2"></i> },
          { id: 'break', title: "BREAKING THE MOLD (파격)", desc: "Sitting outside at night", color: "bg-indigo-100 border-indigo-400 text-indigo-800", icon: <i className="ph-fill ph-chair text-xl mb-2"></i> },
          { id: 'vision', title: "NEW VISION (새로운 시각)", desc: "Night has diverse & vibrant colors", color: "bg-yellow-100 border-yellow-400 text-yellow-800", icon: <i className="ph-fill ph-eye text-xl mb-2"></i> },
          { id: 'masterpiece', title: "THE MASTERPIECE (명작)", desc: "Harmony of colors, No black paint", color: "bg-blue-100 border-blue-400 text-blue-800", icon: <i className="ph-fill ph-paint-brush-broad text-xl mb-2"></i> }
        ];

        function App() {
          const [activeTab, setActiveTab] = useState(1);
          const [activeLogic, setActiveLogic] = useState(null);
          const [mapStep, setMapStep] = useState(0);
          const [quiz1Answered, setQuiz1Answered] = useState(null);
          const [quiz2Answered, setQuiz2Answered] = useState(null);
          const [quiz3Answered, setQuiz3Answered] = useState(null);

          const handleLogicClick = (point) => setActiveLogic(activeLogic === point ? null : point);
          const nextMapStep = () => { if (mapStep < logicMapSteps.length) setMapStep(mapStep + 1); };
          const resetMap = () => setMapStep(0);

          const handlePrint = () => {
            window.print();
          };

          return (
            <div className="min-h-screen bg-slate-50 font-sans text-slate-800 p-4 md:p-8 flex justify-center print:bg-white print:p-0">
              <div className="max-w-4xl w-full flex flex-col gap-6 print:flex print:flex-col print:gap-6 print:max-w-none">
                
                {/* 헤더 */}
                <div className="bg-white p-6 rounded-xl shadow-sm border-t-4 border-yellow-500 print:shadow-none print:border-t-4 print:border-black print:rounded-none flex justify-between items-start">
                  <div>
                    <h1 className="text-sm font-bold text-yellow-600 tracking-wider mb-2 print:text-black">THE LOGIC INTERACTIVE</h1>
                    <h2 className="text-3xl font-serif font-bold text-slate-900 print:text-black">Arles, the City of Light and Art</h2>
                    <p className="text-slate-500 italic mt-1 font-serif print:text-gray-600">Part 3: Café van Gogh</p>
                  </div>
                  <button 
                    onClick={handlePrint}
                    className="print:hidden flex items-center gap-2 bg-slate-800 hover:bg-slate-700 text-white px-4 py-2 rounded-lg font-bold transition-colors shadow-sm"
                  >
                    <i className="ph-bold ph-printer text-lg"></i> 인쇄하기
                  </button>
                </div>

                {/* 탭 네비게이션 */}
                <div className="flex bg-white rounded-xl shadow-sm overflow-hidden print:hidden">
                  <button 
                    onClick={() => setActiveTab(1)}
                    className={`flex-1 py-4 px-2 text-center font-bold text-base md:text-lg transition-all duration-300 border-b-4 ${activeTab === 1 ? 'bg-yellow-50 text-yellow-800 border-yellow-500' : 'text-slate-400 border-transparent hover:bg-slate-50 hover:text-slate-600'}`}
                  >
                    <i className="ph-fill ph-book-open mr-2"></i>
                    1. 지문 및 구문 분석
                  </button>
                  <button 
                    onClick={() => setActiveTab(2)}
                    className={`flex-1 py-4 px-2 text-center font-bold text-base md:text-lg transition-all duration-300 border-b-4 ${activeTab === 2 ? 'bg-indigo-50 text-indigo-800 border-indigo-600' : 'text-slate-400 border-transparent hover:bg-slate-50 hover:text-slate-600'}`}
                  >
                    <i className="ph-fill ph-puzzle-piece mr-2"></i>
                    2. 논리 구조 및 실전 문제
                  </button>
                </div>

                {/* === TAB 1: 지문 및 구문 분석 영역 === */}
                <div className={`space-y-6 print:space-y-4 ${activeTab === 1 ? 'block' : 'hidden print:block'}`}>
                  {/* 1. 지문 영역 */}
                  <div className="bg-white p-6 md:p-8 rounded-xl shadow-sm print:shadow-none print:border print:border-slate-300 print:rounded-none">
                    <h3 className="text-xl font-bold text-yellow-600 border-b-2 border-slate-100 pb-3 mb-4 flex items-center gap-2 print:text-black print:border-black">
                      <i className="ph-fill ph-book-open text-2xl print:text-black"></i> PART 1. Text Analysis
                    </h3>
                    
                    <div className="space-y-8 print:space-y-6">
                      
                      {/* 파트 A: 명작의 탄생 (1~2번) */}
                      <div>
                        <div className="inline-block bg-slate-800 text-white text-sm font-bold px-3 py-1 rounded mb-3 print:bg-slate-200 print:text-black print:border print:border-slate-800">
                          ▶ The Creation (이례적인 작업 방식)
                        </div>
                        <div className="space-y-2 print:space-y-1">
                          {textData.slice(0, 2).map((item) => (
                            <div 
                              key={item.id} 
                              className={`p-2 rounded-lg transition-all duration-300 group cursor-pointer print:p-0 print:mb-2
                                ${activeLogic === item.logicPoint ? 'bg-yellow-50 border border-yellow-200 shadow-inner print:bg-transparent print:border-none print:shadow-none' : 'hover:bg-slate-50 border border-transparent print:border-none'}
                              `}
                            >
                              <p className="text-base md:text-lg leading-relaxed print:text-base print:text-black">
                                <span className="font-bold text-yellow-600 mr-2 text-sm print:text-black">[{item.id.toString().padStart(2, '0')}]</span>
                                <span className={`${activeLogic === item.logicPoint ? 'font-bold text-yellow-700 print:text-black print:underline print:underline-offset-4' : ''}`}>
                                  {item.text}
                                </span>
                              </p>
                              <p className="text-sm text-slate-500 mt-1 opacity-0 group-hover:opacity-100 transition-opacity duration-300 ml-9 print:hidden">
                                {item.trans}
                              </p>
                            </div>
                          ))}
                        </div>
                      </div>

                      {/* 파트 B: 기존의 통념 (3~4번) */}
                      <div className="border-t border-dashed border-slate-300 pt-6 print:border-black print:pt-4">
                        <div className="inline-block bg-slate-600 text-white text-sm font-bold px-3 py-1 rounded mb-3 print:bg-slate-200 print:text-black print:border print:border-slate-800">
                          ▶ The Norm (다른 화가들의 일반적인 방식)
                        </div>
                        <div className="space-y-2 print:space-y-1">
                          {textData.slice(2, 4).map((item) => (
                            <div 
                              key={item.id} 
                              className={`p-2 rounded-lg transition-all duration-300 group cursor-pointer print:p-0 print:mb-2
                                ${activeLogic === item.logicPoint ? 'bg-slate-100 border border-slate-300 shadow-inner print:bg-transparent print:border-none print:shadow-none' : 'hover:bg-slate-50 border border-transparent print:border-none'}
                              `}
                            >
                              <p className="text-base md:text-lg leading-relaxed print:text-base print:text-black">
                                <span className="font-bold text-yellow-600 mr-2 text-sm print:text-black">[{item.id.toString().padStart(2, '0')}]</span>
                                <span className={`${activeLogic === item.logicPoint ? 'font-bold text-slate-800 print:text-black print:underline print:underline-offset-4' : ''}`}>
                                  {item.text}
                                </span>
                              </p>
                              <p className="text-sm text-slate-500 mt-1 opacity-0 group-hover:opacity-100 transition-opacity duration-300 ml-9 print:hidden">
                                {item.trans}
                              </p>
                            </div>
                          ))}
                        </div>
                      </div>

                      {/* 파트 C: 혁신적 시각 (5~6번) */}
                      <div className="border-t border-dashed border-slate-300 pt-6 print:border-black print:pt-4">
                        <div className="inline-block bg-indigo-600 text-white text-sm font-bold px-3 py-1 rounded mb-3 print:bg-slate-200 print:text-black print:border print:border-slate-800">
                          ▶ The Innovation (새로운 시각과 색채의 마술)
                        </div>
                        <div className="space-y-2 print:space-y-1">
                          {textData.slice(4, 6).map((item) => (
                            <div 
                              key={item.id} 
                              className={`p-2 rounded-lg transition-all duration-300 group cursor-pointer print:p-0 print:mb-2
                                ${activeLogic === item.logicPoint ? 'bg-indigo-50 border border-indigo-200 shadow-inner print:bg-transparent print:border-none print:shadow-none' : 'hover:bg-slate-50 border border-transparent print:border-none'}
                              `}
                            >
                              <p className="text-base md:text-lg leading-relaxed print:text-base print:text-black">
                                <span className="font-bold text-yellow-600 mr-2 text-sm print:text-black">[{item.id.toString().padStart(2, '0')}]</span>
                                <span className={`${activeLogic === item.logicPoint ? 'font-bold text-indigo-700 print:text-black print:underline print:underline-offset-4' : ''}`}>
                                  {item.text}
                                </span>
                              </p>
                              <p className="text-sm text-slate-500 mt-1 opacity-0 group-hover:opacity-100 transition-opacity duration-300 ml-9 print:hidden">
                                {item.trans}
                              </p>
                            </div>
                          ))}
                        </div>
                      </div>

                      {/* 파트 D: 오늘날의 흔적 (7~10번) */}
                      <div className="border-t border-dashed border-slate-300 pt-6 print:border-black print:pt-4">
                        <div className="inline-block bg-yellow-600 text-white text-sm font-bold px-3 py-1 rounded mb-3 print:bg-slate-200 print:text-black print:border print:border-slate-800">
                          ▶ The Legacy (오늘날 카페의 노란색이 갖는 비밀)
                        </div>
                        <div className="space-y-2 print:space-y-1">
                          {textData.slice(6, 10).map((item) => (
                            <div 
                              key={item.id} 
                              className={`p-2 rounded-lg transition-all duration-300 group cursor-pointer print:p-0 print:mb-2
                                ${activeLogic === item.logicPoint ? 'bg-yellow-50 border border-yellow-200 shadow-inner print:bg-transparent print:border-none print:shadow-none' : 'hover:bg-slate-50 border border-transparent print:border-none'}
                              `}
                            >
                              <p className="text-base md:text-lg leading-relaxed print:text-base print:text-black">
                                <span className="font-bold text-yellow-600 mr-2 text-sm print:text-black">[{item.id.toString().padStart(2, '0')}]</span>
                                <span className={`${activeLogic === item.logicPoint ? 'font-bold text-yellow-700 print:text-black print:underline print:underline-offset-4' : ''}`}>
                                  {item.text}
                                </span>
                              </p>
                              <p className="text-sm text-slate-500 mt-1 opacity-0 group-hover:opacity-100 transition-opacity duration-300 ml-9 print:hidden">
                                {item.trans}
                              </p>
                            </div>
                          ))}
                        </div>
                      </div>

                    </div>
                  </div>

                  {/* 2. 구문 로직 영역 */}
                  <div className="bg-white p-6 md:p-8 rounded-xl shadow-sm print:shadow-none print:border print:border-slate-300 print:rounded-none print-avoid-break">
                    <h3 className="text-xl font-bold text-yellow-700 border-b-2 border-slate-100 pb-3 mb-6 print:text-black print:border-black">
                      PART 2. The Logic Syntax
                    </h3>
                    <p className="text-sm text-slate-500 mb-6 print:hidden">💡 아래의 포인트를 클릭하면 지문의 해당 문장이 강조됩니다.</p>
                    
                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4 print:grid-cols-1 print:gap-6">
                      
                      {/* POINT 1 */}
                      <button 
                        onClick={() => handleLogicClick(1)}
                        className={`text-left border-2 rounded-lg overflow-hidden transition-all duration-300 print:border-2 print:border-slate-800 print:shadow-none print:transform-none print:rounded-none
                          ${activeLogic === 1 ? 'border-yellow-500 shadow-md transform -translate-y-1' : 'border-slate-200 hover:border-yellow-400'}
                        `}
                      >
                        <div className={`px-4 py-2 font-bold print:bg-slate-100 print:text-black ${activeLogic === 1 ? 'bg-yellow-500 text-white' : 'bg-yellow-50 text-yellow-800'}`}>
                          POINT 01. 분사구문 (동시동작): while sitting
                        </div>
                        <div className="p-4 bg-white h-full">
                          <p className="mb-2"><span className="font-semibold text-slate-700 print:text-black">Structure:</span> He created this work [while sitting] outside...</p>
                          <p className="text-sm text-slate-600 leading-relaxed print:text-black">
                            접속사(while)를 살려둔 능동의 분사구문입니다. 기억에 의존하지 않고 밤에 현장에 '직접 앉아서' 작품을 그렸다는 <strong>고흐만의 파격적인 작업 방식</strong>을 설명합니다.
                          </p>
                        </div>
                      </button>

                      {/* POINT 2 */}
                      <button 
                        onClick={() => handleLogicClick(2)}
                        className={`text-left border-2 rounded-lg overflow-hidden transition-all duration-300 print:border-2 print:border-slate-800 print:shadow-none print:transform-none print:rounded-none
                          ${activeLogic === 2 ? 'border-slate-600 shadow-md transform -translate-y-1' : 'border-slate-200 hover:border-slate-400'}
                        `}
                      >
                        <div className={`px-4 py-2 font-bold print:bg-slate-100 print:text-black ${activeLogic === 2 ? 'bg-slate-600 text-white' : 'bg-slate-50 text-slate-800'}`}>
                          POINT 02. 결과의 연결어: As such
                        </div>
                        <div className="p-4 bg-white h-full">
                          <p className="mb-2"><span className="font-semibold text-slate-700 print:text-black">Structure:</span> [As such], they used a lot of black paint.</p>
                          <p className="text-sm text-slate-600 leading-relaxed print:text-black">
                            "이와 같이, 따라서"라는 뜻입니다. 낮에 기억에 의존해 밤 풍경을 그렸기 때문에(원인), 필연적으로 검은색 물감을 많이 사용할 수밖에 없었던(결과) 다른 화가들의 <strong>일반적인 관행(Norm)</strong>을 보여줍니다.
                          </p>
                        </div>
                      </button>

                      {/* POINT 3 */}
                      <button 
                        onClick={() => handleLogicClick(3)}
                        className={`text-left border-2 rounded-lg overflow-hidden transition-all duration-300 print:border-2 print:border-slate-800 print:shadow-none print:transform-none print:rounded-none
                          ${activeLogic === 3 ? 'border-indigo-600 shadow-md transform -translate-y-1' : 'border-slate-200 hover:border-indigo-400'}
                        `}
                      >
                        <div className={`px-4 py-2 font-bold print:bg-slate-100 print:text-black ${activeLogic === 3 ? 'bg-indigo-600 text-white' : 'bg-indigo-50 text-indigo-800'}`}>
                          POINT 03. 강조의 인과관계: such ~ that
                        </div>
                        <div className="p-4 bg-white h-full">
                          <p className="mb-2"><span className="font-semibold text-slate-700 print:text-black">Structure:</span> has [such a] rich harmony... [that] Vincent did not have to use...</p>
                          <p className="text-sm text-slate-600 leading-relaxed print:text-black">
                            "매우 ~해서 ...하다"라는 의미로 원인과 결과를 묶습니다. 고흐가 밤의 다채로운 색을 직접 관찰하여 매우 풍부한 조화를 만들어냈고(원인), 그 결과 <strong>단 한 방울의 검은색도 쓰지 않았다(결과)</strong>는 명작의 특징을 강조합니다.
                          </p>
                        </div>
                      </button>

                      {/* POINT 4 */}
                      <button 
                        onClick={() => handleLogicClick(4)}
                        className={`text-left border-2 rounded-lg overflow-hidden transition-all duration-300 print:border-2 print:border-slate-800 print:shadow-none print:transform-none print:rounded-none
                          ${activeLogic === 4 ? 'border-yellow-600 shadow-md transform -translate-y-1' : 'border-slate-200 hover:border-yellow-400'}
                        `}
                      >
                        <div className={`px-4 py-2 font-bold print:bg-slate-100 print:text-black ${activeLogic === 4 ? 'bg-yellow-600 text-white' : 'bg-yellow-50 text-yellow-800'}`}>
                          POINT 04. 명사절 접속사: whether ~ or not
                        </div>
                        <div className="p-4 bg-white h-full">
                          <p className="mb-2"><span className="font-semibold text-slate-700 print:text-black">Structure:</span> it is uncertain [whether] the color... was yellow [or not].</p>
                          <p className="text-sm text-slate-600 leading-relaxed print:text-black">
                            "~인지 아닌지"라는 뜻으로 주어절을 이끕니다(it은 가주어). 오늘날 카페의 노란색이 원래 건물의 색상인지, 아니면 고흐가 '불빛'을 표현하기 위해 덧칠한 색상인지에 대한 <strong>흥미로운 미스터리</strong>를 던집니다.
                          </p>
                        </div>
                      </button>

                    </div>

                    <div className="mt-8 text-center print:hidden">
                       <button onClick={() => setActiveTab(2)} className="bg-yellow-600 hover:bg-yellow-500 text-white px-8 py-3 rounded-full font-bold shadow-md transition-colors flex items-center gap-2 mx-auto">
                         구문 분석 완료! 실전 문제로 이동 <i className="ph-bold ph-arrow-right"></i>
                       </button>
                    </div>
                  </div>
                </div>

                {/* === TAB 2: 논리 구조도 및 퀴즈 영역 === */}
                <div className={`space-y-6 print:space-y-4 print:mt-4 ${activeTab === 2 ? 'block' : 'hidden print:block'}`}>
                  
                  {/* 3. 로직 맵 */}
                  <div className="bg-white p-6 rounded-xl shadow-sm border-t-4 border-indigo-600 print:shadow-none print:border print:border-slate-300 print:border-t-4 print:border-t-black print:rounded-none print-avoid-break">
                    <div className="flex justify-between items-center border-b-2 border-slate-100 pb-3 mb-6 print:border-black">
                      <h3 className="text-xl font-bold text-slate-800 flex items-center gap-2 print:text-black">
                        <i className="ph-fill ph-play-circle text-2xl text-indigo-600 print:text-black"></i> PART 3. Logic Map
                      </h3>
                      <div className="print:hidden">
                        {mapStep > 0 && mapStep < logicMapSteps.length && (
                          <button onClick={nextMapStep} className="bg-indigo-100 hover:bg-indigo-200 text-indigo-800 px-3 py-1 rounded text-sm font-bold transition-colors">
                            Next Step ➔
                          </button>
                        )}
                        {mapStep === logicMapSteps.length && (
                           <button onClick={resetMap} className="text-slate-400 hover:text-slate-600 text-sm underline">
                            Reset
                           </button>
                        )}
                      </div>
                    </div>
                    
                    <div 
                      className={`h-64 flex-col items-center justify-center border-2 border-dashed border-slate-200 rounded-lg bg-slate-50 text-center p-6 cursor-pointer hover:bg-indigo-50 transition-colors 
                        ${mapStep === 0 ? 'flex' : 'hidden'} print:!hidden
                      `} 
                      onClick={nextMapStep}
                    >
                      <i className="ph-fill ph-play-circle text-5xl text-indigo-400 mb-4"></i>
                      <p className="text-slate-600 font-medium">클릭하여 고흐의 파격적인 작업 논리를<br/>단계별로 파악해 보세요.</p>
                    </div>
                    
                    <div className={`flex-col items-center gap-2 py-4 ${mapStep > 0 ? 'flex' : 'hidden'} print:!flex`}>
                      {logicMapSteps.map((step, idx) => (
                        <React.Fragment key={step.id}>
                          <div 
                            className={`w-full max-w-sm border-2 rounded-lg p-4 flex flex-col items-center text-center transition-all duration-500 transform
                              print:!opacity-100 print:!translate-y-0 print:!flex print:border-slate-800 print:rounded-none print:bg-white print:text-black
                              ${idx < mapStep ? `opacity-100 translate-y-0 ${step.color}` : 'opacity-0 translate-y-8 hidden'}
                            `}
                          >
                            <div className="print:hidden">{step.icon}</div>
                            <span className="font-bold text-sm mb-1 print:text-black">{step.title}</span>
                            <span className="text-sm opacity-90 print:text-black">{step.desc}</span>
                          </div>
                          <div 
                            className={`flex-col items-center opacity-100 animate-pulse 
                              print:!flex print:!opacity-100 print:animate-none
                              ${idx < logicMapSteps.length - 1 && idx < mapStep ? 'flex' : 'hidden'}
                            `}
                          >
                            <div className="w-0.5 h-6 bg-slate-300 print:bg-slate-800"></div>
                            {/* 화살표 라벨 추가 */}
                            {idx === 0 ? (
                              <div className="bg-indigo-100 text-indigo-700 text-xs font-bold px-2 py-1 rounded-full my-1 border border-indigo-300 print:bg-white print:text-black print:border-slate-800 print:rounded-none">
                                Challenged by
                              </div>
                            ) : idx === 1 ? (
                              <div className="bg-yellow-100 text-yellow-700 text-xs font-bold px-2 py-1 rounded-full my-1 border border-yellow-300 print:bg-white print:text-black print:border-slate-800 print:rounded-none">
                                Proving that
                              </div>
                            ) : idx === 2 ? (
                              <div className="bg-blue-100 text-blue-700 text-xs font-bold px-2 py-1 rounded-full my-1 border border-blue-300 print:bg-white print:text-black print:border-slate-800 print:rounded-none">
                                Resulting in
                              </div>
                            ) : null}
                            <i className="ph-bold ph-arrow-right text-base text-slate-400 transform rotate-90 print:text-slate-800"></i>
                          </div>
                        </React.Fragment>
                      ))}
                    </div>
                  </div>

                  {/* 4. 실전 변형 문제 */}
                  <div className="bg-white p-6 rounded-xl shadow-sm print:shadow-none print:border print:border-slate-300 print:rounded-none print-avoid-break">
                    <h3 className="text-xl font-bold text-slate-800 border-b-2 border-slate-100 pb-3 mb-6 flex items-center gap-2 print:text-black print:border-black">
                      <i className="ph-fill ph-check-circle text-2xl text-indigo-600 print:text-black"></i> PART 4. Challenge
                    </h3>
                    
                    {/* Q1. 내용 일치 */}
                    <div className="mb-8">
                      <div className="bg-slate-50 border border-slate-200 p-5 rounded-lg mb-4 print:bg-white print:border-none print:p-0 print:mb-6">
                        <p className="font-bold text-slate-800 mb-2 print:text-black">Q1. 내용 불일치 파악</p>
                        <p className="text-sm text-slate-600 mb-4 print:text-black">윗글의 내용과 일치하지 <u>않는</u> 것은?</p>
                      </div>

                      <div className="space-y-2 print:space-y-3">
                        {[
                          { id: 1, text: "빈센트는 1888년에 '밤의 카페 테라스'를 그렸다." },
                          { id: 2, text: "당시 화가들은 주로 낮에 기억에 의존하여 밤 풍경을 그렸다." },
                          { id: 3, text: "빈센트는 밤 풍경을 그리기 위해 다양한 색상과 검은색 물감을 적절히 섞어 사용했다.", isCorrect: true },
                          { id: 4, text: "오늘날 그 장소에 있는 카페는 그림과 비슷하게 보이기 위해 노란색으로 칠해졌다." }
                        ].map((choice) => (
                          <button
                            key={choice.id}
                            onClick={() => setQuiz1Answered(choice.id)}
                            disabled={quiz1Answered !== null}
                            className={`w-full text-left p-3 rounded-lg border flex items-center transition-all duration-200
                              print:border-none print:p-1 print:text-black
                              ${quiz1Answered === null ? 'border-slate-200 hover:border-indigo-400 hover:bg-indigo-50' : 
                                (choice.isCorrect ? 'border-green-500 bg-green-50 text-green-800 font-bold shadow-sm' : 
                                  (quiz1Answered === choice.id ? 'border-red-400 bg-red-50 text-red-500' : 'border-slate-100 text-slate-400 opacity-50'))
                              }
                            `}
                          >
                            <span className="w-8 inline-block font-mono text-slate-500 print:text-black">{['①', '②', '③', '④'][choice.id - 1]}</span> 
                            {choice.text}
                            {quiz1Answered !== null && choice.isCorrect && <i className="ph-fill ph-check-circle text-lg ml-auto text-green-500 print:hidden"></i>}
                          </button>
                        ))}
                      </div>

                      {quiz1Answered !== null && (
                        <div className={`mt-4 p-4 rounded-lg text-sm leading-relaxed animate-fade-in print:hidden
                          ${quiz1Answered === 3 ? 'bg-green-100 text-green-900 border border-green-300' : 'bg-red-100 text-red-900 border border-red-300'}
                        `}>
                          <p className="font-bold mb-1">
                            {quiz1Answered === 3 ? '🎉 정답입니다!' : '오답입니다. 다시 한번 생각해 보세요.'}
                          </p>
                          <p>
                            <strong>해설:</strong> 본문 6번 문장에서 '밤의 카페 테라스'는 노란색, 파란색, 주황색의 풍부한 조화를 이루고 있어 빈센트가 <strong>"검은색 물감을 단 한 방울도 사용할 필요가 없었다(did not have to use a single drop of black paint)"</strong>고 분명히 서술하고 있으므로 3번은 일치하지 않습니다.
                          </p>
                          <button onClick={() => setQuiz1Answered(null)} className="mt-3 text-sm underline opacity-70 hover:opacity-100">
                            다시 풀기
                          </button>
                        </div>
                      )}
                    </div>

                    <hr className="my-8 border-slate-200 print:border-black" />

                    {/* Q2. 문장 삽입 */}
                    <div className="mb-8">
                      <div className="bg-slate-50 border border-slate-200 p-5 rounded-lg mb-4 print:bg-white print:border-none print:p-0 print:mb-6">
                        <p className="font-bold text-slate-800 mb-2 print:text-black">Q2. 문장 삽입</p>
                        <p className="text-sm text-slate-600 mb-4 print:text-black">글의 흐름으로 보아, 주어진 문장이 들어가기에 가장 적절한 곳을 고르시오.</p>
                        <div className="text-md font-bold text-center bg-white p-4 border border-slate-200 rounded mb-4 print:border-slate-400 print:rounded-none print:text-black">
                          Vincent, however, believed that night scenes contained diverse and vibrant colors.
                        </div>
                        <p className="text-md leading-relaxed bg-white p-4 border border-slate-200 rounded print:border-slate-400 print:rounded-none print:text-black">
                          He created this work while sitting outside the Café van Gogh at night. ( ① ) This was unusual because most painters did their night scenes from memory and worked during the daytime. ( ② ) As such, they used a lot of black paint. ( ③ ) Indeed, the Café Terrace at Night has such a rich harmony of yellows, blues, and oranges that Vincent did not have to use a single drop of black paint. ( ④ ) Even today, there is still a café at the site of Vincent’s painting.
                        </p>
                      </div>

                      <div className="grid grid-cols-2 md:grid-cols-4 gap-2 print:grid-cols-4 print:gap-4">
                        {[
                          { id: 1, text: "①" },
                          { id: 2, text: "②" },
                          { id: 3, text: "③", isCorrect: true },
                          { id: 4, text: "④" }
                        ].map((choice) => (
                          <button
                            key={choice.id}
                            onClick={() => setQuiz2Answered(choice.id)}
                            disabled={quiz2Answered !== null}
                            className={`w-full text-center p-3 rounded-lg border font-medium transition-all duration-200
                              print:border-none print:p-1 print:text-black
                              ${quiz2Answered === null ? 'border-slate-200 hover:border-indigo-400 hover:bg-indigo-50' : 
                                (choice.isCorrect ? 'border-green-500 bg-green-50 text-green-800 shadow-sm' : 
                                  (quiz2Answered === choice.id ? 'border-red-400 bg-red-50 text-red-500' : 'border-slate-100 text-slate-400 opacity-50'))
                              }
                            `}
                          >
                            {choice.text}
                          </button>
                        ))}
                      </div>

                      {quiz2Answered !== null && (
                        <div className={`mt-4 p-4 rounded-lg text-sm leading-relaxed animate-fade-in print:hidden
                          ${quiz2Answered === 3 ? 'bg-green-100 text-green-900 border border-green-300' : 'bg-red-100 text-red-900 border border-red-300'}
                        `}>
                          <p className="font-bold mb-1">
                            {quiz2Answered === 3 ? '🎉 정답입니다!' : '오답입니다. 다시 한번 생각해 보세요.'}
                          </p>
                          <p>
                            <strong>해설:</strong> <strong>'However(하지만)'</strong>가 아주 강력한 단서입니다. 앞 문장들에서 기존 화가들이 기억에 의존해 <strong>'검은색(black paint)'</strong>을 많이 썼다는 통념을 설명하고, 주어진 문장에서 고흐는 밤이 <strong>'다양하고 생동감 넘치는 색'</strong>을 포함한다고 믿었다며 대조를 이룹니다. 그 바로 뒤에 '실제로(Indeed)' 노-파-주의 조화를 이루었다는 증거가 이어지므로 <strong>③번</strong> 자리가 완벽합니다.
                          </p>
                          <button onClick={() => setQuiz2Answered(null)} className="mt-3 text-sm underline opacity-70 hover:opacity-100">
                            다시 풀기
                          </button>
                        </div>
                      )}
                    </div>

                    <hr className="my-8 border-slate-200 print:border-black" />

                    {/* Q3. 요약문 완성 */}
                    <div>
                      <div className="bg-slate-50 border border-slate-200 p-5 rounded-lg mb-4 print:bg-white print:border-none print:p-0 print:mb-6">
                        <p className="font-bold text-slate-800 mb-2 print:text-black">Q3. 요약문 완성</p>
                        <p className="text-sm text-slate-600 mb-4 print:text-black">다음 글의 내용을 한 문장으로 요약하고자 한다. 빈칸 (A), (B)에 들어갈 말로 가장 적절한 것은?</p>
                        <p className="text-md leading-relaxed bg-white p-4 border border-slate-200 rounded print:border-slate-400 print:rounded-none print:text-black">
                          Unlike other painters who relied on memory and dark colors, Van Gogh painted his night scene outside, capturing the night's <span className="font-bold text-indigo-800">( A )</span> colors without using any <span className="font-bold text-indigo-800">( B )</span> paint.
                        </p>
                      </div>

                      <div className="space-y-2 print:space-y-3">
                        {[
                          { id: 1, text: "(A) dull —— (B) yellow" },
                          { id: 2, text: "(A) vivid —— (B) black", isCorrect: true },
                          { id: 3, text: "(A) vivid —— (B) yellow" },
                          { id: 4, text: "(A) dull —— (B) black" }
                        ].map((choice) => (
                          <button
                            key={choice.id}
                            onClick={() => setQuiz3Answered(choice.id)}
                            disabled={quiz3Answered !== null}
                            className={`w-full text-left p-3 rounded-lg border flex items-center transition-all duration-200
                              print:border-none print:p-1 print:text-black
                              ${quiz3Answered === null ? 'border-slate-200 hover:border-indigo-400 hover:bg-indigo-50' : 
                                (choice.isCorrect ? 'border-green-500 bg-green-50 text-green-800 font-bold shadow-sm' : 
                                  (quiz3Answered === choice.id ? 'border-red-400 bg-red-50 text-red-500' : 'border-slate-100 text-slate-400 opacity-50'))
                              }
                            `}
                          >
                            <span className="w-8 inline-block font-mono text-slate-500 print:text-black">{['①', '②', '③', '④'][choice.id - 1]}</span> 
                            {choice.text}
                            {quiz3Answered !== null && choice.isCorrect && <i className="ph-fill ph-check-circle text-lg ml-auto text-green-500 print:hidden"></i>}
                          </button>
                        ))}
                      </div>

                      {quiz3Answered !== null && (
                        <div className={`mt-4 p-4 rounded-lg text-sm leading-relaxed animate-fade-in print:hidden
                          ${quiz3Answered === 2 ? 'bg-green-100 text-green-900 border border-green-300' : 'bg-red-100 text-red-900 border border-red-300'}
                        `}>
                          <p className="font-bold mb-1">
                            {quiz3Answered === 2 ? '🎉 정답입니다!' : '오답입니다. 다시 한번 생각해 보세요.'}
                          </p>
                          <p>
                            <strong>해설:</strong> 반 고흐는 기억과 어두운 색에 의존했던 다른 화가들과 달리 밤 풍경을 밖에서 직접 그렸으며, <strong>검은색(black)</strong> 물감을 전혀 사용하지 않고 밤의 <strong>생생하고 생동감 넘치는(vivid / vibrant)</strong> 색채를 포착했습니다.
                          </p>
                          <button onClick={() => setQuiz3Answered(null)} className="mt-3 text-sm underline opacity-70 hover:opacity-100">
                            다시 풀기
                          </button>
                        </div>
                      )}
                    </div>

                  </div>
                </div>

              </div>
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
