<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE LOGIC Interactive App - Crowdfunding Part 1</title>
    
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    
    <style>
        @media print {
            body {
                -webkit-print-color-adjust: exact;
                print-color-adjust: exact;
                background-color: white !important;
            }
            ::-webkit-scrollbar {
                display: none;
            }
            .print-avoid-break {
                break-inside: avoid;
            }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        const textData = [
          // Part 1: The Problem (1~3)
          { id: 1, text: "My grandparents sell their delicious organic jam at the local market every weekend.", trans: "나의 조부모님은 주말마다 지역 시장에서 맛있는 유기농 잼을 파신다." },
          { id: 2, text: "I went to help them last weekend. However, they had already sold all of their jam!", trans: "나는 지난 주말에 그들을 도우러 갔다. 하지만, 그들은 이미 그들의 잼을 모두 팔아버린 상태였다!" },
          { id: 3, text: "They didn’t have enough strawberries to make any more jam.", trans: "그들은 잼을 더 만들기에 충분한 딸기를 가지고 있지 않았다.", isHighlight: true, logicPoint: 1, logic: 'problem' },

          // Part 2: The Spark (4~6)
          { id: 4, text: "That evening, I sat by the window and stared out at the empty field behind their house.", trans: "그날 저녁, 나는 창가에 앉아 집 뒤의 빈 들판을 내다보았다." },
          { id: 5, text: "Suddenly, I got an idea. The field would be the perfect place for a larger greenhouse.", trans: "갑자기, 나는 아이디어가 떠올랐다. 그 들판은 더 큰 온실을 위한 완벽한 장소가 될 것이었다.", isHighlight: true, logicPoint: 2, logic: 'spark' },
          { id: 6, text: "Then they could grow more strawberries!", trans: "그러면 그들은 더 많은 딸기를 재배할 수 있을 것이다!" },

          // Part 3: The Solution (7)
          { id: 7, text: "I immediately started searching for a way, and I found the perfect solution. I would start a crowdfunding campaign!", trans: "나는 즉시 방법을 찾기 시작했고, 완벽한 해결책을 찾았다. 나는 크라우드펀딩 캠페인을 시작할 것이다!", logic: 'solution' },

          // Part 4: What is Crowdfunding? (8~10)
          { id: 8, text: "Crowdfunding is a way of raising money for a product, company, or charity. These days, people can use crowdfunding websites to collect money.", trans: "크라우드펀딩은 제품, 회사, 또는 자선을 위해 돈을 모으는 방법이다. 요즘 사람들은 돈을 모으기 위해 크라우드펀딩 웹사이트를 사용할 수 있다." },
          { id: 9, text: "Crowdfunding is especially advantageous for individuals or small companies that can’t attract big investors.", trans: "크라우드펀딩은 대규모 투자자를 유치할 수 없는 개인이나 소규모 회사에게 특히 유리하다.", isHighlight: true, logicPoint: 3, logic: 'concept' },
          { id: 10, text: "If the campaign is successful, the investors receive direct rewards for their contribution.", trans: "만약 캠페인이 성공하면, 투자자들은 그들의 기여에 대한 직접적인 보상을 받는다.", isHighlight: true, logicPoint: 4 }
        ];

        const logicMapSteps = [
          { id: 'problem', title: "THE PROBLEM (문제 상황)", desc: "Not enough strawberries for jam", color: "bg-stone-100 border-stone-400 text-stone-800", icon: <i className="ph-fill ph-warning-circle text-xl mb-2"></i> },
          { id: 'spark', title: "THE SPARK (아이디어의 번뜩임)", desc: "Build a greenhouse in the empty field", color: "bg-emerald-100 border-emerald-400 text-emerald-800", icon: <i className="ph-fill ph-lightbulb text-xl mb-2"></i> },
          { id: 'solution', title: "THE SOLUTION (해결책)", desc: "Start a crowdfunding campaign", color: "bg-rose-100 border-rose-400 text-rose-800", icon: <i className="ph-fill ph-rocket-launch text-xl mb-2"></i> },
          { id: 'concept', title: "THE MECHANISM (원리)", desc: "Raise money online & Reward investors", color: "bg-pink-100 border-pink-400 text-pink-800", icon: <i className="ph-fill ph-coins text-xl mb-2"></i> }
        ];

        function App() {
          const [activeTab, setActiveTab] = useState(1);
          const [activeLogic, setActiveLogic] = useState(null);
          const [mapStep, setMapStep] = useState(0);
          const [quiz1Answered, setQuiz1Answered] = useState(null);
          const [quiz2Answered, setQuiz2Answered] = useState(null);
          const [quiz3Answered, setQuiz3Answered] = useState(null);

          const handleLogicClick = (point) => setActiveLogic(activeLogic === point ? null : point);
          const nextMapStep = () => { if (mapStep < logicMapSteps.length) setMapStep(mapStep + 1); };
          const resetMap = () => setMapStep(0);

          const handlePrint = () => {
            window.print();
          };

          return (
            <div className="min-h-screen bg-slate-50 font-sans text-slate-800 p-4 md:p-8 flex justify-center print:bg-white print:p-0">
              <div className="max-w-4xl w-full flex flex-col gap-6 print:flex print:flex-col print:gap-6 print:max-w-none">
                
                {/* 헤더 */}
                <div className="bg-white p-6 rounded-xl shadow-sm border-t-4 border-rose-600 print:shadow-none print:border-t-4 print:border-black print:rounded-none flex justify-between items-start">
                  <div>
                    <h1 className="text-sm font-bold text-rose-800 tracking-wider mb-2 print:text-black">THE LOGIC INTERACTIVE</h1>
                    <h2 className="text-3xl font-serif font-bold text-slate-900 print:text-black">Turning Ideas into Reality</h2>
                    <p className="text-slate-500 italic mt-1 font-serif print:text-gray-600">Part 1: The Spark & The Concept</p>
                  </div>
                  <button 
                    onClick={handlePrint}
                    className="print:hidden flex items-center gap-2 bg-slate-800 hover:bg-slate-700 text-white px-4 py-2 rounded-lg font-bold transition-colors shadow-sm"
                  >
                    <i className="ph-bold ph-printer text-lg"></i> 인쇄하기
                  </button>
                </div>

                {/* 탭 네비게이션 */}
                <div className="flex bg-white rounded-xl shadow-sm overflow-hidden print:hidden">
                  <button 
                    onClick={() => setActiveTab(1)}
                    className={`flex-1 py-4 px-2 text-center font-bold text-base md:text-lg transition-all duration-300 border-b-4 ${activeTab === 1 ? 'bg-rose-50 text-rose-800 border-rose-600' : 'text-slate-400 border-transparent hover:bg-slate-50 hover:text-slate-600'}`}
                  >
                    <i className="ph-fill ph-book-open mr-2"></i>
                    1. 지문 및 구문 분석
                  </button>
                  <button 
                    onClick={() => setActiveTab(2)}
                    className={`flex-1 py-4 px-2 text-center font-bold text-base md:text-lg transition-all duration-300 border-b-4 ${activeTab === 2 ? 'bg-emerald-50 text-emerald-800 border-emerald-600' : 'text-slate-400 border-transparent hover:bg-slate-50 hover:text-slate-600'}`}
                  >
                    <i className="ph-fill ph-puzzle-piece mr-2"></i>
                    2. 논리 구조 및 실전 문제
                  </button>
                </div>

                {/* === TAB 1: 지문 및 구문 분석 영역 === */}
                <div className={`space-y-6 print:space-y-4 ${activeTab === 1 ? 'block' : 'hidden print:block'}`}>
                  {/* 1. 지문 영역 */}
                  <div className="bg-white p-6 md:p-8 rounded-xl shadow-sm print:shadow-none print:border print:border-slate-300 print:rounded-none">
                    <h3 className="text-xl font-bold text-rose-800 border-b-2 border-slate-100 pb-3 mb-4 flex items-center gap-2 print:text-black print:border-black">
                      <i className="ph-fill ph-book-open text-2xl print:text-black"></i> PART 1. Text Analysis
                    </h3>
                    
                    <div className="space-y-8 print:space-y-6">
                      
                      {/* 파트 A: 문제 발견 (1~3번) */}
                      <div>
                        <div className="inline-block bg-slate-800 text-white text-sm font-bold px-3 py-1 rounded mb-3 print:bg-slate-200 print:text-black print:border print:border-slate-800">
                          ▶ The Problem (딸기 부족이라는 문제 상황)
                        </div>
                        <div className="space-y-2 print:space-y-1">
                          {textData.slice(0, 3).map((item) => (
                            <div 
                              key={item.id} 
                              className={`p-2 rounded-lg transition-all duration-300 group cursor-pointer print:p-0 print:mb-2
                                ${activeLogic === item.logicPoint ? 'bg-rose-50 border border-rose-200 shadow-inner print:bg-transparent print:border-none print:shadow-none' : 'hover:bg-slate-50 border border-transparent print:border-none'}
                              `}
                            >
                              <p className="text-base md:text-lg leading-relaxed print:text-base print:text-black">
                                <span className="font-bold text-rose-700 mr-2 text-sm print:text-black">[{item.id.toString().padStart(2, '0')}]</span>
                                <span className={`${activeLogic === item.logicPoint ? 'font-bold text-rose-800 print:text-black print:underline print:underline-offset-4' : ''}`}>
                                  {item.text}
                                </span>
                              </p>
                              <p className="text-sm text-slate-500 mt-1 opacity-0 group-hover:opacity-100 transition-opacity duration-300 ml-9 print:hidden">
                                {item.trans}
                              </p>
                            </div>
                          ))}
                        </div>
                      </div>

                      {/* 파트 B: 아이디어 도출 (4~6번) */}
                      <div className="border-t border-dashed border-slate-300 pt-6 print:border-black print:pt-4">
                        <div className="inline-block bg-emerald-600 text-white text-sm font-bold px-3 py-1 rounded mb-3 print:bg-slate-200 print:text-black print:border print:border-slate-800">
                          ▶ The Spark (빈 들판에서 얻은 영감)
                        </div>
                        <div className="space-y-2 print:space-y-1">
                          {textData.slice(3, 6).map((item) => (
                            <div 
                              key={item.id} 
                              className={`p-2 rounded-lg transition-all duration-300 group cursor-pointer print:p-0 print:mb-2
                                ${activeLogic === item.logicPoint ? 'bg-emerald-50 border border-emerald-200 shadow-inner print:bg-transparent print:border-none print:shadow-none' : 'hover:bg-slate-50 border border-transparent print:border-none'}
                              `}
                            >
                              <p className="text-base md:text-lg leading-relaxed print:text-base print:text-black">
                                <span className="font-bold text-rose-700 mr-2 text-sm print:text-black">[{item.id.toString().padStart(2, '0')}]</span>
                                <span className={`${activeLogic === item.logicPoint ? 'font-bold text-emerald-700 print:text-black print:underline print:underline-offset-4' : ''}`}>
                                  {item.text}
                                </span>
                              </p>
                              <p className="text-sm text-slate-500 mt-1 opacity-0 group-hover:opacity-100 transition-opacity duration-300 ml-9 print:hidden">
                                {item.trans}
                              </p>
                            </div>
                          ))}
                        </div>
                      </div>

                      {/* 파트 C: 해결책의 등장 (7번) */}
                      <div className="border-t border-dashed border-slate-300 pt-6 print:border-black print:pt-4">
                        <div className="inline-block bg-rose-700 text-white text-sm font-bold px-3 py-1 rounded mb-3 print:bg-slate-200 print:text-black print:border print:border-slate-800">
                          ▶ The Solution (완벽한 해결책의 발견)
                        </div>
                        <div className="space-y-2 print:space-y-1">
                          {textData.slice(6, 7).map((item) => (
                            <div 
                              key={item.id} 
                              className={`p-2 rounded-lg transition-all duration-300 group cursor-pointer print:p-0 print:mb-2
                                ${activeLogic === item.logicPoint ? 'bg-rose-50 border border-rose-200 shadow-inner print:bg-transparent print:border-none print:shadow-none' : 'hover:bg-slate-50 border border-transparent print:border-none'}
                              `}
                            >
                              <p className="text-base md:text-lg leading-relaxed print:text-base print:text-black">
                                <span className="font-bold text-rose-700 mr-2 text-sm print:text-black">[{item.id.toString().padStart(2, '0')}]</span>
                                <span className={`${activeLogic === item.logicPoint ? 'font-bold text-rose-800 print:text-black print:underline print:underline-offset-4' : ''}`}>
                                  {item.text}
                                </span>
                              </p>
                              <p className="text-sm text-slate-500 mt-1 opacity-0 group-hover:opacity-100 transition-opacity duration-300 ml-9 print:hidden">
                                {item.trans}
                              </p>
                            </div>
                          ))}
                        </div>
                      </div>

                      {/* 파트 D: 크라우드펀딩 개념 (8~10번) */}
                      <div className="border-t border-dashed border-slate-300 pt-6 print:border-black print:pt-4">
                        <div className="inline-block bg-pink-600 text-white text-sm font-bold px-3 py-1 rounded mb-3 print:bg-slate-200 print:text-black print:border print:border-slate-800">
                          ▶ The Concept (크라우드펀딩의 원리)
                        </div>
                        <div className="space-y-2 print:space-y-1">
                          {textData.slice(7, 10).map((item) => (
                            <div 
                              key={item.id} 
                              className={`p-2 rounded-lg transition-all duration-300 group cursor-pointer print:p-0 print:mb-2
                                ${activeLogic === item.logicPoint ? 'bg-pink-50 border border-pink-200 shadow-inner print:bg-transparent print:border-none print:shadow-none' : 'hover:bg-slate-50 border border-transparent print:border-none'}
                              `}
                            >
                              <p className="text-base md:text-lg leading-relaxed print:text-base print:text-black">
                                <span className="font-bold text-rose-700 mr-2 text-sm print:text-black">[{item.id.toString().padStart(2, '0')}]</span>
                                <span className={`${activeLogic === item.logicPoint ? 'font-bold text-pink-700 print:text-black print:underline print:underline-offset-4' : ''}`}>
                                  {item.text}
                                </span>
                              </p>
                              <p className="text-sm text-slate-500 mt-1 opacity-0 group-hover:opacity-100 transition-opacity duration-300 ml-9 print:hidden">
                                {item.trans}
                              </p>
                            </div>
                          ))}
                        </div>
                      </div>

                    </div>
                  </div>

                  {/* 2. 구문 로직 영역 */}
                  <div className="bg-white p-6 md:p-8 rounded-xl shadow-sm print:shadow-none print:border print:border-slate-300 print:rounded-none print-avoid-break">
                    <h3 className="text-xl font-bold text-rose-800 border-b-2 border-slate-100 pb-3 mb-6 print:text-black print:border-black">
                      PART 2. The Logic Syntax
                    </h3>
                    <p className="text-sm text-slate-500 mb-6 print:hidden">💡 아래의 포인트를 클릭하면 지문의 해당 문장이 강조됩니다.</p>
                    
                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4 print:grid-cols-1 print:gap-6">
                      
                      {/* POINT 1 */}
                      <button 
                        onClick={() => handleLogicClick(1)}
                        className={`text-left border-2 rounded-lg overflow-hidden transition-all duration-300 print:border-2 print:border-slate-800 print:shadow-none print:transform-none print:rounded-none
                          ${activeLogic === 1 ? 'border-rose-600 shadow-md transform -translate-y-1' : 'border-slate-200 hover:border-rose-400'}
                        `}
                      >
                        <div className={`px-4 py-2 font-bold print:bg-slate-100 print:text-black ${activeLogic === 1 ? 'bg-rose-600 text-white' : 'bg-rose-50 text-rose-800'}`}>
                          POINT 01. 부정문에서의 수량 표현: any more
                        </div>
                        <div className="p-4 bg-white h-full">
                          <p className="mb-2"><span className="font-semibold text-slate-700 print:text-black">Structure:</span> didn’t have enough strawberries to make [any more] jam</p>
                          <p className="text-sm text-slate-600 leading-relaxed print:text-black">
                            "더 이상의 잼을 만들 충분한 딸기가 없었다"는 의미입니다. 수요(수익 창출 기회)는 넘치는데 공급(재료)이 부족하다는 <strong>문제 상황(Problem)</strong>을 극명하게 보여줍니다.
                          </p>
                        </div>
                      </button>

                      {/* POINT 2 */}
                      <button 
                        onClick={() => handleLogicClick(2)}
                        className={`text-left border-2 rounded-lg overflow-hidden transition-all duration-300 print:border-2 print:border-slate-800 print:shadow-none print:transform-none print:rounded-none
                          ${activeLogic === 2 ? 'border-emerald-600 shadow-md transform -translate-y-1' : 'border-slate-200 hover:border-emerald-400'}
                        `}
                      >
                        <div className={`px-4 py-2 font-bold print:bg-slate-100 print:text-black ${activeLogic === 2 ? 'bg-emerald-600 text-white' : 'bg-emerald-50 text-emerald-800'}`}>
                          POINT 02. 가능성과 추측의 조동사: would
                        </div>
                        <div className="p-4 bg-white h-full">
                          <p className="mb-2"><span className="font-semibold text-slate-700 print:text-black">Structure:</span> The field [would be] the perfect place...</p>
                          <p className="text-sm text-slate-600 leading-relaxed print:text-black">
                            단순한 과거형이 아니라, "완벽한 장소가 될 텐데"라는 <strong>아이디어의 가정과 상상</strong>을 표현하는 조동사입니다. 빈 들판을 기회로 바꾸는 생각의 전환을 나타냅니다.
                          </p>
                        </div>
                      </button>

                      {/* POINT 3 */}
                      <button 
                        onClick={() => handleLogicClick(3)}
                        className={`text-left border-2 rounded-lg overflow-hidden transition-all duration-300 print:border-2 print:border-slate-800 print:shadow-none print:transform-none print:rounded-none
                          ${activeLogic === 3 ? 'border-pink-600 shadow-md transform -translate-y-1' : 'border-slate-200 hover:border-pink-400'}
                        `}
                      >
                        <div className={`px-4 py-2 font-bold print:bg-slate-100 print:text-black ${activeLogic === 3 ? 'bg-pink-600 text-white' : 'bg-pink-50 text-pink-800'}`}>
                          POINT 03. 주격 관계대명사: that
                        </div>
                        <div className="p-4 bg-white h-full">
                          <p className="mb-2"><span className="font-semibold text-slate-700 print:text-black">Structure:</span> individuals or small companies [that] can’t attract big investors.</p>
                          <p className="text-sm text-slate-600 leading-relaxed print:text-black">
                            선행사(개인이나 소규모 회사)를 수식하는 주격 관계대명사입니다. 거대 자본을 끌어들일 수 없는 <strong>할아버지와 같은 소상공인</strong>에게 크라우드펀딩이 왜 '해결책'인지를 설명해 줍니다.
                          </p>
                        </div>
                      </button>

                      {/* POINT 4 */}
                      <button 
                        onClick={() => handleLogicClick(4)}
                        className={`text-left border-2 rounded-lg overflow-hidden transition-all duration-300 print:border-2 print:border-slate-800 print:shadow-none print:transform-none print:rounded-none
                          ${activeLogic === 4 ? 'border-rose-600 shadow-md transform -translate-y-1' : 'border-slate-200 hover:border-rose-400'}
                        `}
                      >
                        <div className={`px-4 py-2 font-bold print:bg-slate-100 print:text-black ${activeLogic === 4 ? 'bg-rose-600 text-white' : 'bg-rose-50 text-rose-800'}`}>
                          POINT 04. 조건 부사절: If
                        </div>
                        <div className="p-4 bg-white h-full">
                          <p className="mb-2"><span className="font-semibold text-slate-700 print:text-black">Structure:</span> [If] the campaign is successful, the investors receive direct rewards</p>
                          <p className="text-sm text-slate-600 leading-relaxed print:text-black">
                            "만약 ~한다면"이라는 조건절입니다. 크라우드펀딩의 가장 핵심적인 <strong>작동 원리(투자자에 대한 보상)</strong>를 설명하며, 앞으로 전개될 이야기의 뼈대를 제공합니다.
                          </p>
                        </div>
                      </button>

                    </div>

                    <div className="mt-8 text-center print:hidden">
                       <button onClick={() => setActiveTab(2)} className="bg-rose-800 hover:bg-rose-700 text-white px-8 py-3 rounded-full font-bold shadow-md transition-colors flex items-center gap-2 mx-auto">
                         구문 분석 완료! 실전 문제로 이동 <i className="ph-bold ph-arrow-right"></i>
                       </button>
                    </div>
                  </div>
                </div>

                {/* === TAB 2: 논리 구조도 및 퀴즈 영역 === */}
                <div className={`space-y-6 print:space-y-4 print:mt-4 ${activeTab === 2 ? 'block' : 'hidden print:block'}`}>
                  
                  {/* 3. 로직 맵 */}
                  <div className="bg-white p-6 rounded-xl shadow-sm border-t-4 border-emerald-600 print:shadow-none print:border print:border-slate-300 print:border-t-4 print:border-t-black print:rounded-none print-avoid-break">
                    <div className="flex justify-between items-center border-b-2 border-slate-100 pb-3 mb-6 print:border-black">
                      <h3 className="text-xl font-bold text-slate-800 flex items-center gap-2 print:text-black">
                        <i className="ph-fill ph-play-circle text-2xl text-emerald-600 print:text-black"></i> PART 3. Logic Map
                      </h3>
                      <div className="print:hidden">
                        {mapStep > 0 && mapStep < logicMapSteps.length && (
                          <button onClick={nextMapStep} className="bg-emerald-100 hover:bg-emerald-200 text-emerald-800 px-3 py-1 rounded text-sm font-bold transition-colors">
                            Next Step ➔
                          </button>
                        )}
                        {mapStep === logicMapSteps.length && (
                           <button onClick={resetMap} className="text-slate-400 hover:text-slate-600 text-sm underline">
                            Reset
                           </button>
                        )}
                      </div>
                    </div>
                    
                    <div 
                      className={`h-64 flex-col items-center justify-center border-2 border-dashed border-slate-200 rounded-lg bg-slate-50 text-center p-6 cursor-pointer hover:bg-emerald-50 transition-colors 
                        ${mapStep === 0 ? 'flex' : 'hidden'} print:!hidden
                      `} 
                      onClick={nextMapStep}
                    >
                      <i className="ph-fill ph-play-circle text-5xl text-emerald-400 mb-4"></i>
                      <p className="text-slate-600 font-medium">클릭하여 이 프로젝트가 시작된 논리 과정을<br/>단계별로 파악해 보세요.</p>
                    </div>
                    
                    <div className={`flex-col items-center gap-2 py-4 ${mapStep > 0 ? 'flex' : 'hidden'} print:!flex`}>
                      {logicMapSteps.map((step, idx) => (
                        <React.Fragment key={step.id}>
                          <div 
                            className={`w-full max-w-sm border-2 rounded-lg p-4 flex flex-col items-center text-center transition-all duration-500 transform
                              print:!opacity-100 print:!translate-y-0 print:!flex print:border-slate-800 print:rounded-none print:bg-white print:text-black
                              ${idx < mapStep ? `opacity-100 translate-y-0 ${step.color}` : 'opacity-0 translate-y-8 hidden'}
                            `}
                          >
                            <div className="print:hidden">{step.icon}</div>
                            <span className="font-bold text-sm mb-1 print:text-black">{step.title}</span>
                            <span className="text-sm opacity-90 print:text-black">{step.desc}</span>
                          </div>
                          <div 
                            className={`flex-col items-center opacity-100 animate-pulse 
                              print:!flex print:!opacity-100 print:animate-none
                              ${idx < logicMapSteps.length - 1 && idx < mapStep ? 'flex' : 'hidden'}
                            `}
                          >
                            <div className="w-0.5 h-6 bg-slate-300 print:bg-slate-800"></div>
                            {/* 화살표 라벨 추가 */}
                            {idx === 0 ? (
                              <div className="bg-emerald-100 text-emerald-700 text-xs font-bold px-2 py-1 rounded-full my-1 border border-emerald-300 print:bg-white print:text-black print:border-slate-800 print:rounded-none">
                                Resolved by
                              </div>
                            ) : idx === 1 ? (
                              <div className="bg-rose-100 text-rose-700 text-xs font-bold px-2 py-1 rounded-full my-1 border border-rose-300 print:bg-white print:text-black print:border-slate-800 print:rounded-none">
                                Funded via
                              </div>
                            ) : idx === 2 ? (
                              <div className="bg-pink-100 text-pink-700 text-xs font-bold px-2 py-1 rounded-full my-1 border border-pink-300 print:bg-white print:text-black print:border-slate-800 print:rounded-none">
                                Which means
                              </div>
                            ) : null}
                            <i className="ph-bold ph-arrow-right text-base text-slate-400 transform rotate-90 print:text-slate-800"></i>
                          </div>
                        </React.Fragment>
                      ))}
                    </div>
                  </div>

                  {/* 4. 실전 변형 문제 */}
                  <div className="bg-white p-6 rounded-xl shadow-sm print:shadow-none print:border print:border-slate-300 print:rounded-none print-avoid-break">
                    <h3 className="text-xl font-bold text-slate-800 border-b-2 border-slate-100 pb-3 mb-6 flex items-center gap-2 print:text-black print:border-black">
                      <i className="ph-fill ph-check-circle text-2xl text-emerald-600 print:text-black"></i> PART 4. Challenge
                    </h3>
                    
                    {/* Q1. 제목 추론 */}
                    <div className="mb-8">
                      <div className="bg-slate-50 border border-slate-200 p-5 rounded-lg mb-4 print:bg-white print:border-none print:p-0 print:mb-6">
                        <p className="font-bold text-slate-800 mb-2 print:text-black">Q1. 제목 파악</p>
                        <p className="text-sm text-slate-600 mb-4 print:text-black">윗글의 제목으로 가장 적절한 것은?</p>
                      </div>

                      <div className="space-y-2 print:space-y-3">
                        {[
                          { id: 1, text: "How to Make Delicious Organic Jam" },
                          { id: 2, text: "The History of Crowdfunding Campaigns" },
                          { id: 3, text: "From an Empty Field to a Crowdfunding Idea", isCorrect: true },
                          { id: 4, text: "Why Big Investors Avoid Small Companies" }
                        ].map((choice) => (
                          <button
                            key={choice.id}
                            onClick={() => setQuiz1Answered(choice.id)}
                            disabled={quiz1Answered !== null}
                            className={`w-full text-left p-3 rounded-lg border flex items-center transition-all duration-200
                              print:border-none print:p-1 print:text-black
                              ${quiz1Answered === null ? 'border-slate-200 hover:border-emerald-400 hover:bg-emerald-50' : 
                                (choice.isCorrect ? 'border-green-500 bg-green-50 text-green-800 font-bold shadow-sm' : 
                                  (quiz1Answered === choice.id ? 'border-red-400 bg-red-50 text-red-500' : 'border-slate-100 text-slate-400 opacity-50'))
                              }
                            `}
                          >
                            <span className="w-8 inline-block font-mono text-slate-500 print:text-black">{['①', '②', '③', '④'][choice.id - 1]}</span> 
                            {choice.text}
                            {quiz1Answered !== null && choice.isCorrect && <i className="ph-fill ph-check-circle text-lg ml-auto text-green-500 print:hidden"></i>}
                          </button>
                        ))}
                      </div>

                      {quiz1Answered !== null && (
                        <div className={`mt-4 p-4 rounded-lg text-sm leading-relaxed animate-fade-in print:hidden
                          ${quiz1Answered === 3 ? 'bg-green-100 text-green-900 border border-green-300' : 'bg-red-100 text-red-900 border border-red-300'}
                        `}>
                          <p className="font-bold mb-1">
                            {quiz1Answered === 3 ? '🎉 정답입니다!' : '오답입니다. 다시 한번 생각해 보세요.'}
                          </p>
                          <p>
                            <strong>해설:</strong> 할아버지의 딸기 잼이 매진된 문제를 해결하기 위해, 빈 들판을 보고 온실 건축 아이디어를 떠올렸으며(From an empty field) 이를 실현할 수단으로 크라우드펀딩을 고안해낸(to a Crowdfunding idea) 과정을 완벽하게 요약한 3번이 제목으로 적절합니다.
                          </p>
                          <button onClick={() => setQuiz1Answered(null)} className="mt-3 text-sm underline opacity-70 hover:opacity-100">
                            다시 풀기
                          </button>
                        </div>
                      )}
                    </div>

                    <hr className="my-8 border-slate-200 print:border-black" />

                    {/* Q2. 문장 삽입 */}
                    <div className="mb-8">
                      <div className="bg-slate-50 border border-slate-200 p-5 rounded-lg mb-4 print:bg-white print:border-none print:p-0 print:mb-6">
                        <p className="font-bold text-slate-800 mb-2 print:text-black">Q2. 문장 삽입</p>
                        <p className="text-sm text-slate-600 mb-4 print:text-black">글의 흐름으로 보아, 주어진 문장이 들어가기에 가장 적절한 곳을 고르시오.</p>
                        <div className="text-md font-bold text-center bg-white p-4 border border-slate-200 rounded mb-4 print:border-slate-400 print:rounded-none print:text-black">
                          Suddenly, I got an idea.
                        </div>
                        <p className="text-md leading-relaxed bg-white p-4 border border-slate-200 rounded print:border-slate-400 print:rounded-none print:text-black">
                          They didn’t have enough strawberries to make any more jam. ( ① ) That evening, I sat by the window and stared out at the empty field behind their house. ( ② ) The field would be the perfect place for a larger greenhouse. ( ③ ) Then they could grow more strawberries! ( ④ ) I immediately started searching for a way, and I found the perfect solution.
                        </p>
                      </div>

                      <div className="grid grid-cols-2 md:grid-cols-4 gap-2 print:grid-cols-4 print:gap-4">
                        {[
                          { id: 1, text: "①" },
                          { id: 2, text: "②", isCorrect: true },
                          { id: 3, text: "③" },
                          { id: 4, text: "④" }
                        ].map((choice) => (
                          <button
                            key={choice.id}
                            onClick={() => setQuiz2Answered(choice.id)}
                            disabled={quiz2Answered !== null}
                            className={`w-full text-center p-3 rounded-lg border font-medium transition-all duration-200
                              print:border-none print:p-1 print:text-black
                              ${quiz2Answered === null ? 'border-slate-200 hover:border-emerald-400 hover:bg-emerald-50' : 
                                (choice.isCorrect ? 'border-green-500 bg-green-50 text-green-800 shadow-sm' : 
                                  (quiz2Answered === choice.id ? 'border-red-400 bg-red-50 text-red-500' : 'border-slate-100 text-slate-400 opacity-50'))
                              }
                            `}
                          >
                            {choice.text}
                          </button>
                        ))}
                      </div>

                      {quiz2Answered !== null && (
                        <div className={`mt-4 p-4 rounded-lg text-sm leading-relaxed animate-fade-in print:hidden
                          ${quiz2Answered === 2 ? 'bg-green-100 text-green-900 border border-green-300' : 'bg-red-100 text-red-900 border border-red-300'}
                        `}>
                          <p className="font-bold mb-1">
                            {quiz2Answered === 2 ? '🎉 정답입니다!' : '오답입니다. 다시 한번 생각해 보세요.'}
                          </p>
                          <p>
                            <strong>해설:</strong> 화자가 창밖의 '빈 들판(empty field)'을 응시하는 행동 바로 다음에, 그 들판과 관련된 '갑작스러운 아이디어(온실 건축)'가 떠오르는 것이 자연스럽습니다. 따라서 들판을 본 문장 바로 뒤인 <strong>②번</strong> 위치가 완벽합니다.
                          </p>
                          <button onClick={() => setQuiz2Answered(null)} className="mt-3 text-sm underline opacity-70 hover:opacity-100">
                            다시 풀기
                          </button>
                        </div>
                      )}
                    </div>

                    <hr className="my-8 border-slate-200 print:border-black" />

                    {/* Q3. 요약문 완성 */}
                    <div>
                      <div className="bg-slate-50 border border-slate-200 p-5 rounded-lg mb-4 print:bg-white print:border-none print:p-0 print:mb-6">
                        <p className="font-bold text-slate-800 mb-2 print:text-black">Q3. 요약문 완성</p>
                        <p className="text-sm text-slate-600 mb-4 print:text-black">다음 글의 내용을 한 문장으로 요약하고자 한다. 빈칸 (A), (B)에 들어갈 말로 가장 적절한 것은?</p>
                        <p className="text-md leading-relaxed bg-white p-4 border border-slate-200 rounded print:border-slate-400 print:rounded-none print:text-black">
                          To solve the <span className="font-bold text-rose-800">( A )</span> of strawberries for their jam, the author decided to start a crowdfunding campaign, which is an advantageous method for small businesses to raise <span className="font-bold text-rose-800">( B )</span>.
                        </p>
                      </div>

                      <div className="space-y-2 print:space-y-3">
                        {[
                          { id: 1, text: "(A) oversupply —— (B) awareness" },
                          { id: 2, text: "(A) shortage —— (B) funds", isCorrect: true },
                          { id: 3, text: "(A) shortage —— (B) competition" },
                          { id: 4, text: "(A) quality —— (B) funds" }
                        ].map((choice) => (
                          <button
                            key={choice.id}
                            onClick={() => setQuiz3Answered(choice.id)}
                            disabled={quiz3Answered !== null}
                            className={`w-full text-left p-3 rounded-lg border flex items-center transition-all duration-200
                              print:border-none print:p-1 print:text-black
                              ${quiz3Answered === null ? 'border-slate-200 hover:border-emerald-400 hover:bg-emerald-50' : 
                                (choice.isCorrect ? 'border-green-500 bg-green-50 text-green-800 font-bold shadow-sm' : 
                                  (quiz3Answered === choice.id ? 'border-red-400 bg-red-50 text-red-500' : 'border-slate-100 text-slate-400 opacity-50'))
                              }
                            `}
                          >
                            <span className="w-8 inline-block font-mono text-slate-500 print:text-black">{['①', '②', '③', '④'][choice.id - 1]}</span> 
                            {choice.text}
                            {quiz3Answered !== null && choice.isCorrect && <i className="ph-fill ph-check-circle text-lg ml-auto text-green-500 print:hidden"></i>}
                          </button>
                        ))}
                      </div>

                      {quiz3Answered !== null && (
                        <div className={`mt-4 p-4 rounded-lg text-sm leading-relaxed animate-fade-in print:hidden
                          ${quiz3Answered === 2 ? 'bg-green-100 text-green-900 border border-green-300' : 'bg-red-100 text-red-900 border border-red-300'}
                        `}>
                          <p className="font-bold mb-1">
                            {quiz3Answered === 2 ? '🎉 정답입니다!' : '오답입니다. 다시 한번 생각해 보세요.'}
                          </p>
                          <p>
                            <strong>해설:</strong> 조부모님은 잼을 더 만들 딸기가 충분하지 않은 <strong>부족(shortage)</strong> 상태에 직면했습니다. 이를 해결하기 위해 화자는 크라우드펀딩을 선택했으며, 이는 소규모 사업체나 개인이 <strong>자금/자본(funds/money)</strong>을 모으는 데 매우 유리한 방법입니다.
                          </p>
                          <button onClick={() => setQuiz3Answered(null)} className="mt-3 text-sm underline opacity-70 hover:opacity-100">
                            다시 풀기
                          </button>
                        </div>
                      )}
                    </div>

                  </div>
                </div>

              </div>
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
