<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE LOGIC Interactive App - Crowdfunding Part 4</title>
    
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    
    <style>
        @media print {
            body {
                -webkit-print-color-adjust: exact;
                print-color-adjust: exact;
                background-color: white !important;
            }
            ::-webkit-scrollbar {
                display: none;
            }
            .print-avoid-break {
                break-inside: avoid;
            }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        const textData = [
          // Part 1: Promotion Tips (1~6)
          { id: 1, text: "For a successful crowdfunding campaign, promoting it is necessary.", trans: "성공적인 크라우드펀딩 캠페인을 위해서는 홍보가 필수적이다." },
          { id: 2, text: "You should consider making a video. This allows investors to get to know you and learn about your product.", trans: "비디오 제작을 고려해야 한다. 이것은 투자자들이 당신을 알게 하고 당신의 제품에 대해 배울 수 있게 해준다.", isHighlight: true, logicPoint: 1, logic: 'tips' },
          { id: 3, text: "In the video, describe your situation clearly and show your product.", trans: "비디오에서, 당신의 상황을 명확하게 설명하고 제품을 보여주어라." },
          { id: 4, text: "You also need to express how important the product is to you.", trans: "또한 그 제품이 당신에게 얼마나 중요한지 표현할 필요가 있다.", isHighlight: true, logicPoint: 2 },
          { id: 5, text: "Don’t forget to include a direct request for support at the end.", trans: "마지막에 지원에 대한 직접적인 요청을 포함하는 것을 잊지 마라." },
          { id: 6, text: "During a campaign, it is important to send investors updates every week. Through the update, the investors will be able to track the progress of the campaign.", trans: "캠페인 기간 동안, 매주 투자자들에게 업데이트를 보내는 것이 중요하다. 업데이트를 통해 투자자들은 캠페인의 진행 상황을 추적할 수 있을 것이다." },

          // Part 2: Making the Video (7~12)
          { id: 7, text: "After our application was accepted, I was eager to make a good first impression with our investors.", trans: "우리의 신청서가 승인된 후, 나는 투자자들에게 좋은 첫인상을 남기고 싶어 간절했다.", logic: 'action' },
          { id: 8, text: "To achieve this, I made a video about my grandparents and their jam.", trans: "이를 달성하기 위해, 나는 조부모님과 그들의 잼에 대한 비디오를 만들었다." },
          { id: 9, text: "In the video, I highlighted how the strawberries were grown without using chemicals.", trans: "비디오에서, 나는 딸기가 화학 물질을 사용하지 않고 어떻게 재배되었는지를 강조했다." },
          { id: 10, text: "I also included clips of my grandparents. In the clips, they were making the jam with all-natural ingredients.", trans: "나는 또한 조부모님의 영상 클립도 포함시켰다. 그 영상에서 그들은 100% 천연 재료로 잼을 만들고 있었다." },
          { id: 11, text: "Finally, I explained where I wanted to put the new greenhouse and asked for support.", trans: "마지막으로, 나는 새 온실을 어디에 두고 싶은지 설명하고 지원을 요청했다." },
          { id: 12, text: "After some editing, I posted the video on many social media sites. It didn’t take long for word of our campaign to spread.", trans: "몇 가지 편집을 거친 후, 나는 많은 소셜 미디어 사이트에 비디오를 올렸다. 우리 캠페인에 대한 소문이 퍼지는 데는 오랜 시간이 걸리지 않았다.", isHighlight: true, logicPoint: 3, logic: 'spread' },

          // Part 3: The Success (13~15)
          { id: 13, text: "Funding for our campaign started slowly.", trans: "우리 캠페인을 위한 자금 조달은 천천히 시작되었다." },
          { id: 14, text: "When the first investor committed to supporting us, I almost jumped for joy.", trans: "첫 번째 투자자가 우리를 지원하기로 약속했을 때, 나는 너무 기뻐서 펄쩍 뛸 뻔했다.", logic: 'success' },
          { id: 15, text: "Now, after six weeks, we have raised almost $2,500. It seems like we might make our funding goal!", trans: "이제 6주 후, 우리는 거의 2,500달러를 모금했다. 우리가 자금 조달 목표를 달성할 수 있을 것 같다!", isHighlight: true, logicPoint: 4 }
        ];

        const logicMapSteps = [
          { id: 'tips', title: "THE STRATEGY (마케팅 전략)", desc: "Making a video & Sending updates", color: "bg-fuchsia-100 border-fuchsia-400 text-fuchsia-800", icon: <i className="ph-fill ph-video-camera text-xl mb-2"></i> },
          { id: 'action', title: "THE EXECUTION (실행)", desc: "Highlighting organic & natural jam", color: "bg-pink-100 border-pink-400 text-pink-800", icon: <i className="ph-fill ph-film-script text-xl mb-2"></i> },
          { id: 'spread', title: "THE SPREAD (확산)", desc: "Social media and Word of mouth", color: "bg-rose-100 border-rose-400 text-rose-800", icon: <i className="ph-fill ph-share-network text-xl mb-2"></i> },
          { id: 'success', title: "THE SUCCESS (성공)", desc: "First investor & $2,500 raised", color: "bg-purple-100 border-purple-400 text-purple-800", icon: <i className="ph-fill ph-confetti text-xl mb-2"></i> }
        ];

        function App() {
          const [activeTab, setActiveTab] = useState(1);
          const [activeLogic, setActiveLogic] = useState(null);
          const [mapStep, setMapStep] = useState(0);
          const [quiz1Answered, setQuiz1Answered] = useState(null);
          const [quiz2Answered, setQuiz2Answered] = useState(null);
          const [quiz3Answered, setQuiz3Answered] = useState(null);

          const handleLogicClick = (point) => setActiveLogic(activeLogic === point ? null : point);
          const nextMapStep = () => { if (mapStep < logicMapSteps.length) setMapStep(mapStep + 1); };
          const resetMap = () => setMapStep(0);

          const handlePrint = () => {
            window.print();
          };

          return (
            <div className="min-h-screen bg-slate-50 font-sans text-slate-800 p-4 md:p-8 flex justify-center print:bg-white print:p-0">
              <div className="max-w-4xl w-full flex flex-col gap-6 print:flex print:flex-col print:gap-6 print:max-w-none">
                
                {/* 헤더 */}
                <div className="bg-white p-6 rounded-xl shadow-sm border-t-4 border-fuchsia-700 print:shadow-none print:border-t-4 print:border-black print:rounded-none flex justify-between items-start">
                  <div>
                    <h1 className="text-sm font-bold text-fuchsia-800 tracking-wider mb-2 print:text-black">THE LOGIC INTERACTIVE</h1>
                    <h2 className="text-3xl font-serif font-bold text-slate-900 print:text-black">Turning Ideas into Reality</h2>
                    <p className="text-slate-500 italic mt-1 font-serif print:text-gray-600">Part 4: Promotion & Success</p>
                  </div>
                  <button 
                    onClick={handlePrint}
                    className="print:hidden flex items-center gap-2 bg-slate-800 hover:bg-slate-700 text-white px-4 py-2 rounded-lg font-bold transition-colors shadow-sm"
                  >
                    <i className="ph-bold ph-printer text-lg"></i> 인쇄하기
                  </button>
                </div>

                {/* 탭 네비게이션 */}
                <div className="flex bg-white rounded-xl shadow-sm overflow-hidden print:hidden">
                  <button 
                    onClick={() => setActiveTab(1)}
                    className={`flex-1 py-4 px-2 text-center font-bold text-base md:text-lg transition-all duration-300 border-b-4 ${activeTab === 1 ? 'bg-fuchsia-50 text-fuchsia-900 border-fuchsia-800' : 'text-slate-400 border-transparent hover:bg-slate-50 hover:text-slate-600'}`}
                  >
                    <i className="ph-fill ph-book-open mr-2"></i>
                    1. 지문 및 구문 분석
                  </button>
                  <button 
                    onClick={() => setActiveTab(2)}
                    className={`flex-1 py-4 px-2 text-center font-bold text-base md:text-lg transition-all duration-300 border-b-4 ${activeTab === 2 ? 'bg-pink-50 text-pink-800 border-pink-600' : 'text-slate-400 border-transparent hover:bg-slate-50 hover:text-slate-600'}`}
                  >
                    <i className="ph-fill ph-puzzle-piece mr-2"></i>
                    2. 논리 구조 및 실전 문제
                  </button>
                </div>

                {/* === TAB 1: 지문 및 구문 분석 영역 === */}
                <div className={`space-y-6 print:space-y-4 ${activeTab === 1 ? 'block' : 'hidden print:block'}`}>
                  {/* 1. 지문 영역 */}
                  <div className="bg-white p-6 md:p-8 rounded-xl shadow-sm print:shadow-none print:border print:border-slate-300 print:rounded-none">
                    <h3 className="text-xl font-bold text-fuchsia-800 border-b-2 border-slate-100 pb-3 mb-4 flex items-center gap-2 print:text-black print:border-black">
                      <i className="ph-fill ph-book-open text-2xl print:text-black"></i> PART 1. Text Analysis
                    </h3>
                    
                    <div className="space-y-8 print:space-y-6">
                      
                      {/* 파트 A: 홍보 전략 (1~6번) */}
                      <div>
                        <div className="inline-block bg-slate-800 text-white text-sm font-bold px-3 py-1 rounded mb-3 print:bg-slate-200 print:text-black print:border print:border-slate-800">
                          ▶ Promotion Strategies (성공적인 홍보를 위한 팁)
                        </div>
                        <div className="space-y-2 print:space-y-1">
                          {textData.slice(0, 6).map((item) => (
                            <div 
                              key={item.id} 
                              className={`p-2 rounded-lg transition-all duration-300 group cursor-pointer print:p-0 print:mb-2
                                ${activeLogic === item.logicPoint ? 'bg-fuchsia-50 border border-fuchsia-200 shadow-inner print:bg-transparent print:border-none print:shadow-none' : 'hover:bg-slate-50 border border-transparent print:border-none'}
                              `}
                            >
                              <p className="text-base md:text-lg leading-relaxed print:text-base print:text-black">
                                <span className="font-bold text-fuchsia-700 mr-2 text-sm print:text-black">[{item.id.toString().padStart(2, '0')}]</span>
                                <span className={`${activeLogic === item.logicPoint ? 'font-bold text-fuchsia-800 print:text-black print:underline print:underline-offset-4' : ''}`}>
                                  {item.text}
                                </span>
                              </p>
                              <p className="text-sm text-slate-500 mt-1 opacity-0 group-hover:opacity-100 transition-opacity duration-300 ml-9 print:hidden">
                                {item.trans}
                              </p>
                            </div>
                          ))}
                        </div>
                      </div>

                      {/* 파트 B: 비디오 제작 (7~12번) */}
                      <div className="border-t border-dashed border-slate-300 pt-6 print:border-black print:pt-4">
                        <div className="inline-block bg-pink-600 text-white text-sm font-bold px-3 py-1 rounded mb-3 print:bg-slate-200 print:text-black print:border print:border-slate-800">
                          ▶ Making the Video (스토리텔링 비디오 제작과 확산)
                        </div>
                        <div className="space-y-2 print:space-y-1">
                          {textData.slice(6, 12).map((item) => (
                            <div 
                              key={item.id} 
                              className={`p-2 rounded-lg transition-all duration-300 group cursor-pointer print:p-0 print:mb-2
                                ${activeLogic === item.logicPoint ? 'bg-pink-50 border border-pink-200 shadow-inner print:bg-transparent print:border-none print:shadow-none' : 'hover:bg-slate-50 border border-transparent print:border-none'}
                              `}
                            >
                              <p className="text-base md:text-lg leading-relaxed print:text-base print:text-black">
                                <span className="font-bold text-fuchsia-700 mr-2 text-sm print:text-black">[{item.id.toString().padStart(2, '0')}]</span>
                                <span className={`${activeLogic === item.logicPoint ? 'font-bold text-pink-700 print:text-black print:underline print:underline-offset-4' : ''}`}>
                                  {item.text}
                                </span>
                              </p>
                              <p className="text-sm text-slate-500 mt-1 opacity-0 group-hover:opacity-100 transition-opacity duration-300 ml-9 print:hidden">
                                {item.trans}
                              </p>
                            </div>
                          ))}
                        </div>
                      </div>

                      {/* 파트 C: 성공 (13~15번) */}
                      <div className="border-t border-dashed border-slate-300 pt-6 print:border-black print:pt-4">
                        <div className="inline-block bg-purple-600 text-white text-sm font-bold px-3 py-1 rounded mb-3 print:bg-slate-200 print:text-black print:border print:border-slate-800">
                          ▶ The Success (첫 투자와 모금액의 증가)
                        </div>
                        <div className="space-y-2 print:space-y-1">
                          {textData.slice(12, 15).map((item) => (
                            <div 
                              key={item.id} 
                              className={`p-2 rounded-lg transition-all duration-300 group cursor-pointer print:p-0 print:mb-2
                                ${activeLogic === item.logicPoint ? 'bg-purple-50 border border-purple-200 shadow-inner print:bg-transparent print:border-none print:shadow-none' : 'hover:bg-slate-50 border border-transparent print:border-none'}
                              `}
                            >
                              <p className="text-base md:text-lg leading-relaxed print:text-base print:text-black">
                                <span className="font-bold text-fuchsia-700 mr-2 text-sm print:text-black">[{item.id.toString().padStart(2, '0')}]</span>
                                <span className={`${activeLogic === item.logicPoint ? 'font-bold text-purple-700 print:text-black print:underline print:underline-offset-4' : ''}`}>
                                  {item.text}
                                </span>
                              </p>
                              <p className="text-sm text-slate-500 mt-1 opacity-0 group-hover:opacity-100 transition-opacity duration-300 ml-9 print:hidden">
                                {item.trans}
                              </p>
                            </div>
                          ))}
                        </div>
                      </div>

                    </div>
                  </div>

                  {/* 2. 구문 로직 영역 */}
                  <div className="bg-white p-6 md:p-8 rounded-xl shadow-sm print:shadow-none print:border print:border-slate-300 print:rounded-none print-avoid-break">
                    <h3 className="text-xl font-bold text-fuchsia-800 border-b-2 border-slate-100 pb-3 mb-6 print:text-black print:border-black">
                      PART 2. The Logic Syntax
                    </h3>
                    <p className="text-sm text-slate-500 mb-6 print:hidden">💡 아래의 포인트를 클릭하면 지문의 해당 문장이 강조됩니다.</p>
                    
                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4 print:grid-cols-1 print:gap-6">
                      
                      {/* POINT 1 */}
                      <button 
                        onClick={() => handleLogicClick(1)}
                        className={`text-left border-2 rounded-lg overflow-hidden transition-all duration-300 print:border-2 print:border-slate-800 print:shadow-none print:transform-none print:rounded-none
                          ${activeLogic === 1 ? 'border-fuchsia-600 shadow-md transform -translate-y-1' : 'border-slate-200 hover:border-fuchsia-400'}
                        `}
                      >
                        <div className={`px-4 py-2 font-bold print:bg-slate-100 print:text-black ${activeLogic === 1 ? 'bg-fuchsia-600 text-white' : 'bg-fuchsia-50 text-fuchsia-800'}`}>
                          POINT 01. 5형식 동사: allow A to B
                        </div>
                        <div className="p-4 bg-white h-full">
                          <p className="mb-2"><span className="font-semibold text-slate-700 print:text-black">Structure:</span> This [allows] investors [to get] to know you...</p>
                          <p className="text-sm text-slate-600 leading-relaxed print:text-black">
                            "A가 B할 수 있게 해주다(허락하다)"라는 뜻입니다. 홍보 비디오(원인)가 투자자들에게 신뢰와 정보를 제공(결과)한다는 마케팅의 <strong>핵심 원리</strong>를 설명합니다.
                          </p>
                        </div>
                      </button>

                      {/* POINT 2 */}
                      <button 
                        onClick={() => handleLogicClick(2)}
                        className={`text-left border-2 rounded-lg overflow-hidden transition-all duration-300 print:border-2 print:border-slate-800 print:shadow-none print:transform-none print:rounded-none
                          ${activeLogic === 2 ? 'border-pink-600 shadow-md transform -translate-y-1' : 'border-slate-200 hover:border-pink-400'}
                        `}
                      >
                        <div className={`px-4 py-2 font-bold print:bg-slate-100 print:text-black ${activeLogic === 2 ? 'bg-pink-600 text-white' : 'bg-pink-50 text-pink-800'}`}>
                          POINT 02. 간접의문문 (정도의 강조)
                        </div>
                        <div className="p-4 bg-white h-full">
                          <p className="mb-2"><span className="font-semibold text-slate-700 print:text-black">Structure:</span> express [how important the product is to you]</p>
                          <p className="text-sm text-slate-600 leading-relaxed print:text-black">
                            의문사구(how important)+주어+동사의 어순입니다. 단순히 제품이 좋다는 것을 넘어 창작자의 <strong>'진정성(how important)'</strong>을 어필하는 것이 중요함을 나타냅니다.
                          </p>
                        </div>
                      </button>

                      {/* POINT 3 */}
                      <button 
                        onClick={() => handleLogicClick(3)}
                        className={`text-left border-2 rounded-lg overflow-hidden transition-all duration-300 print:border-2 print:border-slate-800 print:shadow-none print:transform-none print:rounded-none
                          ${activeLogic === 3 ? 'border-rose-600 shadow-md transform -translate-y-1' : 'border-slate-200 hover:border-rose-400'}
                        `}
                      >
                        <div className={`px-4 py-2 font-bold print:bg-slate-100 print:text-black ${activeLogic === 3 ? 'bg-rose-600 text-white' : 'bg-rose-50 text-rose-800'}`}>
                          POINT 03. 시간 소요 관용구: It takes + 시간 + for ~ to V
                        </div>
                        <div className="p-4 bg-white h-full">
                          <p className="mb-2"><span className="font-semibold text-slate-700 print:text-black">Structure:</span> [It didn’t take long for] word of our campaign [to spread].</p>
                          <p className="text-sm text-slate-600 leading-relaxed print:text-black">
                            "~가 ...하는 데 (시간이) 걸리다" 구문의 부정형입니다. 소셜 미디어를 통한 비디오 마케팅이 <strong>매우 빠르고 성공적으로 확산(Viral)</strong>되었음을 극적으로 표현합니다.
                          </p>
                        </div>
                      </button>

                      {/* POINT 4 */}
                      <button 
                        onClick={() => handleLogicClick(4)}
                        className={`text-left border-2 rounded-lg overflow-hidden transition-all duration-300 print:border-2 print:border-slate-800 print:shadow-none print:transform-none print:rounded-none
                          ${activeLogic === 4 ? 'border-purple-600 shadow-md transform -translate-y-1' : 'border-slate-200 hover:border-purple-400'}
                        `}
                      >
                        <div className={`px-4 py-2 font-bold print:bg-slate-100 print:text-black ${activeLogic === 4 ? 'bg-purple-600 text-white' : 'bg-purple-50 text-purple-800'}`}>
                          POINT 04. 추측과 기대: It seems like
                        </div>
                        <div className="p-4 bg-white h-full">
                          <p className="mb-2"><span className="font-semibold text-slate-700 print:text-black">Structure:</span> [It seems like] we might make our funding goal!</p>
                          <p className="text-sm text-slate-600 leading-relaxed print:text-black">
                            "~할 것 같다"는 뜻입니다. 6주 만에 2,500달러를 모았다는 구체적인 성과를 바탕으로, 최종 목표(5,000달러) 달성에 대한 <strong>화자의 높은 기대감과 기쁨</strong>을 담아 시리즈의 결론을 맺습니다.
                          </p>
                        </div>
                      </button>

                    </div>

                    <div className="mt-8 text-center print:hidden">
                       <button onClick={() => setActiveTab(2)} className="bg-fuchsia-800 hover:bg-fuchsia-700 text-white px-8 py-3 rounded-full font-bold shadow-md transition-colors flex items-center gap-2 mx-auto">
                         구문 분석 완료! 실전 문제로 이동 <i className="ph-bold ph-arrow-right"></i>
                       </button>
                    </div>
                  </div>
                </div>

                {/* === TAB 2: 논리 구조도 및 퀴즈 영역 === */}
                <div className={`space-y-6 print:space-y-4 print:mt-4 ${activeTab === 2 ? 'block' : 'hidden print:block'}`}>
                  
                  {/* 3. 로직 맵 */}
                  <div className="bg-white p-6 rounded-xl shadow-sm border-t-4 border-pink-600 print:shadow-none print:border print:border-slate-300 print:border-t-4 print:border-t-black print:rounded-none print-avoid-break">
                    <div className="flex justify-between items-center border-b-2 border-slate-100 pb-3 mb-6 print:border-black">
                      <h3 className="text-xl font-bold text-slate-800 flex items-center gap-2 print:text-black">
                        <i className="ph-fill ph-play-circle text-2xl text-pink-600 print:text-black"></i> PART 3. Logic Map
                      </h3>
                      <div className="print:hidden">
                        {mapStep > 0 && mapStep < logicMapSteps.length && (
                          <button onClick={nextMapStep} className="bg-pink-100 hover:bg-pink-200 text-pink-800 px-3 py-1 rounded text-sm font-bold transition-colors">
                            Next Step ➔
                          </button>
                        )}
                        {mapStep === logicMapSteps.length && (
                           <button onClick={resetMap} className="text-slate-400 hover:text-slate-600 text-sm underline">
                            Reset
                           </button>
                        )}
                      </div>
                    </div>
                    
                    <div 
                      className={`h-64 flex-col items-center justify-center border-2 border-dashed border-slate-200 rounded-lg bg-slate-50 text-center p-6 cursor-pointer hover:bg-pink-50 transition-colors 
                        ${mapStep === 0 ? 'flex' : 'hidden'} print:!hidden
                      `} 
                      onClick={nextMapStep}
                    >
                      <i className="ph-fill ph-play-circle text-5xl text-pink-400 mb-4"></i>
                      <p className="text-slate-600 font-medium">클릭하여 캠페인 홍보 및 성공 과정을<br/>단계별로 파악해 보세요.</p>
                    </div>
                    
                    <div className={`flex-col items-center gap-2 py-4 ${mapStep > 0 ? 'flex' : 'hidden'} print:!flex`}>
                      {logicMapSteps.map((step, idx) => (
                        <React.Fragment key={step.id}>
                          <div 
                            className={`w-full max-w-sm border-2 rounded-lg p-4 flex flex-col items-center text-center transition-all duration-500 transform
                              print:!opacity-100 print:!translate-y-0 print:!flex print:border-slate-800 print:rounded-none print:bg-white print:text-black
                              ${idx < mapStep ? `opacity-100 translate-y-0 ${step.color}` : 'opacity-0 translate-y-8 hidden'}
                            `}
                          >
                            <div className="print:hidden">{step.icon}</div>
                            <span className="font-bold text-sm mb-1 print:text-black">{step.title}</span>
                            <span className="text-sm opacity-90 print:text-black">{step.desc}</span>
                          </div>
                          <div 
                            className={`flex-col items-center opacity-100 animate-pulse 
                              print:!flex print:!opacity-100 print:animate-none
                              ${idx < logicMapSteps.length - 1 && idx < mapStep ? 'flex' : 'hidden'}
                            `}
                          >
                            <div className="w-0.5 h-6 bg-slate-300 print:bg-slate-800"></div>
                            {/* 화살표 라벨 추가 */}
                            {idx === 0 ? (
                              <div className="bg-fuchsia-100 text-fuchsia-700 text-xs font-bold px-2 py-1 rounded-full my-1 border border-fuchsia-300 print:bg-white print:text-black print:border-slate-800 print:rounded-none">
                                Executed by
                              </div>
                            ) : idx === 1 ? (
                              <div className="bg-pink-100 text-pink-700 text-xs font-bold px-2 py-1 rounded-full my-1 border border-pink-300 print:bg-white print:text-black print:border-slate-800 print:rounded-none">
                                Resulting in
                              </div>
                            ) : idx === 2 ? (
                              <div className="bg-rose-100 text-rose-700 text-xs font-bold px-2 py-1 rounded-full my-1 border border-rose-300 print:bg-white print:text-black print:border-slate-800 print:rounded-none">
                                Which leads to
                              </div>
                            ) : null}
                            <i className="ph-bold ph-arrow-right text-base text-slate-400 transform rotate-90 print:text-slate-800"></i>
                          </div>
                        </React.Fragment>
                      ))}
                    </div>
                  </div>

                  {/* 4. 실전 변형 문제 */}
                  <div className="bg-white p-6 rounded-xl shadow-sm print:shadow-none print:border print:border-slate-300 print:rounded-none print-avoid-break">
                    <h3 className="text-xl font-bold text-slate-800 border-b-2 border-slate-100 pb-3 mb-6 flex items-center gap-2 print:text-black print:border-black">
                      <i className="ph-fill ph-check-circle text-2xl text-pink-600 print:text-black"></i> PART 4. Challenge
                    </h3>
                    
                    {/* Q1. 내용 일치 */}
                    <div className="mb-8">
                      <div className="bg-slate-50 border border-slate-200 p-5 rounded-lg mb-4 print:bg-white print:border-none print:p-0 print:mb-6">
                        <p className="font-bold text-slate-800 mb-2 print:text-black">Q1. 내용 불일치 파악</p>
                        <p className="text-sm text-slate-600 mb-4 print:text-black">윗글의 내용과 일치하지 <u>않는</u> 것은?</p>
                      </div>

                      <div className="space-y-2 print:space-y-3">
                        {[
                          { id: 1, text: "비디오를 통해 투자자들은 제품에 대해 더 잘 알 수 있다." },
                          { id: 2, text: "캠페인 진행 중에는 매주 투자자들에게 진행 상황 업데이트를 보내는 것이 좋다." },
                          { id: 3, text: "비디오에는 화학 비료를 사용하여 기른 딸기의 우수성이 강조되었다.", isCorrect: true },
                          { id: 4, text: "캠페인 시작 6주 후, 모금액은 약 2,500달러에 달했다." }
                        ].map((choice) => (
                          <button
                            key={choice.id}
                            onClick={() => setQuiz1Answered(choice.id)}
                            disabled={quiz1Answered !== null}
                            className={`w-full text-left p-3 rounded-lg border flex items-center transition-all duration-200
                              print:border-none print:p-1 print:text-black
                              ${quiz1Answered === null ? 'border-slate-200 hover:border-pink-400 hover:bg-pink-50' : 
                                (choice.isCorrect ? 'border-green-500 bg-green-50 text-green-800 font-bold shadow-sm' : 
                                  (quiz1Answered === choice.id ? 'border-red-400 bg-red-50 text-red-500' : 'border-slate-100 text-slate-400 opacity-50'))
                              }
                            `}
                          >
                            <span className="w-8 inline-block font-mono text-slate-500 print:text-black">{['①', '②', '③', '④'][choice.id - 1]}</span> 
                            {choice.text}
                            {quiz1Answered !== null && choice.isCorrect && <i className="ph-fill ph-check-circle text-lg ml-auto text-green-500 print:hidden"></i>}
                          </button>
                        ))}
                      </div>

                      {quiz1Answered !== null && (
                        <div className={`mt-4 p-4 rounded-lg text-sm leading-relaxed animate-fade-in print:hidden
                          ${quiz1Answered === 3 ? 'bg-green-100 text-green-900 border border-green-300' : 'bg-red-100 text-red-900 border border-red-300'}
                        `}>
                          <p className="font-bold mb-1">
                            {quiz1Answered === 3 ? '🎉 정답입니다!' : '오답입니다. 다시 한번 생각해 보세요.'}
                          </p>
                          <p>
                            <strong>해설:</strong> 본문의 9~10번 문장에서 "딸기가 화학 물질을 사용하지 않고(<strong>without using chemicals</strong>) 어떻게 재배되었는지 강조했고", "100% 천연 재료(<strong>all-natural ingredients</strong>)로 잼을 만들고 있다"고 서술했으므로 3번은 사실과 정반대입니다.
                          </p>
                          <button onClick={() => setQuiz1Answered(null)} className="mt-3 text-sm underline opacity-70 hover:opacity-100">
                            다시 풀기
                          </button>
                        </div>
                      )}
                    </div>

                    <hr className="my-8 border-slate-200 print:border-black" />

                    {/* Q2. 문장 삽입 */}
                    <div className="mb-8">
                      <div className="bg-slate-50 border border-slate-200 p-5 rounded-lg mb-4 print:bg-white print:border-none print:p-0 print:mb-6">
                        <p className="font-bold text-slate-800 mb-2 print:text-black">Q2. 문장 삽입</p>
                        <p className="text-sm text-slate-600 mb-4 print:text-black">글의 흐름으로 보아, 주어진 문장이 들어가기에 가장 적절한 곳을 고르시오.</p>
                        <div className="text-md font-bold text-center bg-white p-4 border border-slate-200 rounded mb-4 print:border-slate-400 print:rounded-none print:text-black">
                          After some editing, I posted the video on many social media sites.
                        </div>
                        <p className="text-md leading-relaxed bg-white p-4 border border-slate-200 rounded print:border-slate-400 print:rounded-none print:text-black">
                          To achieve this, I made a video about my grandparents and their jam. In the video, I highlighted how the strawberries were grown without using chemicals. ( ① ) I also included clips of my grandparents. ( ② ) In the clips, they were making the jam with all-natural ingredients. ( ③ ) Finally, I explained where I wanted to put the new greenhouse and asked for support. ( ④ ) It didn’t take long for word of our campaign to spread.
                        </p>
                      </div>

                      <div className="grid grid-cols-2 md:grid-cols-4 gap-2 print:grid-cols-4 print:gap-4">
                        {[
                          { id: 1, text: "①" },
                          { id: 2, text: "②" },
                          { id: 3, text: "③" },
                          { id: 4, text: "④", isCorrect: true }
                        ].map((choice) => (
                          <button
                            key={choice.id}
                            onClick={() => setQuiz2Answered(choice.id)}
                            disabled={quiz2Answered !== null}
                            className={`w-full text-center p-3 rounded-lg border font-medium transition-all duration-200
                              print:border-none print:p-1 print:text-black
                              ${quiz2Answered === null ? 'border-slate-200 hover:border-pink-400 hover:bg-pink-50' : 
                                (choice.isCorrect ? 'border-green-500 bg-green-50 text-green-800 shadow-sm' : 
                                  (quiz2Answered === choice.id ? 'border-red-400 bg-red-50 text-red-500' : 'border-slate-100 text-slate-400 opacity-50'))
                              }
                            `}
                          >
                            {choice.text}
                          </button>
                        ))}
                      </div>

                      {quiz2Answered !== null && (
                        <div className={`mt-4 p-4 rounded-lg text-sm leading-relaxed animate-fade-in print:hidden
                          ${quiz2Answered === 4 ? 'bg-green-100 text-green-900 border border-green-300' : 'bg-red-100 text-red-900 border border-red-300'}
                        `}>
                          <p className="font-bold mb-1">
                            {quiz2Answered === 4 ? '🎉 정답입니다!' : '오답입니다. 다시 한번 생각해 보세요.'}
                          </p>
                          <p>
                            <strong>해설:</strong> 비디오에 들어갈 구체적인 내용들(딸기 재배, 조부모님 영상, 온실 위치와 지원 요청)을 나열하는 설명이 모두 끝난 직후(Finally 이후)에, 그것을 편집하여 <strong>'소셜 미디어에 올렸다(posted)'</strong>는 행동이 나와야 합니다. 그 결과로 소문이 퍼졌다(word to spread)는 문장이 자연스럽게 이어지므로 <strong>④번</strong> 위치가 완벽합니다.
                          </p>
                          <button onClick={() => setQuiz2Answered(null)} className="mt-3 text-sm underline opacity-70 hover:opacity-100">
                            다시 풀기
                          </button>
                        </div>
                      )}
                    </div>

                    <hr className="my-8 border-slate-200 print:border-black" />

                    {/* Q3. 요약문 완성 */}
                    <div>
                      <div className="bg-slate-50 border border-slate-200 p-5 rounded-lg mb-4 print:bg-white print:border-none print:p-0 print:mb-6">
                        <p className="font-bold text-slate-800 mb-2 print:text-black">Q3. 요약문 완성</p>
                        <p className="text-sm text-slate-600 mb-4 print:text-black">다음 글의 내용을 한 문장으로 요약하고자 한다. 빈칸 (A), (B)에 들어갈 말로 가장 적절한 것은?</p>
                        <p className="text-md leading-relaxed bg-white p-4 border border-slate-200 rounded print:border-slate-400 print:rounded-none print:text-black">
                          To effectively promote the campaign, the author created an appealing video emphasizing the <span className="font-bold text-fuchsia-800">( A )</span> quality of the jam, which quickly caught people's attention and led to early <span className="font-bold text-fuchsia-800">( B )</span> in funding.
                        </p>
                      </div>

                      <div className="space-y-2 print:space-y-3">
                        {[
                          { id: 1, text: "(A) artificial —— (B) failure" },
                          { id: 2, text: "(A) cheap —— (B) success" },
                          { id: 3, text: "(A) natural —— (B) success", isCorrect: true },
                          { id: 4, text: "(A) natural —— (B) rejection" }
                        ].map((choice) => (
                          <button
                            key={choice.id}
                            onClick={() => setQuiz3Answered(choice.id)}
                            disabled={quiz3Answered !== null}
                            className={`w-full text-left p-3 rounded-lg border flex items-center transition-all duration-200
                              print:border-none print:p-1 print:text-black
                              ${quiz3Answered === null ? 'border-slate-200 hover:border-fuchsia-400 hover:bg-fuchsia-50' : 
                                (choice.isCorrect ? 'border-green-500 bg-green-50 text-green-800 font-bold shadow-sm' : 
                                  (quiz3Answered === choice.id ? 'border-red-400 bg-red-50 text-red-500' : 'border-slate-100 text-slate-400 opacity-50'))
                              }
                            `}
                          >
                            <span className="w-8 inline-block font-mono text-slate-500 print:text-black">{['①', '②', '③', '④'][choice.id - 1]}</span> 
                            {choice.text}
                            {quiz3Answered !== null && choice.isCorrect && <i className="ph-fill ph-check-circle text-lg ml-auto text-green-500 print:hidden"></i>}
                          </button>
                        ))}
                      </div>

                      {quiz3Answered !== null && (
                        <div className={`mt-4 p-4 rounded-lg text-sm leading-relaxed animate-fade-in print:hidden
                          ${quiz3Answered === 3 ? 'bg-green-100 text-green-900 border border-green-300' : 'bg-red-100 text-red-900 border border-red-300'}
                        `}>
                          <p className="font-bold mb-1">
                            {quiz3Answered === 3 ? '🎉 정답입니다!' : '오답입니다. 다시 한번 생각해 보세요.'}
                          </p>
                          <p>
                            <strong>해설:</strong> 화자는 화학물질을 사용하지 않고(without chemicals) 만든 잼의 <strong>천연(natural/all-natural)</strong> 품질을 영상에서 강조했으며, 이 영상이 빠르게 확산되어 초기 펀딩의 <strong>성공(success/jumped for joy/make our funding goal)</strong>을 이끌어냈습니다.
                          </p>
                          <button onClick={() => setQuiz3Answered(null)} className="mt-3 text-sm underline opacity-70 hover:opacity-100">
                            다시 풀기
                          </button>
                        </div>
                      )}
                    </div>

                  </div>
                </div>

              </div>
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
