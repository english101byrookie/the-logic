<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE LOGIC Interactive App - Anger Management</title>
    
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    
    <style>
        @media print {
            body {
                -webkit-print-color-adjust: exact;
                print-color-adjust: exact;
                background-color: white !important;
            }
            ::-webkit-scrollbar {
                display: none;
            }
            .print-avoid-break {
                break-inside: avoid;
            }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        const textData = [
          // Part 1: The Cause (1~13)
          { id: 1, text: "Do you ever find yourself suddenly feeling angry?", trans: "갑자기 화가 나는 자신을 발견한 적이 있나요?" },
          { id: 2, text: "One moment you’re fine, and the next moment you’re slamming doors or rolling your eyes at your parents.", trans: "어느 순간에는 괜찮다가도, 다음 순간에는 문을 쾅 닫거나 부모님께 눈을 흘기기도 합니다." },
          { id: 3, text: "Some people may think you just have a bad attitude or are getting too upset about a small problem.", trans: "어떤 사람들은 여러분이 그저 태도가 나쁘거나 작은 문제에 너무 화를 낸다고 생각할지도 모릅니다." },
          { id: 4, text: "However, these feelings don’t simply come from stress about everyday life.", trans: "하지만, 이러한 감정들은 단순히 일상생활의 스트레스에서만 오는 것이 아닙니다.", isHighlight: true, logicPoint: 1 },
          { id: 5, text: "As a teen, you may feel like an adult, but your brain is still growing.", trans: "십 대로서 여러분은 어른처럼 느낄지 모르지만, 여러분의 뇌는 여전히 자라고 있습니다." },
          { id: 6, text: "In your brain, there is a part that is responsible for solving problems and controlling your emotions.", trans: "뇌에는 문제 해결과 감정 통제를 담당하는 부분이 있습니다." },
          { id: 7, text: "In your teen years, this part is still in development.", trans: "십 대 시절에는 이 부분이 아직 발달 중입니다." },
          { id: 8, text: "The changes in your brain lead you toward independence, social engagement, and creativity.", trans: "뇌의 변화는 여러분을 독립성, 사회적 참여, 창의성으로 이끕니다." },
          { id: 9, text: "At the same time, however, you may feel confused about who you are. You may also be more sensitive to unfairness.", trans: "하지만 동시에 자신이 누구인지 혼란스러울 수도 있습니다. 또한 불공평함에 더 민감해질 수도 있습니다." },
          { id: 10, text: "Furthermore, your body is flowing with hormones. This significantly affects your mood.", trans: "게다가, 여러분의 몸에는 호르몬이 흐르고 있습니다. 이것은 기분에 큰 영향을 미칩니다." },
          { id: 11, text: "The combination of these factors intensifies your strong emotions.", trans: "이러한 요인들의 결합은 여러분의 강렬한 감정을 더욱 심화시킵니다." },

          // Part 2: The Perspective (12~22)
          { id: 12, text: "It is natural to feel angry from time to time; it doesn’t mean there is something wrong with you.", trans: "가끔 화가 나는 것은 자연스러운 일이며, 여러분에게 문제가 있다는 뜻은 아닙니다." },
          { id: 13, text: "Anger can sometimes be a useful tool. For example, an angry but open conversation can resolve a conflict between friends.", trans: "분노는 때때로 유용한 도구가 될 수 있습니다. 예를 들어, 화가 나더라도 솔직한 대화는 친구들 사이의 갈등을 해결할 수 있습니다." },
          { id: 14, text: "The important thing is to manage your anger so that it does not turn into aggressive or violent behavior.", trans: "중요한 것은 분노가 공격적이거나 폭력적인 행동으로 변하지 않도록 관리하는 것입니다.", isHighlight: true, logicPoint: 2 },
          { id: 15, text: "This does not mean that you should stop yourself from feeling angry.", trans: "이것이 화나는 감정을 억누르라는 의미는 아닙니다." },
          { id: 16, text: "Rather, you should express it in a productive way.", trans: "오히려, 여러분은 그것을 생산적인 방식으로 표현해야 합니다.", isHighlight: true, logicPoint: 3 },
          { id: 17, text: "Ask yourself some questions about your angry feelings. This can help you to better understand your anger.", trans: "여러분의 분노 감정에 대해 스스로에게 질문해 보세요. 이것은 여러분의 분노를 더 잘 이해하는 데 도움을 줄 수 있습니다." },
          { id: 18, text: "[Questions] ✔ How often do I feel angry? ✔ What situations make me feel the most intense anger?", trans: "[질문] ✔ 얼마나 자주 화가 나는가? ✔ 어떤 상황이 가장 격렬한 분노를 느끼게 하는가?" },
          { id: 19, text: "✔ Is my anger directed at anyone or anything in particular? ✔ Do I focus on the causes of my anger instead of solutions?", trans: "✔ 내 분노가 특정인이나 특정 대상을 향하고 있는가? ✔ 해결책 대신 분노의 원인에만 집중하고 있는가?" },
          { id: 20, text: "✔ Can I control my emotions when I get angry? ✔ How do I react and behave when I get angry?", trans: "✔ 화가 났을 때 감정을 조절할 수 있는가? ✔ 화가 났을 때 나는 어떻게 반응하고 행동하는가?" },
          { id: 21, text: "You need to learn how to deal with anger in a socially appropriate way.", trans: "여러분은 사회적으로 적절한 방식으로 분노에 대처하는 법을 배울 필요가 있습니다." },
          { id: 22, text: "Remember: anger is a feeling, but behavior is a choice.", trans: "기억하세요: 분노는 감정이지만, 행동은 선택입니다.", isHighlight: true, logicPoint: 4 },

          // Part 3: The Strategy (23~31)
          { id: 23, text: "The first step is recognizing the physical signs of anger.", trans: "첫 번째 단계는 분노의 신체적 신호를 알아차리는 것입니다." },
          { id: 24, text: "It is possible to recognize those signs in advance.", trans: "그러한 신호들을 미리 인지하는 것은 가능합니다." },
          { id: 25, text: "They include an increased heart rate, a flushed face, and the clenching of your fists.", trans: "여기에는 심박수 증가, 붉어진 얼굴, 주먹 꽉 쥐기 등이 포함됩니다." },
          { id: 26, text: "When these things happen, take action to reduce your anger.", trans: "이런 일이 발생하면 분노를 줄이기 위한 조치를 취하세요." },
          { id: 27, text: "For example, you could try taking a break to organize your thoughts or ending a conversation before it gets too intense.", trans: "예를 들어, 생각을 정리하기 위해 휴식을 취하거나 대화가 너무 격렬해지기 전에 대화를 끝낼 수 있습니다." },
          { id: 28, text: "In some cases, the strategies mentioned above may not be enough, so you may need to find proper coping skills for your personal situation.", trans: "어떤 경우에는 위에서 언급한 전략만으로는 충분하지 않을 수 있으므로, 여러분의 개인적인 상황에 맞는 적절한 대처 기술을 찾아야 할 수도 있습니다." },
          { id: 29, text: "Without the right coping skills, you may find yourself becoming verbally or even physically aggressive.", trans: "올바른 대처 기술이 없다면, 언어적으로 또는 심지어 신체적으로 공격적으로 변하는 자신을 발견할 수 있습니다." },
          { id: 30, text: "Explore various strategies to discover what is best for you, such as taking a walk, drawing a picture, or writing down things that come to your mind.", trans: "산책하기, 그림 그리기, 머릿속에 떠오르는 것들 적어보기 등 자신에게 가장 잘 맞는 것을 발견하기 위해 다양한 전략을 탐색해 보세요." },
          { id: 31, text: "You can also try to find possible solutions to a problem and then compare the advantages and disadvantages of each one.", trans: "또한 문제에 대한 가능한 해결책을 찾은 다음 각각의 장단점을 비교해 볼 수도 있습니다." },
          
          // Part 4: The Ultimate Goal (32~35)
          { id: 32, text: "By developing problem-solving skills, you will learn that there are many ways to solve a problem without getting angry.", trans: "문제 해결 능력을 개발함으로써, 화를 내지 않고도 문제를 해결할 수 있는 많은 방법이 있다는 것을 배우게 될 것입니다.", isHighlight: true, logicPoint: 5 },
          { id: 33, text: "Anger is an emotion that we all experience.", trans: "분노는 우리 모두가 경험하는 감정입니다." },
          { id: 34, text: "By managing your anger properly, you can be the boss of your feelings, not the other way around.", trans: "분노를 적절히 관리함으로써, 여러분은 감정의 주인이 될 수 있으며, 그 반대가 되어서는 안 됩니다.", isHighlight: true, logicPoint: 6, logic: 'goal' },
          { id: 35, text: "This is an important step in finding your true self and taking control of your life.", trans: "이것은 진정한 자아를 찾고 여러분의 삶을 통제하는 데 있어 중요한 단계입니다." }
        ];

        const logicMapSteps = [
          { id: 'cause', title: "THE CAUSE (생물학적 원인)", desc: "Brain Development & Hormones", color: "bg-rose-100 border-rose-400 text-rose-800", icon: <i className="ph-fill ph-brain text-xl mb-2"></i> },
          { id: 'perspective', title: "PERSPECTIVE (관점의 전환)", desc: "Anger is natural. Behavior is a choice.", color: "bg-orange-100 border-orange-400 text-orange-800", icon: <i className="ph-fill ph-arrows-left-right text-xl mb-2"></i> },
          { id: 'strategy', title: "STRATEGY (실천 전략)", desc: "Recognize signs & Find coping skills", color: "bg-indigo-100 border-indigo-400 text-indigo-800", icon: <i className="ph-fill ph-shield-check text-xl mb-2"></i> },
          { id: 'goal', title: "ULTIMATE GOAL (최종 목표)", desc: "Be the Boss of your feelings", color: "bg-slate-200 border-slate-500 text-slate-800", icon: <i className="ph-fill ph-crown text-xl mb-2"></i> }
        ];

        function App() {
          const [activeTab, setActiveTab] = useState(1);
          const [activeLogic, setActiveLogic] = useState(null);
          const [mapStep, setMapStep] = useState(0);
          const [quiz1Answered, setQuiz1Answered] = useState(null);
          const [quiz2Answered, setQuiz2Answered] = useState(null);
          const [quiz3Answered, setQuiz3Answered] = useState(null);
          const [quiz4Answered, setQuiz4Answered] = useState(null);

          const handleLogicClick = (point) => setActiveLogic(activeLogic === point ? null : point);
          const nextMapStep = () => { if (mapStep < logicMapSteps.length) setMapStep(mapStep + 1); };
          const resetMap = () => setMapStep(0);

          const handlePrint = () => {
            window.print();
          };

          return (
            <div className="min-h-screen bg-slate-50 font-sans text-slate-800 p-4 md:p-8 flex justify-center print:bg-white print:p-0">
              <div className="max-w-4xl w-full flex flex-col gap-6 print:flex print:flex-col print:gap-6 print:max-w-none">
                
                {/* 헤더 */}
                <div className="bg-white p-6 rounded-xl shadow-sm border-t-4 border-rose-700 print:shadow-none print:border-t-4 print:border-black print:rounded-none flex justify-between items-start">
                  <div>
                    <h1 className="text-sm font-bold text-rose-800 tracking-wider mb-2 print:text-black">THE LOGIC INTERACTIVE</h1>
                    <h2 className="text-3xl font-serif font-bold text-slate-900 print:text-black">Don't Let Anger Be Your Boss</h2>
                    <p className="text-slate-500 italic mt-1 font-serif print:text-gray-600">"Mastering Your Emotions"</p>
                  </div>
                  <button 
                    onClick={handlePrint}
                    className="print:hidden flex items-center gap-2 bg-slate-800 hover:bg-slate-700 text-white px-4 py-2 rounded-lg font-bold transition-colors shadow-sm"
                  >
                    <i className="ph-bold ph-printer text-lg"></i> 인쇄하기
                  </button>
                </div>

                {/* 탭 네비게이션 */}
                <div className="flex bg-white rounded-xl shadow-sm overflow-hidden print:hidden">
                  <button 
                    onClick={() => setActiveTab(1)}
                    className={`flex-1 py-4 px-2 text-center font-bold text-base md:text-lg transition-all duration-300 border-b-4 ${activeTab === 1 ? 'bg-rose-50 text-rose-800 border-rose-700' : 'text-slate-400 border-transparent hover:bg-slate-50 hover:text-slate-600'}`}
                  >
                    <i className="ph-fill ph-book-open mr-2"></i>
                    1. 지문 및 구문 분석
                  </button>
                  <button 
                    onClick={() => setActiveTab(2)}
                    className={`flex-1 py-4 px-2 text-center font-bold text-base md:text-lg transition-all duration-300 border-b-4 ${activeTab === 2 ? 'bg-indigo-50 text-indigo-800 border-indigo-600' : 'text-slate-400 border-transparent hover:bg-slate-50 hover:text-slate-600'}`}
                  >
                    <i className="ph-fill ph-puzzle-piece mr-2"></i>
                    2. 논리 구조 및 실전 문제
                  </button>
                </div>

                {/* === TAB 1: 지문 및 구문 분석 영역 === */}
                <div className={`space-y-6 print:space-y-4 ${activeTab === 1 ? 'block' : 'hidden print:block'}`}>
                  {/* 1. 지문 영역 */}
                  <div className="bg-white p-6 md:p-8 rounded-xl shadow-sm print:shadow-none print:border print:border-slate-300 print:rounded-none">
                    <h3 className="text-xl font-bold text-rose-800 border-b-2 border-slate-100 pb-3 mb-4 flex items-center gap-2 print:text-black print:border-black">
                      <i className="ph-fill ph-book-open text-2xl print:text-black"></i> PART 1. Text Analysis
                    </h3>
                    
                    <div className="space-y-8 print:space-y-6">
                      {/* 파트 A: 원인 (1~11번) */}
                      <div>
                        <div className="inline-block bg-slate-800 text-white text-sm font-bold px-3 py-1 rounded mb-3 print:bg-slate-200 print:text-black print:border print:border-slate-800">
                          ▶ The Cause (청소년기 분노의 생물학적 원인)
                        </div>
                        <div className="space-y-2 print:space-y-1">
                          {textData.slice(0, 11).map((item) => (
                            <div 
                              key={item.id} 
                              className={`p-2 rounded-lg transition-all duration-300 group cursor-pointer print:p-0 print:mb-2
                                ${activeLogic === item.logicPoint ? 'bg-rose-50 border border-rose-200 shadow-inner print:bg-transparent print:border-none print:shadow-none' : 'hover:bg-slate-50 border border-transparent print:border-none'}
                              `}
                            >
                              <p className="text-base md:text-lg leading-relaxed print:text-base print:text-black">
                                <span className="font-bold text-rose-800 mr-2 text-sm print:text-black">[{item.id.toString().padStart(2, '0')}]</span>
                                <span className={`${activeLogic === item.logicPoint ? 'font-bold text-rose-700 print:text-black print:underline print:underline-offset-4' : ''}`}>
                                  {item.text}
                                </span>
                              </p>
                              <p className="text-sm text-slate-500 mt-1 opacity-0 group-hover:opacity-100 transition-opacity duration-300 ml-9 print:hidden">
                                {item.trans}
                              </p>
                            </div>
                          ))}
                        </div>
                      </div>

                      {/* 파트 B: 관점 (12~22번) */}
                      <div className="border-t border-dashed border-slate-300 pt-6 print:border-black print:pt-4">
                        <div className="inline-block bg-orange-700 text-white text-sm font-bold px-3 py-1 rounded mb-3 print:bg-slate-200 print:text-black print:border print:border-slate-800">
                          ▶ The Perspective (분노를 바라보는 새로운 관점)
                        </div>
                        <div className="space-y-2 print:space-y-1">
                          {textData.slice(11, 22).map((item) => (
                            <div 
                              key={item.id} 
                              className={`p-2 rounded-lg transition-all duration-300 group cursor-pointer print:p-0 print:mb-2
                                ${activeLogic === item.logicPoint ? 'bg-orange-50 border border-orange-200 shadow-inner print:bg-transparent print:border-none print:shadow-none' : 'hover:bg-slate-50 border border-transparent print:border-none'}
                              `}
                            >
                              <p className="text-base md:text-lg leading-relaxed print:text-base print:text-black">
                                <span className="font-bold text-rose-800 mr-2 text-sm print:text-black">[{item.id.toString().padStart(2, '0')}]</span>
                                <span className={`${activeLogic === item.logicPoint ? 'font-bold text-orange-700 print:text-black print:underline print:underline-offset-4' : ''}`}>
                                  {item.text}
                                </span>
                              </p>
                              <p className="text-sm text-slate-500 mt-1 opacity-0 group-hover:opacity-100 transition-opacity duration-300 ml-9 print:hidden">
                                {item.trans}
                              </p>
                            </div>
                          ))}
                        </div>
                      </div>

                      {/* 파트 C: 전략 (23~31번) */}
                      <div className="border-t border-dashed border-slate-300 pt-6 print:border-black print:pt-4">
                        <div className="inline-block bg-indigo-600 text-white text-sm font-bold px-3 py-1 rounded mb-3 print:bg-slate-200 print:text-black print:border print:border-slate-800">
                          ▶ The Strategy (분노를 가라앉히는 실천 전략)
                        </div>
                        <div className="space-y-2 print:space-y-1">
                          {textData.slice(22, 31).map((item) => (
                            <div 
                              key={item.id} 
                              className={`p-2 rounded-lg transition-all duration-300 group cursor-pointer print:p-0 print:mb-2
                                ${activeLogic === item.logicPoint ? 'bg-indigo-50 border border-indigo-200 shadow-inner print:bg-transparent print:border-none print:shadow-none' : 'hover:bg-slate-50 border border-transparent print:border-none'}
                              `}
                            >
                              <p className="text-base md:text-lg leading-relaxed print:text-base print:text-black">
                                <span className="font-bold text-rose-800 mr-2 text-sm print:text-black">[{item.id.toString().padStart(2, '0')}]</span>
                                <span className={`${activeLogic === item.logicPoint ? 'font-bold text-indigo-700 print:text-black print:underline print:underline-offset-4' : ''}`}>
                                  {item.text}
                                </span>
                              </p>
                              <p className="text-sm text-slate-500 mt-1 opacity-0 group-hover:opacity-100 transition-opacity duration-300 ml-9 print:hidden">
                                {item.trans}
                              </p>
                            </div>
                          ))}
                        </div>
                      </div>

                      {/* 파트 D: 목표 (32~35번) */}
                      <div className="border-t border-dashed border-slate-300 pt-6 print:border-black print:pt-4">
                        <div className="inline-block bg-slate-600 text-white text-sm font-bold px-3 py-1 rounded mb-3 print:bg-slate-200 print:text-black print:border print:border-slate-800">
                          ▶ The Ultimate Goal (결론 및 최종 목표)
                        </div>
                        <div className="space-y-2 print:space-y-1">
                          {textData.slice(31, 35).map((item) => (
                            <div 
                              key={item.id} 
                              className={`p-2 rounded-lg transition-all duration-300 group cursor-pointer print:p-0 print:mb-2
                                ${activeLogic === item.logicPoint ? 'bg-slate-200 border border-slate-300 shadow-inner print:bg-transparent print:border-none print:shadow-none' : 'hover:bg-slate-50 border border-transparent print:border-none'}
                              `}
                            >
                              <p className="text-base md:text-lg leading-relaxed print:text-base print:text-black">
                                <span className="font-bold text-rose-800 mr-2 text-sm print:text-black">[{item.id.toString().padStart(2, '0')}]</span>
                                <span className={`${activeLogic === item.logicPoint ? 'font-bold text-slate-700 print:text-black print:underline print:underline-offset-4' : ''}`}>
                                  {item.text}
                                </span>
                              </p>
                              <p className="text-sm text-slate-500 mt-1 opacity-0 group-hover:opacity-100 transition-opacity duration-300 ml-9 print:hidden">
                                {item.trans}
                              </p>
                            </div>
                          ))}
                        </div>
                      </div>

                    </div>
                  </div>

                  {/* 2. 구문 로직 영역 (6개) */}
                  <div className="bg-white p-6 md:p-8 rounded-xl shadow-sm print:shadow-none print:border print:border-slate-300 print:rounded-none print-avoid-break">
                    <h3 className="text-xl font-bold text-rose-800 border-b-2 border-slate-100 pb-3 mb-6 print:text-black print:border-black">
                      PART 2. The Logic Syntax
                    </h3>

                      </div>

                      {quiz3Answered !== null && (
                        <div className={`mt-4 p-4 rounded-lg text-sm leading-relaxed animate-fade-in print:hidden
                          ${quiz3Answered === 1 ? 'bg-green-100 text-green-900 border border-green-300' : 'bg-red-100 text-red-900 border border-red-300'}
                        `}>
                          <p className="font-bold mb-1">
                            {quiz3Answered === 1 ? '🎉 정답입니다!' : '오답입니다. 다시 한번 생각해 보세요.'}
                          </p>
                          <p>
                            <strong>해설: ① reduces $\rightarrow$ intensifies</strong><br/>
                            앞 문장에서 발달 중인 뇌와 호르몬의 변화라는 분노의 원인들을 열거했습니다. 이러한 요인들이 결합하면 강한 감정이 '줄어드는(reduces)' 것이 아니라 <strong>'더욱 심화/강화(intensifies)'</strong>되는 것이 문맥상 맞습니다.
                          </p>
                          <button onClick={() => setQuiz3Answered(null)} className="mt-3 text-sm underline opacity-70 hover:opacity-100">
                            다시 풀기
                          </button>
                        </div>
                      )}
                    </div>

                    <hr className="my-8 border-slate-200 print:border-black" />

                    {/* Q4. 요약문 완성 */}
                    <div>
                      <div className="bg-slate-50 border border-slate-200 p-5 rounded-lg mb-4 print:bg-white print:border-none print:p-0 print:mb-6">
                        <p className="font-bold text-slate-800 mb-2 print:text-black">Q4. 요약문 완성</p>
                        <p className="text-sm text-slate-600 mb-4 print:text-black">다음 글의 내용을 한 문장으로 요약하고자 한다. 빈칸 (A), (B)에 들어갈 말로 가장 적절한 것은?</p>
                        <p className="text-md leading-relaxed bg-white p-4 border border-slate-200 rounded print:border-slate-400 print:rounded-none print:text-black">
                          While adolescent anger often stems from <span className="font-bold text-indigo-800">( A )</span> changes, you can <span className="font-bold text-indigo-800">( B )</span> control your behavior by recognizing physical signs and developing healthy coping strategies.
                        </p>
                      </div>

                      <div className="space-y-2 print:space-y-3">
                        {[
                          { id: 1, text: "(A) academic —— (B) randomly" },
                          { id: 2, text: "(A) biological —— (B) consciously", isCorrect: true },
                          { id: 3, text: "(A) environmental —— (B) hardly" },
                          { id: 4, text: "(A) biological —— (B) passively" }
                        ].map((choice) => (
                          <button
                            key={choice.id}
                            onClick={() => setQuiz4Answered(choice.id)}
                            disabled={quiz4Answered !== null}
                            className={`w-full text-left p-3 rounded-lg border flex items-center transition-all duration-200
                              print:border-none print:p-1 print:text-black
                              ${quiz4Answered === null ? 'border-slate-200 hover:border-indigo-400 hover:bg-indigo-50' : 
                                (choice.isCorrect ? 'border-green-500 bg-green-50 text-green-800 font-bold shadow-sm' : 
                                  (quiz4Answered === choice.id ? 'border-red-400 bg-red-50 text-red-500' : 'border-slate-100 text-slate-400 opacity-50'))
                              }
                            `}
                          >
                            <span className="w-8 inline-block font-mono text-slate-500 print:text-black">{['①', '②', '③', '④'][choice.id - 1]}</span> 
                            {choice.text}
                            {quiz4Answered !== null && choice.isCorrect && <i className="ph-fill ph-check-circle text-lg ml-auto text-green-500 print:hidden"></i>}
                          </button>
                        ))}
                      </div>

                      {quiz4Answered !== null && (
                        <div className={`mt-4 p-4 rounded-lg text-sm leading-relaxed animate-fade-in print:hidden
                          ${quiz4Answered === 2 ? 'bg-green-100 text-green-900 border border-green-300' : 'bg-red-100 text-red-900 border border-red-300'}
                        `}>
                          <p className="font-bold mb-1">
                            {quiz4Answered === 2 ? '🎉 정답입니다!' : '오답입니다. 다시 한번 생각해 보세요.'}
                          </p>
                          <p>
                            <strong>해설:</strong> 청소년기의 분노는 뇌 발달과 호르몬과 같은 <strong>생물학적(biological)</strong> 변화에서 기인하지만, 신체 신호를 인지하고 대처법을 기름으로써 여러분은 <strong>의식적으로(consciously)</strong> 행동을 통제하고 감정의 주인이 될 수 있습니다.
                          </p>
                          <button onClick={() => setQuiz4Answered(null)} className="mt-3 text-sm underline opacity-70 hover:opacity-100">
                            다시 풀기
                          </button>
                        </div>
                      )}
                    </div>

                  </div>
                </div>

              </div>
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
