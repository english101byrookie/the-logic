<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE LOGIC Interactive App - Nahyeon Kim</title>
    
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    
    <style>
        @media print {
            body {
                -webkit-print-color-adjust: exact;
                print-color-adjust: exact;
                background-color: white !important;
            }
            ::-webkit-scrollbar {
                display: none;
            }
            .print-avoid-break {
                break-inside: avoid;
            }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        const textData = [
          // Part 1: Magazine Intro (1~2)
          { id: 1, text: "Welcome to a new season of High School Magazine.", trans: "고등학교 잡지의 새로운 시즌에 오신 것을 환영합니다." },
          { id: 2, text: "To start off the new school year on the right foot, we asked some of our recent graduates to give us tips on how to succeed in the coming year and beyond.", trans: "새 학년을 순조롭게 시작하기 위해, 우리는 최근 졸업생들에게 다가오는 해와 그 이후에 성공하는 방법에 대한 조언을 구했습니다." },
          
          // Part 2: Nahyeon's Crisis (3~5)
          { id: 3, text: "In high school, everyone told me how talented an artist I was, so I dreamed of becoming an illustrator.", trans: "고등학교 때, 모든 사람들이 내가 얼마나 재능 있는 예술가인지 말해주었고, 그래서 나는 일러스트레이터가 되는 것을 꿈꿨다." },
          { id: 4, text: "In university, though, everyone seemed much more talented than me, and they all worked so hard that I felt small in comparison.", trans: "하지만 대학교에서는 모두가 나보다 훨씬 더 재능이 있어 보였고, 그들 모두 너무 열심히 노력해서 나는 그에 비해 한없이 작게 느껴졌다.", isHighlight: true, logicPoint: 1 },
          { id: 5, text: "I thought about giving up my dream of becoming an artist.", trans: "나는 예술가가 되겠다는 꿈을 포기할까 생각했다.", logic: 'crisis' },

          // Part 3: Turning Point (6~7)
          { id: 6, text: "Then one day, I happened to see a drawing I had won an award for from middle school on the kitchen wall.", trans: "그러던 어느 날, 나는 우연히 중학교 때 상을 받았던 부엌 벽에 걸린 그림을 보게 되었다.", isHighlight: true, logicPoint: 2, logic: 'turn' },
          { id: 7, text: "I was embarrassed because it wasn’t very good.", trans: "그림이 별로 좋지 않았기 때문에 나는 부끄러웠다." },

          // Part 4: The Epiphany (8~14)
          { id: 8, text: "People say you shouldn’t compare apples to oranges, and they’re right.", trans: "사람들은 사과와 오렌지를 비교해서는 안 된다고 말하는데, 그들의 말이 맞다." },
          { id: 9, text: "That’s why it doesn’t make sense to compare yourself to Internet personalities or even people in your real life.", trans: "그렇기 때문에 자신을 인터넷 유명 인사나 심지어 현실의 사람들과 비교하는 것은 말이 되지 않는다." },
          { id: 10, text: "Maybe they had an advantage, or even a disadvantage, that you didn’t.", trans: "어쩌면 그들은 여러분이 가지지 못한 장점이나 심지어 단점을 가지고 있었을지도 모른다." },
          { id: 11, text: "If you are going to compare yourself to anyone, the only fair comparison is “yesterday-you.”", trans: "만약 자신을 누군가와 비교하려 한다면, 유일하게 공정한 비교 대상은 '어제의 나'이다.", logic: 'epiphany' },
          { id: 12, text: "Only you know where you started and how much effort you’ve put in.", trans: "오직 여러분만이 자신이 어디서 시작했고 얼마나 많은 노력을 기울였는지 안다." },
          { id: 13, text: "I couldn’t see the progress in my ability when I only compared myself to others.", trans: "나는 나 자신을 다른 사람들과만 비교했을 때 내 능력의 발전을 볼 수 없었다." },
          { id: 14, text: "Everyone develops differently.", trans: "모든 사람은 다르게 발달한다." },

          // Part 5: The Lesson (15~17)
          { id: 15, text: "I’m able to see now the drawing in the kitchen was full of mistakes that I no longer make.", trans: "이제 나는 부엌에 있는 그림이 내가 더 이상 하지 않는 실수들로 가득하다는 것을 볼 수 있다." },
          { id: 16, text: "It is empowering to see how I have improved rather than to envy the success of others.", trans: "다른 사람들의 성공을 부러워하기보다 내가 얼마나 발전했는지 보는 것은 힘을 준다.", isHighlight: true, logicPoint: 3 },
          { id: 17, text: "Your competition isn’t the person next door or the influencer on social media: it’s you.", trans: "여러분의 경쟁자는 옆집 사람이나 소셜 미디어의 인플루언서가 아닙니다: 바로 여러분 자신입니다.", isHighlight: true, logicPoint: 4, logic: 'lesson' }
        ];

        const logicMapSteps = [
          { id: 'crisis', title: "THE CRISIS (좌절)", desc: "Feeling small compared to others", color: "bg-slate-100 border-slate-400 text-slate-800", icon: <i className="ph-fill ph-cloud-rain text-xl mb-2"></i> },
          { id: 'turn', title: "TURNING POINT (전환점)", desc: "Seeing the old middle school drawing", color: "bg-rose-100 border-rose-400 text-rose-800", icon: <i className="ph-fill ph-paint-brush text-xl mb-2"></i> },
          { id: 'epiphany', title: "THE EPIPHANY (깨달음)", desc: "Don't compare apples to oranges", color: "bg-red-100 border-red-400 text-red-800", icon: <i className="ph-fill ph-lightbulb text-xl mb-2"></i> },
          { id: 'lesson', title: "THE LESSON (최종 교훈)", desc: "Your only competition is YOU", color: "bg-orange-100 border-orange-400 text-orange-800", icon: <i className="ph-fill ph-crown text-xl mb-2"></i> }
        ];

        function App() {
          const [activeTab, setActiveTab] = useState(1);
          const [activeLogic, setActiveLogic] = useState(null);
          const [mapStep, setMapStep] = useState(0);
          const [quiz1Answered, setQuiz1Answered] = useState(null);
          const [quiz2Answered, setQuiz2Answered] = useState(null);
          const [quiz3Answered, setQuiz3Answered] = useState(null);
          const [quiz4Answered, setQuiz4Answered] = useState(null);

          const handleLogicClick = (point) => setActiveLogic(activeLogic === point ? null : point);
          const nextMapStep = () => { if (mapStep < logicMapSteps.length) setMapStep(mapStep + 1); };
          const resetMap = () => setMapStep(0);

          const handlePrint = () => {
            window.print();
          };

          return (
            <div className="min-h-screen bg-slate-50 font-sans text-slate-800 p-4 md:p-8 flex justify-center print:bg-white print:p-0">
              <div className="max-w-4xl w-full flex flex-col gap-6 print:flex print:flex-col print:gap-6 print:max-w-none">
                
                {/* 헤더 */}
                <div className="bg-white p-6 rounded-xl shadow-sm border-t-4 border-red-700 print:shadow-none print:border-t-4 print:border-black print:rounded-none flex justify-between items-start">
                  <div>
                    <h1 className="text-sm font-bold text-red-800 tracking-wider mb-2 print:text-black">THE LOGIC INTERACTIVE</h1>
                    <h2 className="text-3xl font-serif font-bold text-slate-900 print:text-black">Compare Apples to Apples</h2>
                    <p className="text-slate-500 italic mt-1 font-serif print:text-gray-600">Advice from Nahyeon Kim</p>
                  </div>
                  <button 
                    onClick={handlePrint}
                    className="print:hidden flex items-center gap-2 bg-slate-800 hover:bg-slate-700 text-white px-4 py-2 rounded-lg font-bold transition-colors shadow-sm"
                  >
                    <i className="ph-bold ph-printer text-lg"></i> 인쇄하기
                  </button>
                </div>

                {/* 탭 네비게이션 */}
                <div className="flex bg-white rounded-xl shadow-sm overflow-hidden print:hidden">
                  <button 
                    onClick={() => setActiveTab(1)}
                    className={`flex-1 py-4 px-2 text-center font-bold text-base md:text-lg transition-all duration-300 border-b-4 ${activeTab === 1 ? 'bg-rose-50 text-red-800 border-red-700' : 'text-slate-400 border-transparent hover:bg-slate-50 hover:text-slate-600'}`}
                  >
                    <i className="ph-fill ph-book-open mr-2"></i>
                    1. 지문 및 구문 분석
                  </button>
                  <button 
                    onClick={() => setActiveTab(2)}
                    className={`flex-1 py-4 px-2 text-center font-bold text-base md:text-lg transition-all duration-300 border-b-4 ${activeTab === 2 ? 'bg-orange-50 text-orange-800 border-orange-600' : 'text-slate-400 border-transparent hover:bg-slate-50 hover:text-slate-600'}`}
                  >
                    <i className="ph-fill ph-puzzle-piece mr-2"></i>
                    2. 논리 구조 및 실전 문제
                  </button>
                </div>

                {/* === TAB 1: 지문 및 구문 분석 영역 === */}
                <div className={`space-y-6 print:space-y-4 ${activeTab === 1 ? 'block' : 'hidden print:block'}`}>
                  {/* 1. 지문 영역 */}
                  <div className="bg-white p-6 md:p-8 rounded-xl shadow-sm print:shadow-none print:border print:border-slate-300 print:rounded-none">
                    <h3 className="text-xl font-bold text-red-800 border-b-2 border-slate-100 pb-3 mb-4 flex items-center gap-2 print:text-black print:border-black">
                      <i className="ph-fill ph-book-open text-2xl print:text-black"></i> PART 1. Text Analysis
                    </h3>
                    
                    <div className="space-y-8 print:space-y-6">
                      {/* 파트 A: Magazine Intro (1~2번) */}
                      <div>
                        <div className="inline-block bg-slate-500 text-white text-sm font-bold px-3 py-1 rounded mb-3 print:bg-slate-200 print:text-black print:border print:border-slate-800">
                          ▶ The Introduction (잡지 서문)
                        </div>
                        <div className="space-y-2 print:space-y-1">
                          {textData.slice(0, 2).map((item) => (
                            <div 
                              key={item.id} 
                              className={`p-2 rounded-lg transition-all duration-300 group cursor-pointer print:p-0 print:mb-2
                                ${activeLogic === item.logicPoint ? 'bg-red-50 border border-red-200 shadow-inner print:bg-transparent print:border-none print:shadow-none' : 'hover:bg-slate-50 border border-transparent print:border-none'}
                              `}
                            >
                              <p className="text-base md:text-lg leading-relaxed print:text-base print:text-black">
                                <span className="font-bold text-slate-500 mr-2 text-sm print:text-black">[{item.id.toString().padStart(2, '0')}]</span>
                                <span className={`${activeLogic === item.logicPoint ? 'font-bold text-red-700 print:text-black print:underline print:underline-offset-4' : ''}`}>
                                  {item.text}
                                </span>
                              </p>
                              <p className="text-sm text-slate-500 mt-1 opacity-0 group-hover:opacity-100 transition-opacity duration-300 ml-9 print:hidden">
                                {item.trans}
                              </p>
                            </div>
                          ))}
                        </div>
                      </div>

                      {/* 시각적 구분선 및 나현 본문 타이틀 */}
                      <div className="border-t-2 border-red-800 pt-6 mt-6 print:border-black print:pt-4 print:mt-4">
                        <div className="flex items-end gap-3 mb-4">
                            <h4 className="text-2xl font-serif font-bold text-red-900 print:text-black">Compare Apples to Apples</h4>
                            <span className="text-base text-slate-600 pb-1 print:text-black">Nahyeon Kim (Class of 2024)</span>
                        </div>
                        
                        <div className="inline-block bg-slate-800 text-white text-sm font-bold px-3 py-1 rounded mb-3 print:bg-slate-200 print:text-black print:border print:border-slate-800">
                          ▶ The Crisis (타인과의 비교로 인한 좌절)
                        </div>
                        <div className="space-y-2 print:space-y-1">
                          {textData.slice(2, 5).map((item) => (
                            <div 
                              key={item.id} 
                              className={`p-2 rounded-lg transition-all duration-300 group cursor-pointer print:p-0 print:mb-2
                                ${activeLogic === item.logicPoint ? 'bg-red-50 border border-red-200 shadow-inner print:bg-transparent print:border-none print:shadow-none' : 'hover:bg-slate-50 border border-transparent print:border-none'}
                              `}
                            >
                              <p className="text-base md:text-lg leading-relaxed print:text-base print:text-black">
                                <span className="font-bold text-red-800 mr-2 text-sm print:text-black">[{item.id.toString().padStart(2, '0')}]</span>
                                <span className={`${activeLogic === item.logicPoint ? 'font-bold text-red-700 print:text-black print:underline print:underline-offset-4' : ''}`}>
                                  {item.text}
                                </span>
                              </p>
                              <p className="text-sm text-slate-500 mt-1 opacity-0 group-hover:opacity-100 transition-opacity duration-300 ml-9 print:hidden">
                                {item.trans}
                              </p>
                            </div>
                          ))}
                        </div>
                      </div>

                      {/* 파트 C: Turning Point (6~7번) */}
                      <div className="border-t border-dashed border-slate-300 pt-6 print:border-black print:pt-4">
                        <div className="inline-block bg-rose-700 text-white text-sm font-bold px-3 py-1 rounded mb-3 print:bg-slate-200 print:text-black print:border print:border-slate-800">
                          ▶ The Turning Point (과거의 내 모습을 마주하다)
                        </div>
                        <div className="space-y-2 print:space-y-1">
                          {textData.slice(5, 7).map((item) => (
                            <div 
                              key={item.id} 
                              className={`p-2 rounded-lg transition-all duration-300 group cursor-pointer print:p-0 print:mb-2
                                ${activeLogic === item.logicPoint ? 'bg-rose-50 border border-rose-200 shadow-inner print:bg-transparent print:border-none print:shadow-none' : 'hover:bg-slate-50 border border-transparent print:border-none'}
                              `}
                            >
                              <p className="text-base md:text-lg leading-relaxed print:text-base print:text-black">
                                <span className="font-bold text-red-800 mr-2 text-sm print:text-black">[{item.id.toString().padStart(2, '0')}]</span>
                                <span className={`${activeLogic === item.logicPoint ? 'font-bold text-rose-700 print:text-black print:underline print:underline-offset-4' : ''}`}>
                                  {item.text}
                                </span>
                              </p>
                              <p className="text-sm text-slate-500 mt-1 opacity-0 group-hover:opacity-100 transition-opacity duration-300 ml-9 print:hidden">
                                {item.trans}
                              </p>
                            </div>
                          ))}
                        </div>
                      </div>

                      {/* 파트 D: The Epiphany (8~14번) */}
                      <div className="border-t border-dashed border-slate-300 pt-6 print:border-black print:pt-4">
                        <div className="inline-block bg-red-600 text-white text-sm font-bold px-3 py-1 rounded mb-3 print:bg-slate-200 print:text-black print:border print:border-slate-800">
                          ▶ The Epiphany (불공정한 비교에 대한 깨달음)
                        </div>
                        <div className="space-y-2 print:space-y-1">
                          {textData.slice(7, 14).map((item) => (
                            <div 
                              key={item.id} 
                              className={`p-2 rounded-lg transition-all duration-300 group cursor-pointer print:p-0 print:mb-2
                                ${activeLogic === item.logicPoint ? 'bg-red-50 border border-red-200 shadow-inner print:bg-transparent print:border-none print:shadow-none' : 'hover:bg-slate-50 border border-transparent print:border-none'}
                              `}
                            >
                              <p className="text-base md:text-lg leading-relaxed print:text-base print:text-black">
                                <span className="font-bold text-red-800 mr-2 text-sm print:text-black">[{item.id.toString().padStart(2, '0')}]</span>
                                <span className={`${activeLogic === item.logicPoint ? 'font-bold text-red-700 print:text-black print:underline print:underline-offset-4' : ''}`}>
                                  {item.text}
                                </span>
                              </p>
                              <p className="text-sm text-slate-500 mt-1 opacity-0 group-hover:opacity-100 transition-opacity duration-300 ml-9 print:hidden">
                                {item.trans}
                              </p>
                            </div>
                          ))}
                        </div>
                      </div>

                      {/* 파트 E: The Lesson (15~17번) */}
                      <div className="border-t border-dashed border-slate-300 pt-6 print:border-black print:pt-4">
                        <div className="inline-block bg-orange-700 text-white text-sm font-bold px-3 py-1 rounded mb-3 print:bg-slate-200 print:text-black print:border print:border-slate-800">
                          ▶ The Lesson (진정한 경쟁자는 나 자신이다)
                        </div>
                        <div className="space-y-2 print:space-y-1">
                          {textData.slice(14, 17).map((item) => (
                            <div 
                              key={item.id} 
                              className={`p-2 rounded-lg transition-all duration-300 group cursor-pointer print:p-0 print:mb-2
                                ${activeLogic === item.logicPoint ? 'bg-orange-50 border border-orange-200 shadow-inner print:bg-transparent print:border-none print:shadow-none' : 'hover:bg-slate-50 border border-transparent print:border-none'}
                              `}
                            >
                              <p className="text-base md:text-lg leading-relaxed print:text-base print:text-black">
                                <span className="font-bold text-red-800 mr-2 text-sm print:text-black">[{item.id.toString().padStart(2, '0')}]</span>
                                <span className={`${activeLogic === item.logicPoint ? 'font-bold text-orange-700 print:text-black print:underline print:underline-offset-4' : ''}`}>
                                  {item.text}
                                </span>
                              </p>
                              <p className="text-sm text-slate-500 mt-1 opacity-0 group-hover:opacity-100 transition-opacity duration-300 ml-9 print:hidden">
                                {item.trans}
                              </p>
                            </div>
                          ))}
                        </div>
                      </div>

                    </div>
                  </div>

                  {/* 2. 구문 로직 영역 (4개) */}
                  <div className="bg-white p-6 md:p-8 rounded-xl shadow-sm print:shadow-none print:border print:border-slate-300 print:rounded-none print-avoid-break">
                    <h3 className="text-xl font-bold text-red-800 border-b-2 border-slate-100 pb-3 mb-6 print:text-black print:border-black">
                      PART 2. The Logic Syntax
                    </h3>
                    <p className="text-sm text-slate-500 mb-6 print:hidden">💡 아래의 포인트를 클릭하면 지문의 해당 문장이 강조됩니다.</p>
                    
                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4 print:grid-cols-1 print:gap-6">
                      
                      {/* POINT 1 */}
                      <button 
                        onClick={() => handleLogicClick(1)}
                        className={`text-left border-2 rounded-lg overflow-hidden transition-all duration-300 print:border-2 print:border-slate-800 print:shadow-none print:transform-none print:rounded-none
                          ${activeLogic === 1 ? 'border-red-600 shadow-md transform -translate-y-1' : 'border-slate-200 hover:border-red-400'}
                        `}
                      >
                        <div className={`px-4 py-2 font-bold print:bg-slate-100 print:text-black ${activeLogic === 1 ? 'bg-red-600 text-white' : 'bg-red-50 text-red-900'}`}>
                          POINT 01. 원인과 결과: so ~ that
                        </div>
                        <div className="p-4 bg-white h-full">
                          <p className="mb-2"><span className="font-semibold text-slate-700 print:text-black">Structure:</span> worked so hard that I felt small</p>
                          <p className="text-sm text-slate-600 leading-relaxed print:text-black">
                            "너무 ~해서 ...하다"라는 뜻으로, 타인들의 엄청난 노력(원인) 때문에 스스로가 한없이 작게 느껴진(결과) 화자의 <strong>깊은 좌절감과 열등감</strong>을 극적으로 표현합니다.
                          </p>
                        </div>
                      </button>

                      {/* POINT 2 */}
                      <button 
                        onClick={() => handleLogicClick(2)}
                        className={`text-left border-2 rounded-lg overflow-hidden transition-all duration-300 print:border-2 print:border-slate-800 print:shadow-none print:transform-none print:rounded-none
                          ${activeLogic === 2 ? 'border-rose-600 shadow-md transform -translate-y-1' : 'border-slate-200 hover:border-rose-400'}
                        `}
                      >
                        <div className={`px-4 py-2 font-bold print:bg-slate-100 print:text-black ${activeLogic === 2 ? 'bg-rose-600 text-white' : 'bg-rose-50 text-rose-900'}`}>
                          POINT 02. 우연한 사건: happen to V
                        </div>
                        <div className="p-4 bg-white h-full">
                          <p className="mb-2"><span className="font-semibold text-slate-700 print:text-black">Structure:</span> I happened to see a drawing...</p>
                          <p className="text-sm text-slate-600 leading-relaxed print:text-black">
                            "우연히 ~하다"라는 뜻입니다. 절망에 빠져 있던 화자가 부엌 벽에 걸린 옛날 그림을 발견하게 되는 이 우연한 사건이 이야기의 <strong>결정적인 전환점(Turning Point)</strong>이 됩니다.
                          </p>
                        </div>
                      </button>

                      {/* POINT 3 */}
                      <button 
                        onClick={() => handleLogicClick(3)}
                        className={`text-left border-2 rounded-lg overflow-hidden transition-all duration-300 print:border-2 print:border-slate-800 print:shadow-none print:transform-none print:rounded-none
                          ${activeLogic === 3 ? 'border-orange-600 shadow-md transform -translate-y-1' : 'border-slate-200 hover:border-orange-400'}
                        `}
                      >
                        <div className={`px-4 py-2 font-bold print:bg-slate-100 print:text-black ${activeLogic === 3 ? 'bg-orange-600 text-white' : 'bg-orange-50 text-orange-900'}`}>
                          POINT 03. 대안과 대조: rather than
                        </div>
                        <div className="p-4 bg-white h-full">
                          <p className="mb-2"><span className="font-semibold text-slate-700 print:text-black">Structure:</span> see how I have improved rather than to envy...</p>
                          <p className="text-sm text-slate-600 leading-relaxed print:text-black">
                            "~하기보다는 차라리"라는 뜻으로, 타인의 성공을 부러워하는 과거의 태도를 버리고, 자신의 성장에 집중하는 <strong>건강한 태도의 변화</strong>를 대조적으로 보여줍니다.
                          </p>
                        </div>
                      </button>

                      {/* POINT 4 */}
                      <button 
                        onClick={() => handleLogicClick(4)}
                        className={`text-left border-2 rounded-lg overflow-hidden transition-all duration-300 print:border-2 print:border-slate-800 print:shadow-none print:transform-none print:rounded-none
                          ${activeLogic === 4 ? 'border-red-600 shadow-md transform -translate-y-1' : 'border-slate-200 hover:border-red-400'}
                        `}
                      >
                        <div className={`px-4 py-2 font-bold print:bg-slate-100 print:text-black ${activeLogic === 4 ? 'bg-red-600 text-white' : 'bg-red-50 text-red-900'}`}>
                          POINT 04. 강력한 대조의 강조: not A : B
                        </div>
                        <div className="p-4 bg-white h-full">
                          <p className="mb-2"><span className="font-semibold text-slate-700 print:text-black">Structure:</span> isn’t the person next door... : it’s you.</p>
                          <p className="text-sm text-slate-600 leading-relaxed print:text-black">
                            콜론(:)을 사용하여 'not A but B(A가 아니라 B다)'와 같은 효과를 냅니다. 진정한 경쟁자는 타인이 아니라 오직 '자신'이라는 <strong>글의 궁극적인 메시지</strong>를 강렬하게 전달합니다.
                          </p>
                        </div>
                      </button>

                    </div>

                    <div className="mt-8 text-center print:hidden">
                       <button onClick={() => setActiveTab(2)} className="bg-red-800 hover:bg-red-700 text-white px-8 py-3 rounded-full font-bold shadow-md transition-colors flex items-center gap-2 mx-auto">
                         구문 분석 완료! 실전 문제로 이동 <i className="ph-bold ph-arrow-right"></i>
                       </button>
                    </div>
                  </div>
                </div>

                {/* === TAB 2: 논리 구조도 및 퀴즈 영역 === */}
                <div className={`space-y-6 print:space-y-4 print:mt-4 ${activeTab === 2 ? 'block' : 'hidden print:block'}`}>
                  
                  {/* 3. 로직 맵 */}
                  <div className="bg-white p-6 rounded-xl shadow-sm border-t-4 border-orange-600 print:shadow-none print:border print:border-slate-300 print:border-t-4 print:border-t-black print:rounded-none print-avoid-break">
                    <div className="flex justify-between items-center border-b-2 border-slate-100 pb-3 mb-6 print:border-black">
                      <h3 className="text-xl font-bold text-slate-800 flex items-center gap-2 print:text-black">
                        <i className="ph-fill ph-play-circle text-2xl text-orange-600 print:text-black"></i> PART 3. Logic Map
                      </h3>
                      <div className="print:hidden">
                        {mapStep > 0 && mapStep < logicMapSteps.length && (
                          <button onClick={nextMapStep} className="bg-orange-100 hover:bg-orange-200 text-orange-800 px-3 py-1 rounded text-sm font-bold transition-colors">
                            Next Step ➔
                          </button>
                        )}
                        {mapStep === logicMapSteps.length && (
                           <button onClick={resetMap} className="text-slate-400 hover:text-slate-600 text-sm underline">
                            Reset
                           </button>
                        )}
                      </div>
                    </div>
                    
                    <div 
                      className={`h-64 flex-col items-center justify-center border-2 border-dashed border-slate-200 rounded-lg bg-slate-50 text-center p-6 cursor-pointer hover:bg-orange-50 transition-colors 
                        ${mapStep === 0 ? 'flex' : 'hidden'} print:!hidden
                      `} 
                      onClick={nextMapStep}
                    >
                      <i className="ph-fill ph-play-circle text-5xl text-orange-400 mb-4"></i>
                      <p className="text-slate-600 font-medium">클릭하여 나현이의 내적 성장 과정을<br/>단계별로 파악해 보세요.</p>
                    </div>
                    
                    <div className={`flex-col items-center gap-2 py-4 ${mapStep > 0 ? 'flex' : 'hidden'} print:!flex`}>
                      {logicMapSteps.map((step, idx) => (
                        <React.Fragment key={step.id}>
                          <div 
                            className={`w-full max-w-sm border-2 rounded-lg p-4 flex flex-col items-center text-center transition-all duration-500 transform
                              print:!opacity-100 print:!translate-y-0 print:!flex print:border-slate-800 print:rounded-none print:bg-white print:text-black
                              ${idx < mapStep ? `opacity-100 translate-y-0 ${step.color}` : 'opacity-0 translate-y-8 hidden'}
                            `}
                          >
                            <div className="print:hidden">{step.icon}</div>
                            <span className="font-bold text-sm mb-1 print:text-black">{step.title}</span>
                            <span className="text-sm opacity-90 print:text-black">{step.desc}</span>
                          </div>
                          <div 
                            className={`flex-col items-center opacity-100 animate-pulse 
                              print:!flex print:!opacity-100 print:animate-none
                              ${idx < logicMapSteps.length - 1 && idx < mapStep ? 'flex' : 'hidden'}
                            `}
                          >
                            <div className="w-0.5 h-6 bg-slate-300 print:bg-slate-800"></div>
                            {/* 화살표 라벨 추가 */}
                            {idx === 0 ? (
                              <div className="bg-slate-200 text-slate-700 text-xs font-bold px-2 py-1 rounded-full my-1 border border-slate-400 print:bg-white print:text-black print:border-slate-800 print:rounded-none">
                                Interrupted by
                              </div>
                            ) : idx === 1 ? (
                              <div className="bg-rose-100 text-rose-700 text-xs font-bold px-2 py-1 rounded-full my-1 border border-rose-300 print:bg-white print:text-black print:border-slate-800 print:rounded-none">
                                Leads to
                              </div>
                            ) : idx === 2 ? (
                              <div className="bg-red-100 text-red-700 text-xs font-bold px-2 py-1 rounded-full my-1 border border-red-300 print:bg-white print:text-black print:border-slate-800 print:rounded-none">
                                Conclusion
                              </div>
                            ) : null}
                            <i className="ph-bold ph-arrow-right text-base text-slate-400 transform rotate-90 print:text-slate-800"></i>
                          </div>
                        </React.Fragment>
                      ))}
                    </div>
                  </div>

                  {/* 4. 실전 변형 문제 */}
                  <div className="bg-white p-6 rounded-xl shadow-sm print:shadow-none print:border print:border-slate-300 print:rounded-none print-avoid-break">
                    <h3 className="text-xl font-bold text-slate-800 border-b-2 border-slate-100 pb-3 mb-6 flex items-center gap-2 print:text-black print:border-black">
                      <i className="ph-fill ph-check-circle text-2xl text-orange-600 print:text-black"></i> PART 4. Challenge
                    </h3>
                    
                    {/* Q1. 제목 파악 */}
                    <div className="mb-8">
                      <div className="bg-slate-50 border border-slate-200 p-5 rounded-lg mb-4 print:bg-white print:border-none print:p-0 print:mb-6">
                        <p className="font-bold text-slate-800 mb-2 print:text-black">Q1. 글의 제목 파악</p>
                        <p className="text-sm text-slate-600 mb-4 print:text-black">윗글의 제목으로 가장 적절한 것은?</p>
                      </div>

                      <div className="space-y-2 print:space-y-3">
                        {[
                          { id: 1, text: "The Importance of Early Art Education" },
                          { id: 2, text: "Compare Apples to Apples: Be Your Own Competition", isCorrect: true },
                          { id: 3, text: "How to Build Confidence in University" },
                          { id: 4, text: "Why We Should Ignore Internet Personalities" }
                        ].map((choice) => (
                          <button
                            key={choice.id}
                            onClick={() => setQuiz1Answered(choice.id)}
                            disabled={quiz1Answered !== null}
                            className={`w-full text-left p-3 rounded-lg border flex items-center transition-all duration-200
                              print:border-none print:p-1 print:text-black
                              ${quiz1Answered === null ? 'border-slate-200 hover:border-orange-400 hover:bg-orange-50' : 
                                (choice.isCorrect ? 'border-green-500 bg-green-50 text-green-800 font-bold shadow-sm' : 
                                  (quiz1Answered === choice.id ? 'border-red-400 bg-red-50 text-red-500' : 'border-slate-100 text-slate-400 opacity-50'))
                              }
                            `}
                          >
                            <span className="w-8 inline-block font-mono text-slate-500 print:text-black">{['①', '②', '③', '④'][choice.id - 1]}</span> 
                            {choice.text}
                            {quiz1Answered !== null && choice.isCorrect && <i className="ph-fill ph-check-circle text-lg ml-auto text-green-500 print:hidden"></i>}
                          </button>
                        ))}
                      </div>

                      {quiz1Answered !== null && (
                        <div className={`mt-4 p-4 rounded-lg text-sm leading-relaxed animate-fade-in print:hidden
                          ${quiz1Answered === 2 ? 'bg-green-100 text-green-900 border border-green-300' : 'bg-red-100 text-red-900 border border-red-300'}
                        `}>
                          <p className="font-bold mb-1">
                            {quiz1Answered === 2 ? '🎉 정답입니다!' : '오답입니다. 다시 한번 생각해 보세요.'}
                          </p>
                          <p>
                            <strong>해설:</strong> 글 전체에 걸쳐 화자는 나와 다른 조건(오렌지)을 가진 타인과 나(사과)를 비교하지 말고, 오직 발전한 과거의 내 모습('어제의 나')과 비교하라고 말합니다. 따라서 2번 "사과를 사과와 비교하라: 네 자신의 경쟁자가 되어라"가 가장 완벽한 제목입니다.
                          </p>
                          <button onClick={() => setQuiz1Answered(null)} className="mt-3 text-sm underline opacity-70 hover:opacity-100">
                            다시 풀기
                          </button>
                        </div>
                      )}
                    </div>

                    <hr className="my-8 border-slate-200 print:border-black" />

                    {/* Q2. 문장 삽입 */}
                    <div className="mb-8">
                      <div className="bg-slate-50 border border-slate-200 p-5 rounded-lg mb-4 print:bg-white print:border-none print:p-0 print:mb-6">
                        <p className="font-bold text-slate-800 mb-2 print:text-black">Q2. 문장 삽입</p>
                        <p className="text-sm text-slate-600 mb-4 print:text-black">글의 흐름으로 보아, 주어진 문장이 들어가기에 가장 적절한 곳을 고르시오.</p>
                        <div className="text-md font-bold text-center bg-white p-4 border border-slate-200 rounded mb-4 print:border-slate-400 print:rounded-none print:text-black">
                          Then one day, I happened to see a drawing I had won an award for from middle school on the kitchen wall.
                        </div>
                        <p className="text-md leading-relaxed bg-white p-4 border border-slate-200 rounded print:border-slate-400 print:rounded-none print:text-black">
                          In university, though, everyone seemed much more talented than me, and they all worked so hard that I felt small in comparison. ( ① ) I thought about giving up my dream of becoming an artist. ( ② ) I was embarrassed because it wasn’t very good. ( ③ ) People say you shouldn’t compare apples to oranges, and they’re right. ( ④ ) That’s why it doesn’t make sense to compare yourself to Internet personalities.
                        </p>
                      </div>

                      <div className="grid grid-cols-2 md:grid-cols-4 gap-2 print:grid-cols-4 print:gap-4">
                        {[
                          { id: 1, text: "①" },
                          { id: 2, text: "②", isCorrect: true },
                          { id: 3, text: "③" },
                          { id: 4, text: "④" }
                        ].map((choice) => (
                          <button
                            key={choice.id}
                            onClick={() => setQuiz2Answered(choice.id)}
                            disabled={quiz2Answered !== null}
                            className={`w-full text-center p-3 rounded-lg border font-medium transition-all duration-200
                              print:border-none print:p-1 print:text-black
                              ${quiz2Answered === null ? 'border-slate-200 hover:border-orange-400 hover:bg-orange-50' : 
                                (choice.isCorrect ? 'border-green-500 bg-green-50 text-green-800 shadow-sm' : 
                                  (quiz2Answered === choice.id ? 'border-red-400 bg-red-50 text-red-500' : 'border-slate-100 text-slate-400 opacity-50'))
                              }
                            `}
                          >
                            {choice.text}
                          </button>
                        ))}
                      </div>

                      {quiz2Answered !== null && (
                        <div className={`mt-4 p-4 rounded-lg text-sm leading-relaxed animate-fade-in print:hidden
                          ${quiz2Answered === 2 ? 'bg-green-100 text-green-900 border border-green-300' : 'bg-red-100 text-red-900 border border-red-300'}
                        `}>
                          <p className="font-bold mb-1">
                            {quiz2Answered === 2 ? '🎉 정답입니다!' : '오답입니다. 다시 한번 생각해 보세요.'}
                          </p>
                          <p>
                            <strong>해설:</strong> 대학에서 재능 있는 친구들을 보며 꿈을 포기할까 생각했다는 내용 뒤에, 우연히 중학교 때 그린 '그림(a drawing)'을 보게 되었다는 내용이 이어져야 자연스럽습니다. 그 그림을 본 결과 "별로 좋지 않아 부끄러웠다(it wasn't very good)"로 연결되므로 <strong>②번</strong>이 가장 적절합니다.
                          </p>
                          <button onClick={() => setQuiz2Answered(null)} className="mt-3 text-sm underline opacity-70 hover:opacity-100">
                            다시 풀기
                          </button>
                        </div>
                      )}
                    </div>

                    <hr className="my-8 border-slate-200 print:border-black" />

                    {/* Q3. 빈칸 추론 */}
                    <div className="mb-8">
                      <div className="bg-slate-50 border border-slate-200 p-5 rounded-lg mb-4 print:bg-white print:border-none print:p-0 print:mb-6">
                        <p className="font-bold text-slate-800 mb-2 print:text-black">Q3. 빈칸 추론</p>
                        <p className="text-sm text-slate-600 mb-4 print:text-black">윗글의 빈칸에 들어갈 가장 적절한 말을 고르시오.</p>
                        <p className="text-md leading-relaxed bg-white p-4 border border-slate-200 rounded print:border-slate-400 print:rounded-none print:text-black">
                          If you are going to compare yourself to anyone, the only fair comparison is <span className="inline-block w-48 border-b-2 border-slate-800 mx-1"></span>.
                        </p>
                      </div>

                      <div className="grid grid-cols-1 gap-2 print:grid-cols-1 print:gap-3">
                        {[
                          { id: 1, text: "“people in your real life”" },
                          { id: 2, text: "“yesterday-you”", isCorrect: true },
                          { id: 3, text: "“Internet personalities”" },
                          { id: 4, text: "“apples to oranges”" }
                        ].map((choice) => (
                          <button
                            key={choice.id}
                            onClick={() => setQuiz3Answered(choice.id)}
                            disabled={quiz3Answered !== null}
                            className={`w-full text-left p-3 rounded-lg border font-medium transition-all duration-200
                              print:border-none print:p-1 print:text-black
                              ${quiz3Answered === null ? 'border-slate-200 hover:border-orange-400 hover:bg-orange-50' : 
                                (choice.isCorrect ? 'border-green-500 bg-green-50 text-green-800 font-bold shadow-sm' : 
                                  (quiz3Answered === choice.id ? 'border-red-400 bg-red-50 text-red-500' : 'border-slate-100 text-slate-400 opacity-50'))
                              }
                            `}
                          >
                            <span className="w-8 inline-block font-mono text-slate-500 print:text-black">{['①', '②', '③', '④'][choice.id - 1]}</span> 
                            {choice.text}
                          </button>
                        ))}
                      </div>

                      {quiz3Answered !== null && (
                        <div className={`mt-4 p-4 rounded-lg text-sm leading-relaxed animate-fade-in print:hidden
                          ${quiz3Answered === 2 ? 'bg-green-100 text-green-900 border border-green-300' : 'bg-red-100 text-red-900 border border-red-300'}
                        `}>
                          <p className="font-bold mb-1">
                            {quiz3Answered === 2 ? '🎉 정답입니다!' : '오답입니다. 다시 한번 생각해 보세요.'}
                          </p>
                          <p>
                            <strong>해설:</strong> 글쓴이가 말하는 유일하고 공정한(fair) 비교 대상은 나와 다른 환경을 가진 남들이 아니라, 내가 어디서 시작했고 어떤 노력을 했는지 정확히 아는 <strong>'어제의 나(yesterday-you)'</strong>입니다.
                          </p>
                          <button onClick={() => setQuiz3Answered(null)} className="mt-3 text-sm underline opacity-70 hover:opacity-100">
                            다시 풀기
                          </button>
                        </div>
                      )}
                    </div>

                    <hr className="my-8 border-slate-200 print:border-black" />

                    {/* Q4. 요약문 완성 */}
                    <div>
                      <div className="bg-slate-50 border border-slate-200 p-5 rounded-lg mb-4 print:bg-white print:border-none print:p-0 print:mb-6">
                        <p className="font-bold text-slate-800 mb-2 print:text-black">Q4. 요약문 완성</p>
                        <p className="text-sm text-slate-600 mb-4 print:text-black">다음 글의 내용을 한 문장으로 요약하고자 한다. 빈칸 (A), (B)에 들어갈 말로 가장 적절한 것은?</p>
                        <p className="text-md leading-relaxed bg-white p-4 border border-slate-200 rounded print:border-slate-400 print:rounded-none print:text-black">
                          Nahyeon emphasizes that rather than comparing yourself to others who have different advantages, focusing on your own past <span className="font-bold text-red-800">( A )</span> allows you to recognize your actual <span className="font-bold text-red-800">( B )</span>.
                        </p>
                      </div>

                      <div className="space-y-2 print:space-y-3">
                        {[
                          { id: 1, text: "(A) self —— (B) progress", isCorrect: true },
                          { id: 2, text: "(A) mistakes —— (B) limitations" },
                          { id: 3, text: "(A) environment —— (B) differences" },
                          { id: 4, text: "(A) self —— (B) wealth" }
                        ].map((choice) => (
                          <button
                            key={choice.id}
                            onClick={() => setQuiz4Answered(choice.id)}
                            disabled={quiz4Answered !== null}
                            className={`w-full text-left p-3 rounded-lg border flex items-center transition-all duration-200
                              print:border-none print:p-1 print:text-black
                              ${quiz4Answered === null ? 'border-slate-200 hover:border-orange-400 hover:bg-orange-50' : 
                                (choice.isCorrect ? 'border-green-500 bg-green-50 text-green-800 font-bold shadow-sm' : 
                                  (quiz4Answered === choice.id ? 'border-red-400 bg-red-50 text-red-500' : 'border-slate-100 text-slate-400 opacity-50'))
                              }
                            `}
                          >
                            <span className="w-8 inline-block font-mono text-slate-500 print:text-black">{['①', '②', '③', '④'][choice.id - 1]}</span> 
                            {choice.text}
                            {quiz4Answered !== null && choice.isCorrect && <i className="ph-fill ph-check-circle text-lg ml-auto text-green-500 print:hidden"></i>}
                          </button>
                        ))}
                      </div>

                      {quiz4Answered !== null && (
                        <div className={`mt-4 p-4 rounded-lg text-sm leading-relaxed animate-fade-in print:hidden
                          ${quiz4Answered === 1 ? 'bg-green-100 text-green-900 border border-green-300' : 'bg-red-100 text-red-900 border border-red-300'}
                        `}>
                          <p className="font-bold mb-1">
                            {quiz4Answered === 1 ? '🎉 정답입니다!' : '오답입니다. 다시 한번 생각해 보세요.'}
                          </p>
                          <p>
                            <strong>해설:</strong> 나현은 각기 다른 장점을 가진 다른 사람들과 비교하기보다, 과거의 자신<strong>(self)</strong>과 비교하는 것만이 당신의 실제 발전<strong>(progress)</strong>을 볼 수 있게 해준다고 강조합니다. 
                          </p>
                          <button onClick={() => setQuiz4Answered(null)} className="mt-3 text-sm underline opacity-70 hover:opacity-100">
                            다시 풀기
                          </button>
                        </div>
                      )}
                    </div>

                  </div>
                </div>

              </div>
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
