<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE LOGIC Interactive App - Crowdfunding Part 2</title>
    
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    
    <style>
        @media print {
            body {
                -webkit-print-color-adjust: exact;
                print-color-adjust: exact;
                background-color: white !important;
            }
            ::-webkit-scrollbar {
                display: none;
            }
            .print-avoid-break {
                break-inside: avoid;
            }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        const textData = [
          // Part 1: The Reaction & Idea (1~4)
          { id: 1, text: "My grandparents were thrilled when I told them my idea.", trans: "나의 조부모님은 내가 내 아이디어를 말씀드렸을 때 몹시 기뻐하셨다." },
          { id: 2, text: "With the help of investors, we could build a large greenhouse and grow a lot more strawberries.", trans: "투자자들의 도움으로, 우리는 큰 온실을 짓고 훨씬 더 많은 딸기를 재배할 수 있을 것이다." },
          { id: 3, text: "Moreover, we could reward the investors for their help by sending them jars of organic jam!", trans: "게다가, 우리는 유기농 잼이 담긴 병을 보냄으로써 투자자들의 도움에 보답할 수 있었다!", isHighlight: true, logicPoint: 1, logic: 'reward' },
          { id: 4, text: "With this plan in mind, the next step was to figure out the details.", trans: "이 계획을 염두에 두고, 다음 단계는 세부 사항을 파악하는 것이었다." },

          // Part 2: Production Details (5~7)
          { id: 5, text: "Before beginning your campaign, be sure to plan all the production details.", trans: "캠페인을 시작하기 전에, 반드시 모든 생산 세부 사항을 계획하라.", logic: 'detail' },
          { id: 6, text: "How many products will you make? How long will it take to make the product?", trans: "얼마나 많은 제품을 만들 것인가? 제품을 만드는 데 얼마나 걸릴 것인가?" },
          { id: 7, text: "This planning is important because your potential investors will want to see a clear schedule.", trans: "여러분의 잠재적인 투자자들은 명확한 일정을 보기를 원할 것이기 때문에 이러한 계획은 중요하다.", isHighlight: true, logicPoint: 2, logic: 'schedule' },

          // Part 3: Funding Goal (8~10)
          { id: 8, text: "Once your plan is complete, remember to set your funding goal.", trans: "계획이 완료되면, 자금 조달 목표를 설정하는 것을 잊지 마라.", isHighlight: true, logicPoint: 3, logic: 'goal' },
          { id: 9, text: "It should be enough to complete the project and fulfill the rewards for the investors.", trans: "그것은 프로젝트를 완료하고 투자자들을 위한 보상을 이행하기에 충분해야 한다." },
          { id: 10, text: "Consider all the necessary costs before deciding on the amount.", trans: "금액을 결정하기 전에 모든 필요한 비용을 고려하라.", isHighlight: true, logicPoint: 4 }
        ];

        const logicMapSteps = [
          { id: 'reward', title: "THE REWARD (투자자 보상안)", desc: "Sending jars of organic jam", color: "bg-blue-100 border-blue-400 text-blue-800", icon: <i className="ph-fill ph-gift text-xl mb-2"></i> },
          { id: 'detail', title: "PRODUCTION DETAILS (생산 계획)", desc: "How many? How long?", color: "bg-cyan-100 border-cyan-400 text-cyan-800", icon: <i className="ph-fill ph-clipboard-text text-xl mb-2"></i> },
          { id: 'schedule', title: "CLEAR SCHEDULE (명확한 일정)", desc: "Important for potential investors", color: "bg-sky-100 border-sky-400 text-sky-800", icon: <i className="ph-fill ph-calendar-check text-xl mb-2"></i> },
          { id: 'goal', title: "FUNDING GOAL (목표 설정)", desc: "Must cover project + reward costs", color: "bg-indigo-100 border-indigo-400 text-indigo-800", icon: <i className="ph-fill ph-target text-xl mb-2"></i> }
        ];

        function App() {
          const [activeTab, setActiveTab] = useState(1);
          const [activeLogic, setActiveLogic] = useState(null);
          const [mapStep, setMapStep] = useState(0);
          const [quiz1Answered, setQuiz1Answered] = useState(null);
          const [quiz2Answered, setQuiz2Answered] = useState(null);
          const [quiz3Answered, setQuiz3Answered] = useState(null);

          const handleLogicClick = (point) => setActiveLogic(activeLogic === point ? null : point);
          const nextMapStep = () => { if (mapStep < logicMapSteps.length) setMapStep(mapStep + 1); };
          const resetMap = () => setMapStep(0);

          const handlePrint = () => {
            window.print();
          };

          return (
            <div className="min-h-screen bg-slate-50 font-sans text-slate-800 p-4 md:p-8 flex justify-center print:bg-white print:p-0">
              <div className="max-w-4xl w-full flex flex-col gap-6 print:flex print:flex-col print:gap-6 print:max-w-none">
                
                {/* 헤더 */}
                <div className="bg-white p-6 rounded-xl shadow-sm border-t-4 border-blue-600 print:shadow-none print:border-t-4 print:border-black print:rounded-none flex justify-between items-start">
                  <div>
                    <h1 className="text-sm font-bold text-blue-800 tracking-wider mb-2 print:text-black">THE LOGIC INTERACTIVE</h1>
                    <h2 className="text-3xl font-serif font-bold text-slate-900 print:text-black">Turning Ideas into Reality</h2>
                    <p className="text-slate-500 italic mt-1 font-serif print:text-gray-600">Part 2: Planning the Details</p>
                  </div>
                  <button 
                    onClick={handlePrint}
                    className="print:hidden flex items-center gap-2 bg-slate-800 hover:bg-slate-700 text-white px-4 py-2 rounded-lg font-bold transition-colors shadow-sm"
                  >
                    <i className="ph-bold ph-printer text-lg"></i> 인쇄하기
                  </button>
                </div>

                {/* 탭 네비게이션 */}
                <div className="flex bg-white rounded-xl shadow-sm overflow-hidden print:hidden">
                  <button 
                    onClick={() => setActiveTab(1)}
                    className={`flex-1 py-4 px-2 text-center font-bold text-base md:text-lg transition-all duration-300 border-b-4 ${activeTab === 1 ? 'bg-blue-50 text-blue-800 border-blue-600' : 'text-slate-400 border-transparent hover:bg-slate-50 hover:text-slate-600'}`}
                  >
                    <i className="ph-fill ph-book-open mr-2"></i>
                    1. 지문 및 구문 분석
                  </button>
                  <button 
                    onClick={() => setActiveTab(2)}
                    className={`flex-1 py-4 px-2 text-center font-bold text-base md:text-lg transition-all duration-300 border-b-4 ${activeTab === 2 ? 'bg-cyan-50 text-cyan-800 border-cyan-600' : 'text-slate-400 border-transparent hover:bg-slate-50 hover:text-slate-600'}`}
                  >
                    <i className="ph-fill ph-puzzle-piece mr-2"></i>
                    2. 논리 구조 및 실전 문제
                  </button>
                </div>

                {/* === TAB 1: 지문 및 구문 분석 영역 === */}
                <div className={`space-y-6 print:space-y-4 ${activeTab === 1 ? 'block' : 'hidden print:block'}`}>
                  {/* 1. 지문 영역 */}
                  <div className="bg-white p-6 md:p-8 rounded-xl shadow-sm print:shadow-none print:border print:border-slate-300 print:rounded-none">
                    <h3 className="text-xl font-bold text-blue-800 border-b-2 border-slate-100 pb-3 mb-4 flex items-center gap-2 print:text-black print:border-black">
                      <i className="ph-fill ph-book-open text-2xl print:text-black"></i> PART 1. Text Analysis
                    </h3>
                    
                    <div className="space-y-8 print:space-y-6">
                      
                      {/* 파트 A: 리워드 아이디어 (1~4번) */}
                      <div>
                        <div className="inline-block bg-slate-800 text-white text-sm font-bold px-3 py-1 rounded mb-3 print:bg-slate-200 print:text-black print:border print:border-slate-800">
                          ▶ The Reward (크라우드펀딩의 핵심: 보상 아이디어)
                        </div>
                        <div className="space-y-2 print:space-y-1">
                          {textData.slice(0, 4).map((item) => (
                            <div 
                              key={item.id} 
                              className={`p-2 rounded-lg transition-all duration-300 group cursor-pointer print:p-0 print:mb-2
                                ${activeLogic === item.logicPoint ? 'bg-blue-50 border border-blue-200 shadow-inner print:bg-transparent print:border-none print:shadow-none' : 'hover:bg-slate-50 border border-transparent print:border-none'}
                              `}
                            >
                              <p className="text-base md:text-lg leading-relaxed print:text-base print:text-black">
                                <span className="font-bold text-blue-700 mr-2 text-sm print:text-black">[{item.id.toString().padStart(2, '0')}]</span>
                                <span className={`${activeLogic === item.logicPoint ? 'font-bold text-blue-800 print:text-black print:underline print:underline-offset-4' : ''}`}>
                                  {item.text}
                                </span>
                              </p>
                              <p className="text-sm text-slate-500 mt-1 opacity-0 group-hover:opacity-100 transition-opacity duration-300 ml-9 print:hidden">
                                {item.trans}
                              </p>
                            </div>
                          ))}
                        </div>
                      </div>

                      {/* 파트 B: 생산 계획 (5~7번) */}
                      <div className="border-t border-dashed border-slate-300 pt-6 print:border-black print:pt-4">
                        <div className="inline-block bg-cyan-600 text-white text-sm font-bold px-3 py-1 rounded mb-3 print:bg-slate-200 print:text-black print:border print:border-slate-800">
                          ▶ Production Details (명확한 일정과 계획)
                        </div>
                        <div className="space-y-2 print:space-y-1">
                          {textData.slice(4, 7).map((item) => (
                            <div 
                              key={item.id} 
                              className={`p-2 rounded-lg transition-all duration-300 group cursor-pointer print:p-0 print:mb-2
                                ${activeLogic === item.logicPoint ? 'bg-cyan-50 border border-cyan-200 shadow-inner print:bg-transparent print:border-none print:shadow-none' : 'hover:bg-slate-50 border border-transparent print:border-none'}
                              `}
                            >
                              <p className="text-base md:text-lg leading-relaxed print:text-base print:text-black">
                                <span className="font-bold text-blue-700 mr-2 text-sm print:text-black">[{item.id.toString().padStart(2, '0')}]</span>
                                <span className={`${activeLogic === item.logicPoint ? 'font-bold text-cyan-700 print:text-black print:underline print:underline-offset-4' : ''}`}>
                                  {item.text}
                                </span>
                              </p>
                              <p className="text-sm text-slate-500 mt-1 opacity-0 group-hover:opacity-100 transition-opacity duration-300 ml-9 print:hidden">
                                {item.trans}
                              </p>
                            </div>
                          ))}
                        </div>
                      </div>

                      {/* 파트 C: 자금 조달 목표 (8~10번) */}
                      <div className="border-t border-dashed border-slate-300 pt-6 print:border-black print:pt-4">
                        <div className="inline-block bg-indigo-600 text-white text-sm font-bold px-3 py-1 rounded mb-3 print:bg-slate-200 print:text-black print:border print:border-slate-800">
                          ▶ Funding Goal (비용을 고려한 목표 설정)
                        </div>
                        <div className="space-y-2 print:space-y-1">
                          {textData.slice(7, 10).map((item) => (
                            <div 
                              key={item.id} 
                              className={`p-2 rounded-lg transition-all duration-300 group cursor-pointer print:p-0 print:mb-2
                                ${activeLogic === item.logicPoint ? 'bg-indigo-50 border border-indigo-200 shadow-inner print:bg-transparent print:border-none print:shadow-none' : 'hover:bg-slate-50 border border-transparent print:border-none'}
                              `}
                            >
                              <p className="text-base md:text-lg leading-relaxed print:text-base print:text-black">
                                <span className="font-bold text-blue-700 mr-2 text-sm print:text-black">[{item.id.toString().padStart(2, '0')}]</span>
                                <span className={`${activeLogic === item.logicPoint ? 'font-bold text-indigo-700 print:text-black print:underline print:underline-offset-4' : ''}`}>
                                  {item.text}
                                </span>
                              </p>
                              <p className="text-sm text-slate-500 mt-1 opacity-0 group-hover:opacity-100 transition-opacity duration-300 ml-9 print:hidden">
                                {item.trans}
                              </p>
                            </div>
                          ))}
                        </div>
                      </div>

                    </div>
                  </div>

                  {/* 2. 구문 로직 영역 */}
                  <div className="bg-white p-6 md:p-8 rounded-xl shadow-sm print:shadow-none print:border print:border-slate-300 print:rounded-none print-avoid-break">
                    <h3 className="text-xl font-bold text-blue-800 border-b-2 border-slate-100 pb-3 mb-6 print:text-black print:border-black">
                      PART 2. The Logic Syntax
                    </h3>
                    <p className="text-sm text-slate-500 mb-6 print:hidden">💡 아래의 포인트를 클릭하면 지문의 해당 문장이 강조됩니다.</p>
                    
                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4 print:grid-cols-1 print:gap-6">
                      
                      {/* POINT 1 */}
                      <button 
                        onClick={() => handleLogicClick(1)}
                        className={`text-left border-2 rounded-lg overflow-hidden transition-all duration-300 print:border-2 print:border-slate-800 print:shadow-none print:transform-none print:rounded-none
                          ${activeLogic === 1 ? 'border-blue-600 shadow-md transform -translate-y-1' : 'border-slate-200 hover:border-blue-400'}
                        `}
                      >
                        <div className={`px-4 py-2 font-bold print:bg-slate-100 print:text-black ${activeLogic === 1 ? 'bg-blue-600 text-white' : 'bg-blue-50 text-blue-800'}`}>
                          POINT 01. 첨가와 부연: Moreover
                        </div>
                        <div className="p-4 bg-white h-full">
                          <p className="mb-2"><span className="font-semibold text-slate-700 print:text-black">Structure:</span> [Moreover], we could reward the investors...</p>
                          <p className="text-sm text-slate-600 leading-relaxed print:text-black">
                            "게다가, 더욱이"라는 뜻의 연결어입니다. 투자로 온실을 지을 수 있다는 장점에 더해, 투자자들에게 줄 수 있는 <strong>유기농 잼 보상이라는 추가적인 아이디어</strong>를 덧붙여 줍니다.
                          </p>
                        </div>
                      </button>

                      {/* POINT 2 */}
                      <button 
                        onClick={() => handleLogicClick(2)}
                        className={`text-left border-2 rounded-lg overflow-hidden transition-all duration-300 print:border-2 print:border-slate-800 print:shadow-none print:transform-none print:rounded-none
                          ${activeLogic === 2 ? 'border-cyan-600 shadow-md transform -translate-y-1' : 'border-slate-200 hover:border-cyan-400'}
                        `}
                      >
                        <div className={`px-4 py-2 font-bold print:bg-slate-100 print:text-black ${activeLogic === 2 ? 'bg-cyan-600 text-white' : 'bg-cyan-50 text-cyan-800'}`}>
                          POINT 02. 논리적 인과관계: because
                        </div>
                        <div className="p-4 bg-white h-full">
                          <p className="mb-2"><span className="font-semibold text-slate-700 print:text-black">Structure:</span> This planning is important [because] your potential investors will want to see...</p>
                          <p className="text-sm text-slate-600 leading-relaxed print:text-black">
                            생산 일정(수량, 시간)을 구체적으로 세우는 것이 왜 중요한지에 대한 <strong>근거(투자자들에게 명확한 일정 제시)</strong>를 밝히는 인과 구조입니다.
                          </p>
                        </div>
                      </button>

                      {/* POINT 3 */}
                      <button 
                        onClick={() => handleLogicClick(3)}
                        className={`text-left border-2 rounded-lg overflow-hidden transition-all duration-300 print:border-2 print:border-slate-800 print:shadow-none print:transform-none print:rounded-none
                          ${activeLogic === 3 ? 'border-sky-600 shadow-md transform -translate-y-1' : 'border-slate-200 hover:border-sky-400'}
                        `}
                      >
                        <div className={`px-4 py-2 font-bold print:bg-slate-100 print:text-black ${activeLogic === 3 ? 'bg-sky-600 text-white' : 'bg-sky-50 text-sky-800'}`}>
                          POINT 03. 조건/시간의 접속사: Once
                        </div>
                        <div className="p-4 bg-white h-full">
                          <p className="mb-2"><span className="font-semibold text-slate-700 print:text-black">Structure:</span> [Once] your plan is complete, remember to set...</p>
                          <p className="text-sm text-slate-600 leading-relaxed print:text-black">
                            "일단 ~하면, ~하자마자"라는 뜻입니다. 생산 세부 계획이 완료된 <strong>이후에 진행해야 할 다음 순서</strong>(목표 금액 설정)로 자연스럽게 단계를 넘겨주는 역할을 합니다.
                          </p>
                        </div>
                      </button>

                      {/* POINT 4 */}
                      <button 
                        onClick={() => handleLogicClick(4)}
                        className={`text-left border-2 rounded-lg overflow-hidden transition-all duration-300 print:border-2 print:border-slate-800 print:shadow-none print:transform-none print:rounded-none
                          ${activeLogic === 4 ? 'border-indigo-600 shadow-md transform -translate-y-1' : 'border-slate-200 hover:border-indigo-400'}
                        `}
                      >
                        <div className={`px-4 py-2 font-bold print:bg-slate-100 print:text-black ${activeLogic === 4 ? 'bg-indigo-600 text-white' : 'bg-indigo-50 text-indigo-800'}`}>
                          POINT 04. 전치사 + 동명사: before ~ing
                        </div>
                        <div className="p-4 bg-white h-full">
                          <p className="mb-2"><span className="font-semibold text-slate-700 print:text-black">Structure:</span> Consider all the necessary costs [before deciding] on the amount.</p>
                          <p className="text-sm text-slate-600 leading-relaxed print:text-black">
                            금액을 결정하기 '전에(before)' 보상 비용 등을 모두 포함한 필수 비용을 고려하라는 <strong>순서와 주의사항</strong>을 명확하게 전달하는 구문입니다.
                          </p>
                        </div>
                      </button>

                    </div>

                    <div className="mt-8 text-center print:hidden">
                       <button onClick={() => setActiveTab(2)} className="bg-blue-800 hover:bg-blue-700 text-white px-8 py-3 rounded-full font-bold shadow-md transition-colors flex items-center gap-2 mx-auto">
                         구문 분석 완료! 실전 문제로 이동 <i className="ph-bold ph-arrow-right"></i>
                       </button>
                    </div>
                  </div>
                </div>

                {/* === TAB 2: 논리 구조도 및 퀴즈 영역 === */}
                <div className={`space-y-6 print:space-y-4 print:mt-4 ${activeTab === 2 ? 'block' : 'hidden print:block'}`}>
                  
                  {/* 3. 로직 맵 */}
                  <div className="bg-white p-6 rounded-xl shadow-sm border-t-4 border-cyan-600 print:shadow-none print:border print:border-slate-300 print:border-t-4 print:border-t-black print:rounded-none print-avoid-break">
                    <div className="flex justify-between items-center border-b-2 border-slate-100 pb-3 mb-6 print:border-black">
                      <h3 className="text-xl font-bold text-slate-800 flex items-center gap-2 print:text-black">
                        <i className="ph-fill ph-play-circle text-2xl text-cyan-600 print:text-black"></i> PART 3. Logic Map
                      </h3>
                      <div className="print:hidden">
                        {mapStep > 0 && mapStep < logicMapSteps.length && (
                          <button onClick={nextMapStep} className="bg-cyan-100 hover:bg-cyan-200 text-cyan-800 px-3 py-1 rounded text-sm font-bold transition-colors">
                            Next Step ➔
                          </button>
                        )}
                        {mapStep === logicMapSteps.length && (
                           <button onClick={resetMap} className="text-slate-400 hover:text-slate-600 text-sm underline">
                            Reset
                           </button>
                        )}
                      </div>
                    </div>
                    
                    <div 
                      className={`h-64 flex-col items-center justify-center border-2 border-dashed border-slate-200 rounded-lg bg-slate-50 text-center p-6 cursor-pointer hover:bg-cyan-50 transition-colors 
                        ${mapStep === 0 ? 'flex' : 'hidden'} print:!hidden
                      `} 
                      onClick={nextMapStep}
                    >
                      <i className="ph-fill ph-play-circle text-5xl text-cyan-400 mb-4"></i>
                      <p className="text-slate-600 font-medium">클릭하여 캠페인 세부 계획 단계를<br/>논리적으로 파악해 보세요.</p>
                    </div>
                    
                    <div className={`flex-col items-center gap-2 py-4 ${mapStep > 0 ? 'flex' : 'hidden'} print:!flex`}>
                      {logicMapSteps.map((step, idx) => (
                        <React.Fragment key={step.id}>
                          <div 
                            className={`w-full max-w-sm border-2 rounded-lg p-4 flex flex-col items-center text-center transition-all duration-500 transform
                              print:!opacity-100 print:!translate-y-0 print:!flex print:border-slate-800 print:rounded-none print:bg-white print:text-black
                              ${idx < mapStep ? `opacity-100 translate-y-0 ${step.color}` : 'opacity-0 translate-y-8 hidden'}
                            `}
                          >
                            <div className="print:hidden">{step.icon}</div>
                            <span className="font-bold text-sm mb-1 print:text-black">{step.title}</span>
                            <span className="text-sm opacity-90 print:text-black">{step.desc}</span>
                          </div>
                          <div 
                            className={`flex-col items-center opacity-100 animate-pulse 
                              print:!flex print:!opacity-100 print:animate-none
                              ${idx < logicMapSteps.length - 1 && idx < mapStep ? 'flex' : 'hidden'}
                            `}
                          >
                            <div className="w-0.5 h-6 bg-slate-300 print:bg-slate-800"></div>
                            {/* 화살표 라벨 추가 */}
                            {idx === 0 ? (
                              <div className="bg-blue-100 text-blue-700 text-xs font-bold px-2 py-1 rounded-full my-1 border border-blue-300 print:bg-white print:text-black print:border-slate-800 print:rounded-none">
                                Requires
                              </div>
                            ) : idx === 1 ? (
                              <div className="bg-cyan-100 text-cyan-700 text-xs font-bold px-2 py-1 rounded-full my-1 border border-cyan-300 print:bg-white print:text-black print:border-slate-800 print:rounded-none">
                                Resulting in a
                              </div>
                            ) : idx === 2 ? (
                              <div className="bg-sky-100 text-sky-700 text-xs font-bold px-2 py-1 rounded-full my-1 border border-sky-300 print:bg-white print:text-black print:border-slate-800 print:rounded-none">
                                Followed by
                              </div>
                            ) : null}
                            <i className="ph-bold ph-arrow-right text-base text-slate-400 transform rotate-90 print:text-slate-800"></i>
                          </div>
                        </React.Fragment>
                      ))}
                    </div>
                  </div>

                  {/* 4. 실전 변형 문제 */}
                  <div className="bg-white p-6 rounded-xl shadow-sm print:shadow-none print:border print:border-slate-300 print:rounded-none print-avoid-break">
                    <h3 className="text-xl font-bold text-slate-800 border-b-2 border-slate-100 pb-3 mb-6 flex items-center gap-2 print:text-black print:border-black">
                      <i className="ph-fill ph-check-circle text-2xl text-blue-600 print:text-black"></i> PART 4. Challenge
                    </h3>
                    
                    {/* Q1. 내용 일치 */}
                    <div className="mb-8">
                      <div className="bg-slate-50 border border-slate-200 p-5 rounded-lg mb-4 print:bg-white print:border-none print:p-0 print:mb-6">
                        <p className="font-bold text-slate-800 mb-2 print:text-black">Q1. 내용 불일치 파악</p>
                        <p className="text-sm text-slate-600 mb-4 print:text-black">윗글의 내용과 일치하지 <u>않는</u> 것은?</p>
                      </div>

                      <div className="space-y-2 print:space-y-3">
                        {[
                          { id: 1, text: "조부모님은 손주의 아이디어를 듣고 매우 기뻐하셨다." },
                          { id: 2, text: "크라우드펀딩 투자자들에게는 유기농 잼이 보상으로 제공될 예정이다." },
                          { id: 3, text: "잠재적 투자자들은 캠페인의 명확한 일정을 보고 싶어 할 것이다." },
                          { id: 4, text: "자금 조달 목표 금액은 오직 프로젝트 완료에 필요한 비용만으로 산정해야 한다.", isCorrect: true }
                        ].map((choice) => (
                          <button
                            key={choice.id}
                            onClick={() => setQuiz1Answered(choice.id)}
                            disabled={quiz1Answered !== null}
                            className={`w-full text-left p-3 rounded-lg border flex items-center transition-all duration-200
                              print:border-none print:p-1 print:text-black
                              ${quiz1Answered === null ? 'border-slate-200 hover:border-blue-400 hover:bg-blue-50' : 
                                (choice.isCorrect ? 'border-green-500 bg-green-50 text-green-800 font-bold shadow-sm' : 
                                  (quiz1Answered === choice.id ? 'border-red-400 bg-red-50 text-red-500' : 'border-slate-100 text-slate-400 opacity-50'))
                              }
                            `}
                          >
                            <span className="w-8 inline-block font-mono text-slate-500 print:text-black">{['①', '②', '③', '④'][choice.id - 1]}</span> 
                            {choice.text}
                            {quiz1Answered !== null && choice.isCorrect && <i className="ph-fill ph-check-circle text-lg ml-auto text-green-500 print:hidden"></i>}
                          </button>
                        ))}
                      </div>

                      {quiz1Answered !== null && (
                        <div className={`mt-4 p-4 rounded-lg text-sm leading-relaxed animate-fade-in print:hidden
                          ${quiz1Answered === 4 ? 'bg-green-100 text-green-900 border border-green-300' : 'bg-red-100 text-red-900 border border-red-300'}
                        `}>
                          <p className="font-bold mb-1">
                            {quiz1Answered === 4 ? '🎉 정답입니다!' : '오답입니다. 다시 한번 생각해 보세요.'}
                          </p>
                          <p>
                            <strong>해설:</strong> 본문의 9~10번 문장에서 자금 조달 목표는 "프로젝트를 완료하고 <strong>투자자들을 위한 보상을 이행하기에(fulfill the rewards)</strong> 충분해야 한다"고 명시하고 있으므로, 오직 프로젝트 완료 비용만 포함한다는 4번은 일치하지 않습니다.
                          </p>
                          <button onClick={() => setQuiz1Answered(null)} className="mt-3 text-sm underline opacity-70 hover:opacity-100">
                            다시 풀기
                          </button>
                        </div>
                      )}
                    </div>

                    <hr className="my-8 border-slate-200 print:border-black" />

                    {/* Q2. 문장 삽입 */}
                    <div className="mb-8">
                      <div className="bg-slate-50 border border-slate-200 p-5 rounded-lg mb-4 print:bg-white print:border-none print:p-0 print:mb-6">
                        <p className="font-bold text-slate-800 mb-2 print:text-black">Q2. 문장 삽입</p>
                        <p className="text-sm text-slate-600 mb-4 print:text-black">글의 흐름으로 보아, 주어진 문장이 들어가기에 가장 적절한 곳을 고르시오.</p>
                        <div className="text-md font-bold text-center bg-white p-4 border border-slate-200 rounded mb-4 print:border-slate-400 print:rounded-none print:text-black">
                          This planning is important because your potential investors will want to see a clear schedule.
                        </div>
                        <p className="text-md leading-relaxed bg-white p-4 border border-slate-200 rounded print:border-slate-400 print:rounded-none print:text-black">
                          Before beginning your campaign, be sure to plan all the production details. ( ① ) How many products will you make? ( ② ) How long will it take to make the product? ( ③ ) Once your plan is complete, remember to set your funding goal. ( ④ ) It should be enough to complete the project and fulfill the rewards for the investors. 
                        </p>
                      </div>

                      <div className="grid grid-cols-2 md:grid-cols-4 gap-2 print:grid-cols-4 print:gap-4">
                        {[
                          { id: 1, text: "①" },
                          { id: 2, text: "②" },
                          { id: 3, text: "③", isCorrect: true },
                          { id: 4, text: "④" }
                        ].map((choice) => (
                          <button
                            key={choice.id}
                            onClick={() => setQuiz2Answered(choice.id)}
                            disabled={quiz2Answered !== null}
                            className={`w-full text-center p-3 rounded-lg border font-medium transition-all duration-200
                              print:border-none print:p-1 print:text-black
                              ${quiz2Answered === null ? 'border-slate-200 hover:border-cyan-400 hover:bg-cyan-50' : 
                                (choice.isCorrect ? 'border-green-500 bg-green-50 text-green-800 shadow-sm' : 
                                  (quiz2Answered === choice.id ? 'border-red-400 bg-red-50 text-red-500' : 'border-slate-100 text-slate-400 opacity-50'))
                              }
                            `}
                          >
                            {choice.text}
                          </button>
                        ))}
                      </div>

                      {quiz2Answered !== null && (
                        <div className={`mt-4 p-4 rounded-lg text-sm leading-relaxed animate-fade-in print:hidden
                          ${quiz2Answered === 3 ? 'bg-green-100 text-green-900 border border-green-300' : 'bg-red-100 text-red-900 border border-red-300'}
                        `}>
                          <p className="font-bold mb-1">
                            {quiz2Answered === 3 ? '🎉 정답입니다!' : '오답입니다. 다시 한번 생각해 보세요.'}
                          </p>
                          <p>
                            <strong>해설:</strong> 주어진 문장의 <strong>'This planning(이러한 계획)'</strong>이 가리키는 대상을 찾아야 합니다. 앞에서 제품 수량(How many)과 소요 시간(How long)을 묻는 <strong>구체적인 생산 일정 계획</strong>이 제시되었으므로, 그 직후이자 목표 설정(funding goal) 단계로 넘어가기 전인 <strong>③번</strong> 위치가 논리적으로 완벽합니다.
                          </p>
                          <button onClick={() => setQuiz2Answered(null)} className="mt-3 text-sm underline opacity-70 hover:opacity-100">
                            다시 풀기
                          </button>
                        </div>
                      )}
                    </div>

                    <hr className="my-8 border-slate-200 print:border-black" />

                    {/* Q3. 요약문 완성 */}
                    <div>
                      <div className="bg-slate-50 border border-slate-200 p-5 rounded-lg mb-4 print:bg-white print:border-none print:p-0 print:mb-6">
                        <p className="font-bold text-slate-800 mb-2 print:text-black">Q3. 요약문 완성</p>
                        <p className="text-sm text-slate-600 mb-4 print:text-black">다음 글의 내용을 한 문장으로 요약하고자 한다. 빈칸 (A), (B)에 들어갈 말로 가장 적절한 것은?</p>
                        <p className="text-md leading-relaxed bg-white p-4 border border-slate-200 rounded print:border-slate-400 print:rounded-none print:text-black">
                          Before launching a crowdfunding campaign, establishing clear production <span className="font-bold text-blue-800">( A )</span> and setting a funding <span className="font-bold text-blue-800">( B )</span> that covers both the project and investor rewards are essential steps for success.
                        </p>
                      </div>

                      <div className="space-y-2 print:space-y-3">
                        {[
                          { id: 1, text: "(A) delays —— (B) target" },
                          { id: 2, text: "(A) schedules —— (B) goal", isCorrect: true },
                          { id: 3, text: "(A) limitations —— (B) method" },
                          { id: 4, text: "(A) schedules —— (B) limitation" }
                        ].map((choice) => (
                          <button
                            key={choice.id}
                            onClick={() => setQuiz3Answered(choice.id)}
                            disabled={quiz3Answered !== null}
                            className={`w-full text-left p-3 rounded-lg border flex items-center transition-all duration-200
                              print:border-none print:p-1 print:text-black
                              ${quiz3Answered === null ? 'border-slate-200 hover:border-cyan-400 hover:bg-cyan-50' : 
                                (choice.isCorrect ? 'border-green-500 bg-green-50 text-green-800 font-bold shadow-sm' : 
                                  (quiz3Answered === choice.id ? 'border-red-400 bg-red-50 text-red-500' : 'border-slate-100 text-slate-400 opacity-50'))
                              }
                            `}
                          >
                            <span className="w-8 inline-block font-mono text-slate-500 print:text-black">{['①', '②', '③', '④'][choice.id - 1]}</span> 
                            {choice.text}
                            {quiz3Answered !== null && choice.isCorrect && <i className="ph-fill ph-check-circle text-lg ml-auto text-green-500 print:hidden"></i>}
                          </button>
                        ))}
                      </div>

                      {quiz3Answered !== null && (
                        <div className={`mt-4 p-4 rounded-lg text-sm leading-relaxed animate-fade-in print:hidden
                          ${quiz3Answered === 2 ? 'bg-green-100 text-green-900 border border-green-300' : 'bg-red-100 text-red-900 border border-red-300'}
                        `}>
                          <p className="font-bold mb-1">
                            {quiz3Answered === 2 ? '🎉 정답입니다!' : '오답입니다. 다시 한번 생각해 보세요.'}
                          </p>
                          <p>
                            <strong>해설:</strong> 크라우드펀딩을 시작하기 전에는 투자자들에게 보여줄 명확한 생산 <strong>일정(schedules)</strong>을 수립하고, 프로젝트와 보상 비용을 모두 포함하는 자금 조달 <strong>목표(goal)</strong>를 설정하는 것이 필수적입니다.
                          </p>
                          <button onClick={() => setQuiz3Answered(null)} className="mt-3 text-sm underline opacity-70 hover:opacity-100">
                            다시 풀기
                          </button>
                        </div>
                      )}
                    </div>

                  </div>
                </div>

              </div>
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
