<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>THE LOGIC Interactive App - Pieced Together</title>
    
    <meta name="theme-color" content="#1e3a8a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="LOGIC App">
    
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    
    <style>
        @media print {
            body { -webkit-print-color-adjust: exact; print-color-adjust: exact; background-color: white !important; }
            ::-webkit-scrollbar { display: none; }
            .print-show-all { display: block !important; }
            .print-hide { display: none !important; }
            .print-page-break { page-break-before: always; }
        }
        .bg-pattern { background-color: #f0f9ff; background-image: radial-gradient(#bae6fd 1px, transparent 1px); background-size: 20px 20px; }
        .app-like { -webkit-user-select: none; user-select: none; }
        .text-selectable { -webkit-user-select: text; user-select: text; }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #f1f5f9; }
        ::-webkit-scrollbar-thumb { background: #93c5fd; border-radius: 4px; }
    </style>
</head>
<body class="app-like bg-slate-50">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const textData = [
          { id: 1, text: "“Good things come in small packages,” they say.", trans: "사람들은 '좋은 것은 작은 상자에 담겨 온다'라고 말합니다." },
          { id: 2, text: "Indeed, some cultures around the world appreciate the importance of small things, often putting them together to create amazing works of art.", trans: "실제로, 전 세계의 일부 문화권에서는 종종 놀라운 예술 작품을 만들기 위해 그것들을 한데 모으면서 작은 것들의 중요성을 진가를 인정합니다." },
          { id: 3, text: "Often, practical need or creative desire plays a key role in such efforts.", trans: "종종 실용적인 필요나 창의적인 욕구가 그러한 노력에 핵심적인 역할을 합니다.", isHighlight: true, logicPoint: 1 },
          { id: 4, text: "[Stitched Together] Patchwork, whose beauty has long been appreciated in many cultures across the globe, is a type of needlework that involves sewing scraps of fabric together to create a larger piece of art.", trans: "[함께 꿰매어진] 전 세계의 많은 문화권에서 오랫동안 그 아름다움의 진가를 인정받아 온 패치워크(조각보)는 더 큰 예술 작품을 만들기 위해 직물 조각들을 함께 바느질하는 것을 포함하는 바느질의 한 종류입니다." },
          { id: 5, text: "Every culture is proud of its own patterns, including Koreans, who take pride in their unique style, jogakbo.", trans: "모든 문화는 고유한 패턴을 자랑스러워하며, 독특한 스타일인 조각보에 자부심을 갖는 한국인들도 포함됩니다." },
          { id: 6, text: "Created during the Joseon dynasty, it is a type of traditional wrapping cloth made by stitching small pieces of fabric into a large square or rectangle.", trans: "조선 시대에 만들어진 이것은 작은 직물 조각들을 큰 정사각형이나 직사각형으로 꿰매어 만든 전통적인 포장용 천의 한 종류입니다." },
          { id: 7, text: "Frugal women did not want to waste any fabric and found ways to reuse it. However, jogakbo was much more than just repurposing fabric.", trans: "검소한 여성들은 어떤 천도 낭비하고 싶어 하지 않았고 그것을 재사용할 방법을 찾았습니다. 그러나 조각보는 단순히 직물을 다른 용도에 맞게 고치는 것 그 이상이었습니다." },
          { id: 8, text: "It often told the creator’s life story because a finished piece contained fabric scraps from her wedding skirt, her husband’s shirt, and her children’s clothes.", trans: "완성된 작품에는 그녀의 웨딩 치마, 남편의 셔츠, 아이들의 옷에서 나온 직물 조각들이 포함되어 있었기 때문에, 그것은 종종 제작자의 인생 이야기를 들려주었습니다." },
          { id: 9, text: "The practical need to repurpose leftover patches gave birth to a novel art form.", trans: "남은 천 조각들을 다른 용도로 사용하려는 실용적인 필요가 새로운 예술 형태를 탄생시켰습니다.", isHighlight: true, logicPoint: 2 },
          { id: 10, text: "The beauty of jogakbo lies in its design, which results from stitching together patches of various shapes, sizes, and colors in a seemingly improvised manner.", trans: "조각보의 아름다움은 그 디자인에 있는데, 이는 다양한 모양, 크기, 색상의 천 조각들을 겉보기에는 즉흥적인 방식으로 함께 꿰맨 결과입니다." },
          { id: 11, text: "Stitching such random patches into a perfect square or rectangle requires artistic sensitivity, a high level of skill, careful planning, and long hours stitching.", trans: "그러한 무작위의 천 조각들을 완벽한 정사각형이나 직사각형으로 꿰매는 것은 예술적 감수성, 높은 수준의 기술, 세심한 계획, 그리고 오랜 시간의 바느질을 요구합니다." },
          { id: 12, text: "The desire for creative excellence resulted in harmonious combinations of patches in various colors, shapes, and sizes, which have been compared to modern abstract paintings, such as those of Piet Mondrian or Paul Klee.", trans: "창조적 우수성에 대한 욕구는 다양한 색상, 모양, 크기의 천 조각들의 조화로운 결합을 낳았고, 이는 피트 몬드리안이나 파울 클레의 것들과 같은 현대 추상화에 비견되어 왔습니다." },
          { id: 13, text: "Jogakbo was a useful activity in which leftover pieces of cloth were transformed into a pursuit of beauty and utility, eventually becoming an important part of traditional Korean craft art.", trans: "조각보는 남은 천 조각들이 아름다움과 실용성의 추구로 변형되는 유용한 활동이었으며, 결국 전통 한국 공예 예술의 중요한 부분이 되었습니다." },
          { id: 14, text: "[Assembled Together] The Sainte-Chapelle in Paris, France and Nasir al-Mulk mosque in Shiraz, Iran amaze their visitors with brilliant glass window panels through which astonishing light of vigorous colors penetrates.", trans: "[함께 조립된] 프랑스 파리의 생트샤펠과 이란 시라즈의 나시르 알 물크 모스크는 강렬한 색채의 놀라운 빛이 투과하는 찬란한 유리창 패널들로 방문객들을 놀라게 합니다." },
          { id: 15, text: "These panels are called stained-glass windows and are made up of colored pieces of glass assembled together to form large windows.", trans: "이 패널들은 스테인드글라스 창문이라고 불리며 큰 창문을 형성하기 위해 함께 조립된 색유리 조각들로 만들어집니다." },
          { id: 16, text: "In Europe and the Middle East, the techniques for stained-glass windows advanced quickly during the Medieval period, when religious buildings got bigger to accommodate more worshipers and prayers.", trans: "유럽과 중동에서 스테인드글라스 창문 기술은 더 많은 예배자와 기도자를 수용하기 위해 종교 건물이 더 커졌던 중세 시대에 빠르게 발전했습니다." },
          { id: 17, text: "Small pieces of glass assembled next to one another were not only more practical for construction but also able to tell a story.", trans: "서로 옆에 조립된 작은 유리 조각들은 건축에 더 실용적이었을 뿐만 아니라 이야기 또한 들려줄 수 있었습니다." },
          { id: 18, text: "Since most people were illiterate at that time, the images placed on the windows helped them understand religious messages that they might otherwise have been unable to grasp.", trans: "그 당시 대부분의 사람들이 문맹이었기 때문에, 창문에 배치된 이미지들은 그들이 그렇지 않았다면 이해할 수 없었을 종교적 메시지를 이해하도록 도왔습니다.", isHighlight: true, logicPoint: 3 },
          { id: 19, text: "Making a stained-glass window is a process in which intricacy is required. It involves creating durable glass sheets and staining them, cutting them into desired shapes, and assembling them into prepared designs.", trans: "스테인드글라스 창문을 만드는 것은 복잡함이 요구되는 과정입니다. 그것은 내구성 있는 유리판을 만들고 착색하며, 원하는 모양으로 자르고, 준비된 디자인으로 조립하는 것을 포함합니다." },
          { id: 20, text: "Each step requires expert craftspeople working together.", trans: "각 단계는 전문가 공예가들이 함께 작업하는 것을 요구합니다." },
          { id: 21, text: "Though originally used in religious structures, stained-glass windows found their way into a variety of modern buildings, including residential homes.", trans: "비록 원래는 종교 건축물에 사용되었지만, 스테인드글라스 창문은 주거용 주택을 포함한 다양한 현대 건물로 그 길을 찾았습니다." },
          { id: 22, text: "These little pieces are now recognized worldwide as an important form of creative art, whose splendor wouldn’t have been acknowledged without the glass artists’ desire for beauty sparked by a practical need.", trans: "이 작은 조각들은 이제 실용적인 필요에 의해 촉발된 유리 예술가들의 아름다움에 대한 열망이 없었다면 그 웅장함이 인정받지 못했을 창조적 예술의 중요한 형태로 전 세계적으로 인식되고 있습니다." },
          { id: 23, text: "[Strung Together] Throughout the ages and across all cultures, there have been small decorative objects with a hole for threading called beads.", trans: "[함께 꿰어진] 시대를 초월하여 모든 문화에 걸쳐 구슬이라 불리는, 꿰기 위한 구멍이 있는 작은 장식용 물건들이 있어 왔습니다." },
          { id: 24, text: "In its simplest form, beadwork can involve threading a few beads together on a single string to make a simple bracelet or necklace, or on a larger scale, to form beaded bags, clothing, or even wall-hangings.", trans: "가장 단순한 형태에서, 구슬 공예는 간단한 팔찌나 목걸이를 만들기 위해 하나의 줄에 몇 개의 구슬을 함께 꿰는 것을 포함하거나, 더 큰 규모로는 구슬 장식이 있는 가방, 옷, 또는 심지어 벽걸이를 형성하는 것을 포함할 수 있습니다." },
          { id: 25, text: "Beadwork is ancient, evidenced by the findings of beads dating back to the Stone Age. Back then, people strung bones, shells, or rocks together to hang around their neck.", trans: "구슬 공예는 고대부터 있었으며, 석기 시대로 거슬러 올라가는 구슬의 발견에 의해 증명됩니다. 그 당시 사람들은 뼈, 조개껍데기, 또는 돌을 함께 꿰어 목 주위에 걸었습니다." },
          { id: 26, text: "As cultures and societies evolved over time, beadwork became a form of personal expression, a symbol of social class, or even a talisman to drive away bad luck.", trans: "시간이 지남에 따라 문화와 사회가 진화하면서, 구슬 공예는 개인적 표현의 형태, 사회 계급의 상징, 또는 심지어 불운을 쫓는 부적이 되었습니다.", isHighlight: true, logicPoint: 4 },
          { id: 27, text: "Interestingly, some regions have particularly rich traditions. The Ndebele tribe of South Africa, for example, is famed for intricate dresses made of glass beads.", trans: "흥미롭게도 일부 지역은 특히 풍부한 전통을 가지고 있습니다. 예를 들어, 남아프리카의 은데벨레 부족은 유리 구슬로 만든 복잡한 드레스로 유명합니다." },
          { id: 28, text: "Different designs serve as a means of marking different developmental stages of a woman’s life.", trans: "다양한 디자인은 여성의 삶의 다른 발달 단계를 표시하는 수단으로 기능합니다." },
          { id: 29, text: "An unmarried girl may wear a square apron onto which thousands of glass beads were hand-sewn, while a married woman might wear a five-paneled apron, along with beaded necklaces and a beaded cape.", trans: "미혼 소녀는 수천 개의 유리 구슬이 손으로 꿰매어진 정사각형 앞치마를 입을 수 있는 반면, 기혼 여성은 구슬 목걸이와 구슬 망토와 함께 5개의 패널로 된 앞치마를 입을 수 있습니다." },
          { id: 30, text: "Similarly, beadwork is an essential aspect of many Native American cultures. Beadwork powerfully expresses cultural identity, reflecting a sense of continuity across generations.", trans: "이와 유사하게, 구슬 공예는 많은 아메리카 원주민 문화의 본질적인 측면입니다. 구슬 공예는 세대에 걸친 연속성을 반영하며 문화적 정체성을 강력하게 표현합니다." },
          { id: 31, text: "[Pieced Together by Need and Desire] Plato once remarked that “our need will be the real creator.”", trans: "[필요와 욕구에 의해 조각들이 맞춰진] 플라톤은 언젠가 '우리의 필요가 진정한 창조자가 될 것이다'라고 언급했습니다." },
          { id: 32, text: "When need or desire arises, different communities willingly attach small, simple, insignificant everyday objects to one another to generate a new form of creative work that is more beautiful and more practical than the mere sum of its parts.", trans: "필요나 욕구가 발생할 때, 서로 다른 공동체들은 작은, 단순한, 하찮은 일상적인 사물들을 서로 기꺼이 붙여서 부분들의 단순한 합보다 더 아름답고 더 실용적인 새로운 형태의 창의적인 작업을 생성해 냅니다.", isHighlight: true, logicPoint: 5 },
          { id: 33, text: "The Greek philosopher may have recognized that the process for all things creative begins from within, from need and desire, to express artistic instincts or to maximize the utility of things available.", trans: "그리스 철학자는 모든 창의적인 것들을 위한 과정이 예술적 본능을 표현하거나 이용 가능한 것들의 효용을 극대화하려는 필요와 욕구에서 비롯되어 내면에서 시작된다는 것을 인식했을지도 모릅니다." },
          { id: 34, text: "Cultures may vary on the surface, but they all seem to share some common elements, often universal and essential, rooted deep in human nature.", trans: "문화는 겉보기에는 다를 수 있지만, 그들은 모두 인간 본성에 깊이 뿌리박힌, 종종 보편적이고 본질적인 몇 가지 공통 요소들을 공유하는 것처럼 보입니다." }
        ];

        const logicMapSteps = [
          { point: 1, title: "THE PREMISE", desc: "Need or desire turns small things into art", color: "bg-red-100 border-red-400 text-red-800", icon: <i className="ph-fill ph-lightbulb-filament text-xl mb-2"></i> },
          { point: 2, title: "STITCHED TOGETHER", desc: "Jogakbo: Frugality + Storytelling = Beauty & Utility", color: "bg-blue-100 border-blue-400 text-blue-800", icon: <i className="ph-fill ph-scissors text-xl mb-2"></i> },
          { point: 3, title: "ASSEMBLED TOGETHER", desc: "Stained-glass: Construction + Religious messages", color: "bg-cyan-100 border-cyan-400 text-cyan-800", icon: <i className="ph-fill ph-squares-four text-xl mb-2"></i> },
          { point: 4, title: "STRUNG TOGETHER", desc: "Beadwork: Social status & Cultural identity", color: "bg-teal-100 border-teal-400 text-teal-800", icon: <i className="ph-fill ph-circles-three-plus text-xl mb-2"></i> },
          { point: 5, title: "CONCLUSION", desc: "Art stems from the universal human nature of need", color: "bg-emerald-100 border-emerald-400 text-emerald-800", icon: <i className="ph-fill ph-globe text-xl mb-2"></i> }
        ];

        function App() {
          const [isAuthenticated, setIsAuthenticated] = useState(false);
          const [passwordInput, setPasswordInput] = useState("");
          const [loginError, setLoginError] = useState("");
          
          const CORRECT_PASSWORD = "Made by Lee";
          const itemRefs = useRef({});

          const handleLoginSubmit = (e) => {
            e.preventDefault();
            if (passwordInput === CORRECT_PASSWORD) {
              setIsAuthenticated(true);
              setLoginError("");
            } else {
              setLoginError("올바르지 않은 암호입니다. 다시 확인해 주세요.");
              setPasswordInput("");
            }
          };

          const [activeTab, setActiveTab] = useState('text');
          const [activeLogic, setActiveLogic] = useState(null);
          
          const handleLogicClick = (point) => {
              setActiveLogic(activeLogic === point ? null : point);
              setActiveTab('text'); 
          };

          useEffect(() => {
              if (activeTab === 'text' && activeLogic !== null) {
                  const targetItem = textData.find(item => item.logicPoint === activeLogic);
                  if (targetItem && itemRefs.current[targetItem.id]) {
                      setTimeout(() => {
                          itemRefs.current[targetItem.id].scrollIntoView({ behavior: 'smooth', block: 'center' });
                      }, 150);
                  }
              }
          }, [activeLogic, activeTab]);
          
          const [quiz1Answered, setQuiz1Answered] = useState(null);
          const [quiz2Answered, setQuiz2Answered] = useState(null);
          const [quiz3Answered, setQuiz3Answered] = useState(null);

          const handlePrint = () => { window.print(); };

          if (!isAuthenticated) {
            return (
              <div className="min-h-screen bg-pattern flex items-center justify-center p-4">
                <div className="bg-white p-8 md:p-10 rounded-2xl shadow-2xl max-w-md w-full text-center border-t-8 border-blue-800">
                  <div className="mx-auto bg-blue-100 w-16 h-16 rounded-full flex items-center justify-center mb-6">
                    <i className="ph-fill ph-lock-key text-3xl text-blue-800"></i>
                  </div>
                  <h2 className="text-2xl font-serif font-bold text-slate-800 mb-2">THE LOGIC INTERACTIVE</h2>
                  <p className="text-blue-600 font-bold mb-6 text-sm">Pieced Together</p>
                  
                  <div className="bg-slate-50 border border-slate-200 rounded-lg p-4 mb-6">
                    <p className="text-slate-600 text-sm leading-relaxed">
                      이 콘텐츠는 <strong>Lee 선생님</strong>이 기획하고 제작한<br/>교육용 창작물입니다. (무단 배포 금지)<br/>
                      <span className="inline-block mt-2 font-medium text-slate-700">열람을 위해 선생님이 안내한 암호를 입력해 주세요.</span>
                    </p>
                  </div>

                  <form onSubmit={handleLoginSubmit} className="flex flex-col gap-3">
                    <input type="text" placeholder="접근 암호 (예: Made by Lee)" className="border border-slate-300 p-3 rounded-lg focus:outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-200 transition-all text-center font-medium text-selectable" value={passwordInput} onChange={(e) => setPasswordInput(e.target.value)} />
                    {loginError && <p className="text-red-500 text-sm font-medium animate-pulse">{loginError}</p>}
                    <button type="submit" className="bg-blue-900 hover:bg-blue-800 text-white font-bold py-3 rounded-lg transition-colors mt-2 shadow-md flex items-center justify-center gap-2">
                      <i className="ph-bold ph-key"></i> 잠금 해제
                    </button>
                  </form>
                </div>
              </div>
            );
          }

          return (

                                                        ${quiz1Answered === null ? 'border-slate-200 hover:border-blue-400 hover:bg-blue-50' : 
                                                        (choice.isCorrect ? 'border-green-500 bg-green-50 text-green-800 shadow-sm' : 
                                                        (quiz1Answered === choice.id ? 'border-red-400 bg-red-50 text-red-600' : 'border-slate-100 text-slate-400 opacity-50'))}`}
                                                >
                                                    <span className="w-8 inline-block font-mono text-slate-500 print:text-black">{['①', '②', '③', '④'][choice.id - 1]}</span> {choice.text}
                                                </button>
                                            ))}
                                        </div>
                                        {quiz1Answered !== null && (
                                            <div className={`mt-4 p-4 rounded-lg text-sm leading-relaxed print:hidden ${quiz1Answered === 3 ? 'bg-green-50 text-green-900 border border-green-200' : 'bg-red-50 text-red-900 border border-red-200'}`}>
                                                <p className="font-bold mb-1">{quiz1Answered === 3 ? '🎉 정답입니다!' : '오답입니다.'}</p>
                                                <p><strong>해설:</strong> 29번 문장에 따르면 미혼 소녀는 정사각형 앞치마를, 기혼 여성은 5개의 패널로 된 앞치마를 입는 등 다른 디자인을 통해 삶의 발달 단계를 표시하므로 3번은 본문과 일치하지 않습니다.</p>
                                            </div>
                                        )}
                                    </div>

                                    <div className="border-t border-slate-200 pt-8 print:border-black print:pt-4">
                                        <div className="bg-slate-50 border border-slate-200 p-5 rounded-lg mb-4 print:bg-white print:border-none print:p-0 print:mb-4">
                                            <p className="font-bold text-slate-800 mb-2 print:text-black">Q2. 문맥상 어휘 추론</p>
                                            <p className="text-sm text-slate-600 mb-4 print:text-black">다음 밑줄 친 (A), (B), (C) 중 문맥상 알맞은 낱말로 가장 적절한 것은?</p>
                                            <p className="text-md leading-relaxed bg-white p-4 border border-slate-200 rounded print:border-slate-400 print:rounded-none print:text-black">
                                                Frugal women did not want to waste any fabric and found ways to <strong>(A) [ discard / reuse ]</strong> it. ... helped them understand religious messages that they might otherwise have been unable to <strong>(B) [ grasp / ignore ]</strong>. ... beadwork became a form of personal expression, a symbol of social class, or even a talisman to drive <strong>(C) [ away / in ]</strong> bad luck.
                                            </p>
                                        </div>
                                        <div className="space-y-2 print:space-y-3">
                                            {[
                                                { id: 1, text: "(A) discard — (B) grasp — (C) away" },
                                                { id: 2, text: "(A) discard — (B) ignore — (C) in" },
                                                { id: 3, text: "(A) reuse — (B) grasp — (C) away", isCorrect: true },
                                                { id: 4, text: "(A) reuse — (B) ignore — (C) in" }
                                            ].map((choice) => (
                                                <button key={choice.id} onClick={() => setQuiz2Answered(choice.id)} disabled={quiz2Answered !== null}
                                                    className={`w-full text-left p-4 rounded-lg border font-medium transition-all duration-200 print:border-none print:p-1 print:text-black
                                                        ${quiz2Answered === null ? 'border-slate-200 hover:border-blue-400 hover:bg-blue-50' : 
                                                        (choice.isCorrect ? 'border-green-500 bg-green-50 text-green-800 shadow-sm' : 
                                                        (quiz2Answered === choice.id ? 'border-red-400 bg-red-50 text-red-600' : 'border-slate-100 text-slate-400 opacity-50'))}`}
                                                >
                                                    <span className="w-8 inline-block font-mono text-slate-500 print:text-black">{['①', '②', '③', '④'][choice.id - 1]}</span> {choice.text}
                                                </button>
                                            ))}
                                        </div>
                                        {quiz2Answered !== null && (
                                            <div className={`mt-4 p-4 rounded-lg text-sm leading-relaxed print:hidden ${quiz2Answered === 3 ? 'bg-green-50 text-green-900 border border-green-200' : 'bg-red-50 text-red-900 border border-red-200'}`}>
                                                <p className="font-bold mb-1">{quiz2Answered === 3 ? '🎉 정답입니다!' : '오답입니다.'}</p>
                                                <p><strong>해설:</strong> 검소한 여성들은 천을 낭비하지 않고 '재사용(reuse)'할 방법을 찾았습니다. 이미지가 없었다면 문맹인 사람들은 종교적 메시지를 '이해(grasp)'할 수 없었을 것입니다. 부적은 불운을 '쫓아내는(drive away)' 역할을 합니다.</p>
                                            </div>
                                        )}
                                    </div>
                                    
                                    <div className="border-t border-slate-200 pt-8 print:border-black print:pt-4">
                                        <div className="bg-slate-50 border border-slate-200 p-5 rounded-lg mb-4 print:bg-white print:border-none print:p-0 print:mb-4">
                                            <p className="font-bold text-slate-800 mb-2 print:text-black">Q3. 글의 제목 파악</p>
                                            <p className="text-sm text-slate-600 print:text-black">윗글의 제목으로 가장 적절한 것은?</p>
                                        </div>
                                        <div className="space-y-2 print:space-y-3">
                                            {[
                                                { id: 1, text: "The History of Stained-Glass Windows in Europe" },
                                                { id: 2, text: "Pieced Together: How Human Need and Desire Create Art", isCorrect: true },
                                                { id: 3, text: "Jogakbo: The Most Expensive Traditional Korean Art" },
                                                { id: 4, text: "Why Ancient People Started Wearing Bead Necklaces" }
                                            ].map((choice) => (
                                                <button key={choice.id} onClick={() => setQuiz3Answered(choice.id)} disabled={quiz3Answered !== null}
                                                    className={`w-full text-left p-4 rounded-lg border font-medium transition-all duration-200 print:border-none print:p-1 print:text-black
                                                        ${quiz3Answered === null ? 'border-slate-200 hover:border-blue-400 hover:bg-blue-50' : 
                                                        (choice.isCorrect ? 'border-green-500 bg-green-50 text-green-800 shadow-sm' : 
                                                        (quiz3Answered === choice.id ? 'border-red-400 bg-red-50 text-red-600' : 'border-slate-100 text-slate-400 opacity-50'))}`}
                                                >
                                                    <span className="w-8 inline-block font-mono text-slate-500 print:text-black">{['①', '②', '③', '④'][choice.id - 1]}</span> {choice.text}
                                                </button>
                                            ))}
                                        </div>
                                        {quiz3Answered !== null && (
                                            <div className={`mt-4 p-4 rounded-lg text-sm leading-relaxed print:hidden ${quiz3Answered === 2 ? 'bg-green-50 text-green-900 border border-green-200' : 'bg-red-50 text-red-900 border border-red-200'}`}>
                                                <p className="font-bold mb-1">{quiz3Answered === 2 ? '🎉 정답입니다!' : '오답입니다.'}</p>
                                                <p><strong>해설:</strong> 이 글은 조각보, 스테인드글라스, 구슬 공예를 예시로 들어, 작고 하찮은 물건들이 어떻게 인간의 '필요'와 '욕구'를 통해 아름답고 의미 있는 '예술(작품)'로 창조되는지 설명하고 있으므로 2번이 가장 적절합니다.</p>
                                            </div>
                                        )}
                                    </div>
                                </div>
                            </div>
                        </section>
                    </div>
                </main>

                <nav className="md:hidden fixed bottom-0 w-full bg-white border-t border-slate-200 flex justify-around p-2 pb-safe z-30 shadow-[0_-5px_10px_rgba(0,0,0,0.05)] print:hidden">
                    <button onClick={() => setActiveTab('text')} className={`flex flex-col items-center p-2 min-w-[64px] transition-colors ${activeTab === 'text' ? 'text-blue-700' : 'text-slate-400 hover:text-slate-600'}`}>
                        <i className={`${activeTab === 'text' ? 'ph-fill' : 'ph'} ph-book-open text-2xl mb-1`}></i>
                        <span className="text-[10px] font-bold">지문 분석</span>
                    </button>
                    <button onClick={() => setActiveTab('syntax')} className={`flex flex-col items-center p-2 min-w-[64px] transition-colors ${activeTab === 'syntax' ? 'text-blue-700' : 'text-slate-400 hover:text-slate-600'}`}>
                        <i className={`${activeTab === 'syntax' ? 'ph-fill' : 'ph'} ph-highlighter-circle text-2xl mb-1`}></i>
                        <span className="text-[10px] font-bold">핵심 구문</span>
                    </button>
                    <button onClick={() => setActiveTab('map')} className={`flex flex-col items-center p-2 min-w-[64px] transition-colors ${activeTab === 'map' ? 'text-blue-700' : 'text-slate-400 hover:text-slate-600'}`}>
                        <i className={`${activeTab === 'map' ? 'ph-fill' : 'ph'} ph-git-merge text-2xl mb-1`}></i>
                        <span className="text-[10px] font-bold">논리 구조도</span>
                    </button>
                    <button onClick={() => setActiveTab('quiz')} className={`flex flex-col items-center p-2 min-w-[64px] transition-colors ${activeTab === 'quiz' ? 'text-blue-700' : 'text-slate-400 hover:text-slate-600'}`}>
                        <i className={`${activeTab === 'quiz' ? 'ph-fill' : 'ph'} ph-check-square-offset text-2xl mb-1`}></i>
                        <span className="text-[10px] font-bold">실전 문제</span>
                    </button>
                </nav>
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
