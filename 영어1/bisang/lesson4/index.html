<body class="app-like bg-slate-50">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const textData = [
          // Part 1: The Shift to Farming
          { id: 1, text: "Traditionally, fishers went out to sea with fishing nets or long lines on boats to catch fish.", trans: "전통적으로, 어부들은 물고기를 잡기 위해 배에 그물이나 주낙을 싣고 바다로 나갔다." },
          { id: 2, text: "They took advantage of their experience gained through trial and error, through observation, and through knowledge passed down from previous generations.", trans: "그들은 시행착오, 관찰, 그리고 이전 세대부터 전해 내려온 지식을 통해 얻은 경험을 활용했다." },
          { id: 3, text: "With wild fish stocks gradually declining due to overfishing and the changing climate, more fishers are turning to farming instead of casting nets or lines.", trans: "남획과 기후 변화로 야생 어족 자원이 점차 감소함에 따라, 더 많은 어부들이 그물이나 낚싯줄을 던지는 대신 양식업으로 돌아서고 있다.", isHighlight: true, logicPoint: 1 },
          { id: 4, text: "In fact, according to a UN report, about 49% of the fish consumed worldwide in 2020 came from fish farms, not from the wild.", trans: "사실, UN 보고서에 따르면, 2020년 전 세계에서 소비된 물고기의 약 49%가 야생이 아닌 양식장에서 왔다." },
          { id: 5, text: "This figure is expected to continue to grow, increasing to 62% by 2030.", trans: "이 수치는 계속 증가하여 2030년에는 62%까지 늘어날 것으로 예상된다." },
          { id: 6, text: "With the arrival of smart fish farming technology driven by artificial intelligence (AI), fish farmers are able to provide healthy, affordable seafood to families everywhere.", trans: "인공지능(AI)이 이끄는 스마트 양식 기술의 도래와 함께, 양식업자들은 어디에서나 가족들에게 건강하고 저렴한 해산물을 제공할 수 있게 되었다." },

          // Part 2: Diagnosis & Tech (Sea lice & AI monitoring)
          { id: 7, text: <span>An essential element in providing healthy fish to consumers is the fish farmers’ ability to detect and prevent <span className="italic font-medium">sea lice</span>, a significant threat to fish health and profitability.</span>, trans: "소비자들에게 건강한 물고기를 제공하는 데 있어 필수적인 요소는 물고기의 건강과 수익성에 중대한 위협이 되는 바다이를 탐지하고 예방하는 양식업자들의 능력이다." },
          { id: 8, text: <span>One of the most modern methods to do this is through the power of <span className="italic font-medium">computer vision</span> and precision sensors, allowing fish farmers to identify and track diseases before they spread.</span>, trans: "이를 수행하는 가장 현대적인 방법 중 하나는 컴퓨터 비전과 정밀 센서의 힘을 통해서이며, 이는 양식업자들이 질병이 퍼지기 전에 식별하고 추적할 수 있게 해준다.", isHighlight: true, logicPoint: 2 },
          { id: 9, text: "An aquaculture system equipped with high-precision underwater tools has already been developed in Norway.", trans: "고정밀 수중 도구가 장착된 양식 시스템이 이미 노르웨이에서 개발되었다." },
          { id: 10, text: <span>It can hold up to 150,000 salmon in a sea cage, regularly inducing each fish into a tube where high-resolution cameras and sensors record everything about each individual salmon, including their overall shapes and dot patterns, their weight and growth rate, as well as any signs of <span className="italic font-medium">sea lice</span>, physical wounds, or abnormalities.</span>, trans: "그것은 바다 가두리에 최대 15만 마리의 연어를 수용할 수 있으며, 규칙적으로 각 물고기를 튜브로 유도하여 고해상도 카메라와 센서가 각각의 개별 연어에 대한 모든 것, 즉 전반적인 모양과 점 패턴, 무게와 성장 속도는 물론 바다이, 신체적 상처 또는 이상 징후를 기록하게 한다." },
          { id: 11, text: "Every detail is registered in the fish’s health record, along with millions of images and figures.", trans: "모든 세부 사항은 수백만 개의 이미지 및 수치와 함께 물고기의 건강 기록부에 등록된다." },
          { id: 12, text: "Such huge amounts of data and other information are taken care of by the AI system.", trans: "그렇게 엄청난 양의 데이터와 기타 정보는 AI 시스템에 의해 처리된다." },
          { id: 13, text: <span>A computer system with <span className="italic font-medium">deep learning</span> capabilities is able to track and record fish behavior better than humans can, especially when the system is trained with enough relevant data.</span>, trans: "딥러닝 기능을 갖춘 컴퓨터 시스템은 특히 충분한 관련 데이터로 훈련되었을 때 인간보다 물고기의 행동을 더 잘 추적하고 기록할 수 있다." },
          { id: 14, text: <span>It can distinguish and identify one fish from another and diagnose whether a small speck is dirt or <span className="italic font-medium">sea lice</span>, and this information is entered into the fish’s health record.</span>, trans: "그것은 한 물고기를 다른 물고기와 구별 및 식별할 수 있고, 작은 얼룩이 먼지인지 바다이인지 진단할 수 있으며, 이 정보는 물고기의 건강 기록부에 입력된다." },
          { id: 15, text: "In a sense, the fish farm is monitored by an AI doctor on duty 24/7.", trans: "어떤 의미에서, 이 양식장은 연중무휴로 근무하는 AI 의사에 의해 모니터링된다." },
          { id: 16, text: "Farmers can then determine when they should take action, such as when to separate an abnormal group from the rest or spread out the fish population to reduce density, without resorting to harsh chemical treatments, which can harm the fish, the environment, and even the consumer.", trans: "그런 다음 양식업자들은 물고기, 환경, 심지어 소비자에게 해를 끼칠 수 있는 가혹한 화학적 치료법에 의존하지 않고, 비정상적인 무리를 나머지 무리와 언제 분리할지 또는 밀도를 줄이기 위해 언제 개체군을 분산시킬지 등 조치를 취해야 할 시기를 결정할 수 있다." },
          { id: 17, text: "In addition, all this data from cameras and sensors can be utilized for various applications and purposes.", trans: "게다가 카메라와 센서에서 얻은 이 모든 데이터는 다양한 응용 프로그램과 목적을 위해 활용될 수 있다." },

          // Part 3: Real-time Monitoring & Feeding Optimization
          { id: 18, text: "One of the most noticeable and effective applications is real-time monitoring of fish behavior and other environmental changes, which serves multiple purposes, including diagnosing diseases in individual fish.", trans: "가장 눈에 띄고 효과적인 응용 중 하나는 개별 물고기의 질병 진단을 포함하여 다목적으로 사용되는 물고기 행동 및 기타 환경 변화의 실시간 모니터링이다.", isHighlight: true, logicPoint: 3 },
          { id: 19, text: "By processing large sets of data, an AI system can detect and recognize unusual group behaviors of an entire school of fish, possibly caused by changes in water quality, temperature, or oxygen levels surrounding the cage.", trans: "대량의 데이터 세트를 처리함으로써, AI 시스템은 가두리 주변의 수질, 온도 또는 산소 수준의 변화로 인해 발생할 수 있는 물고기 떼 전체의 비정상적인 집단 행동을 감지하고 인식할 수 있다." },
          { id: 20, text: "It can also ensure the quality of cage nets to prevent fish from escaping or predators from invading and protect the surrounding habitat.", trans: "그것은 또한 물고기가 탈출하거나 포식자가 침입하는 것을 막고 주변 서식지를 보호하기 위해 가두리 그물의 품질을 보장할 수 있다." },
          { id: 21, text: "The system can also tell farmers exactly when to feed the fish by identifying patterns of behavior that an individual fish or the school exhibits when they are hungry.", trans: "이 시스템은 개별 물고기나 무리가 배고플 때 보이는 행동 패턴을 식별함으로써 양식업자들에게 언제 물고기에게 먹이를 주어야 할지 정확히 알려줄 수도 있다." },
          { id: 22, text: "This is how farmers can accurately determine optimal feeding times and amounts.", trans: "이것이 양식업자들이 최적의 먹이 공급 시간과 양을 정확하게 결정할 수 있는 방법이다." },
          { id: 23, text: "The right amount of food at the right time minimizes cost, reduces waste and pollution, and maximizes fish growth rates.", trans: "적절한 시기에 적절한 양의 먹이는 비용을 최소화하고 낭비와 오염을 줄이며 물고기의 성장 속도를 극대화한다." },
          { id: 24, text: "Given the fact that feeding constitutes more than 50% of a fish farm’s operational budget, this precise feeding approach will ultimately contribute to a more affordable supply of fish for consumers as well as efficient and sustainable aquaculture operations in general.", trans: "사료 공급이 양식장 운영 예산의 50% 이상을 차지한다는 사실을 감안할 때, 이러한 정밀한 사료 공급 접근 방식은 전반적으로 효율적이고 지속 가능한 양식업 운영뿐만 아니라 소비자들에게 더 저렴한 물고기 공급에 궁극적으로 기여할 것이다." },

          // Part 4: Expansion to Seaweed & Robotics
          { id: 25, text: "AI continues to advance in aquaculture to extend beyond caged fish.", trans: "양식업에서 AI는 가두리 양식 물고기를 넘어 계속해서 발전하고 있다.", isHighlight: true, logicPoint: 4 },
          { id: 26, text: "In particular, smart fish farming technologies can be applied to seaweed farming.", trans: "특히, 스마트 양식 기술은 해조류 양식에도 적용될 수 있다." },
          { id: 27, text: "Seaweed is as valuable a source of food as fish.", trans: "해조류는 물고기만큼이나 가치 있는 식량 공급원이다." },
          { id: 28, text: "It’s also a source of fuel and an important ingredient for cosmetics, fertilizers, and other medicinal and industrial products.", trans: "그것은 또한 연료의 공급원이자 화장품, 비료 및 기타 의학용 및 산업용 제품의 중요한 성분이다." },
          { id: 29, text: <span>As such, ongoing research is exploring various ways AI can help in the seaweed industry, including the use of <span className="italic font-medium">autonomous underwater vehicles (AUVs)</span> and <span className="italic font-medium">swarm robotics</span>.</span>, trans: "따라서, 자율 수중 로봇(AUVs)과 군집 로봇 공학의 사용을 포함하여 AI가 해조류 산업에서 도울 수 있는 다양한 방법들을 현재의 연구가 탐구하고 있다." },
          { id: 30, text: <span>Using cameras and sensors, <span className="italic font-medium">AUVs</span> can do many of the analytical and diagnostic tasks on seaweed farms.</span>, trans: "카메라와 센서를 사용하여 AUV는 해조류 양식장에서 많은 분석 및 진단 작업을 수행할 수 있다." },
          { id: 31, text: <span><span className="italic font-medium">Swarm robots</span>, or many small robots working together, can swim in and around seaweed farms to collect data and then make decisions on how to deal with problems that arise.</span>, trans: "군집 로봇, 즉 함께 일하는 많은 작은 로봇들은 해조류 양식장 안팎을 헤엄치며 데이터를 수집한 다음 발생하는 문제를 어떻게 처리할지에 대한 결정을 내릴 수 있다." },
          { id: 32, text: <span>Single larger robots or even humans may be available to take care of the physical labor from removing harmful weeds to harvesting; however, <span className="italic font-medium">swarm robots</span> may be more efficient and cost-effective.</span>, trans: "단일 대형 로봇이나 심지어 인간도 해로운 잡초 제거부터 수확까지 육체 노동을 처리할 수 있지만, 군집 로봇이 더 효율적이고 비용 효율적일 수 있다." },

          // Part 5: Conclusion
          { id: 33, text: "The potential of AI in aquaculture is vast, and it brings a more sustainable and technologically driven future for fish and seaweed farming.", trans: "양식업에서 AI의 잠재력은 방대하며, 그것은 어류 및 해조류 양식에 있어 더 지속 가능하고 기술 주도적인 미래를 가져온다.", isHighlight: true, logicPoint: 5 },
          { id: 34, text: "Families that gather together, eagerly anticipating a healthy seafood dinner, may not be aware of the carefully monitored fish and seaweed farms or the cutting-edge AI technology involved in getting food to their table.", trans: "건강한 해산물 저녁 식사를 간절히 기대하며 모이는 가족들은 그들의 식탁에 음식을 올리기 위해 관여된 신중하게 모니터링되는 어류 및 해조류 양식장이나 최첨단 AI 기술에 대해 알지 못할 수도 있다." },
          { id: 35, text: "However, the process of doing so is evidence of the considerable amount of investment in sustainable, high-quality aquaculture with AI.", trans: "하지만, 그렇게 하는 과정은 AI를 활용한 지속 가능하고 고품질의 양식업에 대한 상당한 양의 투자의 증거이다." },
          { id: 36, text: "With AI as an ally, the future of the oceans and the nourishment of humanity is just a little bit more secure.", trans: "AI를 동맹으로 삼아, 해양의 미래와 인류의 영양 공급은 조금 더 안전해진다." }
        ];

        const logicMapSteps = [
          { id: 'shift', title: "THE SHIFT (패러다임의 전환)", desc: "전통 어업에서 AI 스마트 양식업으로의 변화", color: "bg-blue-100 border-blue-400 text-blue-800", icon: <i className="ph-fill ph-boat text-xl mb-2"></i> },
          { id: 'diagnosis', title: "DIAGNOSIS (진단 및 관리)", desc: "카메라/센서를 통한 개체 식별 및 질병 예방", color: "bg-indigo-100 border-indigo-400 text-indigo-800", icon: <i className="ph-fill ph-heartbeat text-xl mb-2"></i> },
          { id: 'opt', title: "OPTIMIZATION (효율성 최적화)", desc: "실시간 모니터링을 통한 사료 급여 최적화", color: "bg-teal-100 border-teal-400 text-teal-800", icon: <i className="ph-fill ph-chart-line-up text-xl mb-2"></i> },
          { id: 'expand', title: "EXPANSION (기술의 확장)", desc: "해조류 양식과 자율 로봇(AUVs) 및 군집 로봇", color: "bg-cyan-100 border-cyan-400 text-cyan-800", icon: <i className="ph-fill ph-robot text-xl mb-2"></i> },
          { id: 'conclusion', title: "CONCLUSION (최종 결론)", desc: "AI를 통한 지속 가능하고 안전한 식량 자원 확보", color: "bg-emerald-100 border-emerald-500 text-emerald-900", icon: <i className="ph-fill ph-globe-hemisphere-west text-xl mb-2"></i> }
        ];

        function App() {
          const [isAuthenticated, setIsAuthenticated] = useState(false);
          const [passwordInput, setPasswordInput] = useState("");
          const [loginError, setLoginError] = useState("");
          
          const CORRECT_PASSWORD = "Made by Lee";

          const itemRefs = useRef({});

          const handleLoginSubmit = (e) => {
            e.preventDefault();
            if (passwordInput === CORRECT_PASSWORD) {
              setIsAuthenticated(true);
              setLoginError("");
            } else {
              setLoginError("올바르지 않은 암호입니다. 다시 확인해 주세요.");
              setPasswordInput("");
            }
          };

          const [activeTab, setActiveTab] = useState('text');
          const [activeLogic, setActiveLogic] = useState(null);
          
          const handleLogicClick = (point) => {
              setActiveLogic(activeLogic === point ? null : point);
              setActiveTab('text'); 
          };

          useEffect(() => {
              if (activeTab === 'text' && activeLogic !== null) {
                  const targetItem = textData.find(item => item.logicPoint === activeLogic);
                  if (targetItem && itemRefs.current[targetItem.id]) {
                      setTimeout(() => {
                          itemRefs.current[targetItem.id].scrollIntoView({ behavior: 'smooth', block: 'center' });
                      }, 150);
                  }
              }
          }, [activeLogic, activeTab]);

          const [quiz1Answered, setQuiz1Answered] = useState(null);
          const [quiz2Answered, setQuiz2Answered] = useState(null);
          const [quiz3Answered, setQuiz3Answered] = useState(null);
          const [quiz4Answered, setQuiz4Answered] = useState(null);
          const [quiz5Answered, setQuiz5Answered] = useState(null);
          const [quiz6Answered, setQuiz6Answered] = useState(null);

          const handlePrint = () => { window.print(); };

          if (!isAuthenticated) {
            return (
              <div className="min-h-screen bg-pattern flex items-center justify-center p-4">
                <div className="bg-white p-8 md:p-10 rounded-2xl shadow-2xl max-w-md w-full text-center border-t-8 border-emerald-700">
                  <div className="mx-auto bg-emerald-100 w-16 h-16 rounded-full flex items-center justify-center mb-6">
                    <i className="ph-fill ph-lock-key text-3xl text-emerald-700"></i>
                  </div>
                  <h2 className="text-2xl font-serif font-bold text-slate-800 mb-2">THE LOGIC INTERACTIVE</h2>
                  <p className="text-emerald-600 font-bold mb-6 text-sm">Intelligent Aquaculture</p>
                  
                  <div className="bg-slate-50 border border-slate-200 rounded-lg p-4 mb-6">
                    <p className="text-slate-600 text-sm leading-relaxed">
                      이 콘텐츠는 <strong>Lee 선생님</strong>이 기획하고 제작한<br/>교육용 창작물입니다. (무단 배포 금지)<br/>
                      <span className="inline-block mt-2 font-medium text-slate-700">열람을 위해 선생님이 안내한 암호를 입력해 주세요.</span>

                    <button onClick={() => setActiveTab('syntax')} className={`flex flex-col items-center p-2 min-w-[64px] transition-colors ${activeTab === 'syntax' ? 'text-emerald-700' : 'text-slate-400 hover:text-slate-600'}`}>
                        <i className={`${activeTab === 'syntax' ? 'ph-fill' : 'ph'} ph-highlighter-circle text-2xl mb-1`}></i>
                        <span className="text-[10px] font-bold">핵심 구문</span>
                    </button>
                    <button onClick={() => setActiveTab('map')} className={`flex flex-col items-center p-2 min-w-[64px] transition-colors ${activeTab === 'map' ? 'text-emerald-700' : 'text-slate-400 hover:text-slate-600'}`}>
                        <i className={`${activeTab === 'map' ? 'ph-fill' : 'ph'} ph-git-merge text-2xl mb-1`}></i>
                        <span className="text-[10px] font-bold">논리 구조도</span>
                    </button>
                    <button onClick={() => setActiveTab('quiz')} className={`flex flex-col items-center p-2 min-w-[64px] transition-colors ${activeTab === 'quiz' ? 'text-emerald-700' : 'text-slate-400 hover:text-slate-600'}`}>
                        <i className={`${activeTab === 'quiz' ? 'ph-fill' : 'ph'} ph-check-square-offset text-2xl mb-1`}></i>
                        <span className="text-[10px] font-bold">실전 문제</span>
                    </button>
                </nav>
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
