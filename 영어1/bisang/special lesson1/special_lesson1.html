<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>THE LOGIC Interactive App - Approach to a Healthy Life</title>
    
    <meta name="theme-color" content="#1e3a8a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="LOGIC App">
    
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    
    <style>
        @media print {
            body { -webkit-print-color-adjust: exact; print-color-adjust: exact; background-color: white !important; }
            ::-webkit-scrollbar { display: none; }
            .print-show-all { display: block !important; }
            .print-hide { display: none !important; }
            .print-page-break { page-break-before: always; }
        }
        .bg-pattern { background-color: #f0f9ff; background-image: radial-gradient(#bae6fd 1px, transparent 1px); background-size: 20px 20px; }
        .app-like { -webkit-user-select: none; user-select: none; }
        .text-selectable { -webkit-user-select: text; user-select: text; }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #f1f5f9; }
        ::-webkit-scrollbar-thumb { background: #93c5fd; border-radius: 4px; }
    </style>
</head>
<body class="app-like bg-slate-50">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const textData = [
          // Part 1: Observation
          { id: 1, text: "[London Transport Workers Study] In the busy London streets of 1953, a special study was conducted.", trans: "[런던 대중교통 노동자 연구] 1953년 런던의 번화한 거리에서 특별한 연구가 수행되었습니다." },
          { id: 2, text: "Scientists observed more than 31,000 people who had various jobs on buses and trains.", trans: "과학자들은 버스와 기차에서 다양한 직업을 가진 31,000명 이상의 사람들을 관찰했습니다." },
          { id: 3, text: "Some jobs demanded lots of moving around, like ticket collectors, while others, like drivers, didn’t require much movement.", trans: "검표원처럼 일부 직업은 많은 움직임을 요구한 반면, 운전사와 같은 다른 직업들은 많은 움직임을 필요로 하지 않았습니다." },
          { id: 4, text: "What was interesting was that the workers with more active jobs had fewer heart problems than those who sat a lot.", trans: "흥미로웠던 점은 활동적인 직업을 가진 노동자들이 많이 앉아 있는 노동자들보다 심장 문제가 더 적었다는 것입니다.", isHighlight: true, logicPoint: 1 },
          { id: 5, text: "This implied that jobs requiring more moving around were healthier for workers than those jobs that didn’t. What could account for the difference in their health outcomes?", trans: "이것은 더 많은 움직임을 요구하는 직업이 그렇지 않은 직업보다 노동자들에게 더 건강하다는 것을 암시했습니다. 무엇이 그들의 건강 결과의 차이를 설명할 수 있을까요?" },

          // Part 2: Cause (Energy Formula)
          { id: 6, text: "[Three Ways Energy Is Used] The answer to this requires a simple formula and a little bit of math.", trans: "[에너지가 사용되는 세 가지 방법] 이것에 대한 답은 간단한 공식과 약간의 수학을 필요로 합니다." },
          { id: 7, text: "The formula is an easy equation: the total energy expenditure of the body equals 「BMR + TEF + PA」.", trans: "그 공식은 쉬운 방정식입니다: 신체의 총 에너지 소비량은 「BMR + TEF + PA」와 같습니다." },
          { id: 8, text: "In the human body, the energy from different foods people eat is used to keep everything running smoothly.", trans: "인체에서 사람들이 먹는 다양한 음식으로부터 얻은 에너지는 모든 것이 원활하게 돌아가도록 유지하는 데 사용됩니다." },
          { id: 9, text: "The basal metabolic rate (BMR) is a measurement of how much energy is needed to stay alive; the thermic effect of food (TEF) is a measurement of the energy used to consume and absorb energy from food; and physical activity (PA) is a measurement of the energy used beyond just lying in bed.", trans: "기초 대사량(BMR)은 살아가는 데 필요한 에너지가 얼마나 되는지를 측정한 것이고, 식품의 발열 효과(TEF)는 음식을 섭취하고 에너지를 흡수하는 데 사용되는 에너지를 측정한 것이며, 신체 활동(PA)은 단지 침대에 누워 있는 것 이상으로 사용되는 에너지를 측정한 것입니다." },
          { id: 10, text: "Learning about the composition of these three elements can help people make better choices for their health and well-being.", trans: "이 세 가지 요소의 구성에 대해 배우는 것은 사람들이 자신의 건강과 웰빙을 위해 더 나은 선택을 하도록 도울 수 있습니다." },
          { id: 11, text: "Most of the energy the body uses each day is set or fixed.", trans: "신체가 매일 사용하는 에너지의 대부분은 설정되어 있거나 고정되어 있습니다." },
          { id: 12, text: "Assuming an energy input of 2,000 calories, about 1,400 calories, or 70%, goes to essential functions such as keeping the heart and the brain working; this is called the basal metabolic rate (BMR).", trans: "2,000칼로리의 에너지 입력을 가정할 때, 약 1,400칼로리, 즉 70%는 심장과 뇌를 계속 작동시키는 것과 같은 필수적인 기능에 사용되며, 이를 기초 대사량(BMR)이라고 합니다." },
          { id: 13, text: "Around 200 calories, or 10%, is used to consume and absorb energy from food and is called the thermic effect of food (TEF).", trans: "약 200칼로리, 즉 10%는 음식에서 에너지를 섭취하고 흡수하는 데 사용되며 식품의 발열 효과(TEF)라고 불립니다." },
          { id: 14, text: "In short, BMR and TEF are the minimum energy required for the body to stay alive.", trans: "요컨대, BMR과 TEF는 신체가 생존하는 데 필요한 최소한의 에너지입니다." },
          { id: 15, text: "The remaining 400 calories, or 20%, is used for things people choose to do, including various physical activities (PA) like working, playing, and moving around.", trans: "남은 400칼로리, 즉 20%는 일하기, 놀기, 움직이기와 같은 다양한 신체 활동(PA)을 포함하여 사람들이 선택하는 일에 사용됩니다." },
          { id: 16, text: "Maybe some of the London public transportation workers spent the remaining 20% differently, resulting in their different health outcomes.", trans: "아마도 런던 대중교통 노동자들 중 일부는 이 남은 20%를 다르게 소비했을 것이고, 그 결과 그들의 건강 결과가 다르게 나타났을 것입니다.", isHighlight: true, logicPoint: 2 },

          // Part 3: Solution Concept (NEAT)
          { id: 17, text: "[Physical Activities and NEAT] Then, what do people do with the remaining 400 calories?", trans: "[신체 활동과 NEAT] 그렇다면, 사람들은 남은 400칼로리로 무엇을 할까요?" },
          { id: 18, text: "They may be burned by intense physical exercise like jogging, working out at the gym, playing badminton or tennis, or venturing out for a hike.", trans: "그것들은 조깅, 체육관에서 운동하기, 배드민턴이나 테니스 치기, 또는 하이킹 가기와 같은 격렬한 신체 운동에 의해 연소될 수 있습니다." },
          { id: 19, text: "However, those calories may also be burned by small, seemingly unimportant activities we do throughout the day, like standing up and sitting down, walking around the house, washing dishes, doing the laundry, taking out the garbage, and many others.", trans: "그러나 그 칼로리들은 또한 일어서고 앉기, 집 주변 걷기, 설거지하기, 빨래하기, 쓰레기 버리기, 그리고 그 밖의 많은 일들처럼 우리가 하루 종일 하는 작고 겉보기에는 중요하지 않은 활동들에 의해서도 연소될 수 있습니다." },
          { id: 20, text: "These actions are collectively called Non-Exercise Activity Thermogenesis (NEAT) as they use up energy too!", trans: "이러한 행동들은 그것들 역시 에너지를 사용하기 때문에 총괄하여 비운동성 활동 열생성(NEAT)이라고 불립니다.", isHighlight: true, logicPoint: 3 },
          { id: 21, text: "For example, a 40-minute run will burn around 400 calories.", trans: "예를 들어, 40분 달리기는 약 400칼로리를 연소할 것입니다." },
          { id: 22, text: "Doing this could use up the excess energy budget completely, but not everyone has 40 minutes a day to go for a run.", trans: "이렇게 하는 것은 잉여 에너지 예산을 완전히 다 써버릴 수 있지만, 모든 사람이 하루에 달리기할 40분의 시간을 가지고 있는 것은 아닙니다." },
          { id: 23, text: "Taking 10,000 steps, which is like walking about 8 kilometers, burns 400 calories as well.", trans: "10,000보를 걷는 것은 약 8킬로미터를 걷는 것과 같으며 이 역시 400칼로리를 연소합니다." },
          { id: 24, text: "What this means is that while a 40-minute run will burn 400 calories, doing small things like more walking, taking stairs, or even just cleaning your room can add up at the end of the day, too.", trans: "이것이 의미하는 바는 40분 달리기가 400칼로리를 연소하는 한편, 더 많이 걷고, 계단을 이용하고, 심지어 그저 방을 청소하는 것과 같은 작은 일들을 하는 것도 하루가 끝날 무렵에는 합산될 수 있다는 것입니다." },

          // Part 4: Benefits
          { id: 25, text: "[What Happens When You Increase NEAT] Each gram of body fat contains about 9 calories, so if you spend your day eating and not moving, your body may convert the 400 calories into 44 grams of fat.", trans: "[NEAT를 늘리면 일어나는 일] 체지방 1그램당 약 9칼로리를 포함하고 있으므로, 만약 당신이 먹기만 하고 움직이지 않으며 하루를 보낸다면 당신의 몸은 그 400칼로리를 44그램의 지방으로 바꿀지도 모릅니다." },
          { id: 26, text: "This is not healthy over the long term.", trans: "이것은 장기적으로 건강에 좋지 않습니다." },
          { id: 27, text: "While NEAT doesn’t provide the heart and muscles with the same benefits that exercise does, excess energy still gets used up instead of being stored.", trans: "NEAT가 심장과 근육에 운동이 하는 것과 동일한 이점을 제공하지는 않지만, 잉여 에너지는 저장되는 대신 여전히 다 사용됩니다." },
          { id: 28, text: "You may not necessarily get fit, but you’ll stay in energy balance, which is important for long term health.", trans: "당신이 반드시 건강해지는 것은 아닐지 몰라도 에너지 균형을 유지할 것이며, 이는 장기적인 건강을 위해 중요합니다." },
          { id: 29, text: "[Further Health Benefits] Paying attention to NEAT has other health benefits as well.", trans: "[추가적인 건강상의 이점] NEAT에 주의를 기울이는 것은 다른 건강상의 이점들도 가지고 있습니다." },
          { id: 30, text: "Sitting too much can cause problems like heart disease and muscle loss, so standing not only increases NEAT but also decreases sitting time, which is a win-win.", trans: "너무 많이 앉아 있는 것은 심장병이나 근육 손실과 같은 문제를 일으킬 수 있으므로 서 있는 것은 NEAT를 늘릴 뿐만 아니라 앉아 있는 시간도 줄여주어 윈윈입니다.", isHighlight: true, logicPoint: 4 },
          { id: 31, text: "As people get older, it may become more difficult to stay healthy, so adopting a lifestyle that maximizes NEAT is a good habit for younger people to make.", trans: "나이가 들수록 건강을 유지하는 것이 더 어려워질 수 있으므로 NEAT를 극대화하는 생활 방식을 채택하는 것은 젊은 사람들이 만들기에 좋은 습관입니다." },
          { id: 32, text: "Walking more, taking stairs, or even using smaller water cups so they have to be refilled more often uses energy.", trans: "더 많이 걷고, 계단을 이용하고, 심지어 더 자주 채워야 하도록 작은 물컵을 사용하는 것은 에너지를 사용합니다." },
          { id: 33, text: "Whether it’s for weight management or trying to stay more active during exam week, understanding NEAT is a great way to maintain energy balance in the body.", trans: "체중 관리를 위해서든 시험 기간 동안 더 활동적으로 지내기 위해서든, NEAT를 이해하는 것은 신체의 에너지 균형을 유지하는 훌륭한 방법입니다." },

          // Part 5: Conclusion
          { id: 34, text: "In the big picture, your body is like an energy account book that needs to be balanced.", trans: "큰 틀에서 볼 때, 당신의 몸은 균형을 맞춰야 하는 에너지 가계부와 같습니다." },
          { id: 35, text: "All the food you eat is credit in the account, and you need to spend energy to keep it all in balance.", trans: "당신이 먹는 모든 음식은 그 계좌의 입금액이며, 당신은 모든 것이 균형을 유지하도록 에너지를 소비해야 합니다." },
          { id: 36, text: "Thus if you eat too much food without using the excess energy, your body will store the extra as fat, which is not healthy.", trans: "따라서 잉여 에너지를 사용하지 않고 음식을 너무 많이 먹으면, 몸은 여분의 것을 지방으로 저장할 것이며 이는 건강에 좋지 않습니다." },
          { id: 37, text: "Remember, standing uses more energy than sitting, walking uses more energy than standing, and running uses more energy than walking, so let’s all keep moving, stay active, and use our energy wisely for a healthier life!", trans: "서 있는 것이 앉아 있는 것보다 더 많은 에너지를 사용하고, 걷는 것이 서 있는 것보다 더 많은 에너지를 사용하며, 달리는 것이 걷는 것보다 더 많은 에너지를 사용한다는 것을 기억하고, 그러니 건강한 삶을 위해 우리 모두 계속 움직이고, 활동적으로 지내며, 에너지를 현명하게 사용합시다!", isHighlight: true, logicPoint: 5 }
        ];

        const logicMapSteps = [
          { point: 1, title: "OBSERVATION", desc: "Active transport workers had fewer heart problems", color: "bg-red-100 border-red-400 text-red-800", icon: <i className="ph-fill ph-magnifying-glass text-xl mb-2"></i> },
          { point: 2, title: "THE CAUSE", desc: "The remaining 20% Physical Activity (PA) budget", color: "bg-blue-100 border-blue-400 text-blue-800", icon: <i className="ph-fill ph-battery-charging text-xl mb-2"></i> },
          { point: 3, title: "THE SOLUTION", desc: "NEAT: Burn calories through small daily movements", color: "bg-cyan-100 border-cyan-400 text-cyan-800", icon: <i className="ph-fill ph-broom text-xl mb-2"></i> },
          { point: 4, title: "THE BENEFITS", desc: "Prevents fat storage, reduces sitting, balances energy", color: "bg-teal-100 border-teal-400 text-teal-800", icon: <i className="ph-fill ph-heartbeat text-xl mb-2"></i> },
          { point: 5, title: "CONCLUSION", desc: "Keep moving to balance your 'energy account'", color: "bg-emerald-100 border-emerald-400 text-emerald-800", icon: <i className="ph-fill ph-scales text-xl mb-2"></i> }
        ];

        function App() {
          const [isAuthenticated, setIsAuthenticated] = useState(false);
          const [passwordInput, setPasswordInput] = useState("");
          const [loginError, setLoginError] = useState("");
          
          const CORRECT_PASSWORD = "Made by Lee";
          const itemRefs = useRef({});

          const handleLoginSubmit = (e) => {
            e.preventDefault();
            if (passwordInput === CORRECT_PASSWORD) {
              setIsAuthenticated(true);
              setLoginError("");
            } else {
              setLoginError("올바르지 않은 암호입니다. 다시 확인해 주세요.");
              setPasswordInput("");
            }
          };

          const [activeTab, setActiveTab] = useState('text');
          const [activeLogic, setActiveLogic] = useState(null);
          
          const handleLogicClick = (point) => {
              setActiveLogic(activeLogic === point ? null : point);
              setActiveTab('text'); 
          };

          useEffect(() => {
              if (activeTab === 'text' && activeLogic !== null) {
                  const targetItem = textData.find(item => item.logicPoint === activeLogic);
                  if (targetItem && itemRefs.current[targetItem.id]) {
                      setTimeout(() => {
                          itemRefs.current[targetItem.id].scrollIntoView({ behavior: 'smooth', block: 'center' });
                      }, 150);
                  }
              }
          }, [activeLogic, activeTab]);
          
          const [quiz1Answered, setQuiz1Answered] = useState(null);
          const [quiz2Answered, setQuiz2Answered] = useState(null);
          const [quiz3Answered, setQuiz3Answered] = useState(null);

          const handlePrint = () => { window.print(); };

          if (!isAuthenticated) {
            return (
              <div className="min-h-screen bg-pattern flex items-center justify-center p-4">
                <div className="bg-white p-8 md:p-10 rounded-2xl shadow-2xl max-w-md w-full text-center border-t-8 border-blue-800">
                  <div className="mx-auto bg-blue-100 w-16 h-16 rounded-full flex items-center justify-center mb-6">
                    <i className="ph-fill ph-lock-key text-3xl text-blue-800"></i>
                  </div>
                  <h2 className="text-2xl font-serif font-bold text-slate-800 mb-2">THE LOGIC INTERACTIVE</h2>
                  <p className="text-blue-600 font-bold mb-6 text-sm">Approach to a Healthy Life</p>
                  
                  <div className="bg-slate-50 border border-slate-200 rounded-lg p-4 mb-6">
                    <p className="text-slate-600 text-sm leading-relaxed">
                      이 콘텐츠는 <strong>Lee 선생님</strong>이 기획하고 제작한<br/>교육용 창작물입니다. (무단 배포 금지)<br/>
                      <span className="inline-block mt-2 font-medium text-slate-700">열람을 위해 선생님이 안내한 암호를 입력해 주세요.</span>
                    </p>
                  </div>

                  <form onSubmit={handleLoginSubmit} className="flex flex-col gap-3">
                    <input type="text" placeholder="접근 암호 (예: Made by Lee)" className="border border-slate-300 p-3 rounded-lg focus:outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-200 transition-all text-center font-medium text-selectable" value={passwordInput} onChange={(e) => setPasswordInput(e.target.value)} />
                    {loginError && <p className="text-red-500 text-sm font-medium animate-pulse">{loginError}</p>}
                    <button type="submit" className="bg-blue-900 hover:bg-blue-800 text-white font-bold py-3 rounded-lg transition-colors mt-2 shadow-md flex items-center justify-center gap-2">
                      <i className="ph-bold ph-key"></i> 잠금 해제
                    </button>
                  </form>
                </div>
              </div>
            );
          }

          return (
            <div className="flex h-screen overflow-hidden bg-slate-50 font-sans text-slate-800 print:h-auto print:bg-white">
                <aside className="hidden md:flex flex-col w-72 bg-slate-900 text-white shadow-2xl z-20 print:hidden">
                    <div className="p-6 bg-slate-800 border-b border-slate-700">
                        <div className="flex items-center gap-2 mb-2 opacity-80">
                            <i className="ph-fill ph-brain text-xl text-cyan-400"></i>
                            <span className="text-xs font-bold tracking-wider text-cyan-300">THE LOGIC INTERACTIVE</span>
                        </div>
                        <h1 className="text-2xl font-serif font-bold leading-tight">Approach to a</h1>
                        <p className="text-slate-400 text-sm mt-2 italic">Healthy Life</p>
                    </div>
                    
                    <nav className="flex-1 py-6 px-4 space-y-2 overflow-y-auto">
                        <p className="text-xs font-bold text-slate-500 uppercase tracking-widest mb-4 ml-2">Navigation</p>
                        <button onClick={() => setActiveTab('text')} className={`w-full flex items-center gap-3 px-4 py-3 rounded-lg text-left transition-all ${activeTab === 'text' ? 'bg-blue-600 text-white font-bold shadow-md' : 'text-slate-300 hover:bg-slate-800'}`}>
                            <i className="ph-fill ph-book-open text-xl"></i> 1. 지문 분석
                        </button>

                                        <div className="bg-slate-50 border border-slate-200 p-5 rounded-lg mb-4 print:bg-white print:border-none print:p-0 print:mb-4">
                                            <p className="font-bold text-slate-800 mb-2 print:text-black">Q2. 문맥상 어휘 추론</p>
                                            <p className="text-sm text-slate-600 mb-4 print:text-black">다음 밑줄 친 (A), (B), (C) 중 문맥상 알맞은 낱말로 가장 적절한 것은?</p>
                                            <p className="text-md leading-relaxed bg-white p-4 border border-slate-200 rounded print:border-slate-400 print:rounded-none print:text-black">
                                                The formula is an <strong>(A) [ easy / complex ]</strong> equation... Doing this could use up the <strong>(B) [ excess / deficient ]</strong> energy budget completely... your body may <strong>(C) [ convert / protect ]</strong> the 400 calories into 44 grams of fat.
                                            </p>
                                        </div>
                                        <div className="space-y-2 print:space-y-3">
                                            {[
                                                { id: 1, text: "(A) easy — (B) deficient — (C) protect" },
                                                { id: 2, text: "(A) complex — (B) excess — (C) convert" },
                                                { id: 3, text: "(A) easy — (B) excess — (C) convert", isCorrect: true },
                                                { id: 4, text: "(A) complex — (B) deficient — (C) protect" }
                                            ].map((choice) => (
                                                <button key={choice.id} onClick={() => setQuiz2Answered(choice.id)} disabled={quiz2Answered !== null}
                                                    className={`w-full text-left p-4 rounded-lg border font-medium transition-all duration-200 print:border-none print:p-1 print:text-black
                                                        ${quiz2Answered === null ? 'border-slate-200 hover:border-blue-400 hover:bg-blue-50' : 
                                                        (choice.isCorrect ? 'border-green-500 bg-green-50 text-green-800 shadow-sm' : 
                                                        (quiz2Answered === choice.id ? 'border-red-400 bg-red-50 text-red-600' : 'border-slate-100 text-slate-400 opacity-50'))}`}
                                                >
                                                    <span className="w-8 inline-block font-mono text-slate-500 print:text-black">{['①', '②', '③', '④'][choice.id - 1]}</span> {choice.text}
                                                </button>
                                            ))}
                                        </div>
                                        {quiz2Answered !== null && (
                                            <div className={`mt-4 p-4 rounded-lg text-sm leading-relaxed print:hidden ${quiz2Answered === 3 ? 'bg-green-50 text-green-900 border border-green-200' : 'bg-red-50 text-red-900 border border-red-200'}`}>
                                                <p className="font-bold mb-1">{quiz2Answered === 3 ? '🎉 정답입니다!' : '오답입니다.'}</p>
                                                <p><strong>해설:</strong> (A) BMR+TEF+PA라는 '쉬운(easy)' 방정식입니다. (B) 달리기 40분은 '잉여(excess)' 에너지 예산을 완전히 다 써버릴 수 있습니다. (C) 몸은 남은 400칼로리를 44그램의 지방으로 '바꿀(convert)'지도 모릅니다.</p>
                                            </div>
                                        )}
                                    </div>
                                    
                                    <div className="border-t border-slate-200 pt-8 print:border-black print:pt-4">
                                        <div className="bg-slate-50 border border-slate-200 p-5 rounded-lg mb-4 print:bg-white print:border-none print:p-0 print:mb-4">
                                            <p className="font-bold text-slate-800 mb-2 print:text-black">Q3. 글의 제목 파악</p>
                                            <p className="text-sm text-slate-600 print:text-black">윗글의 제목으로 가장 적절한 것은?</p>
                                        </div>
                                        <div className="space-y-2 print:space-y-3">
                                            {[
                                                { id: 1, text: "How to Calculate Your Basal Metabolic Rate" },
                                                { id: 2, text: "NEAT: The Secret to Balancing Your Energy and Health", isCorrect: true },
                                                { id: 3, text: "Why Intense Workout is Better Than Walking" },
                                                { id: 4, text: "The History of the London Transport System" }
                                            ].map((choice) => (
                                                <button key={choice.id} onClick={() => setQuiz3Answered(choice.id)} disabled={quiz3Answered !== null}
                                                    className={`w-full text-left p-4 rounded-lg border font-medium transition-all duration-200 print:border-none print:p-1 print:text-black
                                                        ${quiz3Answered === null ? 'border-slate-200 hover:border-blue-400 hover:bg-blue-50' : 
                                                        (choice.isCorrect ? 'border-green-500 bg-green-50 text-green-800 shadow-sm' : 
                                                        (quiz3Answered === choice.id ? 'border-red-400 bg-red-50 text-red-600' : 'border-slate-100 text-slate-400 opacity-50'))}`}
                                                >
                                                    <span className="w-8 inline-block font-mono text-slate-500 print:text-black">{['①', '②', '③', '④'][choice.id - 1]}</span> {choice.text}
                                                </button>
                                            ))}
                                        </div>
                                        {quiz3Answered !== null && (
                                            <div className={`mt-4 p-4 rounded-lg text-sm leading-relaxed print:hidden ${quiz3Answered === 2 ? 'bg-green-50 text-green-900 border border-green-200' : 'bg-red-50 text-red-900 border border-red-200'}`}>
                                                <p className="font-bold mb-1">{quiz3Answered === 2 ? '🎉 정답입니다!' : '오답입니다.'}</p>
                                                <p><strong>해설:</strong> 일상 속의 작은 활동인 NEAT(비운동성 활동 열생성)가 신체의 잉여 에너지를 소모하여 장기적으로 건강과 에너지 균형을 유지하는 데 얼마나 중요한 역할을 하는지 설명하고 있으므로 2번이 가장 적절합니다.</p>
                                            </div>
                                        )}
                                    </div>
                                </div>
                            </div>
                        </section>
                    </div>
                </main>

                <nav className="md:hidden fixed bottom-0 w-full bg-white border-t border-slate-200 flex justify-around p-2 pb-safe z-30 shadow-[0_-5px_10px_rgba(0,0,0,0.05)] print:hidden">
                    <button onClick={() => setActiveTab('text')} className={`flex flex-col items-center p-2 min-w-[64px] transition-colors ${activeTab === 'text' ? 'text-blue-700' : 'text-slate-400 hover:text-slate-600'}`}>
                        <i className={`${activeTab === 'text' ? 'ph-fill' : 'ph'} ph-book-open text-2xl mb-1`}></i>
                        <span className="text-[10px] font-bold">지문 분석</span>
                    </button>
                    <button onClick={() => setActiveTab('syntax')} className={`flex flex-col items-center p-2 min-w-[64px] transition-colors ${activeTab === 'syntax' ? 'text-blue-700' : 'text-slate-400 hover:text-slate-600'}`}>
                        <i className={`${activeTab === 'syntax' ? 'ph-fill' : 'ph'} ph-highlighter-circle text-2xl mb-1`}></i>
                        <span className="text-[10px] font-bold">핵심 구문</span>
                    </button>
                    <button onClick={() => setActiveTab('map')} className={`flex flex-col items-center p-2 min-w-[64px] transition-colors ${activeTab === 'map' ? 'text-blue-700' : 'text-slate-400 hover:text-slate-600'}`}>
                        <i className={`${activeTab === 'map' ? 'ph-fill' : 'ph'} ph-git-merge text-2xl mb-1`}></i>
                        <span className="text-[10px] font-bold">논리 구조도</span>
                    </button>
                    <button onClick={() => setActiveTab('quiz')} className={`flex flex-col items-center p-2 min-w-[64px] transition-colors ${activeTab === 'quiz' ? 'text-blue-700' : 'text-slate-400 hover:text-slate-600'}`}>
                        <i className={`${activeTab === 'quiz' ? 'ph-fill' : 'ph'} ph-check-square-offset text-2xl mb-1`}></i>
                        <span className="text-[10px] font-bold">실전 문제</span>
                    </button>
                </nav>
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
