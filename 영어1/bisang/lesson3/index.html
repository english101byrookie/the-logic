    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const textData = [
          // Part 1: Intro
          { id: 1, text: "In a suburb in the Pacific Northwest, Justin ties his shoes for his morning run and steps out at dawn.", trans: "태평양 북서부의 한 교외 지역에서, 저스틴은 아침 달리기를 위해 신발 끈을 묶고 새벽에 집을 나선다." },
          { id: 2, text: "As he walks off his front step, he spots some racoons crossing the street.", trans: "현관 계단을 내려오면서, 그는 너구리 몇 마리가 길을 건너는 것을 발견한다." },
          { id: 3, text: "Up in a tree, he sees a family of squirrels.", trans: "나무 위에서는 다람쥐 가족을 본다." },
          { id: 4, text: "Birds begin to sing, and he enjoys the beauty of his neighborhood.", trans: "새들이 지저귀기 시작하고, 그는 동네의 아름다움을 즐긴다." },
          { id: 5, text: "While running, a dangerous sight interrupts the idyllic scene.", trans: "달리는 동안, 위험한 광경이 그 목가적인 풍경을 방해한다." },
          { id: 6, text: "A coyote watches as a black bear searches through a garbage bin for food.", trans: "흑곰이 먹이를 찾기 위해 쓰레기통을 뒤지는 것을 코요테가 지켜보고 있다." },
          { id: 7, text: "Justin is surprised at his neighborhood transforming into a place full of wildlife encounters.", trans: "저스틴은 자신의 동네가 야생 동물들과 마주치는 곳으로 변하는 것에 놀란다.", isHighlight: true, logicPoint: 1 },

          // Part 2: Why Animals Migrate to Cities
          { id: 8, text: <span><span className="font-bold text-emerald-800 mr-2">Why Animals Migrate to Cities</span></span>, trans: "동물들이 도시로 이주하는 이유" },
          { id: 9, text: "In 2019, it was estimated that more than 1.5 million squirrels were living in Chicago and approximately 10,000 foxes in London.", trans: "2019년에 시카고에는 150만 마리 이상의 다람쥐가, 런던에는 약 10,000마리의 여우가 살고 있는 것으로 추산되었다." },
          { id: 10, text: "In Seoul, 155 wild boars were captured in 2022.", trans: "2022년 서울에서는 155마리의 멧돼지가 포획되었다." },
          { id: 11, text: "Why are there so many animals in big cities?", trans: "왜 대도시에 그렇게 많은 동물들이 있을까?" },
          { id: 12, text: "One reason is that many cities are built on biologically fertile and productive land areas, which are attractive not only to humans but to other creatures as well.", trans: "한 가지 이유는 많은 도시들이 생물학적으로 비옥하고 생산적인 토지 위에 세워졌으며, 이것이 인간뿐만 아니라 다른 생물들에게도 매력적이라는 것이다." },
          { id: 13, text: "Another reason is due to urban areas becoming greener, inviting more wild animals.", trans: "또 다른 이유는 도시 지역이 더 푸르게 변하면서 더 많은 야생 동물들을 불러들이기 때문이다." },
          { id: 14, text: "Cities have begun building more gardens, parks, and legally protected areas for educational, recreational, or other purposes, attracting more wild creatures.", trans: "도시들은 교육, 오락 또는 기타 목적을 위해 더 많은 정원, 공원, 그리고 법적으로 보호되는 구역을 짓기 시작했고, 더 많은 야생 생물들을 끌어들이고 있다." },
          { id: 15, text: "In addition, for some animal species, cities have become a perfect place for feeding, mating, and nesting.", trans: "게다가, 일부 동물 종에게 도시는 먹이 활동, 짝짓기, 둥지 틀기에 완벽한 장소가 되었다." },
          { id: 16, text: "Peregrine falcons, for example, use tall buildings for nesting sites, man-made lighting to hunt for prey at night, and warm urban air currents to soar easily.", trans: "예를 들어 송골매는 둥지를 틀기 위해 높은 건물을, 밤에 먹이를 사냥하기 위해 인공조명을, 쉽게 날아오르기 위해 따뜻한 도시 기류를 사용한다." },
          { id: 17, text: "Cities have become home, sweet home, not only to humans but to wild animals.", trans: "도시는 인간뿐만 아니라 야생 동물들에게도 즐거운 나의 집이 되었다." },
          { id: 18, text: "To some, living among animals might sound idyllic, but to others, wild animals near residential areas, especially those predators high up in the food chain, can be an annoyance and a threat.", trans: "어떤 이들에게는 동물들과 함께 사는 것이 목가적으로 들릴지 모르지만, 다른 이들에게는 주거 지역 근처의 야생 동물들, 특히 먹이 사슬의 높은 곳에 있는 포식자들은 성가신 존재이자 위협이 될 수 있다." },
          { id: 19, text: "What could be an optimal approach to dealing with these new neighbors?", trans: "이 새로운 이웃들을 다루는 최적의 접근법은 무엇일까?", isHighlight: true, logicPoint: 2 },
          { id: 20, text: "Is there a solution for humans and animals to live together peacefully in their shared habitat?", trans: "인간과 동물이 공유하는 서식지에서 평화롭게 함께 살 수 있는 해결책이 있을까?" },

          // Part 3: A Careless Solution
          { id: 21, text: <span><span className="font-bold text-emerald-800 mr-2">A Careless Solution:</span> Failure in Coyote Control</span>, trans: "부주의한 해결책: 코요테 통제의 실패" },
          { id: 22, text: "In 1981, tragic news shocked Los Angeles residents.", trans: "1981년, 비극적인 뉴스가 로스앤젤레스 주민들에게 충격을 주었다." },
          { id: 23, text: "A three-year-old girl was attacked and killed by a coyote in front of her home.", trans: "3살 소녀가 집 앞에서 코요테의 공격을 받아 사망했다." },
          { id: 24, text: "People were outraged and immediately took action to remove the species from their neighborhoods.", trans: "사람들은 분노했고 그들의 동네에서 그 종을 제거하기 위해 즉각 조치를 취했다." },
          { id: 25, text: "They killed a total of 55 coyotes over a period of 80 days.", trans: "그들은 80일 동안 총 55마리의 코요테를 죽였다." },
          { id: 26, text: "Scientists, however, questioned such a destructive control method, as coyotes are highly adaptive and breed quickly.", trans: "하지만 과학자들은 코요테가 적응력이 매우 뛰어나고 번식이 빠르기 때문에 그런 파괴적인 통제 방식에 의문을 제기했다." },
          { id: 27, text: "A study showed that a simulated coyote population survived indefinitely when 70% were killed annually.", trans: "한 연구는 매년 70%가 죽임을 당할 때 시뮬레이션 된 코요테 개체군이 무기한으로 생존한다는 것을 보여주었다." },
          { id: 28, text: "This means that killing even most of the coyotes in a population will have no significant effect.", trans: "이것은 개체군 내의 코요테 대부분을 죽이는 것조차 큰 효과가 없다는 것을 의미한다." },
          { id: 29, text: "In coyote packs, a dominant adult pair maintains a strict structure that prevents others from breeding and controls the population.", trans: "코요테 무리에서는, 우두머리 성체 쌍이 다른 코요테들의 번식을 막고 개체 수를 통제하는 엄격한 구조를 유지한다." },
          { id: 30, text: "Destructive control methods often disrupt this social structure, resulting in increased populations.", trans: "파괴적인 통제 방법은 종종 이 사회적 구조를 붕괴시켜, 개체 수 증가를 초래한다." },
          { id: 31, text: "Moreover, completely eliminating the species using a control method could cause other issues such as over-population of rodents and other small prey.", trans: "더욱이, 통제 방법을 사용하여 그 종을 완전히 없애는 것은 설치류나 다른 작은 먹잇감들의 과잉 번식과 같은 다른 문제를 일으킬 수 있다." },
          { id: 32, text: "Clearly, it is difficult to predict how nature will balance itself out when humans attempt to control.", trans: "분명히, 인간이 통제하려고 시도할 때 자연이 어떻게 스스로 균형을 맞출지 예측하는 것은 어렵다.", isHighlight: true, logicPoint: 3 },

          // Part 4: A Peaceful Approach
          { id: 33, text: <span><span className="font-bold text-emerald-800 mr-2">A Peaceful Approach:</span> Lions in Nairobi</span>, trans: "평화로운 접근법: 나이로비의 사자들" },
          { id: 34, text: "Nairobi, Kenya is unique because it is the world’s only capital with a national park, which attracts many international tourists with wild lions and other beasts against the backdrop of tall buildings in its urban center.", trans: "케냐의 나이로비는 국립공원이 있는 세계 유일의 수도이기 때문에 독특한데, 이 공원은 도심의 높은 건물들을 배경으로 야생 사자와 다른 짐승들을 통해 많은 국제 관광객들을 끌어들인다." },
          { id: 35, text: "Living near the park, a thirteen-year-old boy named Richard Turere was responsible for keeping his family’s cattle safe from lions that often came out of the park at night to hunt.", trans: "공원 근처에 살면서, 리차드 투레레라는 13살 소년은 밤에 사냥을 위해 종종 공원 밖으로 나오는 사자들로부터 가족의 소를 안전하게 지키는 책임이 있었다." },
          { id: 36, text: "Many neighbors had lost their cows, and others their goats and sheep.", trans: "많은 이웃들이 그들의 소를 잃었고, 다른 사람들은 염소와 양을 잃었다." },
          { id: 37, text: "While rounding up his cattle one night, Richard discovered that lions were scared of moving lights and didn’t come near the cattle enclosure when he walked around carrying a flashlight.", trans: "어느 날 밤 소를 모으는 동안, 리차드는 사자들이 움직이는 빛을 무서워하며 그가 손전등을 들고 돌아다닐 때 소 울타리 근처로 오지 않는다는 것을 발견했다." },
          { id: 38, text: "Soon, he fastened flashing LED bulbs onto poles around the enclosure facing the outside and connected them to an old car battery powered by a solar panel.", trans: "곧, 그는 울타리 주변의 기둥에 바깥쪽을 향하도록 깜박이는 LED 전구를 고정하고, 그것들을 태양광 패널로 구동되는 낡은 자동차 배터리에 연결했다." },
          { id: 39, text: "He devised the lights to flicker on and off from time to time.", trans: "그는 그 불빛이 때때로 깜빡거리도록 고안했다." },
          { id: 40, text: "It worked perfectly.", trans: "그것은 완벽하게 작동했다." },
          { id: 41, text: "After he installed his first “lion lights,” he never spotted lions again, and his family didn’t lose any cattle to them.", trans: "그가 첫 번째 \"사자 불빛\"을 설치한 후, 그는 다시는 사자들을 보지 못했고 그의 가족은 사자들에게 어떤 소도 잃지 않았다." },
          { id: 42, text: "Neighbors followed suit, protecting their valuable source of income without killing the unwanted neighbors.", trans: "이웃들도 선례를 따랐고, 원치 않는 이웃을 죽이지 않고 자신들의 귀중한 수입원을 보호했다." },
          { id: 43, text: "This is an example of a keen observation on animal behavior leading to a creative approach that brought peace and harmony.", trans: "이것은 동물 행동에 대한 예리한 관찰이 평화와 조화를 가져온 창의적인 접근으로 이어진 사례이다.", isHighlight: true, logicPoint: 4 },

          // Part 5: Balance and Harmony
          { id: 44, text: <span><span className="font-bold text-emerald-800 mr-2">Balance and Harmony:</span> A Key to Co-Existence</span>, trans: "균형과 조화: 공존의 열쇠" },
          { id: 45, text: "Coyotes and racoons cause conflicts with residents in many towns in North America.", trans: "코요테와 너구리는 북미의 많은 마을에서 주민들과 갈등을 일으킨다." },
          { id: 46, text: "Elephants damage crops and property in Africa.", trans: "아프리카에서는 코끼리가 농작물과 재산에 피해를 준다." },
          { id: 47, text: "Wild boars destroy agricultural fields in Asia and Europe.", trans: "아시아와 유럽에서는 멧돼지가 농경지를 파괴한다." },
          { id: 48, text: "The idea that wild animals are annoyances or threats that need to be eliminated is common in many parts of the world.", trans: "야생 동물이 제거되어야 할 성가신 존재나 위협이라는 생각은 세계 여러 곳에서 흔하다." },
          { id: 49, text: "However, often, unintended consequences occur because of this attitude.", trans: "하지만, 이런 태도 때문에 종종 의도치 않은 결과가 발생한다." },
          { id: 50, text: "A balanced approach is needed, particularly between human safety and the well-being of the animals, which can be found when we grasp a proper understanding of their behavior as well as their role in their natural habitat.", trans: "균형 잡힌 접근, 특히 인간의 안전과 동물의 안녕 사이의 접근이 필요한데, 이것은 우리가 동물의 행동뿐만 아니라 자연 서식지에서의 역할에 대한 적절한 이해를 파악할 때 찾을 수 있다." },
          { id: 51, text: "After all, we should acknowledge the fact that both humans and animals are temporary tenants of this precious planet.", trans: "결국, 우리는 인간과 동물 모두 이 소중한 행성의 일시적인 세입자라는 사실을 인정해야 한다." },
          { id: 52, text: "Neither is less valuable nor more valuable than the other.", trans: "어느 쪽도 다른 쪽보다 덜 가치 있거나 더 가치 있지 않다." },
          { id: 53, text: "Maintaining balance and harmony among all living species is the only choice.", trans: "모든 살아있는 생물들 사이의 균형과 조화를 유지하는 것이 유일한 선택이다.", isHighlight: true, logicPoint: 5 }
        ];

        const logicMapSteps = [
          { id: 'intro', title: "THE PHENOMENON (현상)", desc: "도심에 출몰하는 야생 동물 이웃들", color: "bg-blue-100 border-blue-400 text-blue-800", icon: <i className="ph-fill ph-paw-print text-xl mb-2"></i> },
          { id: 'cause', title: "THE CAUSE (이주의 원인)", desc: "비옥한 토지와 서식 환경의 제공", color: "bg-indigo-100 border-indigo-400 text-indigo-800", icon: <i className="ph-fill ph-tree text-xl mb-2"></i> },
          { id: 'failure', title: "FAILED APPROACH (실패 사례)", desc: "LA 코요테의 파괴적 통제와 부작용", color: "bg-red-100 border-red-400 text-red-800", icon: <i className="ph-fill ph-warning-circle text-xl mb-2"></i> },
          { id: 'success', title: "PEACEFUL APPROACH (성공 사례)", desc: "나이로비의 창의적인 '사자 불빛'", color: "bg-teal-100 border-teal-400 text-teal-800", icon: <i className="ph-fill ph-lightbulb text-xl mb-2"></i> },
          { id: 'conclusion', title: "CONCLUSION (최종 결론)", desc: "생물종 간의 균형과 조화 유지", color: "bg-emerald-100 border-emerald-500 text-emerald-900", icon: <i className="ph-fill ph-scales text-xl mb-2"></i> }
        ];

        function App() {
          const [isAuthenticated, setIsAuthenticated] = useState(false);
          const [passwordInput, setPasswordInput] = useState("");
          const [loginError, setLoginError] = useState("");
          
          const CORRECT_PASSWORD = "Made by Lee";

          const itemRefs = useRef({});

          const handleLoginSubmit = (e) => {
            e.preventDefault();
            if (passwordInput === CORRECT_PASSWORD) {
              setIsAuthenticated(true);
              setLoginError("");
            } else {
              setLoginError("올바르지 않은 암호입니다. 다시 확인해 주세요.");
              setPasswordInput("");
            }
          };

          const [activeTab, setActiveTab] = useState('text');
          const [activeLogic, setActiveLogic] = useState(null);
          
          const handleLogicClick = (point) => {
              setActiveLogic(activeLogic === point ? null : point);
              setActiveTab('text'); 
          };

          useEffect(() => {
              if (activeTab === 'text' && activeLogic !== null) {
                  const targetItem = textData.find(item => item.logicPoint === activeLogic);
                  if (targetItem && itemRefs.current[targetItem.id]) {
                      setTimeout(() => {
                          itemRefs.current[targetItem.id].scrollIntoView({ behavior: 'smooth', block: 'center' });
                      }, 150);
                  }
              }
          }, [activeLogic, activeTab]);

          const [quiz1Answered, setQuiz1Answered] = useState(null);
          const [quiz2Answered, setQuiz2Answered] = useState(null);
          const [quiz3Answered, setQuiz3Answered] = useState(null);
          const [quiz4Answered, setQuiz4Answered] = useState(null);
          const [quiz5Answered, setQuiz5Answered] = useState(null);
          const [quiz6Answered, setQuiz6Answered] = useState(null);

          const handlePrint = () => { window.print(); };

          if (!isAuthenticated) {
            return (
              <div className="min-h-screen bg-pattern flex items-center justify-center p-4">
                <div className="bg-white p-8 md:p-10 rounded-2xl shadow-2xl max-w-md w-full text-center border-t-8 border-emerald-700">
                  <div className="mx-auto bg-emerald-100 w-16 h-16 rounded-full flex items-center justify-center mb-6">
                    <i className="ph-fill ph-lock-key text-3xl text-emerald-700"></i>
                  </div>

                    <button onClick={() => setActiveTab('syntax')} className={`flex flex-col items-center p-2 min-w-[64px] transition-colors ${activeTab === 'syntax' ? 'text-emerald-700' : 'text-slate-400 hover:text-slate-600'}`}>
                        <i className={`${activeTab === 'syntax' ? 'ph-fill' : 'ph'} ph-highlighter-circle text-2xl mb-1`}></i>
                        <span className="text-[10px] font-bold">핵심 구문</span>
                    </button>
                    <button onClick={() => setActiveTab('map')} className={`flex flex-col items-center p-2 min-w-[64px] transition-colors ${activeTab === 'map' ? 'text-emerald-700' : 'text-slate-400 hover:text-slate-600'}`}>
                        <i className={`${activeTab === 'map' ? 'ph-fill' : 'ph'} ph-git-merge text-2xl mb-1`}></i>
                        <span className="text-[10px] font-bold">논리 구조도</span>
                    </button>
                    <button onClick={() => setActiveTab('quiz')} className={`flex flex-col items-center p-2 min-w-[64px] transition-colors ${activeTab === 'quiz' ? 'text-emerald-700' : 'text-slate-400 hover:text-slate-600'}`}>
                        <i className={`${activeTab === 'quiz' ? 'ph-fill' : 'ph'} ph-check-square-offset text-2xl mb-1`}></i>
                        <span className="text-[10px] font-bold">실전 문제</span>
                    </button>
                </nav>
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
