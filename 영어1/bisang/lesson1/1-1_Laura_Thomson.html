<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE LOGIC Interactive App - Laura Thompson</title>
    
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    
    <style>
        @media print {
            body {
                -webkit-print-color-adjust: exact;
                print-color-adjust: exact;
                background-color: white !important;
            }
            ::-webkit-scrollbar {
                display: none;
            }
            .print-avoid-break {
                break-inside: avoid;
            }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        const textData = [
          // Intro
          { id: 1, text: "Hello, my name is Laura Thompson, and I’m a guidance counselor at the local college.", trans: "안녕하세요, 제 이름은 로라 톰슨이고, 지역 대학의 진로 상담 교사입니다." },
          { id: 2, text: "I also have a social media channel where I give advice to young students like you.", trans: "저는 여러분과 같은 어린 학생들에게 조언을 해주는 소셜 미디어 채널도 운영하고 있습니다." },
          { id: 3, text: "Today I’d like to talk to you about two things that I hope will inspire you.", trans: "오늘 저는 여러분에게 영감을 주기를 바라는 두 가지에 대해 이야기하고자 합니다." },
          
          // Point 1
          { id: 4, text: "Let me start by asking you a question.", trans: "질문 하나로 시작하겠습니다." },
          { id: 5, text: "Have you ever asked yourself whether you made a good impression on someone you just met?", trans: "방금 만난 사람에게 좋은 인상을 남겼는지 스스로에게 물어본 적이 있나요?" },
          { id: 6, text: "In fact, most people believe they make a worse impression than they actually do.", trans: "사실, 대부분의 사람들은 실제보다 자신이 더 나쁜 인상을 남긴다고 믿습니다.", isHighlight: true, logicPoint: 1 },
          { id: 7, text: "Researchers performed an experiment where students were paired up for five-minute ice breaking conversations.", trans: "연구자들은 학생들을 짝지어 5분간의 어색함을 깨는 대화를 나누게 하는 실험을 진행했습니다." },
          { id: 8, text: "They were then asked to rate how much they liked their partners.", trans: "그런 다음 파트너가 얼마나 마음에 들었는지 평가하도록 요청받았습니다." },
          { id: 9, text: "Additionally, researchers asked participants if they thought their partners liked them.", trans: "또한 연구자들은 참가자들에게 파트너가 자신을 좋아했다고 생각하는지 물었습니다." },
          { id: 10, text: "Most participants’ estimations of their partners’ responses were pessimistic, which were opposite to the real responses.", trans: "파트너의 반응에 대한 대부분의 참가자들의 예상은 비관적이었고, 이는 실제 반응과는 정반대였습니다." },
          { id: 11, text: "It turns out that participants do not make bad impressions but make better impressions than they think.", trans: "참가자들은 나쁜 인상을 남긴 것이 아니라 생각보다 더 좋은 인상을 남겼다는 것이 밝혀졌습니다.", isHighlight: true, logicPoint: 1 },
          { id: 12, text: "The researchers coined a new term, the “liking gap,” for this difference in perception or the mismatch between how we perceive ourselves and what others actually think of us.", trans: "연구자들은 우리가 스스로를 인식하는 방식과 다른 사람들이 실제로 우리에 대해 생각하는 것 사이의 이러한 인식 차이 또는 불일치를 '호감도 격차(liking gap)'라는 새로운 용어로 만들었습니다." },
          { id: 13, text: "How is this helpful for you?", trans: "이것이 여러분에게 어떻게 도움이 될까요?" },
          { id: 14, text: "We often underestimate ourselves based on our assumption of how others might judge us.", trans: "우리는 종종 다른 사람들이 우리를 어떻게 판단할지에 대한 가정을 바탕으로 우리 자신을 과소평가합니다." },
          { id: 15, text: "In other words, our fixed attitudes may prevent us from reaching our true potential.", trans: "즉, 우리의 고정된 태도가 우리가 진정한 잠재력에 도달하는 것을 막을 수 있습니다.", isHighlight: true, logicPoint: 2 },
          { id: 16, text: "Don’t worry about the impression you think you make on people; chances are you can be confident that the impression you make is just fine.", trans: "여러분이 사람들에게 남긴다고 생각하는 인상에 대해 걱정하지 마세요. 여러분이 남기는 인상은 충분히 괜찮다고 확신해도 좋습니다." },
          
          // Point 2
          { id: 17, text: "The second point I want to make today is about thinking that your personality is fixed.", trans: "오늘 제가 말씀드리고 싶은 두 번째 요점은 성격이 고정되어 있다고 생각하는 것에 관한 것입니다." },
          { id: 18, text: "Many people believe that their personality falls into a specific category and often blame their weaknesses or failures on their personality type.", trans: "많은 사람들이 자신의 성격이 특정 범주에 속한다고 믿으며 종종 자신의 약점이나 실패를 성격 유형 탓으로 돌립니다." },
          { id: 19, text: "For example, they may say they can’t do something because they aren’t that kind of person.", trans: "예를 들어, 그들은 자신이 그런 종류의 사람이 아니기 때문에 무언가를 할 수 없다고 말할 수 있습니다." },
          { id: 20, text: "However, personality categorizations are neither absolute nor permanent.", trans: "그러나 성격 분류는 절대적이지도 영구적이지도 않습니다." },
          { id: 21, text: "Try to remember yourself from ten years ago.", trans: "10년 전의 자신을 기억해 보세요." },
          { id: 22, text: "Who was your favorite singer?", trans: "여러분이 가장 좋아하는 가수는 누구였나요?" },
          { id: 23, text: "What did you hope to become when you grow up?", trans: "커서 무엇이 되고 싶었나요?" },
          { id: 24, text: "Do you feel the same way now?", trans: "지금도 같은 기분인가요?" },
          { id: 25, text: "What will your answers be 10 years from now?", trans: "10년 후 여러분의 대답은 무엇일까요?" },
          { id: 26, text: "I bet you don’t know.", trans: "장담하건대 여러분은 모를 것입니다." },
          { id: 27, text: "Just like your likes and future dreams keep changing, so do you.", trans: "여러분의 취향과 미래의 꿈이 계속 변하는 것처럼 여러분도 마찬가지입니다.", isHighlight: true, logicPoint: 3 },
          { id: 28, text: "If you choose to behave differently and make needed changes, your personality will also change.", trans: "다르게 행동하고 필요한 변화를 만들기로 선택하면 성격도 변할 것입니다." },
          { id: 29, text: "People are predictable and consistent over time only because they choose to be, so don’t limit yourself to a certain type.", trans: "사람들은 오직 그렇게 하기로 선택했기 때문에 시간이 지나도 예측 가능하고 일관된 것이므로, 특정 유형에 자신을 제한하지 마세요." },
          { id: 30, text: "Start crafting the person you want to become today.", trans: "오늘 여러분이 되고 싶은 사람을 만들기 시작하세요.", isHighlight: true, logicPoint: 3 }
        ];

        const logicMapSteps = [
          { id: 'myth', title: "FALSE ASSUMPTIONS (잘못된 가정)", desc: "Bad Impressions & Fixed Personality", color: "bg-red-100 border-red-400 text-red-800", icon: <i className="ph-fill ph-warning-octagon text-xl mb-2"></i> },
          { id: 'truth', title: "THE REALITY (객관적 진실)", desc: "The 'Liking Gap' & Changing Preferences", color: "bg-blue-100 border-blue-400 text-blue-800", icon: <i className="ph-bold ph-magnifying-glass text-xl mb-2"></i> },
          { id: 'cause', title: "THE LIMITATION (한계의 원인)", desc: "Fixed attitudes prevent true potential", color: "bg-orange-100 border-orange-400 text-orange-800", icon: <i className="ph-fill ph-lock-key text-xl mb-2"></i> },
          { id: 'sol', title: "THE SOLUTION (해결책)", desc: "Don't limit yourself. Craft who you are.", color: "bg-green-100 border-green-400 text-green-800", icon: <i className="ph-fill ph-hammer text-xl mb-2"></i> }
        ];

        function App() {
          const [activeTab, setActiveTab] = useState(1);
          const [activeLogic, setActiveLogic] = useState(null);
          const [mapStep, setMapStep] = useState(0);
          const [quiz1Answered, setQuiz1Answered] = useState(null);
          const [quiz2Answered, setQuiz2Answered] = useState(null);

          const handleLogicClick = (point) => setActiveLogic(activeLogic === point ? null : point);
          const nextMapStep = () => { if (mapStep < logicMapSteps.length) setMapStep(mapStep + 1); };
          const resetMap = () => setMapStep(0);

          const handlePrint = () => {
            window.print();
          };

          return (
            <div className="min-h-screen bg-slate-100 font-sans text-slate-800 p-4 md:p-8 flex justify-center print:bg-white print:p-0">
              <div className="max-w-4xl w-full flex flex-col gap-6 print:flex print:flex-col print:gap-6 print:max-w-none">
                
                {/* 헤더 */}
                <div className="bg-white p-6 rounded-xl shadow-sm border-t-4 border-indigo-900 print:shadow-none print:border-t-4 print:border-black print:rounded-none flex justify-between items-start">
                  <div>
                    <h1 className="text-sm font-bold text-indigo-900 tracking-wider mb-2 print:text-black">THE LOGIC INTERACTIVE</h1>
                    <h2 className="text-3xl font-serif font-bold text-slate-900 print:text-black">Be Proud of Who You Are</h2>
                    <p className="text-slate-500 italic mt-1 font-serif print:text-gray-600">Advice from Laura Thompson</p>
                  </div>
                  <button 
                    onClick={handlePrint}
                    className="print:hidden flex items-center gap-2 bg-slate-800 hover:bg-slate-700 text-white px-4 py-2 rounded-lg font-bold transition-colors shadow-sm"
                  >
                    <i className="ph-bold ph-printer text-lg"></i> 인쇄하기
                  </button>
                </div>

                {/* 탭 네비게이션 */}
                <div className="flex bg-white rounded-xl shadow-sm overflow-hidden print:hidden">
                  <button 
                    onClick={() => setActiveTab(1)}
                    className={`flex-1 py-4 px-2 text-center font-bold text-base md:text-lg transition-all duration-300 border-b-4 ${activeTab === 1 ? 'bg-indigo-50 text-indigo-900 border-indigo-900' : 'text-slate-400 border-transparent hover:bg-slate-50 hover:text-slate-600'}`}
                  >
                    <i className="ph-fill ph-book-open mr-2"></i>
                    1. 지문 및 구문 분석
                  </button>
                  <button 
                    onClick={() => setActiveTab(2)}
                    className={`flex-1 py-4 px-2 text-center font-bold text-base md:text-lg transition-all duration-300 border-b-4 ${activeTab === 2 ? 'bg-teal-50 text-teal-800 border-teal-600' : 'text-slate-400 border-transparent hover:bg-slate-50 hover:text-slate-600'}`}
                  >
                    <i className="ph-fill ph-puzzle-piece mr-2"></i>
                    2. 논리 구조 및 실전 문제
                  </button>
                </div>

                {/* === TAB 1: 지문 및 구문 분석 영역 === */}
                <div className={`space-y-6 print:space-y-4 ${activeTab === 1 ? 'block' : 'hidden print:block'}`}>
                  {/* 1. 지문 영역 */}
                  <div className="bg-white p-6 md:p-8 rounded-xl shadow-sm print:shadow-none print:border print:border-slate-300 print:rounded-none">
                    <h3 className="text-xl font-bold text-indigo-900 border-b-2 border-slate-100 pb-3 mb-4 flex items-center gap-2 print:text-black print:border-black">
                      <i className="ph-fill ph-book-open text-2xl print:text-black"></i> PART 1. Text Analysis
                    </h3>
                    
                    <div className="space-y-6 print:space-y-4">
                      {/* 파트 A: 서론 (1~3번) */}
                      <div>
                        <div className="inline-block bg-slate-800 text-white text-sm font-bold px-3 py-1 rounded mb-3 print:bg-slate-200 print:text-black print:border print:border-slate-800">
                          ▶ The Introduction (강연의 목적 제시)
                        </div>
                        <div className="space-y-2 print:space-y-1">
                          {textData.slice(0, 3).map((item) => (
                            <div 
                              key={item.id} 
                              className={`p-2 rounded-lg transition-all duration-300 group cursor-pointer print:p-0 print:mb-2
                                hover:bg-slate-50 border border-transparent print:border-none
                              `}
                            >
                              <p className="text-base md:text-lg leading-relaxed print:text-base print:text-black">
                                <span className="font-bold text-indigo-900 mr-2 text-sm print:text-black">[{item.id.toString().padStart(2, '0')}]</span>
                                <span>{item.text}</span>
                              </p>
                              <p className="text-sm text-slate-500 mt-1 opacity-0 group-hover:opacity-100 transition-opacity duration-300 ml-9 print:hidden">
                                {item.trans}
                              </p>
                            </div>
                          ))}
                        </div>
                      </div>

                      {/* 파트 B: Point 1 (4~16번) */}
                      <div className="border-t border-dashed border-slate-300 pt-4 print:border-black print:pt-4">
                        <div className="inline-block bg-indigo-700 text-white text-sm font-bold px-3 py-1 rounded mb-3 print:bg-slate-200 print:text-black print:border print:border-slate-800">
                          ▶ Point 1: The Liking Gap (호감도 격차 극복하기)
                        </div>
                        <div className="space-y-2 print:space-y-1">
                          {textData.slice(3, 16).map((item) => (
                            <div 
                              key={item.id} 
                              className={`p-2 rounded-lg transition-all duration-300 group cursor-pointer print:p-0 print:mb-2
                                ${activeLogic === item.logicPoint ? 'bg-blue-50 border border-blue-200 shadow-inner print:bg-transparent print:border-none print:shadow-none' : 'hover:bg-slate-50 border border-transparent print:border-none'}
                              `}
                            >
                              <p className="text-base md:text-lg leading-relaxed print:text-base print:text-black">
                                <span className="font-bold text-indigo-900 mr-2 text-sm print:text-black">[{item.id.toString().padStart(2, '0')}]</span>
                                <span className={`${activeLogic === item.logicPoint ? 'font-bold text-blue-800 print:text-black print:underline print:underline-offset-4' : ''}`}>
                                  {item.text}
                                </span>
                              </p>
                              <p className="text-sm text-slate-500 mt-1 opacity-0 group-hover:opacity-100 transition-opacity duration-300 ml-9 print:hidden">
                                {item.trans}
                              </p>
                            </div>
                          ))}
                        </div>
                      </div>

                      {/* 파트 C: Point 2 (17~30번) */}
                      <div className="border-t border-dashed border-slate-300 pt-4 print:border-black print:pt-4">
                        <div className="inline-block bg-teal-700 text-white text-sm font-bold px-3 py-1 rounded mb-3 print:bg-slate-200 print:text-black print:border print:border-slate-800">
                          ▶ Point 2: Fluid Personality (변화하는 성격과 잠재력)
                        </div>
                        <div className="space-y-2 print:space-y-1">
                          {textData.slice(16, 30).map((item) => (
                            <div 
                              key={item.id} 
                              className={`p-2 rounded-lg transition-all duration-300 group cursor-pointer print:p-0 print:mb-2
                                ${activeLogic === item.logicPoint ? 'bg-teal-50 border border-teal-200 shadow-inner print:bg-transparent print:border-none print:shadow-none' : 'hover:bg-slate-50 border border-transparent print:border-none'}
                              `}
                            >
                              <p className="text-base md:text-lg leading-relaxed print:text-base print:text-black">
                                <span className="font-bold text-indigo-900 mr-2 text-sm print:text-black">[{item.id.toString().padStart(2, '0')}]</span>
                                <span className={`${activeLogic === item.logicPoint ? 'font-bold text-teal-800 print:text-black print:underline print:underline-offset-4' : ''}`}>
                                  {item.text}
                                </span>
                              </p>
                              <p className="text-sm text-slate-500 mt-1 opacity-0 group-hover:opacity-100 transition-opacity duration-300 ml-9 print:hidden">
                                {item.trans}
                              </p>
                            </div>
                          ))}
                        </div>
                      </div>

                    </div>
                  </div>

                  {/* 2. 구문 로직 영역 */}
                  <div className="bg-white p-6 md:p-8 rounded-xl shadow-sm print:shadow-none print:border print:border-slate-300 print:rounded-none print-avoid-break">
                    <h3 className="text-xl font-bold text-indigo-900 border-b-2 border-slate-100 pb-3 mb-6 print:text-black print:border-black">
                      PART 2. The Logic Syntax
                    </h3>
                    <p className="text-sm text-slate-500 mb-4 print:hidden">💡 아래의 포인트를 클릭하면 지문의 해당 문장이 강조됩니다.</p>
                    
                    <div className="grid gap-4 print:gap-6">
                      <button 
                        onClick={() => handleLogicClick(1)}
                        className={`text-left border-2 rounded-lg overflow-hidden transition-all duration-300 print:border-2 print:border-slate-800 print:shadow-none print:transform-none print:rounded-none
                          ${activeLogic === 1 ? 'border-blue-600 shadow-md transform -translate-y-1' : 'border-slate-200 hover:border-blue-300'}
                        `}
                      >
                        <div className={`px-4 py-2 font-bold print:bg-slate-100 print:text-black ${activeLogic === 1 ? 'bg-blue-600 text-white' : 'bg-blue-50 text-blue-800'}`}>
                          POINT 01. 통념과 진실의 대조: In fact / It turns out that
                        </div>
                        <div className="p-4 bg-white">
                          <p className="mb-2"><span className="font-semibold text-slate-700 print:text-black">Structure:</span> people believe ~ (통념) $\leftrightarrow$ It turns out that ~ (진실)</p>
                          <p className="text-sm text-slate-600 leading-relaxed print:text-black">
                            사람들은 나쁜 인상을 남긴다고 '믿지만(believe)', 실제 연구 결과 '더 좋은 인상을 남긴다(turns out)'는 <strong className="print:text-black">통념 비판 구조</strong>입니다. 주제를 파악하는 가장 확실한 논리적 장치입니다.
                          </p>
                        </div>
                      </button>

                      <button 
                        onClick={() => handleLogicClick(2)}
                        className={`text-left border-2 rounded-lg overflow-hidden transition-all duration-300 print:border-2 print:border-slate-800 print:shadow-none print:transform-none print:rounded-none
                          ${activeLogic === 2 ? 'border-orange-500 shadow-md transform -translate-y-1' : 'border-slate-200 hover:border-orange-300'}
                        `}
                      >
                        <div className={`px-4 py-2 font-bold print:bg-slate-100 print:text-black ${activeLogic === 2 ? 'bg-orange-500 text-white' : 'bg-orange-50 text-orange-800'}`}>
                          POINT 02. 환언과 방해의 인과: In other words / prevent
                        </div>
                        <div className="p-4 bg-white">
                          <p className="mb-2"><span className="font-semibold text-slate-700 print:text-black">Structure:</span> In other words, A prevent B from \~ing</p>
                          <p className="text-sm text-slate-600 leading-relaxed print:text-black">
                            'In other words(즉 다시 말해)'를 통해 앞선 실험의 의미를 재진술합니다. 스스로를 과소평가하는 고정된 태도(A)가 잠재력 발휘(B)를 <strong>'막는다(prevent)'</strong>는 명확한 부정적 인과관계를 보여줍니다.
                          </p>
                        </div>
                      </button>

                      <button 
                        onClick={() => handleLogicClick(3)}
                        className={`text-left border-2 rounded-lg overflow-hidden transition-all duration-300 print:border-2 print:border-slate-800 print:shadow-none print:transform-none print:rounded-none
                          ${activeLogic === 3 ? 'border-teal-600 shadow-md transform -translate-y-1' : 'border-slate-200 hover:border-teal-300'}
                        `}
                      >
                        <div className={`px-4 py-2 font-bold print:bg-slate-100 print:text-black ${activeLogic === 3 ? 'bg-teal-600 text-white' : 'bg-teal-50 text-teal-800'}`}>
                          POINT 03. 유추를 통한 주장 도출: Just like ~, so ~
                        </div>
                        <div className="p-4 bg-white">
                          <p className="mb-2"><span className="font-semibold text-slate-700 print:text-black">Structure:</span> Just like A, so do B $\rightarrow$ Start V (명령문)</p>
                          <p className="text-sm text-slate-600 leading-relaxed print:text-black">
                            취향이 변하는 것(A)에 빗대어 성격도 변한다(B)는 <strong className="print:text-black">유추(Analogy)</strong> 기법을 사용했습니다. 이후 "만들기 시작하라(Start)"는 명령문을 통해 필자의 궁극적인 행동 촉구(주장)를 완성합니다.
                          </p>
                        </div>
                      </button>
                    </div>

                    <div className="mt-8 text-center print:hidden">
                       <button onClick={() => setActiveTab(2)} className="bg-indigo-900 hover:bg-indigo-800 text-white px-8 py-3 rounded-full font-bold shadow-md transition-colors flex items-center gap-2 mx-auto">
                         구문 분석 완료! 실전 문제로 이동 <i className="ph-bold ph-arrow-right"></i>
                       </button>
                    </div>
                  </div>
                </div>

                {/* === TAB 2: 논리 구조도 및 퀴즈 영역 === */}
                <div className={`space-y-6 print:space-y-4 print:mt-4 ${activeTab === 2 ? 'block' : 'hidden print:block'}`}>
                  
                  {/* 3. 로직 맵 */}
                  <div className="bg-white p-6 rounded-xl shadow-sm border-t-4 border-teal-600 print:shadow-none print:border print:border-slate-300 print:border-t-4 print:border-t-black print:rounded-none print-avoid-break">
                    <div className="flex justify-between items-center border-b-2 border-slate-100 pb-3 mb-6 print:border-black">
                      <h3 className="text-xl font-bold text-slate-800 flex items-center gap-2 print:text-black">
                        <i className="ph-fill ph-play-circle text-2xl text-teal-600 print:text-black"></i> PART 3. Logic Map
                      </h3>
                      <div className="print:hidden">
                        {mapStep > 0 && mapStep < logicMapSteps.length && (
                          <button onClick={nextMapStep} className="bg-teal-100 hover:bg-teal-200 text-teal-800 px-3 py-1 rounded text-sm font-bold transition-colors">
                            Next Step ➔
                          </button>
                        )}
                        {mapStep === logicMapSteps.length && (
                           <button onClick={resetMap} className="text-slate-400 hover:text-slate-600 text-sm underline">
                            Reset
                           </button>
                        )}
                      </div>
                    </div>
                    
                    <div 
                      className={`h-64 flex-col items-center justify-center border-2 border-dashed border-slate-200 rounded-lg bg-slate-50 text-center p-6 cursor-pointer hover:bg-teal-50 transition-colors 
                        ${mapStep === 0 ? 'flex' : 'hidden'} print:!hidden
                      `} 
                      onClick={nextMapStep}
                    >
                      <i className="ph-fill ph-play-circle text-5xl text-teal-400 mb-4"></i>
                      <p className="text-slate-600 font-medium">클릭하여 강연의 논리 구조를<br/>단계별로 파악해 보세요.</p>
                    </div>
                    
                    <div className={`flex-col items-center gap-2 py-4 ${mapStep > 0 ? 'flex' : 'hidden'} print:!flex`}>
                      {logicMapSteps.map((step, idx) => (
                        <React.Fragment key={step.id}>
                          <div 
                            className={`w-full max-w-sm border-2 rounded-lg p-4 flex flex-col items-center text-center transition-all duration-500 transform
                              print:!opacity-100 print:!translate-y-0 print:!flex print:border-slate-800 print:rounded-none print:bg-white print:text-black
                              ${idx < mapStep ? `opacity-100 translate-y-0 ${step.color}` : 'opacity-0 translate-y-8 hidden'}
                            `}
                          >
                            <div className="print:hidden">{step.icon}</div>
                            <span className="font-bold text-sm mb-1 print:text-black">{step.title}</span>
                            <span className="text-sm opacity-90 print:text-black">{step.desc}</span>
                          </div>
                          <div 
                            className={`flex-col items-center opacity-100 animate-pulse 
                              print:!flex print:!opacity-100 print:animate-none
                              ${idx < logicMapSteps.length - 1 && idx < mapStep ? 'flex' : 'hidden'}
                            `}
                          >
                            <div className="w-0.5 h-6 bg-slate-300 print:bg-slate-800"></div>
                            {/* 화살표 라벨 추가 */}
                            {idx === 0 ? (
                              <div className="bg-blue-100 text-blue-600 text-xs font-bold px-2 py-1 rounded-full my-1 border border-blue-200 print:bg-white print:text-black print:border-slate-800 print:rounded-none">
                                It turns out that
                              </div>
                            ) : idx === 1 ? (
                              <div className="bg-orange-100 text-orange-600 text-xs font-bold px-2 py-1 rounded-full my-1 border border-orange-200 print:bg-white print:text-black print:border-slate-800 print:rounded-none">
                                In other words
                              </div>
                            ) : idx === 2 ? (
                              <div className="bg-green-100 text-green-700 text-xs font-bold px-2 py-1 rounded-full my-1 border border-green-300 print:bg-white print:text-black print:border-slate-800 print:rounded-none">
                                Therefore
                              </div>
                            ) : null}
                            <i className="ph-bold ph-arrow-right text-base text-slate-400 transform rotate-90 print:text-slate-800"></i>
                          </div>
                        </React.Fragment>
                      ))}
                    </div>
                  </div>

                  {/* 4. 실전 변형 문제 */}
                  <div className="bg-white p-6 rounded-xl shadow-sm print:shadow-none print:border print:border-slate-300 print:rounded-none print-avoid-break">
                    <h3 className="text-xl font-bold text-slate-800 border-b-2 border-slate-100 pb-3 mb-6 flex items-center gap-2 print:text-black print:border-black">
                      <i className="ph-fill ph-check-circle text-2xl text-indigo-600 print:text-black"></i> PART 4. Challenge
                    </h3>
                    
                    {/* Q1. 글의 제목 파악 */}
                    <div className="mb-8">
                      <div className="bg-slate-50 border border-slate-200 p-5 rounded-lg mb-4 print:bg-white print:border-none print:p-0 print:mb-6">
                        <p className="font-bold text-slate-800 mb-2 print:text-black">Q1. 제목 파악</p>
                        <p className="text-sm text-slate-600 mb-4 print:text-black">다음 글의 제목으로 가장 적절한 것은?</p>
                      </div>

                      <div className="space-y-2 print:space-y-3">
                        {[
                          { id: 1, text: "Why the First Impression Matters Most" },
                          { id: 2, text: "Break Free from Your Fixed Assumptions", isCorrect: true },
                          { id: 3, text: "How to Build a Strong Personality Type" },
                          { id: 4, text: "The Science of Human Relationships" }
                        ].map((choice) => (
                          <button
                            key={choice.id}
                            onClick={() => setQuiz1Answered(choice.id)}
                            disabled={quiz1Answered !== null}
                            className={`w-full text-left p-3 rounded-lg border flex items-center transition-all duration-200
                              print:border-none print:p-1 print:text-black
                              ${quiz1Answered === null ? 'border-slate-200 hover:border-indigo-400 hover:bg-indigo-50' : 
                                (choice.isCorrect ? 'border-green-500 bg-green-50 text-green-800 font-bold shadow-sm' : 
                                  (quiz1Answered === choice.id ? 'border-red-400 bg-red-50 text-red-500' : 'border-slate-100 text-slate-400 opacity-50'))
                              }
                            `}
                          >
                            <span className="w-8 inline-block font-mono text-slate-500 print:text-black">①</span> 
                            {choice.text}
                            {quiz1Answered !== null && choice.isCorrect && <i className="ph-fill ph-check-circle text-lg ml-auto text-green-500 print:hidden"></i>}
                          </button>
                        ))}
                      </div>

                      {quiz1Answered !== null && (
                        <div className={`mt-4 p-4 rounded-lg text-sm leading-relaxed animate-fade-in print:hidden
                          ${quiz1Answered === 2 ? 'bg-green-100 text-green-900 border border-green-300' : 'bg-red-100 text-red-900 border border-red-300'}
                        `}>
                          <p className="font-bold mb-1">
                            {quiz1Answered === 2 ? '🎉 정답입니다!' : '오답입니다. 다시 한번 생각해 보세요.'}
                          </p>
                          <p>
                            <strong>해설:</strong> 글 전체에 걸쳐 로라 톰슨은 '내가 안 좋은 인상을 줄 것이다'라는 가정(Assumption)과 '내 성격은 고정되어 있다'는 가정에서 벗어나라고 조언합니다. 따라서 '당신의 고정된 가정에서 벗어나라'는 의미의 <strong>2번</strong>이 강연을 완벽하게 포괄하는 제목입니다.
                          </p>
                          <button onClick={() => setQuiz1Answered(null)} className="mt-3 text-sm underline opacity-70 hover:opacity-100">
                            다시 풀기
                          </button>
                        </div>
                      )}
                    </div>

                    <hr className="my-8 border-slate-200 print:border-black" />

                    {/* Q2. 요약문 완성 */}
                    <div>
                      <div className="bg-slate-50 border border-slate-200 p-5 rounded-lg mb-4 print:bg-white print:border-none print:p-0 print:mb-6">
                        <p className="font-bold text-slate-800 mb-2 print:text-black">Q2. 요약문 완성</p>
                        <p className="text-sm text-slate-600 mb-4 print:text-black">다음 글의 내용을 한 문장으로 요약하고자 한다. 빈칸 (A), (B)에 들어갈 말로 가장 적절한 것은?</p>
                        <p className="text-md leading-relaxed bg-white p-4 border border-slate-200 rounded print:border-slate-400 print:rounded-none print:text-black">
                          Laura advises us not to <span className="font-bold text-indigo-800">( A )</span> ourselves based on the "liking gap" and reminds us that our personality is not <span className="font-bold text-indigo-800">( B )</span>, encouraging us to shape our own future.
                        </p>
                      </div>

                      <div className="space-y-2 print:space-y-3">
                        {[
                          { id: 1, text: "(A) overestimate —— (B) flexible" },
                          { id: 2, text: "(A) underestimate —— (B) fixed", isCorrect: true },
                          { id: 3, text: "(A) disguise —— (B) predictable" },
                          { id: 4, text: "(A) isolate —— (B) permanent" }
                        ].map((choice) => (
                          <button
                            key={choice.id}
                            onClick={() => setQuiz2Answered(choice.id)}
                            disabled={quiz2Answered !== null}
                            className={`w-full text-left p-3 rounded-lg border flex items-center transition-all duration-200
                              print:border-none print:p-1 print:text-black
                              ${quiz2Answered === null ? 'border-slate-200 hover:border-indigo-400 hover:bg-indigo-50' : 
                                (choice.isCorrect ? 'border-green-500 bg-green-50 text-green-800 font-bold shadow-sm' : 
                                  (quiz2Answered === choice.id ? 'border-red-400 bg-red-50 text-red-500' : 'border-slate-100 text-slate-400 opacity-50'))
                              }
                            `}
                          >
                            <span className="w-8 inline-block font-mono text-slate-500 print:text-black">({choice.id})</span> 
                            {choice.text}
                            {quiz2Answered !== null && choice.isCorrect && <i className="ph-fill ph-check-circle text-lg ml-auto text-green-500 print:hidden"></i>}
                          </button>
                        ))}
                      </div>

                      {quiz2Answered !== null && (
                        <div className={`mt-4 p-4 rounded-lg text-sm leading-relaxed animate-fade-in print:hidden
                          ${quiz2Answered === 2 ? 'bg-green-100 text-green-900 border border-green-300' : 'bg-red-100 text-red-900 border border-red-300'}
                        `}>
                          <p className="font-bold mb-1">
                            {quiz2Answered === 2 ? '🎉 정답입니다!' : '오답입니다. 다시 한번 생각해 보세요.'}
                          </p>
                          <p>
                            <strong>해설:</strong> 호감도 격차(liking gap)로 인해 자신을 <strong>과소평가(underestimate)</strong>하지 말 것, 그리고 성격은 <strong>고정된(fixed)</strong> 것이 아니라는 두 가지 핵심 조언을 정확히 요약한 선택지입니다. (본문 14번 문장의 underestimate와 17번 문장의 fixed가 패러프레이징 없이 그대로 활용되었습니다.)
                          </p>
                          <button onClick={() => setQuiz2Answered(null)} className="mt-3 text-sm underline opacity-70 hover:opacity-100">
                            다시 풀기
                          </button>
                        </div>
                      )}
                    </div>

                  </div>
                </div>

              </div>
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
