<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE LOGIC Interactive App - Lemonade Part 1</title>
    
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    
    <style>
        @media print {
            body {
                -webkit-print-color-adjust: exact;
                print-color-adjust: exact;
                background-color: white !important;
            }
            ::-webkit-scrollbar {
                display: none;
            }
            .print-avoid-break {
                break-inside: avoid;
            }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        const textData = [
          // Part 1: Intro (1~4)
          { id: 1, text: "High school is not only where we study different subjects but also where we learn about life.", trans: "고등학교는 우리가 다양한 과목을 공부하는 곳일 뿐만 아니라 삶에 대해 배우는 곳이기도 합니다.", isHighlight: true, logicPoint: 1, logic: 'intro' },
          { id: 2, text: "We are a group of students that get together every week to discuss ways to make a difference in our society.", trans: "우리는 우리 사회에 변화를 만들 방법을 논의하기 위해 매주 모이는 학생 그룹입니다." },
          { id: 3, text: "In this newsletter, I would like to share the story of how we participated in our community’s international food festival.", trans: "이 소식지에서 저는 우리가 지역사회의 국제 음식 축제에 어떻게 참여했는지에 대한 이야기를 나누고 싶습니다." },
          { id: 4, text: "On top of raising enough money to make a donation, we learned a lot about how to create and carry out a business plan. Here is our story.", trans: "기부할 수 있을 만큼 충분한 돈을 모으는 것 외에도, 우리는 사업 계획을 세우고 실행하는 방법에 대해 많이 배웠습니다. 여기 우리의 이야기가 있습니다.", isHighlight: true, logicPoint: 2 },

          // Part 2: Choosing What to Sell (5~8)
          { id: 5, text: "The first step we took was to decide what to sell.", trans: "우리가 취한 첫 번째 단계는 무엇을 팔지 결정하는 것이었습니다.", logic: 'choose' },
          { id: 6, text: "Some of the ideas that we discussed included cotton candy, corn dogs, and lemonade.", trans: "우리가 논의한 아이디어 중 일부에는 솜사탕, 콘도그(핫도그), 레모네이드가 포함되었습니다." },
          { id: 7, text: "Out of these options, we agreed that a lemonade stand would be the easiest for us, as we would need only a good recipe and a few ingredients.", trans: "이러한 선택지들 중에서, 우리는 좋은 레시피와 몇 가지 재료만 있으면 되기 때문에 레모네이드 가판대가 우리에게 가장 쉬울 것이라는 데 동의했습니다.", isHighlight: true, logicPoint: 3 },
          { id: 8, text: "We also found out that no other stand had signed up to sell drinks, so lemonade seemed to be the natural choice.", trans: "우리는 또한 음료를 팔겠다고 신청한 다른 가판대가 없다는 것을 알게 되었고, 그래서 레모네이드는 당연한 선택인 것 같았습니다." },

          // Part 3: Finding the Recipe (9~11)
          { id: 9, text: "Once we decided on lemonade, we needed the perfect recipe. Fortunately, we were able to find a simple one online.", trans: "일단 레모네이드로 결정하자, 우리는 완벽한 레시피가 필요했습니다. 다행히도 온라인에서 간단한 것을 찾을 수 있었습니다.", logic: 'recipe' },
          { id: 10, text: "We just needed freshly squeezed lemons, sugar, water, and ice.", trans: "우리는 그저 갓 짜낸 레몬, 설탕, 물, 그리고 얼음만 필요했습니다." },
          { id: 11, text: "After trying out different variations of the recipe on friends and family, we decided on the final recipe.", trans: "친구들과 가족들에게 레시피의 다양한 변형을 시도해 본 후, 우리는 최종 레시피를 결정했습니다.", isHighlight: true, logicPoint: 4 }
        ];

        const logicMapSteps = [
          { id: 'intro', title: "THE PURPOSE (프로젝트 목적)", desc: "Donation & Learning a business plan", color: "bg-stone-100 border-stone-400 text-stone-800", icon: <i className="ph-fill ph-target text-xl mb-2"></i> },
          { id: 'choose', title: "THE OPTIONS (옵션 탐색)", desc: "Cotton candy, Corn dogs, Lemonade", color: "bg-yellow-100 border-yellow-400 text-yellow-800", icon: <i className="ph-fill ph-list-magnifying-glass text-xl mb-2"></i> },
          { id: 'logic', title: "DECISION LOGIC (선정 논리)", desc: "Easy to make + No competitors", color: "bg-amber-100 border-amber-400 text-amber-800", icon: <i className="ph-fill ph-scales text-xl mb-2"></i> },
          { id: 'recipe', title: "EXECUTION (실행 및 테스트)", desc: "Find recipe online & Test on family", color: "bg-orange-100 border-orange-400 text-orange-800", icon: <i className="ph-fill ph-flask text-xl mb-2"></i> }
        ];

        function App() {
          const [activeTab, setActiveTab] = useState(1);
          const [activeLogic, setActiveLogic] = useState(null);
          const [mapStep, setMapStep] = useState(0);
          const [quiz1Answered, setQuiz1Answered] = useState(null);
          const [quiz2Answered, setQuiz2Answered] = useState(null);

          const handleLogicClick = (point) => setActiveLogic(activeLogic === point ? null : point);
          const nextMapStep = () => { if (mapStep < logicMapSteps.length) setMapStep(mapStep + 1); };
          const resetMap = () => setMapStep(0);

          const handlePrint = () => {
            window.print();
          };

          return (
            <div className="min-h-screen bg-stone-50 font-sans text-stone-800 p-4 md:p-8 flex justify-center print:bg-white print:p-0">
              <div className="max-w-4xl w-full flex flex-col gap-6 print:flex print:flex-col print:gap-6 print:max-w-none">
                
                {/* 헤더 */}
                <div className="bg-white p-6 rounded-xl shadow-sm border-t-4 border-yellow-500 print:shadow-none print:border-t-4 print:border-black print:rounded-none flex justify-between items-start">
                  <div>
                    <h1 className="text-sm font-bold text-yellow-700 tracking-wider mb-2 print:text-black">THE LOGIC INTERACTIVE</h1>
                    <h2 className="text-3xl font-serif font-bold text-stone-900 print:text-black">Sweet Success: Lemonade Stand</h2>
                    <p className="text-stone-500 italic mt-1 font-serif print:text-gray-600">Part 1: Setting Up Our Plans</p>
                  </div>
                  <button 
                    onClick={handlePrint}
                    className="print:hidden flex items-center gap-2 bg-stone-800 hover:bg-stone-700 text-white px-4 py-2 rounded-lg font-bold transition-colors shadow-sm"
                  >
                    <i className="ph-bold ph-printer text-lg"></i> 인쇄하기
                  </button>
                </div>

                {/* 탭 네비게이션 */}
                <div className="flex bg-white rounded-xl shadow-sm overflow-hidden print:hidden">
                  <button 
                    onClick={() => setActiveTab(1)}
                    className={`flex-1 py-4 px-2 text-center font-bold text-base md:text-lg transition-all duration-300 border-b-4 ${activeTab === 1 ? 'bg-yellow-50 text-yellow-800 border-yellow-500' : 'text-stone-400 border-transparent hover:bg-stone-50 hover:text-stone-600'}`}
                  >
                    <i className="ph-fill ph-book-open mr-2"></i>
                    1. 지문 및 구문 분석
                  </button>
                  <button 
                    onClick={() => setActiveTab(2)}
                    className={`flex-1 py-4 px-2 text-center font-bold text-base md:text-lg transition-all duration-300 border-b-4 ${activeTab === 2 ? 'bg-amber-50 text-amber-800 border-amber-500' : 'text-stone-400 border-transparent hover:bg-stone-50 hover:text-stone-600'}`}
                  >
                    <i className="ph-fill ph-puzzle-piece mr-2"></i>
                    2. 논리 구조 및 실전 문제
                  </button>
                </div>

                {/* === TAB 1: 지문 및 구문 분석 영역 === */}
                <div className={`space-y-6 print:space-y-4 ${activeTab === 1 ? 'block' : 'hidden print:block'}`}>
                  {/* 1. 지문 영역 */}
                  <div className="bg-white p-6 md:p-8 rounded-xl shadow-sm print:shadow-none print:border print:border-slate-300 print:rounded-none">
                    <h3 className="text-xl font-bold text-yellow-700 border-b-2 border-stone-100 pb-3 mb-4 flex items-center gap-2 print:text-black print:border-black">
                      <i className="ph-fill ph-book-open text-2xl print:text-black"></i> PART 1. Text Analysis
                    </h3>
                    
                    <div className="space-y-8 print:space-y-6">
                      
                      {/* 파트 A: Intro (1~4번) */}
                      <div>
                        <div className="inline-block bg-stone-700 text-white text-sm font-bold px-3 py-1 rounded mb-3 print:bg-stone-200 print:text-black print:border print:border-stone-800">
                          ▶ The Introduction (프로젝트의 목적과 의미)
                        </div>
                        <div className="space-y-2 print:space-y-1">
                          {textData.slice(0, 4).map((item) => (
                            <div 
                              key={item.id} 
                              className={`p-2 rounded-lg transition-all duration-300 group cursor-pointer print:p-0 print:mb-2
                                ${activeLogic === item.logicPoint ? 'bg-yellow-50 border border-yellow-200 shadow-inner print:bg-transparent print:border-none print:shadow-none' : 'hover:bg-stone-50 border border-transparent print:border-none'}
                              `}
                            >
                              <p className="text-base md:text-lg leading-relaxed print:text-base print:text-black">
                                <span className="font-bold text-yellow-600 mr-2 text-sm print:text-black">[{item.id.toString().padStart(2, '0')}]</span>
                                <span className={`${activeLogic === item.logicPoint ? 'font-bold text-yellow-800 print:text-black print:underline print:underline-offset-4' : ''}`}>
                                  {item.text}
                                </span>
                              </p>
                              <p className="text-sm text-stone-500 mt-1 opacity-0 group-hover:opacity-100 transition-opacity duration-300 ml-9 print:hidden">
                                {item.trans}
                              </p>
                            </div>
                          ))}
                        </div>
                      </div>

                      {/* 파트 B: Choosing What to Sell (5~8번) */}
                      <div className="border-t border-dashed border-stone-300 pt-6 print:border-black print:pt-4">
                        <div className="inline-block bg-yellow-600 text-white text-sm font-bold px-3 py-1 rounded mb-3 print:bg-stone-200 print:text-black print:border print:border-stone-800">
                          ▶ Choosing What to Sell (품목 선정의 논리)
                        </div>
                        <div className="space-y-2 print:space-y-1">
                          {textData.slice(4, 8).map((item) => (
                            <div 
                              key={item.id} 
                              className={`p-2 rounded-lg transition-all duration-300 group cursor-pointer print:p-0 print:mb-2
                                ${activeLogic === item.logicPoint ? 'bg-amber-50 border border-amber-200 shadow-inner print:bg-transparent print:border-none print:shadow-none' : 'hover:bg-stone-50 border border-transparent print:border-none'}
                              `}
                            >
                              <p className="text-base md:text-lg leading-relaxed print:text-base print:text-black">
                                <span className="font-bold text-yellow-600 mr-2 text-sm print:text-black">[{item.id.toString().padStart(2, '0')}]</span>
                                <span className={`${activeLogic === item.logicPoint ? 'font-bold text-amber-700 print:text-black print:underline print:underline-offset-4' : ''}`}>
                                  {item.text}
                                </span>
                              </p>
                              <p className="text-sm text-stone-500 mt-1 opacity-0 group-hover:opacity-100 transition-opacity duration-300 ml-9 print:hidden">
                                {item.trans}
                              </p>
                            </div>
                          ))}
                        </div>
                      </div>

                      {/* 파트 C: Finding the Recipe (9~11번) */}
                      <div className="border-t border-dashed border-stone-300 pt-6 print:border-black print:pt-4">
                        <div className="inline-block bg-orange-500 text-white text-sm font-bold px-3 py-1 rounded mb-3 print:bg-stone-200 print:text-black print:border print:border-stone-800">
                          ▶ Finding the Recipe (레시피 탐색과 테스트)
                        </div>
                        <div className="space-y-2 print:space-y-1">
                          {textData.slice(8, 11).map((item) => (
                            <div 
                              key={item.id} 
                              className={`p-2 rounded-lg transition-all duration-300 group cursor-pointer print:p-0 print:mb-2
                                ${activeLogic === item.logicPoint ? 'bg-orange-50 border border-orange-200 shadow-inner print:bg-transparent print:border-none print:shadow-none' : 'hover:bg-stone-50 border border-transparent print:border-none'}
                              `}
                            >
                              <p className="text-base md:text-lg leading-relaxed print:text-base print:text-black">
                                <span className="font-bold text-yellow-600 mr-2 text-sm print:text-black">[{item.id.toString().padStart(2, '0')}]</span>
                                <span className={`${activeLogic === item.logicPoint ? 'font-bold text-orange-700 print:text-black print:underline print:underline-offset-4' : ''}`}>
                                  {item.text}
                                </span>
                              </p>
                              <p className="text-sm text-stone-500 mt-1 opacity-0 group-hover:opacity-100 transition-opacity duration-300 ml-9 print:hidden">
                                {item.trans}
                              </p>
                            </div>
                          ))}
                        </div>
                      </div>

                    </div>
                  </div>

                  {/* 2. 구문 로직 영역 */}
                  <div className="bg-white p-6 md:p-8 rounded-xl shadow-sm print:shadow-none print:border print:border-slate-300 print:rounded-none print-avoid-break">
                    <h3 className="text-xl font-bold text-yellow-700 border-b-2 border-stone-100 pb-3 mb-6 print:text-black print:border-black">
                      PART 2. The Logic Syntax
                    </h3>
                    <p className="text-sm text-stone-500 mb-6 print:hidden">💡 아래의 포인트를 클릭하면 지문의 해당 문장이 강조됩니다.</p>
                    
                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4 print:grid-cols-1 print:gap-6">
                      
                      {/* POINT 1 */}
                      <button 
                        onClick={() => handleLogicClick(1)}
                        className={`text-left border-2 rounded-lg overflow-hidden transition-all duration-300 print:border-2 print:border-slate-800 print:shadow-none print:transform-none print:rounded-none
                          ${activeLogic === 1 ? 'border-yellow-500 shadow-md transform -translate-y-1' : 'border-stone-200 hover:border-yellow-400'}
                        `}
                      >
                        <div className={`px-4 py-2 font-bold print:bg-stone-100 print:text-black ${activeLogic === 1 ? 'bg-yellow-500 text-white' : 'bg-yellow-50 text-yellow-800'}`}>
                          POINT 01. 상관접속사: not only A but also B
                        </div>
                        <div className="p-4 bg-white h-full">
                          <p className="mb-2"><span className="font-semibold text-stone-700 print:text-black">Structure:</span> [not only] where we study... [but also] where we learn about life.</p>
                          <p className="text-sm text-stone-600 leading-relaxed print:text-black">
                            "A뿐만 아니라 B도"라는 뜻으로, 학교가 단순한 학업(A)을 넘어 <strong>'삶(경제, 비즈니스)에 대한 배움터(B)'</strong>라는 이 글 전체의 주제를 열어주는 문장입니다.
                          </p>
                        </div>
                      </button>

                      {/* POINT 2 */}
                      <button 
                        onClick={() => handleLogicClick(2)}
                        className={`text-left border-2 rounded-lg overflow-hidden transition-all duration-300 print:border-2 print:border-slate-800 print:shadow-none print:transform-none print:rounded-none
                          ${activeLogic === 2 ? 'border-yellow-600 shadow-md transform -translate-y-1' : 'border-stone-200 hover:border-yellow-400'}
                        `}
                      >
                        <div className={`px-4 py-2 font-bold print:bg-stone-100 print:text-black ${activeLogic === 2 ? 'bg-yellow-600 text-white' : 'bg-yellow-50 text-yellow-800'}`}>
                          POINT 02. 부가 정보의 전치사구: On top of
                        </div>
                        <div className="p-4 bg-white h-full">
                          <p className="mb-2"><span className="font-semibold text-stone-700 print:text-black">Structure:</span> [On top of] raising enough money..., we learned a lot</p>
                          <p className="text-sm text-stone-600 leading-relaxed print:text-black">
                            "~하는 것 외에도(In addition to)"라는 뜻입니다. 기부금 모금이라는 1차적 목표 외에, 사업 계획(business plan)을 세우고 실행하는 법을 배웠다는 <strong>주된 목적의 확장</strong>을 보여줍니다.
                          </p>
                        </div>
                      </button>

                      {/* POINT 3 */}
                      <button 
                        onClick={() => handleLogicClick(3)}
                        className={`text-left border-2 rounded-lg overflow-hidden transition-all duration-300 print:border-2 print:border-slate-800 print:shadow-none print:transform-none print:rounded-none
                          ${activeLogic === 3 ? 'border-amber-500 shadow-md transform -translate-y-1' : 'border-stone-200 hover:border-amber-400'}
                        `}
                      >
                        <div className={`px-4 py-2 font-bold print:bg-stone-100 print:text-black ${activeLogic === 3 ? 'bg-amber-500 text-white' : 'bg-amber-50 text-amber-800'}`}>
                          POINT 03. 한정과 선택: Out of
                        </div>
                        <div className="p-4 bg-white h-full">
                          <p className="mb-2"><span className="font-semibold text-stone-700 print:text-black">Structure:</span> [Out of] these options, we agreed that...</p>
                          <p className="text-sm text-stone-600 leading-relaxed print:text-black">
                            "~들 중에서"라는 뜻으로, 브레인스토밍된 여러 아이디어(솜사탕, 콘도그 등) 중에서 가장 쉽고 효율적인 레모네이드로 <strong>선택의 범위가 좁혀지는 논리적 결정 순간</strong>을 보여줍니다.
                          </p>
                        </div>
                      </button>

                      {/* POINT 4 */}
                      <button 
                        onClick={() => handleLogicClick(4)}
                        className={`text-left border-2 rounded-lg overflow-hidden transition-all duration-300 print:border-2 print:border-slate-800 print:shadow-none print:transform-none print:rounded-none
                          ${activeLogic === 4 ? 'border-orange-500 shadow-md transform -translate-y-1' : 'border-stone-200 hover:border-orange-400'}
                        `}
                      >
                        <div className={`px-4 py-2 font-bold print:bg-stone-100 print:text-black ${activeLogic === 4 ? 'bg-orange-500 text-white' : 'bg-orange-50 text-orange-800'}`}>
                          POINT 04. 시간의 순서를 나타내는 전치사: After
                        </div>
                        <div className="p-4 bg-white h-full">
                          <p className="mb-2"><span className="font-semibold text-stone-700 print:text-black">Structure:</span> [After] trying out different variations..., we decided on...</p>
                          <p className="text-sm text-stone-600 leading-relaxed print:text-black">
                            단순히 레시피를 정한 것이 아니라, 여러 번의 '실험/테스트(trying out)'라는 필수적인 검증 단계를 거친 <strong>후에야</strong> 최종 결정을 내렸다는 시간적/논리적 선후 관계를 보여줍니다.
                          </p>
                        </div>
                      </button>

                    </div>

                    <div className="mt-8 text-center print:hidden">
                       <button onClick={() => setActiveTab(2)} className="bg-yellow-600 hover:bg-yellow-500 text-white px-8 py-3 rounded-full font-bold shadow-md transition-colors flex items-center gap-2 mx-auto">
                         구문 분석 완료! 실전 문제로 이동 <i className="ph-bold ph-arrow-right"></i>
                       </button>
                    </div>
                  </div>
                </div>

                {/* === TAB 2: 논리 구조도 및 퀴즈 영역 === */}
                <div className={`space-y-6 print:space-y-4 print:mt-4 ${activeTab === 2 ? 'block' : 'hidden print:block'}`}>
                  
                  {/* 3. 로직 맵 */}
                  <div className="bg-white p-6 rounded-xl shadow-sm border-t-4 border-amber-500 print:shadow-none print:border print:border-slate-300 print:border-t-4 print:border-t-black print:rounded-none print-avoid-break">
                    <div className="flex justify-between items-center border-b-2 border-stone-100 pb-3 mb-6 print:border-black">
                      <h3 className="text-xl font-bold text-stone-800 flex items-center gap-2 print:text-black">
                        <i className="ph-fill ph-play-circle text-2xl text-amber-500 print:text-black"></i> PART 3. Logic Map
                      </h3>
                      <div className="print:hidden">
                        {mapStep > 0 && mapStep < logicMapSteps.length && (
                          <button onClick={nextMapStep} className="bg-amber-100 hover:bg-amber-200 text-amber-800 px-3 py-1 rounded text-sm font-bold transition-colors">
                            Next Step ➔
                          </button>
                        )}
                        {mapStep === logicMapSteps.length && (
                           <button onClick={resetMap} className="text-stone-400 hover:text-stone-600 text-sm underline">
                            Reset
                           </button>
                        )}
                      </div>
                    </div>
                    
                    <div 
                      className={`h-64 flex-col items-center justify-center border-2 border-dashed border-stone-200 rounded-lg bg-stone-50 text-center p-6 cursor-pointer hover:bg-amber-50 transition-colors 
                        ${mapStep === 0 ? 'flex' : 'hidden'} print:!hidden
                      `} 
                      onClick={nextMapStep}
                    >
                      <i className="ph-fill ph-play-circle text-5xl text-amber-400 mb-4"></i>
                      <p className="text-stone-600 font-medium">클릭하여 사업 기획의 첫 단계를<br/>논리적으로 파악해 보세요.</p>
                    </div>
                    
                    <div className={`flex-col items-center gap-2 py-4 ${mapStep > 0 ? 'flex' : 'hidden'} print:!flex`}>
                      {logicMapSteps.map((step, idx) => (
                        <React.Fragment key={step.id}>
                          <div 
                            className={`w-full max-w-sm border-2 rounded-lg p-4 flex flex-col items-center text-center transition-all duration-500 transform
                              print:!opacity-100 print:!translate-y-0 print:!flex print:border-slate-800 print:rounded-none print:bg-white print:text-black
                              ${idx < mapStep ? `opacity-100 translate-y-0 ${step.color}` : 'opacity-0 translate-y-8 hidden'}
                            `}
                          >
                            <div className="print:hidden">{step.icon}</div>
                            <span className="font-bold text-sm mb-1 print:text-black">{step.title}</span>
                            <span className="text-sm opacity-90 print:text-black">{step.desc}</span>
                          </div>
                          <div 
                            className={`flex-col items-center opacity-100 animate-pulse 
                              print:!flex print:!opacity-100 print:animate-none
                              ${idx < logicMapSteps.length - 1 && idx < mapStep ? 'flex' : 'hidden'}
                            `}
                          >
                            <div className="w-0.5 h-6 bg-stone-300 print:bg-stone-800"></div>
                            {/* 화살표 라벨 추가 */}
                            {idx === 0 ? (
                              <div className="bg-yellow-100 text-yellow-700 text-xs font-bold px-2 py-1 rounded-full my-1 border border-yellow-300 print:bg-white print:text-black print:border-slate-800 print:rounded-none">
                                Leads to
                              </div>
                            ) : idx === 1 ? (
                              <div className="bg-amber-100 text-amber-700 text-xs font-bold px-2 py-1 rounded-full my-1 border border-amber-300 print:bg-white print:text-black print:border-slate-800 print:rounded-none">
                                Filtered by
                              </div>
                            ) : idx === 2 ? (
                              <div className="bg-orange-100 text-orange-700 text-xs font-bold px-2 py-1 rounded-full my-1 border border-orange-300 print:bg-white print:text-black print:border-slate-800 print:rounded-none">
                                Finalizing
                              </div>
                            ) : null}
                            <i className="ph-bold ph-arrow-right text-base text-stone-400 transform rotate-90 print:text-stone-800"></i>
                          </div>
                        </React.Fragment>
                      ))}
                    </div>
                  </div>

                  {/* 4. 실전 변형 문제 */}
                  <div className="bg-white p-6 rounded-xl shadow-sm print:shadow-none print:border print:border-slate-300 print:rounded-none print-avoid-break">
                    <h3 className="text-xl font-bold text-stone-800 border-b-2 border-stone-100 pb-3 mb-6 flex items-center gap-2 print:text-black print:border-black">
                      <i className="ph-fill ph-check-circle text-2xl text-amber-500 print:text-black"></i> PART 4. Challenge
                    </h3>
                    
                    {/* Q1. 내용 일치 */}
                    <div className="mb-8">
                      <div className="bg-stone-50 border border-stone-200 p-5 rounded-lg mb-4 print:bg-white print:border-none print:p-0 print:mb-6">
                        <p className="font-bold text-stone-800 mb-2 print:text-black">Q1. 내용 일치 파악</p>
                        <p className="text-sm text-stone-600 mb-4 print:text-black">동아리 학생들이 판매 품목으로 레모네이드를 선택한 이유로 본문에 언급되지 <u>않은</u> 것은?</p>
                      </div>

                      <div className="space-y-2 print:space-y-3">
                        {[
                          { id: 1, text: "만드는 과정과 레시피가 비교적 쉽기 때문에" },
                          { id: 2, text: "소수의 몇 가지 재료만 있으면 되기 때문에" },
                          { id: 3, text: "축제 참가자 중 절반 이상이 구매할 것으로 예상했기 때문에", isCorrect: true },
                          { id: 4, text: "축제에서 음료를 파는 다른 경쟁 가판대가 없었기 때문에" }
                        ].map((choice) => (
                          <button
                            key={choice.id}
                            onClick={() => setQuiz1Answered(choice.id)}
                            disabled={quiz1Answered !== null}
                            className={`w-full text-left p-3 rounded-lg border flex items-center transition-all duration-200
                              print:border-none print:p-1 print:text-black
                              ${quiz1Answered === null ? 'border-stone-200 hover:border-amber-400 hover:bg-amber-50' : 
                                (choice.isCorrect ? 'border-green-500 bg-green-50 text-green-800 font-bold shadow-sm' : 
                                  (quiz1Answered === choice.id ? 'border-red-400 bg-red-50 text-red-500' : 'border-stone-100 text-stone-400 opacity-50'))
                              }
                            `}
                          >
                            <span className="w-8 inline-block font-mono text-stone-500 print:text-black">{['①', '②', '③', '④'][choice.id - 1]}</span> 
                            {choice.text}
                            {quiz1Answered !== null && choice.isCorrect && <i className="ph-fill ph-check-circle text-lg ml-auto text-green-500 print:hidden"></i>}
                          </button>
                        ))}
                      </div>

                      {quiz1Answered !== null && (
                        <div className={`mt-4 p-4 rounded-lg text-sm leading-relaxed animate-fade-in print:hidden
                          ${quiz1Answered === 3 ? 'bg-green-100 text-green-900 border border-green-300' : 'bg-red-100 text-red-900 border border-red-300'}
                        `}>
                          <p className="font-bold mb-1">
                            {quiz1Answered === 3 ? '🎉 정답입니다!' : '오답입니다. 다시 한번 생각해 보세요.'}
                          </p>
                          <p>
                            <strong>해설:</strong> 본문의 Part 1(Setting Up Our Plans)에서 레모네이드를 선택한 이유는 '쉬운 레시피와 적은 재료(1, 2번)' 그리고 '경쟁자 없음(4번)'이었습니다. 참가자의 절반이 살 것이라는 예상은 나중에 <strong>가격을 책정하고 수익을 예상(Pricing)</strong>할 때 나오는 내용입니다.
                          </p>
                          <button onClick={() => setQuiz1Answered(null)} className="mt-3 text-sm underline opacity-70 hover:opacity-100">
                            다시 풀기
                          </button>
                        </div>
                      )}
                    </div>

                    <hr className="my-8 border-stone-200 print:border-black" />

                    {/* Q2. 문장 삽입 */}
                    <div>
                      <div className="bg-stone-50 border border-stone-200 p-5 rounded-lg mb-4 print:bg-white print:border-none print:p-0 print:mb-6">
                        <p className="font-bold text-stone-800 mb-2 print:text-black">Q2. 문장 삽입</p>
                        <p className="text-sm text-stone-600 mb-4 print:text-black">글의 흐름으로 보아, 주어진 문장이 들어가기에 가장 적절한 곳을 고르시오.</p>
                        <div className="text-md font-bold text-center bg-white p-4 border border-stone-200 rounded mb-4 print:border-slate-400 print:rounded-none print:text-black">
                          Once we decided on lemonade, we needed the perfect recipe.
                        </div>
                        <p className="text-md leading-relaxed bg-white p-4 border border-stone-200 rounded print:border-slate-400 print:rounded-none print:text-black">
                          Some of the ideas that we discussed included cotton candy, corn dogs, and lemonade. Out of these options, we agreed that a lemonade stand would be the easiest for us, as we would need only a good recipe and a few ingredients. ( ① ) We also found out that no other stand had signed up to sell drinks, so lemonade seemed to be the natural choice. ( ② ) Fortunately, we were able to find a simple one online. ( ③ ) We just needed freshly squeezed lemons, sugar, water, and ice. ( ④ ) After trying out different variations of the recipe on friends and family, we decided on the final recipe.
                        </p>
                      </div>

                      <div className="grid grid-cols-2 md:grid-cols-4 gap-2 print:grid-cols-4 print:gap-4">
                        {[
                          { id: 1, text: "①" },
                          { id: 2, text: "②", isCorrect: true },
                          { id: 3, text: "③" },
                          { id: 4, text: "④" }
                        ].map((choice) => (
                          <button
                            key={choice.id}
                            onClick={() => setQuiz2Answered(choice.id)}
                            disabled={quiz2Answered !== null}
                            className={`w-full text-center p-3 rounded-lg border font-medium transition-all duration-200
                              print:border-none print:p-1 print:text-black
                              ${quiz2Answered === null ? 'border-stone-200 hover:border-amber-400 hover:bg-amber-50' : 
                                (choice.isCorrect ? 'border-green-500 bg-green-50 text-green-800 shadow-sm' : 
                                  (quiz2Answered === choice.id ? 'border-red-400 bg-red-50 text-red-500' : 'border-stone-100 text-stone-400 opacity-50'))
                              }
                            `}
                          >
                            {choice.text}
                          </button>
                        ))}
                      </div>

                      {quiz2Answered !== null && (
                        <div className={`mt-4 p-4 rounded-lg text-sm leading-relaxed animate-fade-in print:hidden
                          ${quiz2Answered === 2 ? 'bg-green-100 text-green-900 border border-green-300' : 'bg-red-100 text-red-900 border border-red-300'}
                        `}>
                          <p className="font-bold mb-1">
                            {quiz2Answered === 2 ? '🎉 정답입니다!' : '오답입니다. 다시 한번 생각해 보세요.'}
                          </p>
                          <p>
                            <strong>해설:</strong> 품목을 '레모네이드'로 최종 결정했다는 내용(natural choice)이 먼저 오고, 그 다음 단계로 <strong>'완벽한 레시피가 필요했다(needed the perfect recipe)'</strong>는 주어진 문장이 등장해야 합니다. 그 바로 뒤에 다행히 온라인에서 하나(a simple one = recipe)를 찾았다는 내용이 자연스럽게 이어지므로 <strong>②번</strong>이 가장 적절합니다.
                          </p>
                          <button onClick={() => setQuiz2Answered(null)} className="mt-3 text-sm underline opacity-70 hover:opacity-100">
                            다시 풀기
                          </button>
                        </div>
                      )}
                    </div>

                  </div>
                </div>

              </div>
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
