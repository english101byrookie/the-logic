<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE LOGIC Interactive App - Talk 1</title>
    
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    
    <style>
        @media print {
            body {
                -webkit-print-color-adjust: exact;
                print-color-adjust: exact;
                background-color: white !important;
            }
            ::-webkit-scrollbar {
                display: none;
            }
            .print-avoid-break {
                break-inside: avoid;
            }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        const textData = [
          // Intro & Problem
          { id: 1, text: "You are at a critical stage in your life, trying to figure out who you are and who you want to be.", trans: "여러분은 자신이 누구인지, 어떤 사람이 되고 싶은지 알아내려 노력하는 인생의 중요한 단계에 있습니다." },
          { id: 2, text: "Self-improvement is not about being perfect. It is a journey to become the best version of yourself.", trans: "자기 계발은 완벽해지는 것이 아닙니다. 그것은 자신을 최고의 모습으로 만들기 위한 여정입니다." },
          { id: 3, text: "I’m a writer, and I love writing. But there are moments when I feel anxious about my writing and blame myself for a lack of creativity.", trans: "나는 작가이고 글쓰기를 사랑합니다. 하지만 내 글쓰기에 대해 불안해하고 창의성 부족을 탓하며 자책하는 순간들이 있습니다.", logic: 'prob' },
          { id: 4, text: "Creating something new is not easy, and you have probably experienced this when you had difficulty coming up with ideas for group projects or videos.", trans: "새로운 것을 창조하는 것은 쉽지 않으며, 여러분도 조별 과제나 영상 아이디어를 떠올리기 어려웠을 때 이를 경험했을 것입니다." },
          { id: 5, text: "So, how can we set aside those worries and enjoy the creative process more?", trans: "그렇다면, 어떻게 그런 걱정들을 제쳐두고 창작 과정을 더 즐길 수 있을까요?" },
          
          // Reframing (Roman Genius)
          { id: 6, text: "I did some research on this issue and found that ancient Romans understood “genius” differently from how we see it today.", trans: "나는 이 문제에 대해 조사했고, 고대 로마인들이 오늘날 우리가 보는 방식과 다르게 '천재성(genius)'을 이해했다는 것을 발견했습니다." },
          { id: 7, text: "To them, “genius” didn’t refer to a particularly gifted person but rather a divine assistant spirit of creativity.", trans: "그들에게 '천재성'은 특별히 재능 있는 사람을 가리키는 것이 아니라 창의성의 신성한 보조 정령을 의미했습니다.", isHighlight: true, logicPoint: 1, logic: 'reframe' },
          { id: 8, text: "They believed that geniuses lived in the walls of artists’ homes and would come out and help them with their work.", trans: "그들은 천재성(정령)이 예술가들의 집 벽에 살고 있으며 밖으로 나와 그들의 작업을 돕는다고 믿었습니다." },
          { id: 9, text: "This meant that if the artists’ work was not good enough, they didn’t have to blame themselves entirely.", trans: "이것은 만약 예술가들의 작품이 충분히 좋지 않더라도, 그들이 전적으로 자신을 자책할 필요가 없다는 것을 의미했습니다." },
          
          // Examples (Evidence)
          { id: 10, text: "Some people may think this is not scientific, but we often hear stories about how people get inspired mysteriously.", trans: "어떤 사람들은 이것이 비과학적이라고 생각할지 모르지만, 우리는 종종 사람들이 신비롭게 영감을 받는 방법에 대한 이야기를 듣습니다." },
          { id: 11, text: "I once met an American poet named Ruth Stone, who had a special way of recognizing when a poetic genius was coming to her.", trans: "나는 전에 루스 스톤이라는 미국 시인을 만났는데, 그녀는 시적 천재성이 자신에게 다가올 때를 알아차리는 특별한 방법을 가지고 있었습니다." },
          { id: 12, text: "My creative process isn’t as dramatic as hers. I have to get up at the same time and work on my laptop for hours every day.", trans: "나의 창작 과정은 그녀의 것만큼 극적이지 않습니다. 나는 매일 같은 시간에 일어나 몇 시간 동안 노트북으로 작업해야 합니다." },
          { id: 13, text: "Yet, even in this rather boring routine, I do get ideas coming from a source I can’t identify.", trans: "하지만, 이 다소 지루한 일상 속에서도, 나는 출처를 알 수 없는 곳으로부터 오는 아이디어들을 실제로 얻습니다." },
          { id: 14, text: "Typically, it happens when I’m deeply engaged in my work.", trans: "보통, 그것은 내가 내 일에 깊이 몰두해 있을 때 일어납니다.", logic: 'evidence' },
          { id: 15, text: "Several hours or even days can pass, and I completely immerse myself in my creative process.", trans: "몇 시간 혹은 며칠이 지날 수도 있고, 나는 창작 과정에 완전히 몰입합니다." },
          { id: 16, text: "It’s at those moments that a brilliant idea strikes me somewhat mysteriously.", trans: "다소 신비롭게 훌륭한 아이디어가 떠오르는 것은 바로 그 순간들입니다.", isHighlight: true, logicPoint: 2 },
          { id: 17, text: "I’m sure that’s my genius.", trans: "나는 그것이 내 천재성이라고 확신합니다." },

          // Solution & Takeaway
          { id: 18, text: "Remember that you too have a magical genius that is willing to help you.", trans: "여러분에게도 기꺼이 여러분을 도우려는 마법 같은 천재성이 있다는 것을 기억하세요." },
          { id: 19, text: "But first, you must put your heart and soul into your work.", trans: "하지만 먼저, 여러분은 일에 마음과 영혼을 쏟아야 합니다." },
          { id: 20, text: "Immerse yourself in your work and try to enjoy the creative process itself.", trans: "일에 몰두하고 창작 과정 그 자체를 즐기려고 노력하세요.", logic: 'solution' },
          { id: 21, text: "If you do, your genius will come for sure.", trans: "그렇게 한다면, 여러분의 천재성은 확실히 찾아올 것입니다." }
        ];

        const logicMapSteps = [
          { id: 'prob', title: "THE PROBLEM (문제 상황)", desc: "Anxiety & Blaming oneself", color: "bg-red-100 border-red-400 text-red-800", icon: <i className="ph-fill ph-cloud-rain text-xl mb-2"></i> },
          { id: 'reframe', title: "PARADIGM SHIFT (발상의 전환)", desc: "Genius = Assistant Spirit", color: "bg-purple-100 border-purple-400 text-purple-800", icon: <i className="ph-fill ph-magic-wand text-xl mb-2"></i> },
          { id: 'evidence', title: "THE EVIDENCE (경험적 증거)", desc: "Ideas come when deeply engaged", color: "bg-blue-100 border-blue-400 text-blue-800", icon: <i className="ph-fill ph-magnifying-glass text-xl mb-2"></i> },
          { id: 'solution', title: "THE SOLUTION (해결책)", desc: "Immerse & Enjoy the process", color: "bg-green-100 border-green-400 text-green-800", icon: <i className="ph-fill ph-sparkle text-xl mb-2"></i> }
        ];

        function App() {
          const [activeTab, setActiveTab] = useState(1);
          const [activeLogic, setActiveLogic] = useState(null);
          const [mapStep, setMapStep] = useState(0);
          const [quiz1Answered, setQuiz1Answered] = useState(null);
          const [quiz2Answered, setQuiz2Answered] = useState(null);

          const handleLogicClick = (point) => setActiveLogic(activeLogic === point ? null : point);
          const nextMapStep = () => { if (mapStep < logicMapSteps.length) setMapStep(mapStep + 1); };
          const resetMap = () => setMapStep(0);

          const handlePrint = () => {
            window.print();
          };

          return (
            <div className="min-h-screen bg-slate-100 font-sans text-slate-800 p-4 md:p-8 flex justify-center print:bg-white print:p-0">
              <div className="max-w-4xl w-full flex flex-col gap-6 print:flex print:flex-col print:gap-6 print:max-w-none">
                
                {/* 헤더 */}
                <div className="bg-white p-6 rounded-xl shadow-sm border-t-4 border-purple-800 print:shadow-none print:border-t-4 print:border-black print:rounded-none flex justify-between items-start">
                  <div>
                    <h1 className="text-sm font-bold text-purple-900 tracking-wider mb-2 print:text-black">THE LOGIC INTERACTIVE</h1>
                    <h2 className="text-3xl font-serif font-bold text-slate-900 print:text-black">Talk 1: For Those Struggling with Creativity</h2>
                    <p className="text-slate-500 italic mt-1 font-serif print:text-gray-600">"Invite Your Genius"</p>
                  </div>
                  <button 
                    onClick={handlePrint}
                    className="print:hidden flex items-center gap-2 bg-slate-800 hover:bg-slate-700 text-white px-4 py-2 rounded-lg font-bold transition-colors shadow-sm"
                  >
                    <i className="ph-bold ph-printer text-lg"></i> 인쇄하기
                  </button>
                </div>

                {/* 탭 네비게이션 */}
                <div className="flex bg-white rounded-xl shadow-sm overflow-hidden print:hidden">
                  <button 
                    onClick={() => setActiveTab(1)}
                    className={`flex-1 py-4 px-2 text-center font-bold text-base md:text-lg transition-all duration-300 border-b-4 ${activeTab === 1 ? 'bg-purple-50 text-purple-900 border-purple-800' : 'text-slate-400 border-transparent hover:bg-slate-50 hover:text-slate-600'}`}
                  >
                    <i className="ph-fill ph-book-open mr-2"></i>
                    1. 지문 및 구문 분석
                  </button>
                  <button 
                    onClick={() => setActiveTab(2)}
                    className={`flex-1 py-4 px-2 text-center font-bold text-base md:text-lg transition-all duration-300 border-b-4 ${activeTab === 2 ? 'bg-blue-50 text-blue-800 border-blue-600' : 'text-slate-400 border-transparent hover:bg-slate-50 hover:text-slate-600'}`}
                  >
                    <i className="ph-fill ph-puzzle-piece mr-2"></i>
                    2. 논리 구조 및 실전 문제
                  </button>
                </div>

                {/* === TAB 1: 지문 및 구문 분석 영역 === */}
                <div className={`space-y-6 print:space-y-4 ${activeTab === 1 ? 'block' : 'hidden print:block'}`}>
                  {/* 1. 지문 영역 */}
                  <div className="bg-white p-6 md:p-8 rounded-xl shadow-sm print:shadow-none print:border print:border-slate-300 print:rounded-none">
                    <h3 className="text-xl font-bold text-purple-900 border-b-2 border-slate-100 pb-3 mb-4 flex items-center gap-2 print:text-black print:border-black">
                      <i className="ph-fill ph-book-open text-2xl print:text-black"></i> PART 1. Text Analysis
                    </h3>
                    
                    <div className="space-y-6 print:space-y-4">
                      {/* 파트 A: 서론 (1~5번) */}
                      <div>
                        <div className="inline-block bg-slate-800 text-white text-sm font-bold px-3 py-1 rounded mb-3 print:bg-slate-200 print:text-black print:border print:border-slate-800">
                          ▶ The Problem (창작의 고통과 불안)
                        </div>
                        <div className="space-y-2 print:space-y-1">
                          {textData.slice(0, 5).map((item) => (
                            <div 
                              key={item.id} 
                              className={`p-2 rounded-lg transition-all duration-300 group cursor-pointer print:p-0 print:mb-2
                                ${activeLogic === item.logicPoint ? 'bg-purple-50 border border-purple-200 shadow-inner print:bg-transparent print:border-none print:shadow-none' : 'hover:bg-slate-50 border border-transparent print:border-none'}
                              `}
                            >
                              <p className="text-base md:text-lg leading-relaxed print:text-base print:text-black">
                                <span className="font-bold text-purple-900 mr-2 text-sm print:text-black">[{item.id.toString().padStart(2, '0')}]</span>
                                <span className={`${activeLogic === item.logicPoint ? 'font-bold text-purple-800 print:text-black print:underline print:underline-offset-4' : ''}`}>
                                  {item.text}
                                </span>
                              </p>
                              <p className="text-sm text-slate-500 mt-1 opacity-0 group-hover:opacity-100 transition-opacity duration-300 ml-9 print:hidden">
                                {item.trans}
                              </p>
                            </div>
                          ))}
                        </div>
                      </div>

                      {/* 파트 B: 해결책 제시 (6~9번) */}
                      <div className="border-t border-dashed border-slate-300 pt-4 print:border-black print:pt-4">
                        <div className="inline-block bg-purple-700 text-white text-sm font-bold px-3 py-1 rounded mb-3 print:bg-slate-200 print:text-black print:border print:border-slate-800">
                          ▶ Paradigm Shift (로마인들의 '천재성' 개념)
                        </div>
                        <div className="space-y-2 print:space-y-1">
                          {textData.slice(5, 9).map((item) => (
                            <div 
                              key={item.id} 
                              className={`p-2 rounded-lg transition-all duration-300 group cursor-pointer print:p-0 print:mb-2
                                ${activeLogic === item.logicPoint ? 'bg-purple-50 border border-purple-200 shadow-inner print:bg-transparent print:border-none print:shadow-none' : 'hover:bg-slate-50 border border-transparent print:border-none'}
                              `}
                            >
                              <p className="text-base md:text-lg leading-relaxed print:text-base print:text-black">
                                <span className="font-bold text-purple-900 mr-2 text-sm print:text-black">[{item.id.toString().padStart(2, '0')}]</span>
                                <span className={`${activeLogic === item.logicPoint ? 'font-bold text-purple-800 print:text-black print:underline print:underline-offset-4' : ''}`}>
                                  {item.text}
                                </span>
                              </p>
                              <p className="text-sm text-slate-500 mt-1 opacity-0 group-hover:opacity-100 transition-opacity duration-300 ml-9 print:hidden">
                                {item.trans}
                              </p>
                            </div>
                          ))}
                        </div>
                      </div>

                      {/* 파트 C: 예시 및 교훈 (10~21번) */}
                      <div className="border-t border-dashed border-slate-300 pt-4 print:border-black print:pt-4">
                        <div className="inline-block bg-blue-700 text-white text-sm font-bold px-3 py-1 rounded mb-3 print:bg-slate-200 print:text-black print:border print:border-slate-800">
                          ▶ The Solution (몰입을 통해 영감 초대하기)
                        </div>
                        <div className="space-y-2 print:space-y-1">
                          {textData.slice(9, 21).map((item) => (
                            <div 
                              key={item.id} 
                              className={`p-2 rounded-lg transition-all duration-300 group cursor-pointer print:p-0 print:mb-2
                                ${activeLogic === item.logicPoint ? 'bg-blue-50 border border-blue-200 shadow-inner print:bg-transparent print:border-none print:shadow-none' : 'hover:bg-slate-50 border border-transparent print:border-none'}
                              `}
                            >
                              <p className="text-base md:text-lg leading-relaxed print:text-base print:text-black">
                                <span className="font-bold text-purple-900 mr-2 text-sm print:text-black">[{item.id.toString().padStart(2, '0')}]</span>
                                <span className={`${activeLogic === item.logicPoint ? 'font-bold text-blue-800 print:text-black print:underline print:underline-offset-4' : ''}`}>
                                  {item.text}
                                </span>
                              </p>
                              <p className="text-sm text-slate-500 mt-1 opacity-0 group-hover:opacity-100 transition-opacity duration-300 ml-9 print:hidden">
                                {item.trans}
                              </p>
                            </div>
                          ))}
                        </div>
                      </div>

                    </div>
                  </div>

                  {/* 2. 구문 로직 영역 */}
                  <div className="bg-white p-6 md:p-8 rounded-xl shadow-sm print:shadow-none print:border print:border-slate-300 print:rounded-none print-avoid-break">
                    <h3 className="text-xl font-bold text-purple-900 border-b-2 border-slate-100 pb-3 mb-6 print:text-black print:border-black">
                      PART 2. The Logic Syntax
                    </h3>
                    <p className="text-sm text-slate-500 mb-4 print:hidden">💡 아래의 포인트를 클릭하면 지문의 해당 문장이 강조됩니다.</p>
                    
                    <div className="grid gap-4 print:gap-6">
                      <button 
                        onClick={() => handleLogicClick(1)}
                        className={`text-left border-2 rounded-lg overflow-hidden transition-all duration-300 print:border-2 print:border-slate-800 print:shadow-none print:transform-none print:rounded-none
                          ${activeLogic === 1 ? 'border-purple-600 shadow-md transform -translate-y-1' : 'border-slate-200 hover:border-purple-400'}
                        `}
                      >
                        <div className={`px-4 py-2 font-bold print:bg-slate-100 print:text-black ${activeLogic === 1 ? 'bg-purple-600 text-white' : 'bg-purple-50 text-purple-900'}`}>
                          POINT 01. 통념의 반박: not A but B
                        </div>
                        <div className="p-4 bg-white">
                          <p className="mb-2"><span className="font-semibold text-slate-700 print:text-black">Structure:</span> didn't refer to A (gifted person) but rather B (assistant spirit)</p>
                          <p className="text-sm text-slate-600 leading-relaxed print:text-black">
                            우리가 흔히 생각하는 천재(A)가 아니라, 외부에서 찾아오는 창의성의 정령(B)이라는 고대 로마인들의 시각을 소개하며 <strong className="print:text-black">발상의 전환(Reframing)</strong>을 유도하는 핵심 문장입니다.
                          </p>
                        </div>
                      </button>

                      <button 
                        onClick={() => handleLogicClick(2)}
                        className={`text-left border-2 rounded-lg overflow-hidden transition-all duration-300 print:border-2 print:border-slate-800 print:shadow-none print:transform-none print:rounded-none
                          ${activeLogic === 2 ? 'border-blue-600 shadow-md transform -translate-y-1' : 'border-slate-200 hover:border-blue-400'}
                        `}
                      >
                        <div className={`px-4 py-2 font-bold print:bg-slate-100 print:text-black ${activeLogic === 2 ? 'bg-blue-600 text-white' : 'bg-blue-50 text-blue-900'}`}>
                          POINT 02. 강조 구문: It is ~ that
                        </div>
                        <div className="p-4 bg-white">
                          <p className="mb-2"><span className="font-semibold text-slate-700 print:text-black">Structure:</span> It’s [at those moments] that S + V</p>
                          <p className="text-sm text-slate-600 leading-relaxed print:text-black">
                            마법 같은 아이디어(천재성)가 떠오르는 것은 다른 때가 아니라 오직 '내가 창작 과정에 완전히 몰입한(immerse) 바로 그 순간'임을 <strong className="print:text-black">강조(Emphasis)</strong>하는 구문입니다.
                          </p>
                        </div>
                      </button>
                    </div>

                    <div className="mt-8 text-center print:hidden">
                       <button onClick={() => setActiveTab(2)} className="bg-purple-900 hover:bg-purple-800 text-white px-8 py-3 rounded-full font-bold shadow-md transition-colors flex items-center gap-2 mx-auto">
                         구문 분석 완료! 실전 문제로 이동 <i className="ph-bold ph-arrow-right"></i>
                       </button>
                    </div>
                  </div>
                </div>

                {/* === TAB 2: 논리 구조도 및 퀴즈 영역 === */}
                <div className={`space-y-6 print:space-y-4 print:mt-4 ${activeTab === 2 ? 'block' : 'hidden print:block'}`}>
                  
                  {/* 3. 로직 맵 */}
                  <div className="bg-white p-6 rounded-xl shadow-sm border-t-4 border-blue-600 print:shadow-none print:border print:border-slate-300 print:border-t-4 print:border-t-black print:rounded-none print-avoid-break">
                    <div className="flex justify-between items-center border-b-2 border-slate-100 pb-3 mb-6 print:border-black">
                      <h3 className="text-xl font-bold text-slate-800 flex items-center gap-2 print:text-black">
                        <i className="ph-fill ph-play-circle text-2xl text-blue-600 print:text-black"></i> PART 3. Logic Map
                      </h3>
                      <div className="print:hidden">
                        {mapStep > 0 && mapStep < logicMapSteps.length && (
                          <button onClick={nextMapStep} className="bg-blue-100 hover:bg-blue-200 text-blue-800 px-3 py-1 rounded text-sm font-bold transition-colors">
                            Next Step ➔
                          </button>
                        )}
                        {mapStep === logicMapSteps.length && (
                           <button onClick={resetMap} className="text-slate-400 hover:text-slate-600 text-sm underline">
                            Reset
                           </button>
                        )}
                      </div>
                    </div>
                    
                    <div 
                      className={`h-64 flex-col items-center justify-center border-2 border-dashed border-slate-200 rounded-lg bg-slate-50 text-center p-6 cursor-pointer hover:bg-blue-50 transition-colors 
                        ${mapStep === 0 ? 'flex' : 'hidden'} print:!hidden
                      `} 
                      onClick={nextMapStep}
                    >
                      <i className="ph-fill ph-play-circle text-5xl text-blue-400 mb-4"></i>
                      <p className="text-slate-600 font-medium">클릭하여 Talk 1의 논리 구조를<br/>단계별로 파악해 보세요.</p>
                    </div>
                    
                    <div className={`flex-col items-center gap-2 py-4 ${mapStep > 0 ? 'flex' : 'hidden'} print:!flex`}>
                      {logicMapSteps.map((step, idx) => (
                        <React.Fragment key={step.id}>
                          <div 
                            className={`w-full max-w-sm border-2 rounded-lg p-4 flex flex-col items-center text-center transition-all duration-500 transform
                              print:!opacity-100 print:!translate-y-0 print:!flex print:border-slate-800 print:rounded-none print:bg-white print:text-black
                              ${idx < mapStep ? `opacity-100 translate-y-0 ${step.color}` : 'opacity-0 translate-y-8 hidden'}
                            `}
                          >
                            <div className="print:hidden">{step.icon}</div>
                            <span className="font-bold text-sm mb-1 print:text-black">{step.title}</span>
                            <span className="text-sm opacity-90 print:text-black">{step.desc}</span>
                          </div>
                          <div 
                            className={`flex-col items-center opacity-100 animate-pulse 
                              print:!flex print:!opacity-100 print:animate-none
                              ${idx < logicMapSteps.length - 1 && idx < mapStep ? 'flex' : 'hidden'}
                            `}
                          >
                            <div className="w-0.5 h-6 bg-slate-300 print:bg-slate-800"></div>
                            {/* 화살표 라벨 추가 */}
                            {idx === 0 ? (
                              <div className="bg-purple-100 text-purple-700 text-xs font-bold px-2 py-1 rounded-full my-1 border border-purple-300 print:bg-white print:text-black print:border-slate-800 print:rounded-none">
                                Resolved by
                              </div>
                            ) : idx === 1 ? (
                              <div className="bg-blue-100 text-blue-700 text-xs font-bold px-2 py-1 rounded-full my-1 border border-blue-300 print:bg-white print:text-black print:border-slate-800 print:rounded-none">
                                Proven by
                              </div>
                            ) : idx === 2 ? (
                              <div className="bg-green-100 text-green-700 text-xs font-bold px-2 py-1 rounded-full my-1 border border-green-300 print:bg-white print:text-black print:border-slate-800 print:rounded-none">
                                Therefore
                              </div>
                            ) : null}
                            <i className="ph-bold ph-arrow-right text-base text-slate-400 transform rotate-90 print:text-slate-800"></i>
                          </div>
                        </React.Fragment>
                      ))}
                    </div>
                  </div>

                  {/* 4. 실전 변형 문제 */}
                  <div className="bg-white p-6 rounded-xl shadow-sm print:shadow-none print:border print:border-slate-300 print:rounded-none print-avoid-break">
                    <h3 className="text-xl font-bold text-slate-800 border-b-2 border-slate-100 pb-3 mb-6 flex items-center gap-2 print:text-black print:border-black">
                      <i className="ph-fill ph-check-circle text-2xl text-blue-600 print:text-black"></i> PART 4. Challenge
                    </h3>
                    
                    {/* Q1. 문장 삽입 */}
                    <div className="mb-8">
                      <div className="bg-slate-50 border border-slate-200 p-5 rounded-lg mb-4 print:bg-white print:border-none print:p-0 print:mb-6">
                        <p className="font-bold text-slate-800 mb-2 print:text-black">Q1. 문장 삽입</p>
                        <p className="text-sm text-slate-600 mb-4 print:text-black">글의 흐름으로 보아, 주어진 문장이 들어가기에 가장 적절한 곳을 고르시오.</p>
                        <div className="text-md font-bold text-center bg-white p-4 border border-slate-200 rounded mb-4 print:border-slate-400 print:rounded-none print:text-black">
                          It’s at those moments that a brilliant idea strikes me somewhat mysteriously.
                        </div>
                        <p className="text-md leading-relaxed bg-white p-4 border border-slate-200 rounded print:border-slate-400 print:rounded-none print:text-black">
                          My creative process isn’t as dramatic as hers. I have to get up at the same time and work on my laptop for hours every day. ( ① ) Yet, even in this rather boring routine, I do get ideas coming from a source I can’t identify. ( ② ) Typically, it happens when I’m deeply engaged in my work. ( ③ ) Several hours or even days can pass, and I completely immerse myself in my creative process. ( ④ ) I’m sure that’s my genius.
                        </p>
                      </div>

                      <div className="grid grid-cols-2 md:grid-cols-4 gap-2 print:grid-cols-4 print:gap-4">
                        {[
                          { id: 1, text: "①" },
                          { id: 2, text: "②" },
                          { id: 3, text: "③" },
                          { id: 4, text: "④", isCorrect: true }
                        ].map((choice) => (
                          <button
                            key={choice.id}
                            onClick={() => setQuiz1Answered(choice.id)}
                            disabled={quiz1Answered !== null}
                            className={`w-full text-center p-3 rounded-lg border font-bold transition-all duration-200
                              print:border-none print:p-1 print:text-black
                              ${quiz1Answered === null ? 'border-slate-200 hover:border-purple-400 hover:bg-purple-50' : 
                                (choice.isCorrect ? 'border-green-500 bg-green-50 text-green-800 shadow-sm' : 
                                  (quiz1Answered === choice.id ? 'border-red-400 bg-red-50 text-red-500' : 'border-slate-100 text-slate-400 opacity-50'))
                              }
                            `}
                          >
                            {choice.text}
                          </button>
                        ))}
                      </div>

                      {quiz1Answered !== null && (
                        <div className={`mt-4 p-4 rounded-lg text-sm leading-relaxed animate-fade-in print:hidden
                          ${quiz1Answered === 4 ? 'bg-green-100 text-green-900 border border-green-300' : 'bg-red-100 text-red-900 border border-red-300'}
                        `}>
                          <p className="font-bold mb-1">
                            {quiz1Answered === 4 ? '🎉 정답입니다!' : '오답입니다. 다시 한번 생각해 보세요.'}
                          </p>
                          <p>
                            <strong>해설:</strong> 주어진 문장의 <strong>'those moments(그 순간들)'</strong>가 가리키는 대상을 찾아야 합니다. 앞 문장에서 묘사된 '창작 과정에 완전히 몰입(immerse)한 시간'을 지칭하므로, 몰입에 대한 설명이 끝난 직후인 <strong>④번</strong> 위치에 들어가는 것이 가장 논리적입니다.
                          </p>
                          <button onClick={() => setQuiz1Answered(null)} className="mt-3 text-sm underline opacity-70 hover:opacity-100">
                            다시 풀기
                          </button>
                        </div>
                      )}
                    </div>

                    <hr className="my-8 border-slate-200 print:border-black" />

                    {/* Q2. 요지 파악 */}
                    <div>
                      <div className="bg-slate-50 border border-slate-200 p-5 rounded-lg mb-4 print:bg-white print:border-none print:p-0 print:mb-6">
                        <p className="font-bold text-slate-800 mb-2 print:text-black">Q2. 요지 파악</p>
                        <p className="text-sm text-slate-600 mb-4 print:text-black">윗글의 요지로 가장 적절한 것은?</p>
                      </div>

                      <div className="space-y-2 print:space-y-3">
                        {[
                          { id: 1, text: "고대 로마의 역사적 사실을 과학적으로 증명해야 한다." },
                          { id: 2, text: "지루한 일상에서 벗어나 새로운 환경을 찾아 떠나야 한다." },
                          { id: 3, text: "창작의 고통에서 벗어나려면 다른 예술가와 협업해야 한다." },
                          { id: 4, text: "창의성 부족을 자책하기보다 작업 과정에 온전히 몰입해야 한다.", isCorrect: true }
                        ].map((choice) => (
                          <button
                            key={choice.id}
                            onClick={() => setQuiz2Answered(choice.id)}
                            disabled={quiz2Answered !== null}
                            className={`w-full text-left p-3 rounded-lg border flex items-center transition-all duration-200
                              print:border-none print:p-1 print:text-black
                              ${quiz2Answered === null ? 'border-slate-200 hover:border-purple-400 hover:bg-purple-50' : 
                                (choice.isCorrect ? 'border-green-500 bg-green-50 text-green-800 font-bold shadow-sm' : 
                                  (quiz2Answered === choice.id ? 'border-red-400 bg-red-50 text-red-500' : 'border-slate-100 text-slate-400 opacity-50'))
                              }
                            `}
                          >
                            <span className="w-8 inline-block font-mono text-slate-500 print:text-black">①</span> 
                            {choice.text}
                            {quiz2Answered !== null && choice.isCorrect && <i className="ph-fill ph-check-circle text-lg ml-auto text-green-500 print:hidden"></i>}
                          </button>
                        ))}
                      </div>

                      {quiz2Answered !== null && (
                        <div className={`mt-4 p-4 rounded-lg text-sm leading-relaxed animate-fade-in print:hidden
                          ${quiz2Answered === 4 ? 'bg-green-100 text-green-900 border border-green-300' : 'bg-red-100 text-red-900 border border-red-300'}
                        `}>
                          <p className="font-bold mb-1">
                            {quiz2Answered === 4 ? '🎉 정답입니다!' : '오답입니다. 다시 한번 생각해 보세요.'}
                          </p>
                          <p>
                            <strong>해설:</strong> 글의 서두에서 창의성 부족으로 인한 자책과 걱정(문제)을 언급하고, 고대 로마인들의 '정령(천재성)' 개념을 빌려와 이를 해소합니다. 결론부에서 "일에 마음과 영혼을 쏟고 창작 과정을 즐겨라(Immerse yourself... try to enjoy)"라는 분명한 해결책을 제시하고 있으므로 4번이 정답입니다.
                          </p>
                          <button onClick={() => setQuiz2Answered(null)} className="mt-3 text-sm underline opacity-70 hover:opacity-100">
                            다시 풀기
                          </button>
                        </div>
                      )}
                    </div>

                  </div>
                </div>

              </div>
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
