<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE LOGIC Interactive App - Talk 2</title>
    
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    
    <style>
        @media print {
            body {
                -webkit-print-color-adjust: exact;
                print-color-adjust: exact;
                background-color: white !important;
            }
            ::-webkit-scrollbar {
                display: none;
            }
            .print-avoid-break {
                break-inside: avoid;
            }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        const textData = [
          // Part 1: 화자의 경험
          { id: 1, text: "When I was 12, I was passionate about soccer. I played soccer every day, and I always thought that I would grow up to become a great soccer player one day.", trans: "내가 12살이었을 때, 나는 축구에 열정적이었다. 매일 축구를 했고, 언젠가 커서 훌륭한 축구 선수가 될 것이라고 항상 생각했다." },
          { id: 2, text: "Forty years later, however, I don’t even watch soccer games anymore. I’m actually a big fan of American football now.", trans: "하지만 40년 후, 나는 이제 축구 경기를 보지도 않는다. 나는 사실 지금 미식축구의 열렬한 팬이다." },
          { id: 3, text: "My 12-year-old self may find this a betrayal.", trans: "12살의 나는 이것을 배신이라고 생각할지도 모른다." },
          { id: 4, text: "When I was 22, I graduated from college in India with a computer science degree.", trans: "22살 때, 나는 인도에서 컴퓨터 공학 학위로 대학을 졸업했다." },
          { id: 5, text: "At that time, it never occurred to me that I would be living a completely different life in the U.S. as a journalist and podcast host.", trans: "그때는 내가 미국에서 언론인이자 팟캐스트 진행자로서 완전히 다른 삶을 살게 될 것이라고는 전혀 생각하지 못했다." },
          { id: 6, text: "Thirty years ago, we didn’t even have podcasts or smartphones, and the future was not just unknown but unknowable.", trans: "30년 전에는 팟캐스트나 스마트폰조차 없었으며, 미래는 그저 알려지지 않은 것이 아니라 알 수도 없는 것이었다.", logic: 'past' },
          
          // Part 2: 착각과 생물학적 진실
          { id: 7, text: "When we look back, we can see how we have changed, but when we look forward, we tend to imagine ourselves as the same people, only older and taller.", trans: "뒤돌아보면 우리가 어떻게 변했는지 볼 수 있지만, 앞을 내다볼 때 우리는 우리 자신을 단지 나이가 들고 키만 커졌을 뿐 똑같은 사람일 것이라고 상상하는 경향이 있다.", isHighlight: true, logicPoint: 1, logic: 'illusion' },
          { id: 8, text: "That, however, is not the case.", trans: "그러나 그것은 사실이 아니다.", isHighlight: true, logicPoint: 1 },
          { id: 9, text: "Biologically, our cells are continuously renewing themselves, and our brains are rewiring and modifying their connections.", trans: "생물학적으로 우리의 세포는 지속적으로 스스로를 새롭게 하고 있으며, 우리의 뇌는 연결을 재배선하고 수정하고 있다." },
          { id: 10, text: "We are constantly becoming new versions of ourselves.", trans: "우리는 끊임없이 새로운 버전의 우리 자신이 되고 있다." },

          // Part 3: 테세우스의 배 (비유)
          { id: 11, text: "Have you heard of the “Ship of Theseus”?", trans: "'테세우스의 배'에 대해 들어본 적이 있는가?" },
          { id: 12, text: "When Theseus, a famous Greek hero, returned from his adventure of rescuing the children of Athens, the Athenians wanted to preserve his ship.", trans: "유명한 그리스 영웅 테세우스가 아테네의 아이들을 구출하는 모험에서 돌아왔을 때, 아테네 사람들은 그의 배를 보존하고 싶어 했다." },
          { id: 13, text: "They kept replacing the wood pieces that had decayed until all the original pieces were replaced with new ones.", trans: "그들은 원래의 조각들이 모두 새 것으로 교체될 때까지 썩은 나무 조각들을 계속해서 교체했다." },
          { id: 14, text: "In this situation, could we still call it the Ship of Theseus?", trans: "이 상황에서 우리는 여전히 그것을 테세우스의 배라고 부를 수 있을까?", logic: 'metaphor' },
          { id: 15, text: "Well, we are living examples of the Ship of Theseus.", trans: "글쎄, 우리가 바로 테세우스의 배의 살아있는 본보기이다.", isHighlight: true, logicPoint: 2 },
          { id: 16, text: "Every day, we are changing and growing to become new versions of ourselves.", trans: "매일 우리는 변화하고 성장하여 새로운 버전의 우리 자신이 된다." },
          { id: 17, text: "This means that our future selves may be very different from who we are now.", trans: "이것은 우리의 미래의 모습이 지금의 우리와 매우 다를 수 있음을 의미한다." },

          // Part 4: 3가지 조언
          { id: 18, text: "Then how can we create a future we’ll be proud of? I have some advice for you.", trans: "그렇다면 우리가 자랑스러워할 미래를 어떻게 만들 수 있을까? 여러분을 위한 몇 가지 조언이 있다." },
          { id: 19, text: "First, actively envision the kind of person you want to become in the future. To do this, spend time with different kinds of people to learn more and stay curious.", trans: "첫째, 미래에 어떤 사람이 되고 싶은지 적극적으로 상상하라. 이를 위해 다양한 부류의 사람들과 시간을 보내며 더 많이 배우고 호기심을 유지하라." },
          { id: 20, text: "Second, when expressing your views online or with friends, remember that your future self might disagree with your current opinions.", trans: "둘째, 온라인이나 친구들과 의견을 표현할 때, 미래의 여러분은 현재의 의견에 동의하지 않을 수도 있음을 기억하라." },
          { id: 21, text: "So, be respectful of other people’s opinions and don’t just assume that you are always right.", trans: "그러므로 다른 사람들의 의견을 존중하고 항상 자신이 옳다고 단정하지 마라." },
          { id: 22, text: "Finally, your future self will have strengths and wisdom that you may lack today. Even if you can’t do something now, you might be able to in the future.", trans: "마지막으로, 미래의 여러분은 오늘 부족할지도 모르는 강점과 지혜를 갖게 될 것이다. 지금 당장 무언가를 할 수 없더라도 미래에는 할 수 있을지도 모른다." },
          { id: 23, text: "So, don’t be afraid of new challenges. Be brave!", trans: "그러니 새로운 도전을 두려워하지 마라. 용기를 가져라!", logic: 'advice' }
        ];

        const logicMapSteps = [
          { id: 'past', title: "PAST vs PRESENT (경험)", desc: "Unexpected Career Changes", color: "bg-slate-100 border-slate-400 text-slate-800", icon: <i className="ph-fill ph-clock-counter-clockwise text-xl mb-2"></i> },
          { id: 'illusion', title: "THE ILLUSION (우리의 착각)", desc: "Thinking we won't change", color: "bg-red-100 border-red-400 text-red-800", icon: <i className="ph-fill ph-eye-slash text-xl mb-2"></i> },
          { id: 'metaphor', title: "THE METAPHOR (테세우스의 배)", desc: "We are constantly renewed", color: "bg-cyan-100 border-cyan-400 text-cyan-800", icon: <i className="ph-fill ph-boat text-xl mb-2"></i> },
          { id: 'advice', title: "ACTION PLAN (행동 지침)", desc: "Envision, Respect, Be Brave", color: "bg-teal-100 border-teal-400 text-teal-800", icon: <i className="ph-fill ph-compass text-xl mb-2"></i> }
        ];

        function App() {
          const [activeTab, setActiveTab] = useState(1);
          const [activeLogic, setActiveLogic] = useState(null);
          const [mapStep, setMapStep] = useState(0);
          const [quiz1Answered, setQuiz1Answered] = useState(null);
          const [quiz2Answered, setQuiz2Answered] = useState(null);

          const handleLogicClick = (point) => setActiveLogic(activeLogic === point ? null : point);
          const nextMapStep = () => { if (mapStep < logicMapSteps.length) setMapStep(mapStep + 1); };
          const resetMap = () => setMapStep(0);

          const handlePrint = () => {
            window.print();
          };

          return (
            <div className="min-h-screen bg-slate-100 font-sans text-slate-800 p-4 md:p-8 flex justify-center print:bg-white print:p-0">
              <div className="max-w-4xl w-full flex flex-col gap-6 print:flex print:flex-col print:gap-6 print:max-w-none">
                
                {/* 헤더 */}
                <div className="bg-white p-6 rounded-xl shadow-sm border-t-4 border-cyan-800 print:shadow-none print:border-t-4 print:border-black print:rounded-none flex justify-between items-start">
                  <div>
                    <h1 className="text-sm font-bold text-cyan-900 tracking-wider mb-2 print:text-black">THE LOGIC INTERACTIVE</h1>
                    <h2 className="text-3xl font-serif font-bold text-slate-900 print:text-black">Talk 2: For Those Worrying about an Uncertain Future</h2>
                    <p className="text-slate-500 italic mt-1 font-serif print:text-gray-600">"The Ship of Theseus"</p>
                  </div>
                  <button 
                    onClick={handlePrint}
                    className="print:hidden flex items-center gap-2 bg-slate-800 hover:bg-slate-700 text-white px-4 py-2 rounded-lg font-bold transition-colors shadow-sm"
                  >
                    <i className="ph-bold ph-printer text-lg"></i> 인쇄하기
                  </button>
                </div>

                {/* 탭 네비게이션 */}
                <div className="flex bg-white rounded-xl shadow-sm overflow-hidden print:hidden">
                  <button 
                    onClick={() => setActiveTab(1)}
                    className={`flex-1 py-4 px-2 text-center font-bold text-base md:text-lg transition-all duration-300 border-b-4 ${activeTab === 1 ? 'bg-cyan-50 text-cyan-900 border-cyan-800' : 'text-slate-400 border-transparent hover:bg-slate-50 hover:text-slate-600'}`}
                  >
                    <i className="ph-fill ph-book-open mr-2"></i>
                    1. 지문 및 구문 분석
                  </button>
                  <button 
                    onClick={() => setActiveTab(2)}
                    className={`flex-1 py-4 px-2 text-center font-bold text-base md:text-lg transition-all duration-300 border-b-4 ${activeTab === 2 ? 'bg-teal-50 text-teal-800 border-teal-600' : 'text-slate-400 border-transparent hover:bg-slate-50 hover:text-slate-600'}`}
                  >
                    <i className="ph-fill ph-puzzle-piece mr-2"></i>
                    2. 논리 구조 및 실전 문제
                  </button>
                </div>

                {/* === TAB 1: 지문 및 구문 분석 영역 === */}
                <div className={`space-y-6 print:space-y-4 ${activeTab === 1 ? 'block' : 'hidden print:block'}`}>
                  {/* 1. 지문 영역 */}
                  <div className="bg-white p-6 md:p-8 rounded-xl shadow-sm print:shadow-none print:border print:border-slate-300 print:rounded-none">
                    <h3 className="text-xl font-bold text-cyan-900 border-b-2 border-slate-100 pb-3 mb-4 flex items-center gap-2 print:text-black print:border-black">
                      <i className="ph-fill ph-book-open text-2xl print:text-black"></i> PART 1. Text Analysis
                    </h3>
                    
                    <div className="space-y-6 print:space-y-4">
                      {/* 파트 A: 화자의 경험 (1~6번) */}
                      <div>
                        <div className="inline-block bg-slate-800 text-white text-sm font-bold px-3 py-1 rounded mb-3 print:bg-slate-200 print:text-black print:border print:border-slate-800">
                          ▶ The Narrative (예상치 못한 삶의 변화)
                        </div>
                        <div className="space-y-2 print:space-y-1">
                          {textData.slice(0, 6).map((item) => (
                            <div 
                              key={item.id} 
                              className={`p-2 rounded-lg transition-all duration-300 group cursor-pointer print:p-0 print:mb-2
                                ${activeLogic === item.logicPoint ? 'bg-cyan-50 border border-cyan-200 shadow-inner print:bg-transparent print:border-none print:shadow-none' : 'hover:bg-slate-50 border border-transparent print:border-none'}
                              `}
                            >
                              <p className="text-base md:text-lg leading-relaxed print:text-base print:text-black">
                                <span className="font-bold text-cyan-900 mr-2 text-sm print:text-black">[{item.id.toString().padStart(2, '0')}]</span>
                                <span className={`${activeLogic === item.logicPoint ? 'font-bold text-cyan-800 print:text-black print:underline print:underline-offset-4' : ''}`}>
                                  {item.text}
                                </span>
                              </p>
                              <p className="text-sm text-slate-500 mt-1 opacity-0 group-hover:opacity-100 transition-opacity duration-300 ml-9 print:hidden">
                                {item.trans}
                              </p>
                            </div>
                          ))}
                        </div>
                      </div>

                      {/* 파트 B: 착각과 진실 (7~10번) */}
                      <div className="border-t border-dashed border-slate-300 pt-4 print:border-black print:pt-4">
                        <div className="inline-block bg-red-700 text-white text-sm font-bold px-3 py-1 rounded mb-3 print:bg-slate-200 print:text-black print:border print:border-slate-800">
                          ▶ The Illusion (미래의 나에 대한 착각)
                        </div>
                        <div className="space-y-2 print:space-y-1">
                          {textData.slice(6, 10).map((item) => (
                            <div 
                              key={item.id} 
                              className={`p-2 rounded-lg transition-all duration-300 group cursor-pointer print:p-0 print:mb-2
                                ${activeLogic === item.logicPoint ? 'bg-red-50 border border-red-200 shadow-inner print:bg-transparent print:border-none print:shadow-none' : 'hover:bg-slate-50 border border-transparent print:border-none'}
                              `}
                            >
                              <p className="text-base md:text-lg leading-relaxed print:text-base print:text-black">
                                <span className="font-bold text-cyan-900 mr-2 text-sm print:text-black">[{item.id.toString().padStart(2, '0')}]</span>
                                <span className={`${activeLogic === item.logicPoint ? 'font-bold text-red-800 print:text-black print:underline print:underline-offset-4' : ''}`}>
                                  {item.text}
                                </span>
                              </p>
                              <p className="text-sm text-slate-500 mt-1 opacity-0 group-hover:opacity-100 transition-opacity duration-300 ml-9 print:hidden">
                                {item.trans}
                              </p>
                            </div>
                          ))}
                        </div>
                      </div>

                      {/* 파트 C: 테세우스의 배 (11~17번) */}
                      <div className="border-t border-dashed border-slate-300 pt-4 print:border-black print:pt-4">
                        <div className="inline-block bg-cyan-700 text-white text-sm font-bold px-3 py-1 rounded mb-3 print:bg-slate-200 print:text-black print:border print:border-slate-800">
                          ▶ The Metaphor (테세우스의 배 비유)
                        </div>
                        <div className="space-y-2 print:space-y-1">
                          {textData.slice(10, 17).map((item) => (
                            <div 
                              key={item.id} 
                              className={`p-2 rounded-lg transition-all duration-300 group cursor-pointer print:p-0 print:mb-2
                                ${activeLogic === item.logicPoint ? 'bg-cyan-50 border border-cyan-200 shadow-inner print:bg-transparent print:border-none print:shadow-none' : 'hover:bg-slate-50 border border-transparent print:border-none'}
                              `}
                            >
                              <p className="text-base md:text-lg leading-relaxed print:text-base print:text-black">
                                <span className="font-bold text-cyan-900 mr-2 text-sm print:text-black">[{item.id.toString().padStart(2, '0')}]</span>
                                <span className={`${activeLogic === item.logicPoint ? 'font-bold text-cyan-800 print:text-black print:underline print:underline-offset-4' : ''}`}>
                                  {item.text}
                                </span>
                              </p>
                              <p className="text-sm text-slate-500 mt-1 opacity-0 group-hover:opacity-100 transition-opacity duration-300 ml-9 print:hidden">
                                {item.trans}
                              </p>
                            </div>
                          ))}
                        </div>
                      </div>
                      
                      {/* 파트 D: 조언 (18~23번) */}
                      <div className="border-t border-dashed border-slate-300 pt-4 print:border-black print:pt-4">
                        <div className="inline-block bg-teal-700 text-white text-sm font-bold px-3 py-1 rounded mb-3 print:bg-slate-200 print:text-black print:border print:border-slate-800">
                          ▶ Action Plan (자랑스러운 미래를 위한 조언)
                        </div>
                        <div className="space-y-2 print:space-y-1">
                          {textData.slice(17, 23).map((item) => (
                            <div 
                              key={item.id} 
                              className={`p-2 rounded-lg transition-all duration-300 group cursor-pointer print:p-0 print:mb-2
                                ${activeLogic === item.logicPoint ? 'bg-teal-50 border border-teal-200 shadow-inner print:bg-transparent print:border-none print:shadow-none' : 'hover:bg-slate-50 border border-transparent print:border-none'}
                              `}
                            >
                              <p className="text-base md:text-lg leading-relaxed print:text-base print:text-black">
                                <span className="font-bold text-cyan-900 mr-2 text-sm print:text-black">[{item.id.toString().padStart(2, '0')}]</span>
                                <span className={`${activeLogic === item.logicPoint ? 'font-bold text-teal-800 print:text-black print:underline print:underline-offset-4' : ''}`}>
                                  {item.text}
                                </span>
                              </p>
                              <p className="text-sm text-slate-500 mt-1 opacity-0 group-hover:opacity-100 transition-opacity duration-300 ml-9 print:hidden">
                                {item.trans}
                              </p>
                            </div>
                          ))}
                        </div>
                      </div>

                    </div>
                  </div>

                  {/* 2. 구문 로직 영역 */}
                  <div className="bg-white p-6 md:p-8 rounded-xl shadow-sm print:shadow-none print:border print:border-slate-300 print:rounded-none print-avoid-break">
                    <h3 className="text-xl font-bold text-cyan-900 border-b-2 border-slate-100 pb-3 mb-6 print:text-black print:border-black">
                      PART 2. The Logic Syntax
                    </h3>
                    <p className="text-sm text-slate-500 mb-4 print:hidden">💡 아래의 포인트를 클릭하면 지문의 해당 문장이 강조됩니다.</p>
                    
                    <div className="grid gap-4 print:gap-6">
                      <button 
                        onClick={() => handleLogicClick(1)}
                        className={`text-left border-2 rounded-lg overflow-hidden transition-all duration-300 print:border-2 print:border-slate-800 print:shadow-none print:transform-none print:rounded-none
                          ${activeLogic === 1 ? 'border-red-600 shadow-md transform -translate-y-1' : 'border-slate-200 hover:border-red-400'}
                        `}
                      >
                        <div className={`px-4 py-2 font-bold print:bg-slate-100 print:text-black ${activeLogic === 1 ? 'bg-red-600 text-white' : 'bg-red-50 text-red-900'}`}>
                          POINT 01. 통념의 반박: not the case
                        </div>
                        <div className="p-4 bg-white">
                          <p className="mb-2"><span className="font-semibold text-slate-700 print:text-black">Structure:</span> we tend to imagine ~ (통념). That, however, is not the case (진실).</p>
                          <p className="text-sm text-slate-600 leading-relaxed print:text-black">
                            미래의 나는 지금과 똑같을 것이라고 '상상하는 경향(tend to imagine)'이 있다는 인간의 보편적 착각을 제시한 후, <strong>'그것은 사실이 아니다(not the case)'</strong>라며 단호하게 통념을 뒤집는 수능형 논리 전개입니다.
                          </p>
                        </div>
                      </button>

                      <button 
                        onClick={() => handleLogicClick(2)}
                        className={`text-left border-2 rounded-lg overflow-hidden transition-all duration-300 print:border-2 print:border-slate-800 print:shadow-none print:transform-none print:rounded-none
                          ${activeLogic === 2 ? 'border-cyan-600 shadow-md transform -translate-y-1' : 'border-slate-200 hover:border-cyan-400'}
                        `}
                      >
                        <div className={`px-4 py-2 font-bold print:bg-slate-100 print:text-black ${activeLogic === 2 ? 'bg-cyan-600 text-white' : 'bg-cyan-50 text-cyan-900'}`}>
                          POINT 02. 비유를 통한 요지 강조: living examples of
                        </div>
                        <div className="p-4 bg-white">
                          <p className="mb-2"><span className="font-semibold text-slate-700 print:text-black">Structure:</span> We are living examples of (the Metaphor).</p>
                          <p className="text-sm text-slate-600 leading-relaxed print:text-black">
                            부품이 계속 교체되어 결국 완전히 다른 배가 되는 '테세우스의 배'라는 철학적 비유를 우리 인간에게 직접 적용합니다. <strong>'우리 역시 끊임없이 새로운 버전으로 교체되는 존재'</strong>라는 글의 핵심 요지를 은유적으로 담고 있습니다.
                          </p>
                        </div>
                      </button>
                    </div>

                    <div className="mt-8 text-center print:hidden">
                       <button onClick={() => setActiveTab(2)} className="bg-cyan-900 hover:bg-cyan-800 text-white px-8 py-3 rounded-full font-bold shadow-md transition-colors flex items-center gap-2 mx-auto">
                         구문 분석 완료! 실전 문제로 이동 <i className="ph-bold ph-arrow-right"></i>
                       </button>
                    </div>
                  </div>
                </div>

                {/* === TAB 2: 논리 구조도 및 퀴즈 영역 === */}
                <div className={`space-y-6 print:space-y-4 print:mt-4 ${activeTab === 2 ? 'block' : 'hidden print:block'}`}>
                  
                  {/* 3. 로직 맵 */}
                  <div className="bg-white p-6 rounded-xl shadow-sm border-t-4 border-cyan-600 print:shadow-none print:border print:border-slate-300 print:border-t-4 print:border-t-black print:rounded-none print-avoid-break">
                    <div className="flex justify-between items-center border-b-2 border-slate-100 pb-3 mb-6 print:border-black">
                      <h3 className="text-xl font-bold text-slate-800 flex items-center gap-2 print:text-black">
                        <i className="ph-fill ph-play-circle text-2xl text-cyan-600 print:text-black"></i> PART 3. Logic Map
                      </h3>
                      <div className="print:hidden">
                        {mapStep > 0 && mapStep < logicMapSteps.length && (
                          <button onClick={nextMapStep} className="bg-cyan-100 hover:bg-cyan-200 text-cyan-800 px-3 py-1 rounded text-sm font-bold transition-colors">
                            Next Step ➔
                          </button>
                        )}
                        {mapStep === logicMapSteps.length && (
                           <button onClick={resetMap} className="text-slate-400 hover:text-slate-600 text-sm underline">
                            Reset
                           </button>
                        )}
                      </div>
                    </div>
                    
                    <div 
                      className={`h-64 flex-col items-center justify-center border-2 border-dashed border-slate-200 rounded-lg bg-slate-50 text-center p-6 cursor-pointer hover:bg-cyan-50 transition-colors 
                        ${mapStep === 0 ? 'flex' : 'hidden'} print:!hidden
                      `} 
                      onClick={nextMapStep}
                    >
                      <i className="ph-fill ph-play-circle text-5xl text-cyan-400 mb-4"></i>
                      <p className="text-slate-600 font-medium">클릭하여 Talk 2의 논리 구조를<br/>단계별로 파악해 보세요.</p>
                    </div>
                    
                    <div className={`flex-col items-center gap-2 py-4 ${mapStep > 0 ? 'flex' : 'hidden'} print:!flex`}>
                      {logicMapSteps.map((step, idx) => (
                        <React.Fragment key={step.id}>
                          <div 
                            className={`w-full max-w-sm border-2 rounded-lg p-4 flex flex-col items-center text-center transition-all duration-500 transform
                              print:!opacity-100 print:!translate-y-0 print:!flex print:border-slate-800 print:rounded-none print:bg-white print:text-black
                              ${idx < mapStep ? `opacity-100 translate-y-0 ${step.color}` : 'opacity-0 translate-y-8 hidden'}
                            `}
                          >
                            <div className="print:hidden">{step.icon}</div>
                            <span className="font-bold text-sm mb-1 print:text-black">{step.title}</span>
                            <span className="text-sm opacity-90 print:text-black">{step.desc}</span>
                          </div>
                          <div 
                            className={`flex-col items-center opacity-100 animate-pulse 
                              print:!flex print:!opacity-100 print:animate-none
                              ${idx < logicMapSteps.length - 1 && idx < mapStep ? 'flex' : 'hidden'}
                            `}
                          >
                            <div className="w-0.5 h-6 bg-slate-300 print:bg-slate-800"></div>
                            {/* 화살표 라벨 추가 */}
                            {idx === 0 ? (
                              <div className="bg-red-100 text-red-700 text-xs font-bold px-2 py-1 rounded-full my-1 border border-red-300 print:bg-white print:text-black print:border-slate-800 print:rounded-none">
                                Leads to
                              </div>
                            ) : idx === 1 ? (
                              <div className="bg-cyan-100 text-cyan-700 text-xs font-bold px-2 py-1 rounded-full my-1 border border-cyan-300 print:bg-white print:text-black print:border-slate-800 print:rounded-none">
                                Corrected by
                              </div>
                            ) : idx === 2 ? (
                              <div className="bg-teal-100 text-teal-700 text-xs font-bold px-2 py-1 rounded-full my-1 border border-teal-300 print:bg-white print:text-black print:border-slate-800 print:rounded-none">
                                Therefore
                              </div>
                            ) : null}
                            <i className="ph-bold ph-arrow-right text-base text-slate-400 transform rotate-90 print:text-slate-800"></i>
                          </div>
                        </React.Fragment>
                      ))}
                    </div>
                  </div>

                  {/* 4. 실전 변형 문제 */}
                  <div className="bg-white p-6 rounded-xl shadow-sm print:shadow-none print:border print:border-slate-300 print:rounded-none print-avoid-break">
                    <h3 className="text-xl font-bold text-slate-800 border-b-2 border-slate-100 pb-3 mb-6 flex items-center gap-2 print:text-black print:border-black">
                      <i className="ph-fill ph-check-circle text-2xl text-cyan-600 print:text-black"></i> PART 4. Challenge
                    </h3>
                    
                    {/* Q1. 문장 삽입 */}
                    <div className="mb-8">
                      <div className="bg-slate-50 border border-slate-200 p-5 rounded-lg mb-4 print:bg-white print:border-none print:p-0 print:mb-6">
                        <p className="font-bold text-slate-800 mb-2 print:text-black">Q1. 문장 삽입</p>
                        <p className="text-sm text-slate-600 mb-4 print:text-black">글의 흐름으로 보아, 주어진 문장이 들어가기에 가장 적절한 곳을 고르시오.</p>
                        <div className="text-md font-bold text-center bg-white p-4 border border-slate-200 rounded mb-4 print:border-slate-400 print:rounded-none print:text-black">
                          That, however, is not the case.
                        </div>
                        <p className="text-md leading-relaxed bg-white p-4 border border-slate-200 rounded print:border-slate-400 print:rounded-none print:text-black">
                          Thirty years ago, we didn’t even have podcasts or smartphones, and the future was not just unknown but unknowable. ( ① ) When we look back, we can see how we have changed, but when we look forward, we tend to imagine ourselves as the same people, only older and taller. ( ② ) Biologically, our cells are continuously renewing themselves, and our brains are rewiring and modifying their connections. ( ③ ) We are constantly becoming new versions of ourselves. ( ④ ) Have you heard of the “Ship of Theseus”?
                        </p>
                      </div>

                      <div className="grid grid-cols-2 md:grid-cols-4 gap-2 print:grid-cols-4 print:gap-4">
                        {[
                          { id: 1, text: "①" },
                          { id: 2, text: "②", isCorrect: true },
                          { id: 3, text: "③" },
                          { id: 4, text: "④" }
                        ].map((choice) => (
                          <button
                            key={choice.id}
                            onClick={() => setQuiz1Answered(choice.id)}
                            disabled={quiz1Answered !== null}
                            className={`w-full text-center p-3 rounded-lg border font-bold transition-all duration-200
                              print:border-none print:p-1 print:text-black
                              ${quiz1Answered === null ? 'border-slate-200 hover:border-cyan-400 hover:bg-cyan-50' : 
                                (choice.isCorrect ? 'border-green-500 bg-green-50 text-green-800 shadow-sm' : 
                                  (quiz1Answered === choice.id ? 'border-red-400 bg-red-50 text-red-500' : 'border-slate-100 text-slate-400 opacity-50'))
                              }
                            `}
                          >
                            {choice.text}
                          </button>
                        ))}
                      </div>

                      {quiz1Answered !== null && (
                        <div className={`mt-4 p-4 rounded-lg text-sm leading-relaxed animate-fade-in print:hidden
                          ${quiz1Answered === 2 ? 'bg-green-100 text-green-900 border border-green-300' : 'bg-red-100 text-red-900 border border-red-300'}
                        `}>
                          <p className="font-bold mb-1">
                            {quiz1Answered === 2 ? '🎉 정답입니다!' : '오답입니다. 다시 한번 생각해 보세요.'}
                          </p>
                          <p>
                            <strong>해설:</strong> 주어진 문장의 <strong>'That(그것)'</strong>은 앞 문장의 내용(우리가 미래에도 똑같은 사람일 것이라고 상상하는 것)을 가리킵니다. 앞서 사람들이 가지는 흔한 '착각(통념)'을 제시하고, "그러나 그것은 사실이 아니다"라고 <strong>역접(however)</strong>으로 반박한 후, 생물학적 근거(세포의 재생)를 대며 진실을 밝히는 ②번 자리가 가장 적절합니다.
                          </p>
                          <button onClick={() => setQuiz1Answered(null)} className="mt-3 text-sm underline opacity-70 hover:opacity-100">
                            다시 풀기
                          </button>
                        </div>
                      )}
                    </div>

                    <hr className="my-8 border-slate-200 print:border-black" />

                    {/* Q2. 함축 의미 추론 */}
                    <div>
                      <div className="bg-slate-50 border border-slate-200 p-5 rounded-lg mb-4 print:bg-white print:border-none print:p-0 print:mb-6">
                        <p className="font-bold text-slate-800 mb-2 print:text-black">Q2. 함축 의미 추론</p>
                        <p className="text-sm text-slate-600 mb-4 print:text-black">밑줄 친 <u>living examples of the Ship of Theseus</u>가 다음 글에서 의미하는 바로 가장 적절한 것은?</p>
                        <p className="text-md leading-relaxed bg-white p-4 border border-slate-200 rounded print:border-slate-400 print:rounded-none print:text-black text-center">
                          "Well, we are <u>living examples of the Ship of Theseus.</u>"
                        </p>
                      </div>

                      <div className="space-y-2 print:space-y-3">
                        {[
                          { id: 1, text: "우리는 역사적 사실을 보존하려는 욕구가 있다." },
                          { id: 2, text: "우리는 과거의 실수를 끊임없이 반복하는 존재이다." },
                          { id: 3, text: "우리는 매일 변화하여 결국 새로운 자아가 되는 존재이다.", isCorrect: true },
                          { id: 4, text: "우리는 육체적 한계를 정신력으로 극복할 수 있다." }
                        ].map((choice) => (
                          <button
                            key={choice.id}
                            onClick={() => setQuiz2Answered(choice.id)}
                            disabled={quiz2Answered !== null}
                            className={`w-full text-left p-3 rounded-lg border flex items-center transition-all duration-200
                              print:border-none print:p-1 print:text-black
                              ${quiz2Answered === null ? 'border-slate-200 hover:border-cyan-400 hover:bg-cyan-50' : 
                                (choice.isCorrect ? 'border-green-500 bg-green-50 text-green-800 font-bold shadow-sm' : 
                                  (quiz2Answered === choice.id ? 'border-red-400 bg-red-50 text-red-500' : 'border-slate-100 text-slate-400 opacity-50'))
                              }
                            `}
                          >
                            <span className="w-8 inline-block font-mono text-slate-500 print:text-black">①</span> 
                            {choice.text}
                            {quiz2Answered !== null && choice.isCorrect && <i className="ph-fill ph-check-circle text-lg ml-auto text-green-500 print:hidden"></i>}
                          </button>
                        ))}
                      </div>

                      {quiz2Answered !== null && (
                        <div className={`mt-4 p-4 rounded-lg text-sm leading-relaxed animate-fade-in print:hidden
                          ${quiz2Answered === 3 ? 'bg-green-100 text-green-900 border border-green-300' : 'bg-red-100 text-red-900 border border-red-300'}
                        `}>
                          <p className="font-bold mb-1">
                            {quiz2Answered === 3 ? '🎉 정답입니다!' : '오답입니다. 다시 한번 생각해 보세요.'}
                          </p>
                          <p>
                            <strong>해설:</strong> 낡은 나무판자를 계속 교체하다 보면 어느새 처음과는 완전히 다른 새 배가 되어버린다는 '테세우스의 배' 비유는 <strong>자아의 끊임없는 변화(Fluidity)</strong>를 상징합니다. 즉, 생물학적 세포뿐만 아니라 우리의 생각과 정체성도 매일 성장하고 교체되어 미래에는 완전히 새로운 버전의 내가 된다는 것을 의미합니다.
                          </p>
                          <button onClick={() => setQuiz2Answered(null)} className="mt-3 text-sm underline opacity-70 hover:opacity-100">
                            다시 풀기
                          </button>
                        </div>
                      )}
                    </div>

                  </div>
                </div>

              </div>
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
