    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const textData = [
          // Part 1: Baseball & Sabermetrics
          { id: 1, text: "When the Oakland Athletics, a Major League Baseball team, won 20 games in a row in 2002, the professional sports industry was shocked.", trans: "미국 메이저리그 야구팀인 오클랜드 애슬레틱스가 2002년에 20경기 연속 승리를 거두었을 때, 프로 스포츠 업계는 충격을 받았다." },
          { id: 2, text: "The Oakland Athletics were a small team with limited funds, which made it difficult for them to attract elite players.", trans: "오클랜드 애슬레틱스는 제한된 자금을 가진 소규모 팀이었고, 이것은 그들이 엘리트 선수들을 유치하는 것을 어렵게 만들었다." },
          { id: 3, text: "How did they do it?", trans: "그들은 어떻게 그것을 해냈을까?" },
          { id: 4, text: <span>The key to their success was adopting <span className="italic font-medium">sabermetrics</span>, a statistical model used for making decisions in baseball.</span>, trans: "그들의 성공 비결은 야구에서 의사결정을 내리는 데 사용되는 통계 모델인 사이버메트릭스(sabermetrics)를 도입한 것이었다." },
          { id: 5, text: <span><span className="italic font-medium">Sabermetrics</span> was created in the late 1970s.</span>, trans: "사이버메트릭스는 1970년대 후반에 만들어졌다." },
          { id: 6, text: "It tries to use large amounts of information to discover patterns, trends, and insights that are difficult to find with traditional ways of studying statistics.", trans: "그것은 통계를 연구하는 전통적인 방법으로는 찾기 어려운 패턴, 경향, 그리고 통찰력을 발견하기 위해 대량의 정보를 사용하려고 시도한다." },
          { id: 7, text: "Normally, coaches and managers prefer players who can hit the ball hard and far, for such players tend to hit more home runs and extra-base hits.", trans: "보통, 코치와 감독들은 공을 강하고 멀리 칠 수 있는 선수들을 선호하는데, 그런 선수들이 홈런과 장타를 더 많이 치는 경향이 있기 때문이다." },
          { id: 8, text: <span><span className="italic font-medium">Sabermetrics</span> suggests that players’ offensive skills can be better measured by the frequency with which they safely reach base.</span>, trans: "사이버메트릭스는 선수들의 공격 능력이 그들이 안전하게 출루하는 빈도에 의해 더 잘 측정될 수 있다고 제안한다." },
          { id: 9, text: "It does not matter whether this is achieved through hits, walks, or hits by pitch.", trans: "이것이 안타, 볼넷, 또는 몸에 맞는 공을 통해 달성되는지는 중요하지 않다." },
          { id: 10, text: <span><span className="italic font-medium">Sabermetrics</span> had not been widely used until the Athletics adopted it in 2002.</span>, trans: "사이버메트릭스는 2002년 애슬레틱스가 그것을 도입하기 전까지는 널리 사용되지 않았다." },
          { id: 11, text: <span>With <span className="italic font-medium">sabermetrics</span>, the Athletics were able to identify underrated players with significant contributions to winning and built a strong team on a small budget.</span>, trans: "사이버메트릭스를 통해, 애슬레틱스는 승리에 상당한 기여를 하는 저평가된 선수들을 식별할 수 있었고 적은 예산으로 강력한 팀을 구축했다." },
          { id: 12, text: <span>The success of the Athletics prompted other teams to quickly adopt <span className="italic font-medium">sabermetrics</span>, sparking a movement to utilize data not only in baseball but also in other sports.</span>, trans: "애슬레틱스의 성공은 다른 팀들이 사이버메트릭스를 빠르게 도입하도록 촉구했으며, 야구뿐만 아니라 다른 스포츠에서도 데이터를 활용하려는 움직임을 촉발시켰다." },
          { id: 13, text: "Thus, sports data analytics emerged as a systematic approach to predict game outcomes.", trans: "이리하여, 스포츠 데이터 분석학은 경기 결과를 예측하는 체계적인 접근법으로 부상했다.", isHighlight: true, logicPoint: 1 },

          // Part 2: Soccer (Liverpool FC)
          { id: 14, text: "In soccer, the Liverpool Football Club of the English Premier League is similar to the Oakland Athletics in baseball.", trans: "축구에서, 잉글랜드 프리미어리그의 리버풀 풋볼 클럽은 야구의 오클랜드 애슬레틱스와 비슷하다." },
          { id: 15, text: "In 2010, Liverpool underwent a change in ownership.", trans: "2010년에 리버풀은 소유권에 변화를 겪었다." },
          { id: 16, text: "While data analysis was already prevailing in the Premier League at that time, the new owner of the club, who also owned a baseball team in the United States, aimed to push data analysis in soccer to new heights.", trans: "그 당시 프리미어리그에는 이미 데이터 분석이 널리 퍼져 있었지만, 미국의 한 야구팀도 소유하고 있던 클럽의 새로운 구단주는 축구에서의 데이터 분석을 새로운 차원으로 밀어올리는 것을 목표로 했다." },
          { id: 17, text: "So he demanded that the club form a new data team.", trans: "그래서 그는 클럽이 새로운 데이터 팀을 구성할 것을 요구했다." },
          { id: 18, text: "The new team included a physicist from Cambridge, a nuclear scientist from Harvard, and a former chess champion.", trans: "새로운 팀에는 케임브리지 출신의 물리학자, 하버드 출신의 핵과학자, 그리고 전 체스 챔피언이 포함되었다." },
          { id: 19, text: "What they had in common was significant expertise in data.", trans: "그들의 공통점은 데이터에 대한 상당한 전문 지식이었다." },
          { id: 20, text: "The team started to apply data analysis in key areas of club management, including player recruitment, injury prevention, and strategy during the game.", trans: "이 팀은 선수 영입, 부상 예방, 그리고 경기 중 전략을 포함한 클럽 관리의 핵심 영역에 데이터 분석을 적용하기 시작했다." },
          { id: 21, text: "The team analyzed large amounts of data to recruit players who fit the team’s style of play.", trans: "이 팀은 팀의 플레이 스타일에 맞는 선수들을 영입하기 위해 대량의 데이터를 분석했다." },
          { id: 22, text: "In training, they collected data on players’ movement patterns, heart rates, and vital signs by using GPS trackers and sensors to prevent injuries.", trans: "훈련 중에, 그들은 부상을 예방하기 위해 GPS 추적기와 센서를 사용하여 선수들의 움직임 패턴, 심박수, 그리고 활력 징후에 대한 데이터를 수집했다." },
          { id: 23, text: "During games, they used live data to make tactical decisions such as substitutions and formations.", trans: "경기 중에, 그들은 교체와 포메이션 같은 전술적 결정을 내리기 위해 실시간 데이터를 사용했다." },
          { id: 24, text: "The data team was praised for its efforts when the Liverpool Football Club won the league championship for the first time in 30 years in 2020.", trans: "이 데이터 팀은 리버풀 풋볼 클럽이 2020년에 30년 만에 처음으로 리그 우승을 차지했을 때 그들의 노력에 대해 칭찬을 받았다.", isHighlight: true, logicPoint: 2 },

          // Part 3: Curling (Korean Women's Team)
          { id: 25, text: "The emergence of sports analytics did not go unnoticed by the Korean sports industry.", trans: "스포츠 분석학의 부상은 한국 스포츠 업계에도 눈에 띄었다." },
          { id: 26, text: "One notable example of success is the Korean women’s curling team.", trans: "성공의 한 가지 주목할 만한 예는 한국 여자 컬링 대표팀이다." },
          { id: 27, text: "Following its debut at the Winter Olympic Games of 2014, the team recognized the need to enhance its sweeping technique.", trans: "2014년 동계 올림픽에 데뷔한 후, 이 팀은 그들의 스위핑 기술을 향상시킬 필요성을 인식했다." },
          { id: 28, text: "Sweeping melts the ice and makes the stone move faster.", trans: "스위핑은 얼음을 녹이고 스톤을 더 빠르게 움직이게 만든다." },
          { id: 29, text: "If too much ice melts, however, the stone moves too fast and misses the target.", trans: "하지만, 얼음이 너무 많이 녹으면 스톤이 너무 빨리 움직여서 목표물을 빗나간다." },
          { id: 30, text: "On the other hand, if not enough ice melts, the stone stops before reaching the target.", trans: "반면에, 얼음이 충분히 녹지 않으면 스톤은 목표물에 도달하기 전에 멈춘다." },
          { id: 31, text: "The amount of ice melting depends on the sweeping speed and pressure.", trans: "얼음이 녹는 양은 스위핑의 속도와 압력에 달려 있다." },
          { id: 32, text: "Applying too much pressure slows down the sweeping speed, and focusing only on speed makes it hard to transfer enough force to the broom.", trans: "너무 많은 압력을 가하는 것은 스위핑 속도를 늦추고, 속도에만 집중하는 것은 빗자루에 충분한 힘을 전달하기 어렵게 만든다." },
          { id: 33, text: "Finding the right balance between speed and pressure is important to melt the right amount of ice.", trans: "적절한 양의 얼음을 녹이기 위해서는 속도와 압력 사이의 올바른 균형을 찾는 것이 중요하다." },
          { id: 34, text: "To identify the most effective technique, the Korean team designed a sweeping measurement device.", trans: "가장 효과적인 기술을 찾아내기 위해, 한국 팀은 스위핑 측정 기기를 설계했다." },
          { id: 35, text: "The device consisted of infrared cameras and sensors attached to the players’ bodies, shoes, and brooms.", trans: "이 기기는 선수들의 몸, 신발, 빗자루에 부착된 적외선 카메라와 센서로 구성되었다." },
          { id: 36, text: "Through the device and motion-capture screens, foot pressure values and other data were obtained for analysis.", trans: "이 기기와 모션 캡처 화면을 통해, 분석을 위한 발 압력 값과 기타 데이터가 획득되었다." },
          { id: 37, text: "After monitoring changes in the temperature of the ice surface, the team concluded that speed was more economical than strength for sweeping.", trans: "얼음 표면 온도의 변화를 모니터링한 후, 팀은 스위핑에 있어 힘보다 속도가 더 경제적이라는 결론을 내렸다." },
          { id: 38, text: "The use of data analysis was critical in the team’s winning of a silver medal at the 2018 Pyeongchang Winter Olympics.", trans: "데이터 분석의 사용은 이 팀이 2018년 평창 동계 올림픽에서 은메달을 따는 데 결정적이었다.", isHighlight: true, logicPoint: 3 },

          // Part 4: Archery (Korean Women's Team)
          { id: 39, text: "The successful use of sports analytics was not limited to the curling team.", trans: "스포츠 분석학의 성공적인 사용은 컬링 팀에만 국한되지 않았다." },
          { id: 40, text: "The Korean women’s archery team had dominated the sport for decades.", trans: "한국 여자 양궁 대표팀은 수십 년 동안 그 스포츠를 지배해 왔다." },
          { id: 41, text: "However, the team turned to sports analytics to maintain its edge over its rivals in preparation for the 2020 Tokyo Olympics.", trans: "하지만, 이 팀은 2020년 도쿄 올림픽을 준비하면서 경쟁자들에 대한 우위를 유지하기 위해 스포츠 분석학에 의존했다." },
          { id: 42, text: "The team developed a system to monitor players’ heart rates by using advanced visual computing technology to convert facial color variations into heart rates.", trans: "팀은 얼굴 색상 변화를 심박수로 변환하는 첨단 비주얼 컴퓨팅 기술을 사용하여 선수들의 심박수를 모니터링하는 시스템을 개발했다." },
          { id: 43, text: "This data was used for psychological training to help players maintain stable heart rates during crucial moments.", trans: "이 데이터는 선수들이 결정적인 순간에 안정적인 심박수를 유지하도록 돕는 심리 훈련에 사용되었다." },
          { id: 44, text: "The team also created an AI coach that helped adjust shooting form.", trans: "팀은 또한 슈팅 자세를 조정하는 데 도움을 주는 AI 코치를 만들었다." },
          { id: 45, text: "The team managers requested that the AI coach edit training videos of the players to assist with practical analysis.", trans: "팀 관리자들은 AI 코치가 실질적인 분석을 돕기 위해 선수들의 훈련 비디오를 편집할 것을 요구했다." },
          { id: 46, text: "Players and coaches used the edited videos to analyze the players’ usual habits or weaknesses.", trans: "선수들과 코치들은 편집된 비디오를 사용하여 선수들의 평소 습관이나 약점을 분석했다." },
          { id: 47, text: "The active use of data analysis by the Korean women’s archery team handed them their ninth Olympic gold medal in a row in Tokyo.", trans: "한국 여자 양궁 대표팀의 적극적인 데이터 분석 활용은 도쿄에서 그들에게 9연속 올림픽 금메달을 안겨주었다.", isHighlight: true, logicPoint: 4 },

          // Part 5: Conclusion
          { id: 48, text: "There are still limitations to what data analysis can capture in games.", trans: "경기에서 데이터 분석이 포착할 수 있는 것에는 여전히 한계가 있다." },
          { id: 49, text: "Factors such as team chemistry, which is related to how well people get along, will likely remain difficult to measure.", trans: "사람들이 얼마나 잘 지내는가와 관련된 팀 화합 같은 요인들은 측정하기 어려운 상태로 남을 가능성이 높다." },
          { id: 50, text: "Similarly, predicting player performance in a match cannot be entirely accurate as players are humans and not machines.", trans: "마찬가지로, 선수들은 기계가 아닌 인간이기 때문에 경기에서의 선수 성과를 예측하는 것은 완전히 정확할 수 없다." },
          { id: 51, text: "Still, sports analytics is undeniably elevating the level of play across various sports, and fans are enjoying this development.", trans: "그럼에도 불구하고, 스포츠 분석학은 의심할 여지 없이 다양한 스포츠에 걸쳐 경기 수준을 끌어올리고 있으며, 팬들은 이러한 발전을 즐기고 있다.", isHighlight: true, logicPoint: 5 }
        ];

        const logicMapSteps = [
          { id: 'baseball', title: "BASEBALL (야구)", desc: "Sabermetrics 도입으로 저예산 고효율 팀 구축", color: "bg-blue-100 border-blue-400 text-blue-800", icon: <i className="ph-fill ph-baseball text-xl mb-2"></i> },
          { id: 'soccer', title: "SOCCER (축구)", desc: "데이터 전담팀 신설로 리그 우승 달성", color: "bg-indigo-100 border-indigo-400 text-indigo-800", icon: <i className="ph-fill ph-soccer-ball text-xl mb-2"></i> },
          { id: 'curling', title: "CURLING (컬링)", desc: "센서 기술로 스위핑 속도와 압력의 최적화", color: "bg-teal-100 border-teal-400 text-teal-800", icon: <i className="ph-fill ph-bullseye text-xl mb-2"></i> },
          { id: 'archery', title: "ARCHERY (양궁)", desc: "심박수 모니터링과 AI 코치를 활용한 약점 분석", color: "bg-orange-100 border-orange-400 text-orange-800", icon: <i className="ph-fill ph-target text-xl mb-2"></i> },
          { id: 'conclusion', title: "CONCLUSION (결론)", desc: "데이터 분석의 한계 인정과 지속적인 경기력 향상", color: "bg-emerald-100 border-emerald-500 text-emerald-900", icon: <i className="ph-fill ph-chart-bar text-xl mb-2"></i> }
        ];

        function App() {
          const [isAuthenticated, setIsAuthenticated] = useState(false);
          const [passwordInput, setPasswordInput] = useState("");
          const [loginError, setLoginError] = useState("");
          
          const CORRECT_PASSWORD = "Made by Lee";

          const itemRefs = useRef({});

          const handleLoginSubmit = (e) => {
            e.preventDefault();
            if (passwordInput === CORRECT_PASSWORD) {
              setIsAuthenticated(true);
              setLoginError("");
            } else {
              setLoginError("올바르지 않은 암호입니다. 다시 확인해 주세요.");
              setPasswordInput("");
            }
          };

          const [activeTab, setActiveTab] = useState('text');
          const [activeLogic, setActiveLogic] = useState(null);
          
          const handleLogicClick = (point) => {
              setActiveLogic(activeLogic === point ? null : point);
              setActiveTab('text'); 
          };

          useEffect(() => {
              if (activeTab === 'text' && activeLogic !== null) {
                  const targetItem = textData.find(item => item.logicPoint === activeLogic);
                  if (targetItem && itemRefs.current[targetItem.id]) {
                      setTimeout(() => {
                          itemRefs.current[targetItem.id].scrollIntoView({ behavior: 'smooth', block: 'center' });
                      }, 150);
                  }
              }
          }, [activeLogic, activeTab]);

          const [quiz1Answered, setQuiz1Answered] = useState(null);

                                                <p><strong>해설:</strong> 본문 48번 문장입니다. 결론부에서 데이터 분석의 강력함에도 불구하고, 팀 화합이나 인간 본연의 불확실성 등 게임에서 데이터가 완벽히 포착할 수 없는 <strong>'한계(limitations)'</strong>가 여전히 존재함을 인정하고 있습니다.</p>
                                            </div>
                                        )}
                                    </div>

                                </div>
                            </div>
                        </section>
                    </div>
                </main>

                {/* 모바일 하단 네비게이션 */}
                <nav className="md:hidden fixed bottom-0 w-full bg-white border-t border-slate-200 flex justify-around p-2 pb-safe z-30 shadow-[0_-5px_10px_rgba(0,0,0,0.05)] print:hidden">
                    <button onClick={() => setActiveTab('text')} className={`flex flex-col items-center p-2 min-w-[64px] transition-colors ${activeTab === 'text' ? 'text-emerald-700' : 'text-slate-400 hover:text-slate-600'}`}>
                        <i className={`${activeTab === 'text' ? 'ph-fill' : 'ph'} ph-book-open text-2xl mb-1`}></i>
                        <span className="text-[10px] font-bold">지문 분석</span>
                    </button>
                    <button onClick={() => setActiveTab('syntax')} className={`flex flex-col items-center p-2 min-w-[64px] transition-colors ${activeTab === 'syntax' ? 'text-emerald-700' : 'text-slate-400 hover:text-slate-600'}`}>
                        <i className={`${activeTab === 'syntax' ? 'ph-fill' : 'ph'} ph-highlighter-circle text-2xl mb-1`}></i>
                        <span className="text-[10px] font-bold">핵심 구문</span>
                    </button>
                    <button onClick={() => setActiveTab('map')} className={`flex flex-col items-center p-2 min-w-[64px] transition-colors ${activeTab === 'map' ? 'text-emerald-700' : 'text-slate-400 hover:text-slate-600'}`}>
                        <i className={`${activeTab === 'map' ? 'ph-fill' : 'ph'} ph-git-merge text-2xl mb-1`}></i>
                        <span className="text-[10px] font-bold">논리 구조도</span>
                    </button>
                    <button onClick={() => setActiveTab('quiz')} className={`flex flex-col items-center p-2 min-w-[64px] transition-colors ${activeTab === 'quiz' ? 'text-emerald-700' : 'text-slate-400 hover:text-slate-600'}`}>
                        <i className={`${activeTab === 'quiz' ? 'ph-fill' : 'ph'} ph-check-square-offset text-2xl mb-1`}></i>
                        <span className="text-[10px] font-bold">실전 문제</span>
                    </button>
                </nav>
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
