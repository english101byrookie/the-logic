<body class="app-like bg-slate-50">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const textData = [
          // Part 1: The Procession Overview
          { id: 1, text: "Hey there! Let me introduce you to a fascinating piece of Korean history.", trans: "안녕하세요! 한국 역사의 매력적인 부분을 소개해 드릴게요." },
          { id: 2, text: "Back on February 9, 1795, something remarkable happened in front of Changdeokgung Palace, where King Jeongjo lived.", trans: "과거 1795년 2월 9일, 정조 대왕이 살았던 창덕궁 앞에서 놀라운 일이 일어났습니다." },
          { id: 3, text: "There was quite a crowd gathered there to witness a very special procession that’s still talked about in Korea today.", trans: "오늘날까지도 한국에서 회자되는 아주 특별한 행렬을 목격하기 위해 꽤 많은 군중이 그곳에 모였습니다." },
          { id: 4, text: "Now, imagine this: more than 2,000 soldiers, hundreds of horse riders, and lots of important officials, all marching alongside the king and his mother with 50 musicians playing traditional instruments.", trans: "자, 상상해 보세요. 2,000명이 넘는 군인, 수백 명의 기수, 그리고 많은 중요한 관리들이 50명의 악사들이 전통 악기를 연주하는 가운데 왕과 그의 어머니 곁을 따라 행진하고 있습니다." },
          { id: 5, text: "When they crossed a bridge made of 36 boats on the Hangang River, you can imagine how that turned heads!", trans: "그들이 한강에 36척의 배로 만든 다리를 건넜을 때, 그것이 얼마나 사람들의 이목을 끌었을지 상상할 수 있을 것입니다!" },
          { id: 6, text: "That must have been something ordinary people rarely saw.", trans: "그것은 평범한 사람들이 좀처럼 보기 힘든 광경이었음에 틀림없습니다." },
          { id: 7, text: "Talk about a big event!", trans: "정말 엄청난 행사였죠!" },
          { id: 8, text: "This was not just about putting on a show. No, it was serious business.", trans: "이것은 단지 보여주기 위한 쇼가 아니었습니다. 아니요, 아주 진지한 일이었습니다." },
          { id: 9, text: "Lasting four days and covering 68 kilometers, the procession moved alongside the king and his mother as they made a round trip to Hwaseong Haenggung.", trans: "4일 동안 68킬로미터에 걸쳐 이어진 이 행렬은 왕과 그의 어머니가 화성 행궁으로 왕복 여행을 하는 동안 그들과 함께 이동했습니다.", isHighlight: true, logicPoint: 1 },

          // Part 2: The Purpose (Filial Piety & Military Strength)
          { id: 10, text: "Why did all of this happen?", trans: "왜 이 모든 일이 일어났을까요?" },
          { id: 11, text: "The first thing King Jeongjo had in mind was to show respect to his family.", trans: "정조 대왕이 염두에 둔 첫 번째는 가족에 대한 존경심을 보여주는 것이었습니다." },
          { id: 12, text: "It happened around his mother’s sixtieth birthday.", trans: "이 일은 그의 어머니의 환갑 즈음에 일어났습니다." },
          { id: 13, text: "Back in the Joseon Dynasty, just like today, turning 60 years old had a special meaning.", trans: "조선 시대에는 오늘날과 마찬가지로 60세가 된다는 것은 특별한 의미를 가졌습니다." },
          { id: 14, text: "And his father’s tomb was near Hwaseong Haenggung.", trans: "그리고 그의 아버지의 무덤은 화성 행궁 근처에 있었습니다." },
          { id: 15, text: "He was planning to hold a memorial service to honor his late father.", trans: "그는 돌아가신 아버지를 기리기 위해 추모식(제사)을 열 계획이었습니다." },
          { id: 16, text: "By combining the two events, he was telling everyone how much family meant to him.", trans: "이 두 가지 행사를 결합함으로써, 그는 가족이 자신에게 얼마나 큰 의미인지 모든 사람에게 말하고 있었습니다." },
          { id: 17, text: "But wait. There’s more. King Jeongjo was also making a statement about the Joseon Dynasty’s strength.", trans: "하지만 잠깐만요. 더 있습니다. 정조 대왕은 또한 조선 왕조의 강인함에 대해 성명(메시지)을 내고 있었습니다." },
          { id: 18, text: "He dressed up like a military leader, wearing armor and sitting on a horse with his soldiers marching in perfect order.", trans: "그는 갑옷을 입고 말에 앉아 완벽한 질서 속에 행진하는 군인들과 함께 군사 지도자처럼 차려입었습니다." },
          { id: 19, text: "It was a way of saying, “We’re ready to protect our land.”", trans: "그것은 “우리는 우리 땅을 지킬 준비가 되어 있다.”라고 말하는 방식이었습니다." },
          { id: 20, text: "He was really serious about making the Joseon Dynasty a powerful and successful kingdom.", trans: "그는 조선을 강력하고 성공적인 왕국으로 만드는 데 정말로 진심이었습니다.", isHighlight: true, logicPoint: 2 },

          // Part 3: Hwaseong Fortress Construction
          { id: 21, text: "Now, here’s the twist: the procession also had something to do with Hwaseong Fortress, which was being built.", trans: "자, 여기에 반전이 있습니다. 이 행렬은 또한 건설 중이던 화성과도 관련이 있었습니다." },
          { id: 22, text: "In King Jeongjo’s mind were big plans for Hwaseong.", trans: "정조 대왕의 마음속에는 화성에 대한 큰 계획이 있었습니다." },
          { id: 23, text: "He wanted it to be a self-sufficient city with a strong military, farming, and trade as he hoped to make it the new capital, away from all the political chaos in Hanyang.", trans: "그는 한양의 모든 정치적 혼란에서 벗어나 화성을 새로운 수도로 만들기를 희망했기 때문에, 강력한 군사, 농업, 무역을 갖춘 자급자족 도시가 되기를 원했습니다." },
          { id: 24, text: "So King Jeongjo gathered the best talents, such as Jeong Yakyong, and let them bring together the finest architectural techniques of his time from both the East and the West to build Hwaseong Fortress.", trans: "그래서 정조 대왕은 정약용과 같은 최고의 인재들을 모았고, 그들이 화성을 건설하기 위해 동양과 서양의 당대 최고 건축 기술들을 한데 모으도록 했습니다." },
          { id: 25, text: "There’s more to King Jeongjo’s story. He treated his people well during the construction of the fortress.", trans: "정조 대왕의 이야기는 더 있습니다. 그는 요새 건설 동안 백성들을 잘 대우했습니다." },
          { id: 26, text: "They received fair wages and breaks during bad weather and were even paid when they were sick, something that was unheard of at that time.", trans: "그들은 공정한 임금과 악천후 시 휴식을 제공받았고 아플 때도 급여를 받았는데, 이는 그 당시에는 전례가 없는 일이었습니다." },
          { id: 27, text: "Back then, ordinary people were typically required to work on public projects without getting paid.", trans: "그 당시에는 평범한 사람들이 대개 보수를 받지 않고 공공 프로젝트에서 일하도록 요구받았습니다." },
          { id: 28, text: "Once people got wind of King Jeongjo’s plan, workers from all over the country came together in a rush.", trans: "정조 대왕의 계획에 대한 소문이 퍼지자, 전국에서 노동자들이 앞다투어 모여들었습니다." },
          { id: 29, text: "So, in under three years was the project finished, though it was initially thought to take about 10 years.", trans: "그래서 처음에는 10년 정도 걸릴 것으로 생각되었지만, 이 프로젝트는 3년도 채 안 되어 완료되었습니다." },
          { id: 30, text: "Impressive, right?", trans: "인상적이지 않나요?", isHighlight: true, logicPoint: 3 },

          // Part 4: Connection with the People
          { id: 31, text: "Let’s go back to the procession. The procession wasn’t just some fancy show for ordinary people.", trans: "행렬로 돌아가 봅시다. 이 행렬은 평범한 사람들을 위한 단순한 화려한 쇼가 아니었습니다." },
          { id: 32, text: "It was actually a way for them to get up close and personal with the king.", trans: "그것은 사실 그들이 왕과 친밀하게 가까워질 수 있는 방법이었습니다." },
          { id: 33, text: "King Jeongjo set up a chance during the procession for common people to meet him and to share their concerns.", trans: "정조 대왕은 행렬 중에 평민들이 그를 만나 그들의 걱정거리를 공유할 기회를 마련했습니다." },
          { id: 34, text: "This was a big deal, especially for those who couldn’t read or write.", trans: "이것은 특히 읽거나 쓸 수 없는 사람들에게 큰일이었습니다." },
          { id: 35, text: "They didn’t have any other way to tell the king what was on their minds, so this was a direct line to him.", trans: "그들은 왕에게 자신의 생각을 전할 다른 방법이 없었으므로, 이것은 왕과 연결되는 직통 전화와 같았습니다." },
          { id: 36, text: "And here’s the cherry on top: through the procession, King Jeongjo made government more accessible.", trans: "그리고 덤으로(가장 좋은 점은), 이 행렬을 통해 정조 대왕은 정부에 더 쉽게 접근할 수 있도록 했습니다." },
          { id: 37, text: "During that time, the government used to hold exams to hire officials every three years. So, there weren’t many chances available.", trans: "그 당시 정부는 3년마다 관리를 등용하기 위한 과거 시험을 치렀습니다. 그래서 기회가 많지 않았습니다." },
          { id: 38, text: "He added special exams during the procession, giving more people a shot at joining the government.", trans: "그는 행렬 중에 특별 시험을 추가하여 더 많은 사람들에게 정부 관직에 오를 기회를 주었습니다." },
          { id: 39, text: "This move was innovative back then and made the government more diverse.", trans: "이러한 조치는 당시 혁신적이었으며 정부를 더 다양하게 만들었습니다.", isHighlight: true, logicPoint: 4 },

          // Part 5: Documentation & Legacy
          { id: 40, text: "And guess what? King Jeongjo didn’t forget a single detail.", trans: "그리고 그거 아세요? 정조 대왕은 단 하나의 세부 사항도 잊지 않았습니다." },
          { id: 41, text: "He made sure everything was documented properly by creating records for the procession and the construction of Hwaseong Fortress.", trans: "그는 행렬과 화성 건설에 대한 기록을 작성하여 모든 것이 제대로 문서화되도록 했습니다." },
          { id: 42, text: "These construction records were especially a lifesaver when the fortress was damaged during wartime.", trans: "이러한 건설 기록들은 특히 전쟁 중에 요새가 손상되었을 때 구세주 역할을 했습니다." },
          { id: 43, text: "They were even part of why UNESCO recognized Hwaseong Fortress as a World Heritage Site.", trans: "그것들은 심지어 유네스코가 화성을 세계유산으로 인정한 이유 중 일부이기도 했습니다." },
          { id: 44, text: "At first, the people at UNESCO were a bit unsure about recognizing Hwaseong Fortress as the real deal.", trans: "처음에, 유네스코 사람들은 화성을 진짜(진품)로 인정하는 것에 대해 약간 확신이 없었습니다." },
          { id: 45, text: "They weren’t totally convinced it was authentic.", trans: "그들은 그것이 진품이라고 완전히 확신하지 못했습니다." },
          { id: 46, text: "But after checking out translated documents and comparing them with the restored fortress, they finally came around and agreed that the fortress had actually been restored just the way it was meant to be.", trans: "하지만 번역된 문서들을 확인하고 복원된 요새와 비교한 후, 그들은 마침내 마음을 돌렸고 요새가 원래 의도된 대로 완벽하게 복원되었다는 것에 동의했습니다." },
          { id: 47, text: "And among the records of the procession, there are these amazing paintings.", trans: "그리고 행렬에 관한 기록 중에는 놀라운 그림들이 있습니다." },
          { id: 48, text: <span>One painting, <span className="italic font-medium">Hwaneo Haengryeoldo</span>, doesn’t just feature the king’s crew, but it also shows ordinary people watching along the road.</span>, trans: "한 그림인 '환어행렬도'는 단지 왕의 일행만을 묘사하는 것이 아니라, 길을 따라 구경하는 평범한 사람들도 보여줍니다." },
          { id: 49, text: "It’s a different take from the usual art of that time, which only focused on important figures.", trans: "그것은 중요한 인물들에만 초점을 맞췄던 당시의 일반적인 예술과는 다른 시각입니다." },
          { id: 50, text: "So being kind to the people was a big deal for kings of the Joseon Dynasty.", trans: "따라서 백성들에게 친절하게 대하는 것은 조선 왕조의 왕들에게 큰일이었습니다." },
          { id: 51, text: "King Jeongjo’s 1795 procession and Hwaseong Fortress stand as proof of that spirit.", trans: "정조 대왕의 1795년 행렬과 화성은 그 정신의 증거로 서 있습니다." },
          { id: 52, text: "Hwaseong is more than just a fortress; it symbolizes a king who cared for his people.", trans: "화성은 단순한 요새 그 이상입니다; 그것은 백성들을 돌보았던 왕을 상징합니다." },
          { id: 53, text: "And this is a significant part of Korean cultural heritage.", trans: "그리고 이것은 한국 문화유산의 중요한 부분입니다.", isHighlight: true, logicPoint: 5 }
        ];

        const logicMapSteps = [
          { id: 'procession', title: "THE PROCESSION (행렬의 개요)", desc: "1795년 2,000여 명의 화성행궁 대행렬", color: "bg-blue-100 border-blue-400 text-blue-800", icon: <i className="ph-fill ph-crown text-xl mb-2"></i> },
          { id: 'purpose', title: "THE PURPOSE (행렬의 목적)", desc: "가족에 대한 효심과 조선의 군사력 과시", color: "bg-indigo-100 border-indigo-400 text-indigo-800", icon: <i className="ph-fill ph-shield-check text-xl mb-2"></i> },
          { id: 'hwaseong', title: "HWASEONG (화성 건설)", desc: "백성을 배려한 자급자족 신도시 건설", color: "bg-teal-100 border-teal-400 text-teal-800", icon: <i className="ph-fill ph-castle-turret text-xl mb-2"></i> },
          { id: 'communication', title: "COMMUNICATION (소통과 기회)", desc: "백성들의 고충 청취 및 특별 과거 시험 실시", color: "bg-orange-100 border-orange-400 text-orange-800", icon: <i className="ph-fill ph-users text-xl mb-2"></i> },
          { id: 'legacy', title: "LEGACY (기록과 유산)", desc: "철저한 기록을 통한 복원과 세계유산 등재", color: "bg-emerald-100 border-emerald-500 text-emerald-900", icon: <i className="ph-fill ph-book-open text-xl mb-2"></i> }
        ];

        function App() {
          const [isAuthenticated, setIsAuthenticated] = useState(false);
          const [passwordInput, setPasswordInput] = useState("");
          const [loginError, setLoginError] = useState("");
          
          const CORRECT_PASSWORD = "Made by Lee";

          const itemRefs = useRef({});

          const handleLoginSubmit = (e) => {
            e.preventDefault();
            if (passwordInput === CORRECT_PASSWORD) {
              setIsAuthenticated(true);
              setLoginError("");
            } else {
              setLoginError("올바르지 않은 암호입니다. 다시 확인해 주세요.");
              setPasswordInput("");
            }
          };

          const [activeTab, setActiveTab] = useState('text');
          const [activeLogic, setActiveLogic] = useState(null);
          
          const handleLogicClick = (point) => {
              setActiveLogic(activeLogic === point ? null : point);
              setActiveTab('text'); 
          };

          useEffect(() => {
              if (activeTab === 'text' && activeLogic !== null) {
                  const targetItem = textData.find(item => item.logicPoint === activeLogic);
                  if (targetItem && itemRefs.current[targetItem.id]) {
                      setTimeout(() => {
                          itemRefs.current[targetItem.id].scrollIntoView({ behavior: 'smooth', block: 'center' });
                      }, 150);
                  }
              }
          }, [activeLogic, activeTab]);

          const [quiz1Answered, setQuiz1Answered] = useState(null);
          const [quiz2Answered, setQuiz2Answered] = useState(null);
          const [quiz3Answered, setQuiz3Answered] = useState(null);
          const [quiz4Answered, setQuiz4Answered] = useState(null);
          const [quiz5Answered, setQuiz5Answered] = useState(null);
          const [quiz6Answered, setQuiz6Answered] = useState(null);

          const handlePrint = () => { window.print(); };

          if (!isAuthenticated) {
            return (
              <div className="min-h-screen bg-pattern flex items-center justify-center p-4">
                <div className="bg-white p-8 md:p-10 rounded-2xl shadow-2xl max-w-md w-full text-center border-t-8 border-emerald-700">
                  <div className="mx-auto bg-emerald-100 w-16 h-16 rounded-full flex items-center justify-center mb-6">
                    <i className="ph-fill ph-lock-key text-3xl text-emerald-700"></i>
                  </div>
                  <h2 className="text-2xl font-serif font-bold text-slate-800 mb-2">THE LOGIC INTERACTIVE</h2>
                  <p className="text-emerald-600 font-bold mb-6 text-sm">King Jeongjo’s Grand Procession</p>
                  
                  <div className="bg-slate-50 border border-slate-200 rounded-lg p-4 mb-6">
                    <p className="text-slate-600 text-sm leading-relaxed">

                    <button onClick={() => setActiveTab('map')} className={`flex flex-col items-center p-2 min-w-[64px] transition-colors ${activeTab === 'map' ? 'text-emerald-700' : 'text-slate-400 hover:text-slate-600'}`}>
                        <i className={`${activeTab === 'map' ? 'ph-fill' : 'ph'} ph-git-merge text-2xl mb-1`}></i>
                        <span className="text-[10px] font-bold">논리 구조도</span>
                    </button>
                    <button onClick={() => setActiveTab('quiz')} className={`flex flex-col items-center p-2 min-w-[64px] transition-colors ${activeTab === 'quiz' ? 'text-emerald-700' : 'text-slate-400 hover:text-slate-600'}`}>
                        <i className={`${activeTab === 'quiz' ? 'ph-fill' : 'ph'} ph-check-square-offset text-2xl mb-1`}></i>
                        <span className="text-[10px] font-bold">실전 문제</span>
                    </button>
                </nav>
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
