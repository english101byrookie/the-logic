    <script type="text/babel">
        const { useState, useEffect } = React;

        const textData = [
          // Part 1: Intro
          { id: 1, text: "Neil: Welcome to the 10-Minute Economics 101 podcast for teenagers! I’m your host, Neil. Thank you for tuning in.", trans: "닐: 십 대들을 위한 10분 경제학 101 팟캐스트에 오신 것을 환영합니다! 저는 진행자 닐입니다. 채널을 맞춰주셔서 감사합니다." },
          { id: 2, text: "We have a very special guest with us, the renowned economist Beth Friedman. Please give her a warm welcome!", trans: "우리와 함께 아주 특별한 게스트인 저명한 경제학자 베스 프리드먼 님을 모셨습니다. 그녀를 따뜻하게 환영해 주세요!" },
          { id: 3, text: "Beth: Hello, everyone. It’s truly an honor to be here with all of you.", trans: "베스: 안녕하세요, 여러분. 여러분 모두와 이 자리에 함께하게 되어 정말 영광입니다." },
          { id: 4, text: "Neil: We’ve been exploring the basics of economics. In this 35th episode, we’ll be talking about the world of stocks. So let’s get started.", trans: "닐: 우리는 경제학의 기본을 탐구해 오고 있습니다. 35번째 에피소드인 이번 시간에는 주식의 세계에 대해 이야기해 보겠습니다. 그럼 시작하겠습니다." },
          { id: 5, text: "Beth: Before we begin, Neil, I have a question for you. Have you ever wondered what to do with your extra money?", trans: "베스: 시작하기 전에, 닐, 질문이 하나 있습니다. 여윳돈으로 무엇을 할지 궁금해본 적이 있나요?" },
          { id: 6, text: "Neil: Absolutely, Beth. I bet all our listeners have asked themselves the same question.", trans: "닐: 물론이죠, 베스. 청취자분들도 모두 스스로에게 같은 질문을 해보셨을 겁니다." },
          { id: 7, text: "Beth: Indeed. It’s a question that often arises, especially among young people who are beginning to explore the world of finance. As you go about your daily lives, you find yourself engaged in financial activities such as purchasing goods and paying bus fares. After that, you might have some extra money.", trans: "베스: 맞습니다. 이것은 특히 금융의 세계를 탐험하기 시작하는 젊은이들 사이에서 자주 발생하는 질문입니다. 일상생활을 하면서 여러분은 물건을 구매하고 버스 요금을 지불하는 등의 금융 활동에 참여하고 있음을 알게 됩니다. 그러고 나면, 여윳돈이 생길 수 있죠." },
          { id: 8, text: "Neil: You’re right. Some people might save it in the bank, and others might prefer keeping it in their wallets for immediate use. There are also a few who have already been venturing into stock trading. Today, we’re going to provide you with an overview of stocks and stock markets, enabling you to gain insight into the economy.", trans: "닐: 맞습니다. 어떤 사람들은 은행에 저축할 수도 있고, 다른 사람들은 즉시 사용하기 위해 지갑에 보관하는 것을 선호할 수도 있습니다. 이미 주식 거래에 뛰어든 사람들도 소수 있습니다. 오늘, 우리는 경제에 대한 통찰력을 얻을 수 있도록 주식과 주식 시장에 대한 개요를 제공할 것입니다.", isHighlight: true, logicPoint: 1, logic: 'intro' },

          // Part 2: The Concept
          { id: 9, text: "Beth: Okay, let’s start with the concept of a stock. A stock is a partial share of ownership in a company.", trans: "베스: 좋습니다, 주식의 개념부터 시작하겠습니다. 주식은 한 회사의 부분적인 소유권 지분입니다.", logic: 'concept' },
          { id: 10, text: "When you buy a stock, you get a portion of the company’s ownership.", trans: "여러분이 주식을 살 때, 여러분은 그 회사의 소유권의 일부를 얻게 됩니다." },
          { id: 11, text: "To put it simply, owning one stock is like having a slice of the company’s pie.", trans: "간단히 말해서, 주식 한 주를 소유하는 것은 회사의 파이 한 조각을 갖는 것과 같습니다.", isHighlight: true, logicPoint: 2 },
          { id: 12, text: "Neil: Does that mean stockholders themselves can actively participate in the management of the company?", trans: "닐: 그것은 주주들이 스스로 회사의 경영에 적극적으로 참여할 수 있다는 뜻인가요?" },
          { id: 13, text: "Beth: Not exactly, Neil. Management is generally carried out by professional managers. However, companies hold stockholder meetings to seek the opinions of major stockholders when they make important decisions.", trans: "베스: 꼭 그렇지는 않습니다, 닐. 경영은 일반적으로 전문 경영인에 의해 수행됩니다. 하지만 기업들은 중요한 결정을 내릴 때 주요 주주들의 의견을 구하기 위해 주주 총회를 엽니다." },

          // Part 3: The Stock Market
          { id: 14, text: "Neil: I see. Then how do companies use the stock market?", trans: "닐: 알겠습니다. 그렇다면 기업들은 주식 시장을 어떻게 활용하나요?" },
          { id: 15, text: "Beth: The stock market is very important for companies because it can provide them with the money they need to grow and expand.", trans: "베스: 주식 시장은 기업이 성장하고 확장하는 데 필요한 돈을 제공할 수 있기 때문에 기업들에게 매우 중요합니다.", logic: 'market' },
          { id: 16, text: "Neil: How does that work?", trans: "닐: 그것이 어떻게 작용하나요?" },
          { id: 17, text: "Beth: Let’s imagine that a small group of people start a footwear company producing innovative sneakers.", trans: "베스: 소규모의 사람들이 혁신적인 운동화를 생산하는 신발 회사를 시작한다고 상상해 봅시다." },
          { id: 18, text: "The founders are confident that their products will be popular with consumers, but they do not have enough funds to grow the business. So they decide to put the newly formed company on the stock market.", trans: "설립자들은 그들의 제품이 소비자들에게 인기가 있을 것이라고 확신하지만, 사업을 성장시킬 자금이 충분하지 않습니다. 그래서 그들은 새로 설립된 회사를 주식 시장에 내놓기로 결정합니다." },
          { id: 19, text: "Neil: What happens then?", trans: "닐: 그러면 어떻게 되나요?" },
          { id: 20, text: "Beth: When a company is listed on the stock market, individuals or organizations that believe in the company’s bright future can buy shares and become partial owners of the company.", trans: "베스: 회사가 주식 시장에 상장되면, 그 회사의 밝은 미래를 믿는 개인이나 조직이 주식을 사서 그 회사의 부분적인 소유자가 될 수 있습니다." },
          { id: 21, text: "This process makes it easy for the footwear company to raise the funds it needs to grow its business.", trans: "이 과정은 신발 회사가 사업을 성장시키는 데 필요한 자금을 조달하는 것을 쉽게 만들어줍니다.", isHighlight: true, logicPoint: 3 },
          { id: 22, text: "As the business grows, the stock value rises, and the stockholders’ profits increase.", trans: "사업이 성장함에 따라 주식 가치도 상승하고, 주주들의 이익도 증가합니다." },

          // Part 4: Prices of Stocks
          { id: 23, text: "Neil: Then what factors affect the prices of stocks?", trans: "닐: 그렇다면 어떤 요인들이 주식 가격에 영향을 미치나요?" },
          { id: 24, text: "Beth: Just like other transactions, the prices of stocks are decided by the law of supply and demand.", trans: "베스: 다른 거래들과 마찬가지로 주식 가격은 수요와 공급의 법칙에 의해 결정됩니다.", logic: 'price1' },
          { id: 25, text: "In other words, the more successful a business is, the more people will see the potential value of the company and start buying its stocks.", trans: "즉, 비즈니스가 성공적일수록, 더 많은 사람들이 그 회사의 잠재적 가치를 보고 주식을 사기 시작할 것입니다.", isHighlight: true, logicPoint: 4 },
          { id: 26, text: "As demand for the stocks increases, so does the stock price. In contrast, if a company performs disappointingly, its stock price will fall.", trans: "주식에 대한 수요가 증가함에 따라 주가도 상승합니다. 반대로 회사가 실망스러운 성과를 내면 주가는 떨어집니다.", isHighlight: true, logicPoint: 5 },
          { id: 27, text: "Neil: Understood. Are there any other factors affecting the price?", trans: "닐: 이해했습니다. 가격에 영향을 미치는 다른 요인들이 또 있나요?" },
          { id: 28, text: "Beth: Yes, companies are constantly under the influence of market factors such as raw material prices, advances in production technology, and labor costs.", trans: "베스: 네, 기업들은 원자재 가격, 생산 기술의 발전, 인건비와 같은 시장 요인의 영향을 끊임없이 받습니다.", logic: 'price2' },
          { id: 29, text: "For example, in terms of raw material prices, if the price of rubber rises, a shoe company may have to pay more to import the rubber it needs from abroad to manufacture sneakers.", trans: "예를 들어, 원자재 가격 측면에서 고무 가격이 상승하면, 신발 회사는 운동화를 제조하기 위해 해외에서 필요한 고무를 수입하는 데 더 많은 비용을 지불해야 할 수도 있습니다." },
          { id: 30, text: "This, in turn, affects production costs and leads to higher prices in the consumer market.", trans: "이것은 결과적으로 생산 비용에 영향을 미치고 소비자 시장에서의 더 높은 가격으로 이어집니다." },
          { id: 31, text: "As consumers hesitate to purchase the company’s sneakers, the company may suffer from poor performance, leading to a decline in the stock price.", trans: "소비자들이 그 회사의 운동화 구매를 주저함에 따라, 회사는 실적 부진을 겪을 수 있고, 이는 주가 하락으로 이어집니다." },
          { id: 32, text: "Neil: There are so many things to consider!", trans: "닐: 고려해야 할 것이 정말 많군요!" },
          { id: 33, text: "Beth: Additionally, investors may be concerned about a company’s leadership or reputation.", trans: "베스: 게다가, 투자자들은 기업의 리더십이나 평판에 대해서도 관심을 가질 수 있습니다." },
          { id: 34, text: "Nowadays, more and more people are starting to support companies that prioritize public values such as business transparency, environmental friendliness, and social justice.", trans: "요즘에는 경영 투명성, 친환경성, 사회 정의와 같은 공공의 가치를 우선시하는 기업을 지지하기 시작하는 사람들이 점점 더 많아지고 있습니다.", logic: 'price3' },
          { id: 35, text: "In purchasing such stocks, they not only pursue their financial goals but also contribute to building a more sustainable economic system that benefits the entire society.", trans: "그러한 주식을 구매할 때, 그들은 재정적 목표를 추구할 뿐만 아니라 전체 사회에 이익이 되는 더 지속 가능한 경제 시스템을 구축하는 데에도 기여합니다.", isHighlight: true, logicPoint: 6 },
          { id: 36, text: "All these variables can cause daily changes in stock prices in the stock market.", trans: "이 모든 변수들이 주식 시장에서 매일 주가 변동을 일으킬 수 있습니다." },

          // Part 5: Advice & Outro
          { id: 37, text: "Neil: It seems to get more difficult as we learn more about stocks. So how do we invest in the stock market?", trans: "닐: 주식에 대해 더 많이 알아갈수록 더 어려워지는 것 같네요. 그렇다면 주식 시장에는 어떻게 투자하나요?" },
          { id: 38, text: "Beth: You can buy stocks through an official place called a stock exchange, or stock market, where you can easily buy or sell stocks in a company. You might think investing in stocks is an easy way to make a profit.", trans: "베스: 여러분은 주식 거래소나 주식 시장이라고 불리는 공식적인 장소를 통해 주식을 살 수 있는데, 그곳에서 회사의 주식을 쉽게 사고팔 수 있습니다. 주식 투자가 이익을 내는 쉬운 방법이라고 생각할지도 모릅니다." },
          { id: 39, text: "But if you are investing, you must be prepared to lose money. Since the market constantly fluctuates, there is a risk of loss and debt.", trans: "하지만 투자를 한다면 돈을 잃을 각오도 해야 합니다. 시장은 끊임없이 변동하기 때문에 손실과 빚의 위험이 있습니다.", logic: 'risk' },
          { id: 40, text: "Neil: Investing in stocks is challenging! I bet our listeners are curious about the best investment options though.", trans: "닐: 주식 투자는 참 도전적이네요! 청취자분들도 최고의 투자 옵션에 대해 궁금해하실 텐데요." },
          { id: 41, text: "Beth: That depends on individual circumstances. Generally, it would be smart to invest in something that interests you, such as a company behind some products you are into.", trans: "베스: 그것은 개인의 상황에 따라 다릅니다. 일반적으로, 여러분이 좋아하는 제품을 만든 회사처럼 여러분의 흥미를 끄는 것에 투자하는 것이 현명할 것입니다." },
          { id: 42, text: "Always remember to do your research, stay informed about the companies you invest in, and be mindful of your risk tolerance.", trans: "항상 조사를 하고, 투자하는 회사에 대해 정보를 파악하며, 자신의 위험 감수 능력을 유념해야 한다는 것을 기억하세요.", logic: 'advice' },
          { id: 43, text: "Neil: Investing can be a powerful tool for building wealth, but it’s essential to approach it with knowledge and caution.", trans: "닐: 투자는 부를 축적하는 강력한 도구가 될 수 있지만, 지식과 주의를 가지고 접근하는 것이 필수적입니다." },
          { id: 44, text: "Beth: Wise words, Neil.", trans: "베스: 지혜로운 말씀입니다, 닐." },
          { id: 45, text: "Neil: All right. I hope today’s episode was helpful for you! I’ll be back with another exciting topic next time...", trans: "닐: 좋습니다. 오늘 에피소드가 여러분에게 도움이 되었기를 바랍니다! 다음번에도 흥미로운 주제로 돌아오겠습니다..." }
        ];

        const logicMapSteps = [
          { id: 'concept', title: "THE CONCEPT (개념)", desc: "A partial share of ownership", color: "bg-emerald-100 border-emerald-400 text-emerald-800", icon: <i className="ph-fill ph-chart-pie-slice text-xl mb-2"></i> },
          { id: 'market', title: "THE MARKET (역할)", desc: "Provides funds for companies to grow", color: "bg-teal-100 border-teal-400 text-teal-800", icon: <i className="ph-fill ph-bank text-xl mb-2"></i> },
          { id: 'prices', title: "THE PRICES (가격 요인)", desc: "Supply/Demand, Market factors, Values", color: "bg-cyan-100 border-cyan-400 text-cyan-800", icon: <i className="ph-fill ph-trend-up text-xl mb-2"></i> },
          { id: 'advice', title: "THE ADVICE (투자 조언)", desc: "High risk requires knowledge & caution", color: "bg-sky-100 border-sky-400 text-sky-800", icon: <i className="ph-fill ph-shield-check text-xl mb-2"></i> }
        ];

        function App() {
          const [isAuthenticated, setIsAuthenticated] = useState(false);
          const [passwordInput, setPasswordInput] = useState("");
          const [loginError, setLoginError] = useState("");
          
          const CORRECT_PASSWORD = "Made by Lee";

          const handleLoginSubmit = (e) => {
            e.preventDefault();
            if (passwordInput === CORRECT_PASSWORD) {
              setIsAuthenticated(true);
              setLoginError("");
            } else {
              setLoginError("올바르지 않은 암호입니다. 다시 확인해 주세요.");
              setPasswordInput("");
            }
          };

          const [activeTab, setActiveTab] = useState('text');
          const [activeLogic, setActiveLogic] = useState(null);
          const [mapStep, setMapStep] = useState(0);
          
          // Quiz states
          const [quiz1Answered, setQuiz1Answered] = useState(null);
          const [quiz2Answered, setQuiz2Answered] = useState(null);
          const [quiz3Answered, setQuiz3Answered] = useState(null);
          const [quiz4Answered, setQuiz4Answered] = useState(null);
          const [quiz5Answered, setQuiz5Answered] = useState(null);
          const [quiz6Answered, setQuiz6Answered] = useState(null);

          const handleLogicClick = (point) => setActiveLogic(activeLogic === point ? null : point);
          const nextMapStep = () => { if (mapStep < logicMapSteps.length) setMapStep(mapStep + 1); };
          const resetMap = () => setMapStep(0);

          const handlePrint = () => { window.print(); };

          // 1. 잠금 화면(로그인) UI
          if (!isAuthenticated) {
            return (
              <div className="min-h-screen bg-pattern flex items-center justify-center p-4">
                <div className="bg-white p-8 md:p-10 rounded-2xl shadow-2xl max-w-md w-full text-center border-t-8 border-emerald-700">
                  <div className="mx-auto bg-emerald-100 w-16 h-16 rounded-full flex items-center justify-center mb-6">
                    <i className="ph-fill ph-lock-key text-3xl text-emerald-700"></i>
                  </div>
                  <h2 className="text-2xl font-serif font-bold text-slate-800 mb-2">THE LOGIC INTERACTIVE</h2>
                  <p className="text-emerald-600 font-bold mb-6 text-sm">The ABCs of Stocks</p>

                                                        ${quiz6Answered === null ? 'border-slate-200 hover:border-emerald-400 hover:bg-emerald-50' : 
                                                        (choice.isCorrect ? 'border-green-500 bg-green-50 text-green-800 shadow-sm' : 
                                                        (quiz6Answered === choice.id ? 'border-red-400 bg-red-50 text-red-600' : 'border-slate-100 text-slate-400 opacity-50'))}
                                                    `}
                                                >
                                                    <span className="w-8 inline-block font-mono text-slate-500 print:text-black">{['①', '②', '③', '④'][choice.id - 1]}</span> {choice.text}
                                                </button>
                                            ))}
                                        </div>
                                        {quiz6Answered !== null && (
                                            <div className={`mt-4 p-4 rounded-lg text-sm leading-relaxed print:hidden ${quiz6Answered === 3 ? 'bg-green-50 text-green-900 border border-green-200' : 'bg-red-50 text-red-900 border border-red-200'}`}>
                                                <p className="font-bold mb-1">{quiz6Answered === 3 ? '🎉 정답입니다!' : '오답입니다. 다시 한번 생각해 보세요.'}</p>
                                                <p><strong>해설:</strong> 주식 시장은 항상 변동하고 손실(loss)과 부채의 위험이 있으므로, 투자를 할 때는 반드시 <strong>'돈을 잃을(lose money)'</strong> 각오를 해야 한다는 것이 전문가의 객관적인 조언입니다.</p>
                                                <button onClick={() => setQuiz6Answered(null)} className="mt-3 text-sm underline opacity-70 hover:opacity-100">
                                                    다시 풀기
                                                </button>
                                            </div>
                                        )}
                                    </div>

                                </div>
                            </div>
                        </section>

                    </div>
                </main>

                {/* === 모바일 하단 네비게이션 (Bottom Nav) === */}
                <nav className="md:hidden fixed bottom-0 w-full bg-white border-t border-slate-200 flex justify-around p-2 pb-safe z-30 shadow-[0_-5px_10px_rgba(0,0,0,0.05)] print:hidden">
                    <button onClick={() => setActiveTab('text')} className={`flex flex-col items-center p-2 min-w-[64px] transition-colors ${activeTab === 'text' ? 'text-emerald-700' : 'text-slate-400 hover:text-slate-600'}`}>
                        <i className={`${activeTab === 'text' ? 'ph-fill' : 'ph'} ph-book-open text-2xl mb-1`}></i>
                        <span className="text-[10px] font-bold">지문 분석</span>
                    </button>
                    <button onClick={() => setActiveTab('syntax')} className={`flex flex-col items-center p-2 min-w-[64px] transition-colors ${activeTab === 'syntax' ? 'text-emerald-700' : 'text-slate-400 hover:text-slate-600'}`}>
                        <i className={`${activeTab === 'syntax' ? 'ph-fill' : 'ph'} ph-highlighter-circle text-2xl mb-1`}></i>
                        <span className="text-[10px] font-bold">핵심 구문</span>
                    </button>
                    <button onClick={() => setActiveTab('map')} className={`flex flex-col items-center p-2 min-w-[64px] transition-colors ${activeTab === 'map' ? 'text-emerald-700' : 'text-slate-400 hover:text-slate-600'}`}>
                        <i className={`${activeTab === 'map' ? 'ph-fill' : 'ph'} ph-git-merge text-2xl mb-1`}></i>
                        <span className="text-[10px] font-bold">논리 구조도</span>
                    </button>
                    <button onClick={() => setActiveTab('quiz')} className={`flex flex-col items-center p-2 min-w-[64px] transition-colors ${activeTab === 'quiz' ? 'text-emerald-700' : 'text-slate-400 hover:text-slate-600'}`}>
                        <i className={`${activeTab === 'quiz' ? 'ph-fill' : 'ph'} ph-check-square-offset text-2xl mb-1`}></i>
                        <span className="text-[10px] font-bold">실전 문제</span>
                    </button>
                </nav>

            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
