<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE LOGIC Interactive App - Case 02</title>
    
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    
    <style>
        @media print {
            body {
                -webkit-print-color-adjust: exact;
                print-color-adjust: exact;
                background-color: white !important;
            }
            ::-webkit-scrollbar {
                display: none;
            }
            .print-avoid-break {
                break-inside: avoid;
            }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        const textData = [
          { id: 1, text: "When people ask me about my role model, I always say that it is Joan Procter.", trans: "사람들이 내게 롤모델에 대해 물어볼 때, 나는 항상 조안 프록터라고 말한다." },
          { id: 2, text: "You may not have heard of her, but she was a notable zoologist who specialized in reptiles in the early 20th century.", trans: "그녀에 대해 들어본 적이 없을지도 모르지만, 그녀는 20세기 초 파충류를 전문으로 한 유명한 동물학자였다." },
          { id: 3, text: "She taught me that devotion to a particular field is important for shaping one’s career.", trans: "그녀는 특정 분야에 대한 헌신이 자신의 진로를 형성하는 데 중요하다는 것을 나에게 가르쳐주었다." },
          { id: 4, text: "During her childhood, Procter immersed herself in the exploration of nature and animals.", trans: "어린 시절, 프록터는 자연과 동물을 탐구하는 데 몰두했다." },
          { id: 5, text: "Although her father hated reptiles, she kept lizards, snakes, and even a baby crocodile as pets.", trans: "아버지는 파충류를 싫어했지만, 그녀는 도마뱀, 뱀, 심지어 새끼 악어까지 애완동물로 키웠다." },
          { id: 6, text: "They were special companions that she loved and took care of.", trans: "그것들은 그녀가 사랑하고 돌보는 특별한 친구들이었다." },
          { id: 7, text: "She was a brilliant student, but health problems prevented her from attending university.", trans: "그녀는 뛰어난 학생이었지만, 건강 문제로 인해 대학에 진학하지 못했다.", logic: 'barrier', isHighlight: true, logicPoint: 1 },
          { id: 8, text: "However, her passion for zoology was so strong that it kept her moving forward, and she continued her studies on her own.", trans: "하지만 동물학에 대한 그녀의 열정은 너무 강해서 그녀를 계속 나아가게 했고, 그녀는 스스로 공부를 계속했다.", logic: 'passion', isHighlight: true, logicPoint: 2 },
          { id: 9, text: "Procter accumulated extensive knowledge of zoology.", trans: "프록터는 동물학에 대한 폭넓은 지식을 축적했다." },
          { id: 10, text: "She began exchanging letters with George Boulenger, a prominent expert on reptiles, in order to share ideas.", trans: "그녀는 아이디어를 나누기 위해 저명한 파충류 전문가인 조지 불렌저와 편지를 주고받기 시작했다.", logic: 'action' },
          { id: 11, text: "He was so impressed that he hired her as his assistant at the British Museum.", trans: "그는 너무 감명을 받아서 그녀를 대영 박물관의 조수로 고용했다." },
          { id: 12, text: "A few years later, she became the first female curator of reptiles at the London Zoo.", trans: "몇 년 후, 그녀는 런던 동물원의 첫 여성 파충류 큐레이터가 되었다.", logic: 'success' },
          { id: 13, text: "There, she actively contributed to the design of the Reptile House by incorporating new technology that allowed for better care and breeding of wild animals.", trans: "그곳에서 그녀는 야생 동물들을 더 잘 돌보고 번식시킬 수 있는 신기술을 도입함으로써 파충류관 설계에 적극적으로 기여했다." },
          { id: 14, text: "Like her, I want to dedicate myself to a field that I have a passion for.", trans: "그녀처럼 나도 내가 열정을 가진 분야에 헌신하고 싶다." },
          { id: 15, text: "For this reason, I will take my time to think deeply about where my true interests lie.", trans: "이러한 이유로, 나는 나의 진정한 관심사가 어디에 있는지 깊이 생각할 시간을 가질 것이다." },
          { id: 16, text: "If I am fortunate, one of my passions might someday lead to a rewarding career.", trans: "운이 좋다면, 나의 열정 중 하나가 언젠가 보람 있는 직업으로 이어질지도 모른다.", logic: 'lesson' }
        ];

        const logicMapSteps = [
          { id: 'barrier', title: "BARRIER (장벽)", desc: "Health Problems → No University", color: "bg-red-100 border-red-400 text-red-800", icon: <i className="ph-fill ph-prohibit text-xl mb-2"></i> },
          { id: 'passion', title: "CORE ENGINE (동력)", desc: "Strong Passion and Devotion", color: "bg-yellow-100 border-yellow-400 text-yellow-800", icon: <i className="ph-fill ph-fire text-xl mb-2"></i> },
          { id: 'action', title: "ACTION (실행)", desc: "Self-study and Exchanging Letters", color: "bg-blue-100 border-blue-400 text-blue-800", icon: <i className="ph-fill ph-envelope-simple text-xl mb-2"></i> },
          { id: 'success', title: "SUCCESS (성취)", desc: "Hired as a Curator", color: "bg-green-100 border-green-400 text-green-800", icon: <i className="ph-fill ph-medal text-xl mb-2"></i> },
          { id: 'lesson', title: "THE TAKEAWAY (교훈)", desc: "Find passion & Dedicate myself", color: "bg-purple-100 border-purple-400 text-purple-800", icon: <i className="ph-fill ph-star text-xl mb-2"></i> }
        ];

        function App() {
          const [activeTab, setActiveTab] = useState(1);
          const [activeLogic, setActiveLogic] = useState(null);
          const [mapStep, setMapStep] = useState(0);
          const [quiz1Answered, setQuiz1Answered] = useState(null);
          const [quiz2Answered, setQuiz2Answered] = useState(null);

          const handleLogicClick = (point) => setActiveLogic(activeLogic === point ? null : point);
          const nextMapStep = () => { if (mapStep < logicMapSteps.length) setMapStep(mapStep + 1); };
          const resetMap = () => setMapStep(0);

          const handlePrint = () => {
            window.print();
          };

          return (
            <div className="min-h-screen bg-slate-100 font-sans text-slate-800 p-4 md:p-8 flex justify-center print:bg-white print:p-0">
              <div className="max-w-4xl w-full flex flex-col gap-6 print:flex print:flex-col print:gap-6 print:max-w-none">
                
                {/* 헤더 */}
                <div className="bg-white p-6 rounded-xl shadow-sm border-t-4 border-blue-900 print:shadow-none print:border-t-4 print:border-black print:rounded-none flex justify-between items-start">
                  <div>
                    <h1 className="text-sm font-bold text-blue-900 tracking-wider mb-2 print:text-black">THE LOGIC INTERACTIVE</h1>
                    <h2 className="text-3xl font-serif font-bold text-slate-900 print:text-black">CASE 02: Joan Procter</h2>
                    <p className="text-slate-500 italic mt-1 font-serif print:text-gray-600">"Persistence Over Barriers"</p>
                  </div>
                  <button 
                    onClick={handlePrint}
                    className="print:hidden flex items-center gap-2 bg-slate-800 hover:bg-slate-700 text-white px-4 py-2 rounded-lg font-bold transition-colors shadow-sm"
                  >
                    <i className="ph-bold ph-printer text-lg"></i> 인쇄하기
                  </button>
                </div>

                {/* 탭 네비게이션 */}
                <div className="flex bg-white rounded-xl shadow-sm overflow-hidden print:hidden">
                  <button 
                    onClick={() => setActiveTab(1)}
                    className={`flex-1 py-4 px-2 text-center font-bold text-base md:text-lg transition-all duration-300 border-b-4 ${activeTab === 1 ? 'bg-blue-50 text-blue-900 border-blue-900' : 'text-slate-400 border-transparent hover:bg-slate-50 hover:text-slate-600'}`}
                  >
                    <i className="ph-fill ph-book-open mr-2"></i>
                    1. 지문 및 구문 분석
                  </button>
                  <button 
                    onClick={() => setActiveTab(2)}
                    className={`flex-1 py-4 px-2 text-center font-bold text-base md:text-lg transition-all duration-300 border-b-4 ${activeTab === 2 ? 'bg-emerald-50 text-emerald-800 border-emerald-600' : 'text-slate-400 border-transparent hover:bg-slate-50 hover:text-slate-600'}`}
                  >
                    <i className="ph-fill ph-puzzle-piece mr-2"></i>
                    2. 논리 구조 및 실전 문제
                  </button>
                </div>

                {/* === TAB 1: 지문 및 구문 분석 영역 === */}
                <div className={`space-y-6 print:space-y-4 ${activeTab === 1 ? 'block' : 'hidden print:block'}`}>
                  {/* 1. 지문 영역 */}
                  <div className="bg-white p-6 md:p-8 rounded-xl shadow-sm print:shadow-none print:border print:border-slate-300 print:rounded-none">
                    <h3 className="text-xl font-bold text-blue-900 border-b-2 border-slate-100 pb-3 mb-4 flex items-center gap-2 print:text-black print:border-black">
                      <i className="ph-fill ph-book-open text-2xl print:text-black"></i> PART 1. Text Analysis
                    </h3>
                    
                    <div className="space-y-6 print:space-y-4">
                      {/* 파트 A: 주제 제시 (1~3번) */}
                      <div>
                        <div className="inline-block bg-slate-800 text-white text-sm font-bold px-3 py-1 rounded mb-3 print:bg-slate-200 print:text-black print:border print:border-slate-800">
                          ▶ The Theme (인물 소개 및 핵심 가치)
                        </div>
                        <div className="space-y-2 print:space-y-1">
                          {textData.slice(0, 3).map((item) => (
                            <div 
                              key={item.id} 
                              className={`p-2 rounded-lg transition-all duration-300 group cursor-pointer print:p-0 print:mb-2
                                hover:bg-slate-50 border border-transparent print:border-none
                              `}
                            >
                              <p className="text-base md:text-lg leading-relaxed print:text-base print:text-black">
                                <span className="font-bold text-blue-900 mr-2 text-sm print:text-black">[{item.id.toString().padStart(2, '0')}]</span>
                                <span>{item.text}</span>
                              </p>
                              <p className="text-sm text-slate-500 mt-1 opacity-0 group-hover:opacity-100 transition-opacity duration-300 ml-9 print:hidden">
                                {item.trans}
                              </p>
                            </div>
                          ))}
                        </div>
                      </div>

                      {/* 파트 B: 일대기 (4~13번) */}
                      <div className="border-t border-dashed border-slate-300 pt-4 print:border-black print:pt-4">
                        <div className="inline-block bg-blue-700 text-white text-sm font-bold px-3 py-1 rounded mb-3 print:bg-slate-200 print:text-black print:border print:border-slate-800">
                          ▶ The Narrative (장벽과 극복의 일대기)
                        </div>
                        <div className="space-y-2 print:space-y-1">
                          {textData.slice(3, 13).map((item) => (
                            <div 
                              key={item.id} 
                              className={`p-2 rounded-lg transition-all duration-300 group cursor-pointer print:p-0 print:mb-2
                                ${activeLogic === item.logicPoint ? 'bg-red-50 border border-red-200 shadow-inner print:bg-transparent print:border-none print:shadow-none' : 'hover:bg-slate-50 border border-transparent print:border-none'}
                              `}
                            >
                              <p className="text-base md:text-lg leading-relaxed print:text-base print:text-black">
                                <span className="font-bold text-blue-900 mr-2 text-sm print:text-black">[{item.id.toString().padStart(2, '0')}]</span>
                                <span className={`${activeLogic === item.logicPoint ? 'font-bold text-red-700 print:text-black print:underline print:underline-offset-4' : ''}`}>
                                  {item.text}
                                </span>
                              </p>
                              <p className="text-sm text-slate-500 mt-1 opacity-0 group-hover:opacity-100 transition-opacity duration-300 ml-9 print:hidden">
                                {item.trans}
                              </p>
                            </div>
                          ))}
                        </div>
                      </div>

                      {/* 파트 C: 교훈 (14~16번) */}
                      <div className="border-t border-dashed border-slate-300 pt-4 print:border-black print:pt-4">
                        <div className="inline-block bg-purple-700 text-white text-sm font-bold px-3 py-1 rounded mb-3 print:bg-slate-200 print:text-black print:border print:border-slate-800">
                          ▶ The Takeaway (화자의 교훈과 다짐)
                        </div>
                        <div className="space-y-2 print:space-y-1">
                          {textData.slice(13, 16).map((item) => (
                            <div 
                              key={item.id} 
                              className={`p-2 rounded-lg transition-all duration-300 group cursor-pointer print:p-0 print:mb-2
                                hover:bg-slate-50 border border-transparent print:border-none
                              `}
                            >
                              <p className="text-base md:text-lg leading-relaxed print:text-base print:text-black">
                                <span className="font-bold text-blue-900 mr-2 text-sm print:text-black">[{item.id.toString().padStart(2, '0')}]</span>
                                <span>{item.text}</span>
                              </p>
                              <p className="text-sm text-slate-500 mt-1 opacity-0 group-hover:opacity-100 transition-opacity duration-300 ml-9 print:hidden">
                                {item.trans}
                              </p>
                            </div>
                          ))}
                        </div>
                      </div>

                    </div>
                  </div>

                  {/* 2. 구문 로직 영역 */}
                  <div className="bg-white p-6 md:p-8 rounded-xl shadow-sm print:shadow-none print:border print:border-slate-300 print:rounded-none print-avoid-break">
                    <h3 className="text-xl font-bold text-blue-900 border-b-2 border-slate-100 pb-3 mb-6 print:text-black print:border-black">
                      PART 2. The Logic Syntax
                    </h3>
                    <p className="text-sm text-slate-500 mb-4 print:hidden">💡 아래의 포인트를 클릭하면 지문의 해당 문장이 강조됩니다.</p>
                    
                    <div className="grid gap-4 print:gap-6">
                      <button 
                        onClick={() => handleLogicClick(1)}
                        className={`text-left border-2 rounded-lg overflow-hidden transition-all duration-300 print:border-2 print:border-slate-800 print:shadow-none print:transform-none print:rounded-none
                          ${activeLogic === 1 ? 'border-red-600 shadow-md transform -translate-y-1' : 'border-slate-200 hover:border-red-300'}
                        `}
                      >
                        <div className={`px-4 py-2 font-bold print:bg-slate-100 print:text-black ${activeLogic === 1 ? 'bg-red-600 text-white' : 'bg-red-50 text-red-800'}`}>
                          POINT 01. 방해와 금지의 인과: Prevent A from B
                        </div>
                        <div className="p-4 bg-white">
                          <p className="mb-2"><span className="font-semibold text-slate-700 print:text-black">Structure:</span> prevent + O + from + ~ing</p>
                          <p className="text-sm text-slate-600 leading-relaxed print:text-black">
                            건강 문제(원인)가 대학 진학(결과)을 가로막는 부정적 인과관계를 나타냅니다. 외부 환경의 거대한 <strong className="print:text-black">'장벽(Barrier)'</strong>을 상징하는 핵심 논리 구문입니다.
                          </p>
                        </div>
                      </button>

                      <button 
                        onClick={() => handleLogicClick(2)}
                        className={`text-left border-2 rounded-lg overflow-hidden transition-all duration-300 print:border-2 print:border-slate-800 print:shadow-none print:transform-none print:rounded-none
                          ${activeLogic === 2 ? 'border-red-600 shadow-md transform -translate-y-1' : 'border-slate-200 hover:border-red-300'}
                        `}
                      >
                        <div className={`px-4 py-2 font-bold print:bg-slate-100 print:text-black ${activeLogic === 2 ? 'bg-red-600 text-white' : 'bg-red-50 text-red-800'}`}>
                          POINT 02. 결과적 필연성: So ~ that
                        </div>
                        <div className="p-4 bg-white">
                          <p className="mb-2"><span className="font-semibold text-slate-700 print:text-black">Structure:</span> so + 형용사/부사 + that + S + V</p>
                          <p className="text-sm text-slate-600 leading-relaxed print:text-black">
                            열정이 '너무 강해서(원인)' 앞으로 계속 나아갔다(결과)는 필연적 흐름을 만듭니다. 앞서 등장한 장벽을 부수는 강력한 <strong className="print:text-black">'엔진(Engine)'</strong>의 역할을 합니다.
                          </p>
                        </div>
                      </button>
                    </div>

                    <div className="mt-8 text-center print:hidden">
                       <button onClick={() => setActiveTab(2)} className="bg-blue-900 hover:bg-blue-800 text-white px-8 py-3 rounded-full font-bold shadow-md transition-colors flex items-center gap-2 mx-auto">
                         구문 분석 완료! 실전 문제로 이동 <i className="ph-bold ph-arrow-right"></i>
                       </button>
                    </div>
                  </div>
                </div>

                {/* === TAB 2: 논리 구조도 및 퀴즈 영역 === */}
                <div className={`space-y-6 print:space-y-4 print:mt-4 ${activeTab === 2 ? 'block' : 'hidden print:block'}`}>
                  
                  {/* 3. 로직 맵 */}
                  <div className="bg-white p-6 rounded-xl shadow-sm border-t-4 border-emerald-600 print:shadow-none print:border print:border-slate-300 print:border-t-4 print:border-t-black print:rounded-none print-avoid-break">
                    <div className="flex justify-between items-center border-b-2 border-slate-100 pb-3 mb-6 print:border-black">
                      <h3 className="text-xl font-bold text-slate-800 flex items-center gap-2 print:text-black">
                        <i className="ph-fill ph-play-circle text-2xl text-emerald-600 print:text-black"></i> PART 3. Logic Map
                      </h3>
                      <div className="print:hidden">
                        {mapStep > 0 && mapStep < logicMapSteps.length && (
                          <button onClick={nextMapStep} className="bg-emerald-100 hover:bg-emerald-200 text-emerald-800 px-3 py-1 rounded text-sm font-bold transition-colors">
                            Next Step ➔
                          </button>
                        )}
                        {mapStep === logicMapSteps.length && (
                           <button onClick={resetMap} className="text-slate-400 hover:text-slate-600 text-sm underline">
                            Reset
                           </button>
                        )}
                      </div>
                    </div>
                    
                    <div 
                      className={`h-64 flex-col items-center justify-center border-2 border-dashed border-slate-200 rounded-lg bg-slate-50 text-center p-6 cursor-pointer hover:bg-emerald-50 transition-colors 
                        ${mapStep === 0 ? 'flex' : 'hidden'} print:!hidden
                      `} 
                      onClick={nextMapStep}
                    >
                      <i className="ph-fill ph-play-circle text-5xl text-emerald-400 mb-4"></i>
                      <p className="text-slate-600 font-medium">클릭하여 조안 프록터의 논리 구조를<br/>단계별로 파악해 보세요.</p>
                    </div>
                    
                    <div className={`flex-col items-center gap-2 py-4 ${mapStep > 0 ? 'flex' : 'hidden'} print:!flex`}>
                      {logicMapSteps.map((step, idx) => (
                        <React.Fragment key={step.id}>
                          <div 
                            className={`w-full max-w-sm border-2 rounded-lg p-4 flex flex-col items-center text-center transition-all duration-500 transform
                              print:!opacity-100 print:!translate-y-0 print:!flex print:border-slate-800 print:rounded-none print:bg-white print:text-black
                              ${idx < mapStep ? `opacity-100 translate-y-0 ${step.color}` : 'opacity-0 translate-y-8 hidden'}
                            `}
                          >
                            <div className="print:hidden">{step.icon}</div>
                            <span className="font-bold text-sm mb-1 print:text-black">{step.title}</span>
                            <span className="text-sm opacity-90 print:text-black">{step.desc}</span>
                          </div>
                          <div 
                            className={`flex-col items-center opacity-100 animate-pulse 
                              print:!flex print:!opacity-100 print:animate-none
                              ${idx < logicMapSteps.length - 1 && idx < mapStep ? 'flex' : 'hidden'}
                            `}
                          >
                            <div className="w-0.5 h-6 bg-slate-300 print:bg-slate-800"></div>
                            {/* 화살표 라벨 추가 */}
                            {idx === 0 ? (
                              <div className="bg-red-100 text-red-600 text-xs font-bold px-2 py-1 rounded-full my-1 border border-red-200 print:bg-white print:text-black print:border-slate-800 print:rounded-none">
                                Overcome by
                              </div>
                            ) : idx === 3 ? (
                              <div className="bg-purple-100 text-purple-600 text-xs font-bold px-2 py-1 rounded-full my-1 border border-purple-200 print:bg-white print:text-black print:border-slate-800 print:rounded-none">
                                Inspired by the story
                              </div>
                            ) : null}
                            <i className="ph-bold ph-arrow-right text-base text-slate-400 transform rotate-90 print:text-slate-800"></i>
                          </div>
                        </React.Fragment>
                      ))}
                    </div>
                  </div>

                  {/* 4. 실전 변형 문제 */}
                  <div className="bg-white p-6 rounded-xl shadow-sm print:shadow-none print:border print:border-slate-300 print:rounded-none print-avoid-break">
                    <h3 className="text-xl font-bold text-slate-800 border-b-2 border-slate-100 pb-3 mb-6 flex items-center gap-2 print:text-black print:border-black">
                      <i className="ph-fill ph-check-circle text-2xl text-blue-600 print:text-black"></i> PART 4. Challenge
                    </h3>
                    
                    {/* Q1. 문장 삽입 */}
                    <div className="mb-8">
                      <div className="bg-slate-50 border border-slate-200 p-5 rounded-lg mb-4 print:bg-white print:border-none print:p-0 print:mb-6">
                        <p className="font-bold text-slate-800 mb-2 print:text-black">Q1. 문장 삽입</p>
                        <p className="text-sm text-slate-600 mb-4 print:text-black">글의 흐름으로 보아, 주어진 문장이 들어가기에 가장 적절한 곳을 고르시오.</p>
                        <div className="text-md font-bold text-center bg-white p-4 border border-slate-200 rounded mb-4 print:border-slate-400 print:rounded-none print:text-black">
                          However, her passion for zoology was so strong that it kept her moving forward, and she continued her studies on her own.
                        </div>
                        <p className="text-md leading-relaxed bg-white p-4 border border-slate-200 rounded print:border-slate-400 print:rounded-none print:text-black">
                          They were special companions that she loved and took care of. ( ① ) She was a brilliant student, but health problems prevented her from attending university. ( ② ) Procter accumulated extensive knowledge of zoology. ( ③ ) She began exchanging letters with George Boulenger, a prominent expert on reptiles, in order to share ideas. ( ④ ) He was so impressed that he hired her as his assistant at the British Museum.
                        </p>
                      </div>

                      <div className="grid grid-cols-2 md:grid-cols-4 gap-2 print:grid-cols-4 print:gap-4">
                        {[
                          { id: 1, text: "①" },
                          { id: 2, text: "②", isCorrect: true },
                          { id: 3, text: "③" },
                          { id: 4, text: "④" }
                        ].map((choice) => (
                          <button
                            key={choice.id}
                            onClick={() => setQuiz1Answered(choice.id)}
                            disabled={quiz1Answered !== null}
                            className={`w-full text-center p-3 rounded-lg border font-bold transition-all duration-200
                              print:border-none print:p-1 print:text-black
                              ${quiz1Answered === null ? 'border-slate-200 hover:border-blue-400 hover:bg-blue-50' : 
                                (choice.isCorrect ? 'border-green-500 bg-green-50 text-green-800 shadow-sm' : 
                                  (quiz1Answered === choice.id ? 'border-red-400 bg-red-50 text-red-500' : 'border-slate-100 text-slate-400 opacity-50'))
                              }
                            `}
                          >
                            {choice.text}
                          </button>
                        ))}
                      </div>

                      {quiz1Answered !== null && (
                        <div className={`mt-4 p-4 rounded-lg text-sm leading-relaxed animate-fade-in print:hidden
                          ${quiz1Answered === 2 ? 'bg-green-100 text-green-900 border border-green-300' : 'bg-red-100 text-red-900 border border-red-300'}
                        `}>
                          <p className="font-bold mb-1">
                            {quiz1Answered === 2 ? '🎉 정답입니다!' : '오답입니다. 다시 한번 생각해 보세요.'}
                          </p>
                          <p>
                            <strong>해설:</strong> <strong>'However'</strong>라는 역접의 연결어가 핵심 단서입니다. ①번 다음 문장에서 건강 문제로 대학에 가지 못했다는 <strong>장벽(문제 상황)</strong>이 제시되고, 주어진 문장이 그 장벽을 열정으로 극복하고 스스로 공부를 계속했다는 <strong>반전</strong>을 만들어냅니다. 따라서 ②번 위치가 가장 적절합니다.
                          </p>
                          <button onClick={() => setQuiz1Answered(null)} className="mt-3 text-sm underline opacity-70 hover:opacity-100">
                            다시 풀기
                          </button>
                        </div>
                      )}
                    </div>

                    <hr className="my-8 border-slate-200 print:border-black" />

                    {/* Q2. 빈칸 추론 */}
                    <div>
                      <div className="bg-slate-50 border border-slate-200 p-5 rounded-lg mb-4 print:bg-white print:border-none print:p-0 print:mb-6">
                        <p className="font-bold text-slate-800 mb-2 print:text-black">Q2. 빈칸 추론</p>
                        <p className="text-sm text-slate-600 mb-4 print:text-black">윗글의 내용을 바탕으로 빈칸에 들어갈 가장 적절한 것을 고르시오.</p>
                        <p className="text-md leading-relaxed bg-white p-4 border border-slate-200 rounded print:border-slate-400 print:rounded-none print:text-black">
                          Joan Procter taught me that <span className="inline-block w-64 border-b-2 border-slate-800 mx-1"></span> is important for shaping one’s career.
                        </p>
                      </div>

                      <div className="space-y-2 print:space-y-3">
                        {[
                          { id: 1, text: "adjusting to new environments" },
                          { id: 2, text: "devotion to a particular field", isCorrect: true },
                          { id: 3, text: "building a wide network of friends" },
                          { id: 4, text: "finding a well-paying job" }
                        ].map((choice) => (
                          <button
                            key={choice.id}
                            onClick={() => setQuiz2Answered(choice.id)}
                            disabled={quiz2Answered !== null}
                            className={`w-full text-left p-3 rounded-lg border flex items-center transition-all duration-200
                              print:border-none print:p-1 print:text-black
                              ${quiz2Answered === null ? 'border-slate-200 hover:border-blue-400 hover:bg-blue-50' : 
                                (choice.isCorrect ? 'border-green-500 bg-green-50 text-green-800 font-bold shadow-sm' : 
                                  (quiz2Answered === choice.id ? 'border-red-400 bg-red-50 text-red-500' : 'border-slate-100 text-slate-400 opacity-50'))
                              }
                            `}
                          >
                            <span className="w-8 inline-block font-mono text-slate-500 print:text-black">({choice.id})</span> 
                            {choice.text}
                            {quiz2Answered !== null && choice.isCorrect && <i className="ph-fill ph-check-circle text-lg ml-auto text-green-500 print:hidden"></i>}
                          </button>
                        ))}
                      </div>

                      {quiz2Answered !== null && (
                        <div className={`mt-4 p-4 rounded-lg text-sm leading-relaxed animate-fade-in print:hidden
                          ${quiz2Answered === 2 ? 'bg-green-100 text-green-900 border border-green-300' : 'bg-red-100 text-red-900 border border-red-300'}
                        `}>
                          <p className="font-bold mb-1">
                            {quiz2Answered === 2 ? '🎉 정답입니다!' : '오답입니다. 다시 한번 생각해 보세요.'}
                          </p>
                          <p>
                            <strong>해설:</strong> 본문의 3번 문장에서 직접적으로 묻고 있는 이 글의 <strong>핵심 주제어(Main Idea)</strong>입니다. 건강이라는 장벽 앞에서도 동물학(파충류)에 대한 열정으로 스스로 공부하고 전문가와 교류했던 프록터의 삶을 관통하는 키워드는 바로 <strong>'특정 분야에 대한 헌신(devotion)'</strong>입니다.
                          </p>
                          <button onClick={() => setQuiz2Answered(null)} className="mt-3 text-sm underline opacity-70 hover:opacity-100">
                            다시 풀기
                          </button>
                        </div>
                      )}
                    </div>

                  </div>
                </div>

              </div>
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
