<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE LOGIC Interactive App - Lazy Brain Part 4</title>
    
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    
    <style>
        @media print {
            body {
                -webkit-print-color-adjust: exact;
                print-color-adjust: exact;
                background-color: white !important;
            }
            ::-webkit-scrollbar {
                display: none;
            }
            .print-avoid-break {
                break-inside: avoid;
            }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        const textData = [
          // Part 1: Intro to Solutions (1~2)
          { id: 1, text: "Host: So how can we resist these lazy brain habits?", trans: "진행자: 그렇다면 우리는 어떻게 이 게으른 뇌의 습관에 저항할 수 있을까요?" },
          { id: 2, text: "Doctor: We can make a deliberate effort to practice thinking deeply with System 2 more often. Here are some tips:", trans: "박사: 우리는 시스템 2를 사용하여 더 자주 깊이 생각하는 연습을 하려는 의도적인 노력을 할 수 있습니다. 여기에 몇 가지 팁이 있습니다:", logic: 'intro' },

          // Part 2: Tip 1 (3~6)
          { id: 3, text: "First, reconsider your initial thoughts instead of accepting them right away.", trans: "첫째, 처음에 든 생각을 곧바로 받아들이는 대신 다시 생각해 보세요.", isHighlight: true, logicPoint: 1, logic: 'tip1' },
          { id: 4, text: "Keep generating more ideas and carefully compare the available options before making a decision.", trans: "결정을 내리기 전에 계속해서 더 많은 아이디어를 내고 가능한 선택지들을 신중하게 비교하세요." },
          { id: 5, text: "Ask yourself if the information you have gathered supports your original conclusion.", trans: "여러분이 수집한 정보가 원래의 결론을 뒷받침하는지 스스로에게 물어보세요." },
          { id: 6, text: "If not, then think again.", trans: "만약 그렇지 않다면, 다시 생각해 보세요." },

          // Part 3: Tip 2 (7~10)
          { id: 7, text: "Next, make use of your natural curiosity.", trans: "다음으로, 여러분의 타고난 호기심을 활용하세요.", logic: 'tip2' },
          { id: 8, text: "Curiosity can motivate us to investigate unfamiliar topics and ideas.", trans: "호기심은 우리가 낯선 주제와 아이디어를 조사하도록 동기를 부여할 수 있습니다.", isHighlight: true, logicPoint: 2 },
          { id: 9, text: "It encourages us to dive deeper into a subject and explore it from multiple angles.", trans: "그것은 우리가 어떤 주제에 더 깊이 빠져들고 그것을 여러 각도에서 탐구하도록 격려합니다.", isHighlight: true, logicPoint: 2 },
          { id: 10, text: "Therefore, it can serve as a foundation for building deeper thinking habits.", trans: "그러므로, 그것은 더 깊은 사고 습관을 기르기 위한 토대 역할을 할 수 있습니다." },

          // Part 4: Tip 3 (11~12)
          { id: 11, text: "Finally, learn something new in order to stimulate your brain and become more intelligent.", trans: "마지막으로, 여러분의 뇌를 자극하고 더 똑똑해지기 위해 새로운 것을 배우세요.", logic: 'tip3' },
          { id: 12, text: "Learning a language or a musical instrument might not be easy, but these new activities will create new paths that allow information to flow through your brain more efficiently.", trans: "언어나 악기를 배우는 것은 쉽지 않을 수 있지만, 이러한 새로운 활동들은 정보가 여러분의 뇌를 통해 더 효율적으로 흐르도록 허용하는 새로운 길을 만들어 낼 것입니다.", isHighlight: true, logicPoint: 2 },

          // Part 5: Final Words (13~18)
          { id: 13, text: "Host: That sounds like excellent advice, Doctor. Do you have any final words for our audience?", trans: "진행자: 정말 훌륭한 조언 같습니다, 박사님. 청중을 위해 마지막으로 하실 말씀이 있나요?" },
          { id: 14, text: "Doctor: Yes. We are creatures of habit, so it is vitally important that we develop well-balanced thinking habits.", trans: "박사: 네. 우리는 습관의 동물이므로 균형 잡힌 사고 습관을 기르는 것이 매우 중요합니다.", isHighlight: true, logicPoint: 4 },
          { id: 15, text: "We should remain alert so that we do not fall into the trap of making careless decisions.", trans: "우리는 부주의한 결정을 내리는 덫에 빠지지 않도록 깨어 있어야 합니다.", isHighlight: true, logicPoint: 3 },
          { id: 16, text: "We should invest time into learning how to think deeply in order to use both System 1 and System 2 harmoniously.", trans: "우리는 시스템 1과 시스템 2를 조화롭게 사용하기 위해 깊이 생각하는 방법을 배우는 데 시간을 투자해야 합니다.", logic: 'conclusion' },
          { id: 17, text: "That way, instead of developing a habit of relying too much on a lazy brain, you can exercise your intelligence and reinforce your mental capabilities.", trans: "그렇게 하면 게으른 뇌에 너무 많이 의존하는 습관을 기르는 대신, 지능을 발휘하고 정신적 능력을 강화할 수 있습니다.", isHighlight: true, logicPoint: 1 },
          { id: 18, text: "Host: Okay, Dr. Yoon. Thanks for the great advice! Please give her a big hand!", trans: "진행자: 알겠습니다, 윤 박사님. 훌륭한 조언 감사합니다! 그녀에게 큰 박수를 부탁드립니다!" }
        ];

        const logicMapSteps = [
          { id: 'intro', title: "DELIBERATE EFFORT (의도적 노력)", desc: "Practice System 2 more often", color: "bg-slate-100 border-slate-400 text-slate-800", icon: <i className="ph-fill ph-barbell text-xl mb-2"></i> },
          { id: 'tip1', title: "TIP 1. RECONSIDER (재고하기)", desc: "Don't accept initial thoughts", color: "bg-sky-100 border-sky-400 text-sky-800", icon: <i className="ph-bold ph-arrows-clockwise text-xl mb-2"></i> },
          { id: 'tip2', title: "TIP 2. CURIOSITY (호기심)", desc: "Explore from multiple angles", color: "bg-indigo-100 border-indigo-400 text-indigo-800", icon: <i className="ph-fill ph-magnifying-glass text-xl mb-2"></i> },
          { id: 'tip3', title: "TIP 3. LEARN NEW THINGS (새로운 학습)", desc: "Create new paths in the brain", color: "bg-blue-100 border-blue-400 text-blue-800", icon: <i className="ph-fill ph-lightbulb text-xl mb-2"></i> },
          { id: 'conclusion', title: "ULTIMATE GOAL (최종 목표)", desc: "Use System 1 & 2 harmoniously", color: "bg-purple-100 border-purple-400 text-purple-800", icon: <i className="ph-fill ph-scales text-xl mb-2"></i> }
        ];

        function App() {
          const [activeTab, setActiveTab] = useState(1);
          const [activeLogic, setActiveLogic] = useState(null);
          const [mapStep, setMapStep] = useState(0);
          const [quiz1Answered, setQuiz1Answered] = useState(null);
          const [quiz2Answered, setQuiz2Answered] = useState(null);

          const handleLogicClick = (point) => setActiveLogic(activeLogic === point ? null : point);
          const nextMapStep = () => { if (mapStep < logicMapSteps.length) setMapStep(mapStep + 1); };
          const resetMap = () => setMapStep(0);

          const handlePrint = () => {
            window.print();
          };

          return (
            <div className="min-h-screen bg-slate-50 font-sans text-slate-800 p-4 md:p-8 flex justify-center print:bg-white print:p-0">
              <div className="max-w-4xl w-full flex flex-col gap-6 print:flex print:flex-col print:gap-6 print:max-w-none">
                
                {/* 헤더 */}
                <div className="bg-white p-6 rounded-xl shadow-sm border-t-4 border-indigo-800 print:shadow-none print:border-t-4 print:border-black print:rounded-none flex justify-between items-start">
                  <div>
                    <h1 className="text-sm font-bold text-indigo-900 tracking-wider mb-2 print:text-black">THE LOGIC INTERACTIVE</h1>
                    <h2 className="text-3xl font-serif font-bold text-slate-900 print:text-black">Wake Up Your Lazy Brain!</h2>
                    <p className="text-slate-500 italic mt-1 font-serif print:text-gray-600">Part 4: Solutions and Conclusion</p>
                  </div>
                  <button 
                    onClick={handlePrint}
                    className="print:hidden flex items-center gap-2 bg-slate-800 hover:bg-slate-700 text-white px-4 py-2 rounded-lg font-bold transition-colors shadow-sm"
                  >
                    <i className="ph-bold ph-printer text-lg"></i> 인쇄하기
                  </button>
                </div>

                {/* 탭 네비게이션 */}
                <div className="flex bg-white rounded-xl shadow-sm overflow-hidden print:hidden">
                  <button 
                    onClick={() => setActiveTab(1)}
                    className={`flex-1 py-4 px-2 text-center font-bold text-base md:text-lg transition-all duration-300 border-b-4 ${activeTab === 1 ? 'bg-indigo-50 text-indigo-900 border-indigo-800' : 'text-slate-400 border-transparent hover:bg-slate-50 hover:text-slate-600'}`}
                  >
                    <i className="ph-fill ph-book-open mr-2"></i>
                    1. 지문 및 구문 분석
                  </button>
                  <button 
                    onClick={() => setActiveTab(2)}
                    className={`flex-1 py-4 px-2 text-center font-bold text-base md:text-lg transition-all duration-300 border-b-4 ${activeTab === 2 ? 'bg-sky-50 text-sky-800 border-sky-600' : 'text-slate-400 border-transparent hover:bg-slate-50 hover:text-slate-600'}`}
                  >
                    <i className="ph-fill ph-puzzle-piece mr-2"></i>
                    2. 논리 구조 및 실전 문제
                  </button>
                </div>

                {/* === TAB 1: 지문 및 구문 분석 영역 === */}
                <div className={`space-y-6 print:space-y-4 ${activeTab === 1 ? 'block' : 'hidden print:block'}`}>
                  {/* 1. 지문 영역 */}
                  <div className="bg-white p-6 md:p-8 rounded-xl shadow-sm print:shadow-none print:border print:border-slate-300 print:rounded-none">
                    <h3 className="text-xl font-bold text-indigo-900 border-b-2 border-slate-100 pb-3 mb-4 flex items-center gap-2 print:text-black print:border-black">
                      <i className="ph-fill ph-book-open text-2xl print:text-black"></i> PART 1. Text Analysis
                    </h3>
                    
                    <div className="space-y-8 print:space-y-6">
                      
                      {/* 파트 A: Intro & Tip 1 (1~6번) */}
                      <div>
                        <div className="inline-block bg-slate-700 text-white text-sm font-bold px-3 py-1 rounded mb-3 print:bg-slate-200 print:text-black print:border print:border-slate-800">
                          ▶ Tip 1: Reconsider (의도적 노력과 재고하기)
                        </div>
                        <div className="space-y-2 print:space-y-1">
                          {textData.slice(0, 6).map((item) => (
                            <div 
                              key={item.id} 
                              className={`p-2 rounded-lg transition-all duration-300 group cursor-pointer print:p-0 print:mb-2
                                ${activeLogic === item.logicPoint ? 'bg-indigo-50 border border-indigo-200 shadow-inner print:bg-transparent print:border-none print:shadow-none' : 'hover:bg-slate-50 border border-transparent print:border-none'}
                              `}
                            >
                              <p className="text-base md:text-lg leading-relaxed print:text-base print:text-black">
                                <span className="font-bold text-indigo-800 mr-2 text-sm print:text-black">[{item.id.toString().padStart(2, '0')}]</span>
                                <span className={`${activeLogic === item.logicPoint ? 'font-bold text-indigo-700 print:text-black print:underline print:underline-offset-4' : ''}`}>
                                  {item.text}
                                </span>
                              </p>
                              <p className="text-sm text-slate-500 mt-1 opacity-0 group-hover:opacity-100 transition-opacity duration-300 ml-9 print:hidden">
                                {item.trans}
                              </p>
                            </div>
                          ))}
                        </div>
                      </div>

                      {/* 파트 B: Tip 2 (7~10번) */}
                      <div className="border-t border-dashed border-slate-300 pt-6 print:border-black print:pt-4">
                        <div className="inline-block bg-sky-700 text-white text-sm font-bold px-3 py-1 rounded mb-3 print:bg-slate-200 print:text-black print:border print:border-slate-800">
                          ▶ Tip 2: Curiosity (호기심 활용하기)
                        </div>
                        <div className="space-y-2 print:space-y-1">
                          {textData.slice(6, 10).map((item) => (
                            <div 
                              key={item.id} 
                              className={`p-2 rounded-lg transition-all duration-300 group cursor-pointer print:p-0 print:mb-2
                                ${activeLogic === item.logicPoint ? 'bg-sky-50 border border-sky-200 shadow-inner print:bg-transparent print:border-none print:shadow-none' : 'hover:bg-slate-50 border border-transparent print:border-none'}
                              `}
                            >
                              <p className="text-base md:text-lg leading-relaxed print:text-base print:text-black">
                                <span className="font-bold text-indigo-800 mr-2 text-sm print:text-black">[{item.id.toString().padStart(2, '0')}]</span>
                                <span className={`${activeLogic === item.logicPoint ? 'font-bold text-sky-700 print:text-black print:underline print:underline-offset-4' : ''}`}>
                                  {item.text}
                                </span>
                              </p>
                              <p className="text-sm text-slate-500 mt-1 opacity-0 group-hover:opacity-100 transition-opacity duration-300 ml-9 print:hidden">
                                {item.trans}
                              </p>
                            </div>
                          ))}
                        </div>
                      </div>

                      {/* 파트 C: Tip 3 (11~12번) */}
                      <div className="border-t border-dashed border-slate-300 pt-6 print:border-black print:pt-4">
                        <div className="inline-block bg-blue-700 text-white text-sm font-bold px-3 py-1 rounded mb-3 print:bg-slate-200 print:text-black print:border print:border-slate-800">
                          ▶ Tip 3: Learn New Things (새로운 학습으로 뇌 자극)
                        </div>
                        <div className="space-y-2 print:space-y-1">
                          {textData.slice(10, 12).map((item) => (
                            <div 
                              key={item.id} 
                              className={`p-2 rounded-lg transition-all duration-300 group cursor-pointer print:p-0 print:mb-2
                                ${activeLogic === item.logicPoint ? 'bg-blue-50 border border-blue-200 shadow-inner print:bg-transparent print:border-none print:shadow-none' : 'hover:bg-slate-50 border border-transparent print:border-none'}
                              `}
                            >
                              <p className="text-base md:text-lg leading-relaxed print:text-base print:text-black">
                                <span className="font-bold text-indigo-800 mr-2 text-sm print:text-black">[{item.id.toString().padStart(2, '0')}]</span>
                                <span className={`${activeLogic === item.logicPoint ? 'font-bold text-blue-700 print:text-black print:underline print:underline-offset-4' : ''}`}>
                                  {item.text}
                                </span>
                              </p>
                              <p className="text-sm text-slate-500 mt-1 opacity-0 group-hover:opacity-100 transition-opacity duration-300 ml-9 print:hidden">
                                {item.trans}
                              </p>
                            </div>
                          ))}
                        </div>
                      </div>

                      {/* 파트 D: Conclusion (13~18번) */}
                      <div className="border-t border-dashed border-slate-300 pt-6 print:border-black print:pt-4">
                        <div className="inline-block bg-indigo-800 text-white text-sm font-bold px-3 py-1 rounded mb-3 print:bg-slate-200 print:text-black print:border print:border-slate-800">
                          ▶ Conclusion (시스템 1과 2의 조화로운 사용)
                        </div>
                        <div className="space-y-2 print:space-y-1">
                          {textData.slice(12, 18).map((item) => (
                            <div 
                              key={item.id} 
                              className={`p-2 rounded-lg transition-all duration-300 group cursor-pointer print:p-0 print:mb-2
                                ${activeLogic === item.logicPoint ? 'bg-indigo-50 border border-indigo-200 shadow-inner print:bg-transparent print:border-none print:shadow-none' : 'hover:bg-slate-50 border border-transparent print:border-none'}
                              `}
                            >
                              <p className="text-base md:text-lg leading-relaxed print:text-base print:text-black">
                                <span className="font-bold text-indigo-800 mr-2 text-sm print:text-black">[{item.id.toString().padStart(2, '0')}]</span>
                                <span className={`${activeLogic === item.logicPoint ? 'font-bold text-indigo-700 print:text-black print:underline print:underline-offset-4' : ''}`}>
                                  {item.text}
                                </span>
                              </p>
                              <p className="text-sm text-slate-500 mt-1 opacity-0 group-hover:opacity-100 transition-opacity duration-300 ml-9 print:hidden">
                                {item.trans}
                              </p>
                            </div>
                          ))}
                        </div>
                      </div>

                    </div>
                  </div>

                  {/* 2. 구문 로직 영역 */}
                  <div className="bg-white p-6 md:p-8 rounded-xl shadow-sm print:shadow-none print:border print:border-slate-300 print:rounded-none print-avoid-break">
                    <h3 className="text-xl font-bold text-indigo-900 border-b-2 border-slate-100 pb-3 mb-6 print:text-black print:border-black">
                      PART 2. The Logic Syntax
                    </h3>
                    <p className="text-sm text-slate-500 mb-6 print:hidden">💡 아래의 포인트를 클릭하면 지문의 해당 문장이 강조됩니다.</p>
                    
                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4 print:grid-cols-1 print:gap-6">
                      
                      {/* POINT 1 */}
                      <button 
                        onClick={() => handleLogicClick(1)}
                        className={`text-left border-2 rounded-lg overflow-hidden transition-all duration-300 print:border-2 print:border-slate-800 print:shadow-none print:transform-none print:rounded-none
                          ${activeLogic === 1 ? 'border-sky-600 shadow-md transform -translate-y-1' : 'border-slate-200 hover:border-sky-400'}
                        `}
                      >
                        <div className={`px-4 py-2 font-bold print:bg-slate-100 print:text-black ${activeLogic === 1 ? 'bg-sky-600 text-white' : 'bg-sky-50 text-sky-900'}`}>
                          POINT 01. 대안의 전치사: instead of
                        </div>
                        <div className="p-4 bg-white h-full">
                          <p className="mb-2"><span className="font-semibold text-slate-700 print:text-black">Structure:</span> [instead of] accepting them right away / [instead of] developing a habit</p>
                          <p className="text-sm text-slate-600 leading-relaxed print:text-black">
                            "~하는 대신에"라는 뜻으로, 우리가 버려야 할 시스템 1의 나쁜 습관(부정)과 새롭게 채택해야 할 시스템 2의 긍정적인 행동을 선명하게 <strong>대조</strong>시켜 보여줍니다.
                          </p>
                        </div>
                      </button>

                      {/* POINT 2 */}
                      <button 
                        onClick={() => handleLogicClick(2)}
                        className={`text-left border-2 rounded-lg overflow-hidden transition-all duration-300 print:border-2 print:border-slate-800 print:shadow-none print:transform-none print:rounded-none
                          ${activeLogic === 2 ? 'border-indigo-600 shadow-md transform -translate-y-1' : 'border-slate-200 hover:border-indigo-400'}
                        `}
                      >
                        <div className={`px-4 py-2 font-bold print:bg-slate-100 print:text-black ${activeLogic === 2 ? 'bg-indigo-600 text-white' : 'bg-indigo-50 text-indigo-900'}`}>
                          POINT 02. 5형식 인과 동사: motivate / allow
                        </div>
                        <div className="p-4 bg-white h-full">
                          <p className="mb-2"><span className="font-semibold text-slate-700 print:text-black">Structure:</span> motivate us [to] investigate / allow information [to] flow</p>
                          <p className="text-sm text-slate-600 leading-relaxed print:text-black">
                            동사 + 목적어 + to부정사 구조입니다. 호기심이나 새로운 학습(원인)이 뇌를 깨우는 구체적인 행동과 결과(목적보어)를 이끌어내는 과정을 설명합니다.
                          </p>
                        </div>
                      </button>

                      {/* POINT 3 */}
                      <button 
                        onClick={() => handleLogicClick(3)}
                        className={`text-left border-2 rounded-lg overflow-hidden transition-all duration-300 print:border-2 print:border-slate-800 print:shadow-none print:transform-none print:rounded-none
                          ${activeLogic === 3 ? 'border-blue-600 shadow-md transform -translate-y-1' : 'border-slate-200 hover:border-blue-400'}
                        `}
                      >
                        <div className={`px-4 py-2 font-bold print:bg-slate-100 print:text-black ${activeLogic === 3 ? 'bg-blue-600 text-white' : 'bg-blue-50 text-blue-900'}`}>
                          POINT 03. 목적을 나타내는 접속사: so that
                        </div>
                        <div className="p-4 bg-white h-full">
                          <p className="mb-2"><span className="font-semibold text-slate-700 print:text-black">Structure:</span> remain alert [so that] we do not fall into the trap</p>
                          <p className="text-sm text-slate-600 leading-relaxed print:text-black">
                            "~하지 않도록, ~하기 위해서"라는 뜻으로, 우리가 끊임없이 뇌를 깨우고 경계해야(alert) 하는 <strong>분명한 목적</strong>(부주의한 결정 방지)을 제시해 줍니다.
                          </p>
                        </div>
                      </button>

                      {/* POINT 4 */}
                      <button 
                        onClick={() => handleLogicClick(4)}
                        className={`text-left border-2 rounded-lg overflow-hidden transition-all duration-300 print:border-2 print:border-slate-800 print:shadow-none print:transform-none print:rounded-none
                          ${activeLogic === 4 ? 'border-purple-600 shadow-md transform -translate-y-1' : 'border-slate-200 hover:border-purple-400'}
                        `}
                      >
                        <div className={`px-4 py-2 font-bold print:bg-slate-100 print:text-black ${activeLogic === 4 ? 'bg-purple-600 text-white' : 'bg-purple-50 text-purple-900'}`}>
                          POINT 04. 가주어-진주어: it is ~ that
                        </div>
                        <div className="p-4 bg-white h-full">
                          <p className="mb-2"><span className="font-semibold text-slate-700 print:text-black">Structure:</span> [it] is vitally important [that] we develop well-balanced thinking habits.</p>
                          <p className="text-sm text-slate-600 leading-relaxed print:text-black">
                            이 글 전체를 마무리하는 필자의 <strong>최종 주장(Main Idea)</strong>입니다. 균형 잡힌 사고 습관(시스템 1과 2의 조화)을 기르는 것(that절)이 절대적으로 중요하다는 점을 강조합니다.
                          </p>
                        </div>
                      </button>

                    </div>

                    <div className="mt-8 text-center print:hidden">
                       <button onClick={() => setActiveTab(2)} className="bg-indigo-900 hover:bg-indigo-800 text-white px-8 py-3 rounded-full font-bold shadow-md transition-colors flex items-center gap-2 mx-auto">
                         구문 분석 완료! 실전 문제로 이동 <i className="ph-bold ph-arrow-right"></i>
                       </button>
                    </div>
                  </div>
                </div>

                {/* === TAB 2: 논리 구조도 및 퀴즈 영역 === */}
                <div className={`space-y-6 print:space-y-4 print:mt-4 ${activeTab === 2 ? 'block' : 'hidden print:block'}`}>
                  
                  {/* 3. 로직 맵 */}
                  <div className="bg-white p-6 rounded-xl shadow-sm border-t-4 border-sky-600 print:shadow-none print:border print:border-slate-300 print:border-t-4 print:border-t-black print:rounded-none print-avoid-break">
                    <div className="flex justify-between items-center border-b-2 border-slate-100 pb-3 mb-6 print:border-black">
                      <h3 className="text-xl font-bold text-slate-800 flex items-center gap-2 print:text-black">
                        <i className="ph-fill ph-play-circle text-2xl text-sky-600 print:text-black"></i> PART 3. Logic Map
                      </h3>
                      <div className="print:hidden">
                        {mapStep > 0 && mapStep < logicMapSteps.length && (
                          <button onClick={nextMapStep} className="bg-sky-100 hover:bg-sky-200 text-sky-800 px-3 py-1 rounded text-sm font-bold transition-colors">
                            Next Step ➔
                          </button>
                        )}
                        {mapStep === logicMapSteps.length && (
                           <button onClick={resetMap} className="text-slate-400 hover:text-slate-600 text-sm underline">
                            Reset
                           </button>
                        )}
                      </div>
                    </div>
                    
                    <div 
                      className={`h-64 flex-col items-center justify-center border-2 border-dashed border-slate-200 rounded-lg bg-slate-50 text-center p-6 cursor-pointer hover:bg-sky-50 transition-colors 
                        ${mapStep === 0 ? 'flex' : 'hidden'} print:!hidden
                      `} 
                      onClick={nextMapStep}
                    >
                      <i className="ph-fill ph-play-circle text-5xl text-sky-400 mb-4"></i>
                      <p className="text-slate-600 font-medium">클릭하여 게으른 뇌를 깨우는 솔루션을<br/>단계별로 파악해 보세요.</p>
                    </div>
                    
                    <div className={`flex-col items-center gap-2 py-4 ${mapStep > 0 ? 'flex' : 'hidden'} print:!flex`}>
                      {logicMapSteps.map((step, idx) => (
                        <React.Fragment key={step.id}>
                          <div 
                            className={`w-full max-w-sm border-2 rounded-lg p-4 flex flex-col items-center text-center transition-all duration-500 transform
                              print:!opacity-100 print:!translate-y-0 print:!flex print:border-slate-800 print:rounded-none print:bg-white print:text-black
                              ${idx < mapStep ? `opacity-100 translate-y-0 ${step.color}` : 'opacity-0 translate-y-8 hidden'}
                            `}
                          >
                            <div className="print:hidden">{step.icon}</div>
                            <span className="font-bold text-sm mb-1 print:text-black">{step.title}</span>
                            <span className="text-sm opacity-90 print:text-black">{step.desc}</span>
                          </div>
                          <div 
                            className={`flex-col items-center opacity-100 animate-pulse 
                              print:!flex print:!opacity-100 print:animate-none
                              ${idx < logicMapSteps.length - 1 && idx < mapStep ? 'flex' : 'hidden'}
                            `}
                          >
                            <div className="w-0.5 h-6 bg-slate-300 print:bg-slate-800"></div>
                            {/* 화살표 라벨 추가 */}
                            {idx === 0 ? (
                              <div className="bg-sky-100 text-sky-700 text-xs font-bold px-2 py-1 rounded-full my-1 border border-sky-300 print:bg-white print:text-black print:border-slate-800 print:rounded-none">
                                Includes
                              </div>
                            ) : idx === 3 ? (
                              <div className="bg-purple-100 text-purple-700 text-xs font-bold px-2 py-1 rounded-full my-1 border border-purple-300 print:bg-white print:text-black print:border-slate-800 print:rounded-none">
                                Leads to
                              </div>
                            ) : null}
                            <i className="ph-bold ph-arrow-right text-base text-slate-400 transform rotate-90 print:text-slate-800"></i>
                          </div>
                        </React.Fragment>
                      ))}
                    </div>
                  </div>

                  {/* 4. 실전 변형 문제 */}
                  <div className="bg-white p-6 rounded-xl shadow-sm print:shadow-none print:border print:border-slate-300 print:rounded-none print-avoid-break">
                    <h3 className="text-xl font-bold text-slate-800 border-b-2 border-slate-100 pb-3 mb-6 flex items-center gap-2 print:text-black print:border-black">
                      <i className="ph-fill ph-check-circle text-2xl text-sky-600 print:text-black"></i> PART 4. Challenge
                    </h3>
                    
                    {/* Q1. 어휘 추론 */}
                    <div className="mb-8">
                      <div className="bg-slate-50 border border-slate-200 p-5 rounded-lg mb-4 print:bg-white print:border-none print:p-0 print:mb-6">
                        <p className="font-bold text-slate-800 mb-2 print:text-black">Q1. 문맥상 어휘 추론</p>
                        <p className="text-sm text-slate-600 mb-4 print:text-black">밑줄 친 부분 중, 문맥상 낱말의 쓰임이 적절하지 <u>않은</u> 것은?</p>
                        <p className="text-md leading-relaxed bg-white p-4 border border-slate-200 rounded print:border-slate-400 print:rounded-none print:text-black">
                          First, ①<u>reconsider</u> your initial thoughts instead of accepting them right away. Next, make use of your natural curiosity. Curiosity can motivate us to investigate ②<u>unfamiliar</u> topics and ideas. Finally, learn something new in order to stimulate your brain. We should remain alert so that we do not fall into the trap of making ③<u><span className="text-red-600 font-bold">careful</span></u> decisions. That way, you can exercise your intelligence and ④<u>reinforce</u> your mental capabilities.
                        </p>
                      </div>

                      <div className="grid grid-cols-2 md:grid-cols-4 gap-2 print:grid-cols-4 print:gap-4">
                        {[
                          { id: 1, text: "① reconsider" },
                          { id: 2, text: "② unfamiliar" },
                          { id: 3, text: "③ careful", isCorrect: true },
                          { id: 4, text: "④ reinforce" }
                        ].map((choice) => (
                          <button
                            key={choice.id}
                            onClick={() => setQuiz1Answered(choice.id)}
                            disabled={quiz1Answered !== null}
                            className={`w-full text-center p-3 rounded-lg border font-medium transition-all duration-200
                              print:border-none print:p-1 print:text-black
                              ${quiz1Answered === null ? 'border-slate-200 hover:border-sky-400 hover:bg-sky-50' : 
                                (choice.isCorrect ? 'border-green-500 bg-green-50 text-green-800 shadow-sm' : 
                                  (quiz1Answered === choice.id ? 'border-red-400 bg-red-50 text-red-500' : 'border-slate-100 text-slate-400 opacity-50'))
                              }
                            `}
                          >
                            {choice.text}
                          </button>
                        ))}
                      </div>

                      {quiz1Answered !== null && (
                        <div className={`mt-4 p-4 rounded-lg text-sm leading-relaxed animate-fade-in print:hidden
                          ${quiz1Answered === 3 ? 'bg-green-100 text-green-900 border border-green-300' : 'bg-red-100 text-red-900 border border-red-300'}
                        `}>
                          <p className="font-bold mb-1">
                            {quiz1Answered === 3 ? '🎉 정답입니다!' : '오답입니다. 다시 한번 생각해 보세요.'}
                          </p>
                          <p>
                            <strong>해설: ③ careful $\rightarrow$ careless</strong><br/>
                            우리가 함정(trap)에 빠지지 않도록 깨어 있어야 하는 이유는 '신중한(careful)' 결정을 내리기 위해서가 아니라, 게으른 뇌에 의존하여 <strong>'부주의한(careless)'</strong> 결정을 내리는 덫을 피하기 위해서입니다.
                          </p>
                          <button onClick={() => setQuiz1Answered(null)} className="mt-3 text-sm underline opacity-70 hover:opacity-100">
                            다시 풀기
                          </button>
                        </div>
                      )}
                    </div>

                    <hr className="my-8 border-slate-200 print:border-black" />

                    {/* Q2. 요약문 완성 */}
                    <div>
                      <div className="bg-slate-50 border border-slate-200 p-5 rounded-lg mb-4 print:bg-white print:border-none print:p-0 print:mb-6">
                        <p className="font-bold text-slate-800 mb-2 print:text-black">Q2. 요약문 완성</p>
                        <p className="text-sm text-slate-600 mb-4 print:text-black">다음 글의 내용을 한 문장으로 요약하고자 한다. 빈칸 (A), (B)에 들어갈 말로 가장 적절한 것은?</p>
                        <p className="text-md leading-relaxed bg-white p-4 border border-slate-200 rounded print:border-slate-400 print:rounded-none print:text-black">
                          To overcome lazy brain habits, we need to actively utilize System <span className="font-bold text-sky-800">( A )</span> by reconsidering initial thoughts, embracing curiosity, and learning new things, which leads to a <span className="font-bold text-sky-800">( B )</span> use of our brain.
                        </p>
                      </div>

                      <div className="space-y-2 print:space-y-3">
                        {[
                          { id: 1, text: "(A) 1 —— (B) strict" },
                          { id: 2, text: "(A) 2 —— (B) harmonious", isCorrect: true },
                          { id: 3, text: "(A) 2 —— (B) temporary" },
                          { id: 4, text: "(A) 1 —— (B) continuous" }
                        ].map((choice) => (
                          <button
                            key={choice.id}
                            onClick={() => setQuiz2Answered(choice.id)}
                            disabled={quiz2Answered !== null}
                            className={`w-full text-left p-3 rounded-lg border flex items-center transition-all duration-200
                              print:border-none print:p-1 print:text-black
                              ${quiz2Answered === null ? 'border-slate-200 hover:border-sky-400 hover:bg-sky-50' : 
                                (choice.isCorrect ? 'border-green-500 bg-green-50 text-green-800 font-bold shadow-sm' : 
                                  (quiz2Answered === choice.id ? 'border-red-400 bg-red-50 text-red-500' : 'border-slate-100 text-slate-400 opacity-50'))
                              }
                            `}
                          >
                            <span className="w-8 inline-block font-mono text-slate-500 print:text-black">{['①', '②', '③', '④'][choice.id - 1]}</span> 
                            {choice.text}
                            {quiz2Answered !== null && choice.isCorrect && <i className="ph-fill ph-check-circle text-lg ml-auto text-green-500 print:hidden"></i>}
                          </button>
                        ))}
                      </div>

                      {quiz2Answered !== null && (
                        <div className={`mt-4 p-4 rounded-lg text-sm leading-relaxed animate-fade-in print:hidden
                          ${quiz2Answered === 2 ? 'bg-green-100 text-green-900 border border-green-300' : 'bg-red-100 text-red-900 border border-red-300'}
                        `}>
                          <p className="font-bold mb-1">
                            {quiz2Answered === 2 ? '🎉 정답입니다!' : '오답입니다. 다시 한번 생각해 보세요.'}
                          </p>
                          <p>
                            <strong>해설:</strong> 게으른 뇌(시스템 1의 함정)를 극복하기 위해 필자가 제시한 방법들은 모두 신중하고 논리적인 사고, 즉 <strong>시스템 2</strong>를 훈련하는 것들입니다. 이러한 의도적인 노력을 통해 우리는 결국 두 시스템을 <strong>조화롭게(harmonious)</strong> 사용할 수 있게 된다는 것이 이 글 전체의 최종 요지입니다.
                          </p>
                          <button onClick={() => setQuiz2Answered(null)} className="mt-3 text-sm underline opacity-70 hover:opacity-100">
                            다시 풀기
                          </button>
                        </div>
                      )}
                    </div>

                  </div>
                </div>

              </div>
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
