<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>THE LOGIC Interactive - NE능률 공통영어2 Lesson 2</title>
    
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    
    <style>
        @media print {
            body { -webkit-print-color-adjust: exact; print-color-adjust: exact; background-color: white !important; }
            .print-avoid-break { break-inside: avoid; }
        }
        .bg-pattern { background-color: #f0fdf4; background-image: radial-gradient(#bbf7d0 1px, transparent 1px); background-size: 20px 20px; }
    </style>
</head>
<body class="bg-slate-50">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const textData = [
          { id: 1, text: "Criminals never leave a crime scene without leaving behind traces of their presence.", trans: "범죄자들은 범죄 현장에 그들의 존재 흔적을 남기지 않고 가는 법이 결코 없다." },
          { id: 2, text: "The traces might be tiny, like hairs, or more obvious, such as soil from their shoes.", trans: "그 흔적들은 머리카락처럼 아주 작거나, 그들의 신발에서 나온 흙처럼 더 분명할지 모른다." },
          { id: 3, text: "So detectives carefully collect all the possible evidence. Scientists then analyze everything and find some clues.", trans: "그래서 형사들은 모든 가능한 증거를 주의 깊게 수집한다. 그러고 나서 과학자들은 모든 것을 분석하고 몇몇 단서를 찾아낸다." },
          { id: 4, text: "The clues are used to find the person who committed the crime. This process is called forensic science.", trans: "그 단서들은 범죄를 저질렀던 사람을 찾는 데 사용된다. 이 과정은 과학 수사라고 불린다." },
          { id: 5, text: "It has evolved thanks to the contributions of many researchers. One of the most important people in the development of modern forensic science was Frances Glessner Lee.", trans: "이것은 많은 연구자의 기여 덕분에 발전해 왔다. 현대 과학 수사의 발전에서 가장 중요한 인물 중 한 명은 Frances Glessner Lee였다." },

          { id: 6, text: "Frances Glessner Lee was born into a rich family in Chicago in 1878. She became interested in medicine at a young age.", trans: "Frances Glessner Lee는 1878년 시카고의 한 부유한 가정에서 태어났다. 그녀는 어린 나이에 의학에 흥미를 갖게 되었다." },
          { id: 7, text: "Her dream was to attend Harvard Medical School, but, at that time, the school did not accept women.", trans: "그녀의 꿈은 하버드 의학 대학에 가는 것이었지만, 그 당시에 그 학교는 여자들을 수용하지(입학을 허가하지) 않았다." },
          { id: 8, text: "She had no choice but to get married. It was not until she was in her fifties that Lee was able to start a career in medicine.", trans: "그녀는 결혼할 수밖에 없었다. 그녀는 50대가 되어서야 의학에서 경력을 시작할 수 있었다." },

          { id: 9, text: "Lee heard many interesting stories of real-life crime from her friend, George Burgess Magrath. He was a medical examiner who wanted to change the investigation system.", trans: "Lee는 그녀의 친구 George Burgess Magrath에게서 실제 범죄에 대한 많은 흥미로운 이야기들을 들었다. 그는 수사 체계를 바꾸고 싶어 했던 검시관이었다." },
          { id: 10, text: "This was because, at that time, people with no medical knowledge investigated and closed many death cases without examining the bodies.", trans: "이것은 그 당시에 의학적 지식이 없는 사람들이 많은 사망 사건을 시신을 조사하지 않은 채로 수사하고 종결했기 때문이었다." },
          { id: 11, text: "He also had a passion for educating medical students in legal medicine. Magrath's passion sparked Lee's interest in legal medicine.", trans: "그는 또한 법의학 분야에서 의과 학생들을 가르치고자 하는 열정도 있었다. Magrath의 열정이 법의학에 대한 Lee의 흥미에 불을 지폈다." },

          { id: 12, text: "Lee started studying legal medicine by reading books and speaking with experts.", trans: "Lee는 책을 읽고 전문가들과 대화함으로써 법의학을 공부하기 시작했다." },
          { id: 13, text: "She believed that medical examiner systems would be adopted more widely across the country.", trans: "그녀는 검시관 체계가 전국적으로 더 넓게 채택될 것이라고 믿었다." },
          { id: 14, text: "Furthermore, she wanted to see more young medical students trained in legal medicine.", trans: "게다가, 그녀는 더 많은 젊은 의과 학생들이 법의학 분야에서 훈련받는 것을 보고 싶어 했다." },
          { id: 15, text: "She decided to devote the rest of her life to developing this field.", trans: "그녀는 자신의 여생을 이 분야를 발전시키는 데 바치기로 결심했다." },
          { id: 16, text: "In 1931, she persuaded Harvard University to use her fortune to make a new branch of study: legal medicine.", trans: "1931년에 그녀는 하버드 대학교를 설득해 그녀의 재산을 새로운 분야의 학문인 법의학(과)을 만드는 데 쓰도록 했다." },

          { id: 17, text: "She thought laws had to be changed so that medical examiners had independent power.", trans: "그녀는 검시관들이 독립적인 힘을 가지도록 법이 바뀌어야 한다고 생각했다." },
          { id: 18, text: "Public support was needed to change laws, so she used the World's Fair held from 1939 to 1940 to educate the public about the modern medical examiner system.", trans: "법을 바꾸기 위해서는 대중의 지지가 필요했고, 그녀는 대중에게 현대 검시관 체계를 교육하기 위해 1939년부터 1940년까지 열린 세계 박람회를 이용했다." },

          { id: 19, text: "By touching and stepping on things, detectives often destroyed clues without realizing it.", trans: "물건들을 만지고 밟으면서, 그들은 알아차리지도 못한 채 자주 단서들을 파손했다." },
          { id: 20, text: "Lee thought detectives also had to learn how to observe crime scenes from a medical point of view.", trans: "Lee는 형사들도 범죄 현장을 의학적 관점에서 관찰하는 법을 배워야 한다고 생각했다." },
          { id: 21, text: "In order to educate detectives effectively, Lee came up with a creative tool. Her idea came from her hobby: creating miniatures.", trans: "형사들을 효율적으로 교육하기 위해, Lee는 창의적인 도구를 생각해 냈다. 그녀의 아이디어는 그녀의 취미로부터 왔는데, 미니어처를 만드는 것이다." },
          { id: 22, text: "She started creating miniatures of crime scenes that were highly detailed and accurate.", trans: "그녀는 매우 자세하고 정밀한 범죄 현장 미니어처를 만들기 시작했다." },
          { id: 23, text: "She wanted to train detectives to notice tiny clues. She created around twenty miniature scenes during the 1940s and 1950s.", trans: "그녀는 형사들이 아주 작은 단서들을 알아차리도록 훈련하길 원했다. 그녀는 1940년대부터 1950년대 동안 약 스무 개의 미니어처 현장을 만들어 냈다." },

          { id: 24, text: "In 1945, she held a week-long seminar and gave her first lecture using her miniature crime scenes.", trans: "1945년에, 그녀는 일주일간의 세미나를 열었고 그녀의 범죄 현장 미니어처를 사용하여 첫 번째 강의를 했다." },
          { id: 25, text: "By developing their observation skills, they were able to improve their ability to solve crime cases.", trans: "자신들의 관찰 능력을 발달시킴으로써, 그들은 범죄 사건을 해결하는 능력을 향상할 수 있었다." },
          { id: 26, text: "Although she had struggled to enter the field, her contributions to forensic science were significant.", trans: "비록 그녀가 그 분야에 들어가는 데 고군분투했지만, 과학 수사에 대한 그녀의 기여는 상당했다." },
          { id: 27, text: "It is no wonder that she was called the \"mother of forensic science.\"", trans: "그녀가 '과학 수사의 어머니'로 불렸던 것은 놀랍지 않다." }
        ];

        function App() {
            return (
                <div className="p-6 max-w-3xl mx-auto bg-white rounded-xl shadow-md">
                    <h1 className="text-2xl font-bold text-green-800 mb-6">Lesson 2: A Creative Idea Sparks a Whole New Field</h1>
                    <div className="space-y-4">
                        {textData.map(item => (
                            <div key={item.id} className="p-4 border-b border-gray-100 hover:bg-green-50 transition-colors">
                                <p className="text-lg text-gray-800 font-medium">{item.text}</p>
                                <p className="text-sm text-green-700 mt-1">{item.trans}</p>
                            </div>
                        ))}
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
