<body class="app-like bg-slate-50">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const textData = [
          // Part 1: THE NUISANCE
          { id: 1, text: "You are on a camping trip with your family or friends.", trans: "가족이나 친구들과 캠핑을 갔다." },
          { id: 2, text: "After a long day of hiking, you take a quick shower, sit in your favorite camping chair, pick up a soda, and let out a deep, contented sigh.", trans: "오랜 시간 등산을 한 후, 가볍게 샤워를 하고 가장 좋아하는 캠핑 의자에 앉아 소다수를 집어 들고 깊고 만족스러운 한숨을 내쉰다." },
          { id: 3, text: "Right at that moment, you hear that annoying and familiar buzzing sound.", trans: "바로 그 순간, 짜증 나고 익숙한 윙윙거리는 소리를 듣는다." },
          { id: 4, text: "Beating its wings as fast as 600 times per second, a mosquito sneaks in and pierces your skin with its straw-like mouthparts.", trans: "초당 600번이나 날갯짓을 하며 모기가 몰래 들어와 빨대 같은 입틀로 피부를 뚫는다.", isHighlight: true, logicPoint: 1 },
          { id: 5, text: "Next, it fills its belly with blood and then escapes quickly, leaving behind an itchy red bump.", trans: "다음으로, 피로 배를 채운 후 빠르게 달아나, 가렵고 붉은 부어오른 자국을 남긴다." },
          { id: 6, text: "This is a mild allergic reaction to the mosquito's saliva. The more you scratch the bump, the more it itches.", trans: "이것은 모기의 침에 대한 가벼운 알레르기 반응이다. 모기 물린 곳을 긁으면 긁을수록 더 가렵다." },
          
          { id: 7, text: "But how do mosquitoes find their victims anyway?", trans: "그런데 모기는 어쨌든 어떻게 희생자를 찾는 걸까?" },
          { id: 8, text: "Carbon dioxide, which humans and other animals breathe out, is actually a key signal to mosquitoes that a nice meal is near.", trans: "인간과 다른 동물이 내쉬는 이산화탄소는 사실 모기에게 훌륭한 식사가 근처에 있다는 핵심 신호이다." },
          { id: 9, text: "They are highly sensitive to CO2 and can detect it from far away.", trans: "그들은 이산화탄소에 매우 민감하고 멀리서도 그것을 감지할 수 있다." },
          { id: 10, text: "That's not the only cue they use to find their victims. When you sweat, you release certain chemicals that attract them.", trans: "그것이 희생자를 찾기 위해 사용하는 유일한 신호는 아니다. 땀을 흘릴 때, 모기를 유인하는 특정 화학 물질을 방출한다." },
          { id: 11, text: "Moreover, they can easily notice that your body temperature has risen.", trans: "게다가, 체온이 올라간 것을 쉽게 알아차릴 수 있다." },
          
          { id: 12, text: "Why do they want our blood in the first place? It turns out that only females bite us; they need protein to produce eggs.", trans: "애초에 왜 우리 피를 원할까? 암컷만 우리를 무는데, 알을 낳기 위해 단백질이 필요하기 때문인 것으로 드러났다." },
          { id: 13, text: "If our blood did not contain protein, they would not bother us.", trans: "만약 우리 피에 단백질이 포함되어 있지 않다면, 그들은 우리를 괴롭히지 않을 것이다.", isHighlight: true, logicPoint: 2 },
          { id: 14, text: "After the mosquito successfully takes a blood meal of up to three times her own body weight, she quickly lands on the nearest vertical surface.", trans: "모기가 자신의 몸무게의 최대 3배에 달하는 피를 성공적으로 먹은 후, 가장 가까운 수직 표면에 빠르게 내려앉는다." },
          { id: 15, text: "With the aid of gravity, she drains off the water from the blood she took. Using this concentrated blood, she develops her eggs over the next few days.", trans: "중력의 도움으로 흡혈한 피에서 물을 빼낸다. 이 농축된 피를 사용하여 다음 며칠 동안 알을 발달시킨다." },
          { id: 16, text: "She then lays roughly 200 floating eggs on the surface of a small pool of water.", trans: "그런 다음 작은 물웅덩이 표면에 약 200개의 떠다니는 알을 낳는다." },

          // Part 2: THE PREDATOR
          { id: 17, text: "If you had to choose our greatest predator in nature, which would you pick? Sharks, lions, or bears?", trans: "자연에서 가장 큰 포식자를 고른다면, 어떤 것을 고르겠는가? 상어, 사자, 아니면 곰?" },
          { id: 18, text: "According to history professor Timothy Winegard, it is actually the mosquito.", trans: "역사학 교수 Timothy Winegard에 따르면, 그것은 사실 모기이다." },
          { id: 19, text: "Mosquitoes can pass on deadly diseases like malaria and yellow fever. Over a million people worldwide die of these diseases every year.", trans: "모기는 말라리아와 황열병 같은 치명적인 질병을 옮길 수 있다. 매년 전 세계적으로 백만 명 이상이 이러한 질병으로 사망한다." },
          { id: 20, text: "Throughout history, Winegard estimates that mosquitoes have killed more people than any other single cause—about fifty-two billion people, nearly half of all humans who have ever lived.", trans: "역사 내내 Winegard는 모기가 다른 어떤 단일 원인보다 더 많은 사람—약 520억 명, 지금까지 살았던 모든 인간의 거의 절반—을 죽였다고 추정한다.", isHighlight: true, logicPoint: 3 },

          // Shaping History: Rome
          { id: 21, text: "Winegard claims that mosquitoes also played a role in shaping the history of several countries. Take the Roman Empire, for example.", trans: "Winegard는 모기가 여러 국가의 역사를 형성하는 데도 역할을 했다고 주장한다. 로마 제국을 예로 들어보자." },
          { id: 22, text: "The fall of the Western Roman Empire was gradual, spanning over centuries.", trans: "서로마 제국의 멸망은 수 세기에 걸쳐 점진적이었다." },
          { id: 23, text: "Here are commonly cited reasons for the fall of the empire: invasions by outside forces, economic troubles, and corruption. Diseases like malaria, however, also contributed.", trans: "제국의 멸망 이유로 흔히 인용되는 것들이 있다: 외부 세력의 침략, 경제적 문제, 그리고 부패. 그러나 말라리아 같은 질병도 한몫했다." },
          { id: 24, text: "Rome, the capital of the empire, was once surrounded by a huge stretch of wetland. This was an ideal breeding ground for mosquitoes and hence a hot spot for malaria.", trans: "제국의 수도 로마는 한때 거대한 습지로 둘러싸여 있었다. 이곳은 모기에게 이상적인 번식지였고 따라서 말라리아의 다발 지역이었다." },
          { id: 25, text: "On the one hand, mosquitoes helped protect the city against the armies coming to attack it.", trans: "한편으로, 모기는 도시를 공격하러 오는 군대로부터 도시를 보호하는 데 도움을 주었다." },
          { id: 26, text: "However, they eventually spread the disease not only throughout the city, but also throughout the empire, crushing much of the population.", trans: "그러나 그들은 결국 도시 전체뿐만 아니라 제국 전체로 질병을 퍼뜨려 인구의 상당수를 파멸시켰다.", isHighlight: true, logicPoint: 4 },

          // Shaping History: Scotland (Darien scheme)
          { id: 27, text: "Here is another reason why Winegard considers the mosquito a powerful agent of historical change.", trans: "Winegard가 모기를 역사적 변화의 강력한 동인으로 간주하는 또 다른 이유가 여기에 있다." },
          { id: 28, text: "In 1698, five ships set sail from Scotland, carrying twelve hundred settlers and valuable trade goods. They headed for the Darien region of Panama, where Scotland planned to create a trading center.", trans: "1698년, 1,200명의 정착민과 귀중한 무역품을 실은 다섯 척의 배가 스코틀랜드에서 출항했다. 그들은 스코틀랜드가 무역 센터를 세우기로 계획했던 파나마의 Darien 지역으로 향했다." },
          { id: 29, text: "After struggling through years of a food crisis, Scotland had hoped this would help raise its economic prospects.", trans: "수년간의 식량 위기로 고군분투한 후, 스코틀랜드는 이것이 경제적 전망을 높이는 데 도움이 되기를 바랐다." },
          { id: 30, text: "The ambitious plan, however, was brought down by the local diseases: yellow fever and malaria.", trans: "그러나 그 야심 찬 계획은 풍토병인 황열병과 말라리아에 의해 무너졌다." },
          { id: 31, text: "Virtually no one from Scotland had ever encountered any of these diseases before.", trans: "스코틀랜드에서 온 거의 어느 누구도 이전에 이러한 질병에 직면해 본 적이 없었다." },
          { id: 32, text: "After six months, nearly half of them died, and the survivors returned to their ships and fled.", trans: "6개월 후, 그들 중 거의 절반이 사망했고, 생존자들은 배로 돌아가 도망쳤다." },
          { id: 33, text: "If their immune systems had been much stronger, they would not have lost so many lives in such a short time.", trans: "만약 그들의 면역 체계가 훨씬 더 강했더라면, 그렇게 짧은 시간에 그렇게 많은 생명을 잃지 않았을 것이다.", isHighlight: true, logicPoint: 5 },

          // Conclusion
          { id: 34, text: "Surprisingly, human beings lived with and died of these diseases for thousands of years without understanding how they were spread.", trans: "놀랍게도 인류는 수천 년 동안 이러한 질병이 어떻게 퍼지는지 이해하지 못한 채 질병과 함께 살고 사망했다." },
          { id: 35, text: "It was not until the end of the nineteenth century that we found out that mosquitoes spread malaria.", trans: "19세기 말에 이르러서야 우리는 모기가 말라리아를 퍼뜨린다는 것을 알게 되었다.", isHighlight: true, logicPoint: 6 },
          { id: 36, text: "Before this finding, no one imagined that these tiny annoying insects might be affecting our lives so deeply.", trans: "이 발견 이전에, 누구도 이 작고 짜증 나는 곤충들이 우리 삶에 그렇게 깊은 영향을 미칠 것이라고 상상하지 못했다." },
          { id: 37, text: "Now we all know that human history is not free from the workings of the natural world.", trans: "이제 우리 모두는 인류의 역사가 자연계의 작용으로부터 자유롭지 않다는 것을 알고 있다." }
        ];

        const logicMapSteps = [
          { point: 1, title: "THE NUISANCE", desc: "이산화탄소와 땀으로 우리를 찾는 모기", color: "bg-slate-100 border-slate-400 text-slate-800", icon: <i className="ph-fill ph-bug text-xl mb-2"></i> },
          { point: 2, title: "WHY THEY BITE", desc: "알을 낳기 위한 단백질(피) 섭취", color: "bg-orange-100 border-orange-400 text-orange-800", icon: <i className="ph-fill ph-drop text-xl mb-2"></i> },
          { point: 3, title: "THE PREDATOR", desc: "치명적인 질병 전파로 인류 절반 사망", color: "bg-red-100 border-red-400 text-red-800", icon: <i className="ph-fill ph-skull text-xl mb-2"></i> },
          { point: 4, title: "SHAPING HISTORY: ROME", desc: "서로마 제국의 멸망에 말라리아가 기여", color: "bg-amber-100 border-amber-400 text-amber-800", icon: <i className="ph-fill ph-bank text-xl mb-2"></i> },
          { point: 5, title: "SHAPING HISTORY: SCOTLAND", desc: "질병으로 인한 스코틀랜드 무역 센터 계획 실패", color: "bg-orange-200 border-orange-500 text-orange-900", icon: <i className="ph-fill ph-anchor text-xl mb-2"></i> },
          { point: 6, title: "CONCLUSION", desc: "인류 역사는 자연계의 작용과 밀접하게 연관됨", color: "bg-stone-200 border-stone-400 text-stone-800", icon: <i className="ph-fill ph-globe-hemisphere-west text-xl mb-2"></i> }
        ];

        function App() {
          const [isAuthenticated, setIsAuthenticated] = useState(false);
          const [passwordInput, setPasswordInput] = useState("");
          const [loginError, setLoginError] = useState("");
          
          const CORRECT_PASSWORD = "Made by Lee";
          const itemRefs = useRef({});

          const handleLoginSubmit = (e) => {
            e.preventDefault();
            if (passwordInput === CORRECT_PASSWORD) {
              setIsAuthenticated(true);
              setLoginError("");
            } else {
              setLoginError("올바르지 않은 암호입니다. 다시 확인해 주세요.");
              setPasswordInput("");
            }
          };

          const [activeTab, setActiveTab] = useState('text');
          const [activeLogic, setActiveLogic] = useState(null);
          
          const handleLogicClick = (point) => {
              setActiveLogic(activeLogic === point ? null : point);
              setActiveTab('text'); 
          };

          useEffect(() => {
              if (activeTab === 'text' && activeLogic !== null) {
                  const targetItem = textData.find(item => item.logicPoint === activeLogic);
                  if (targetItem && itemRefs.current[targetItem.id]) {
                      setTimeout(() => {
                          itemRefs.current[targetItem.id].scrollIntoView({ behavior: 'smooth', block: 'center' });
                      }, 150);
                  }
              }
          }, [activeLogic, activeTab]);

          const [quiz1Answered, setQuiz1Answered] = useState(null);
          const [quiz2Answered, setQuiz2Answered] = useState(null);

          const handlePrint = () => { window.print(); };

          if (!isAuthenticated) {
            return (
              <div className="min-h-screen bg-pattern flex items-center justify-center p-4">
                <div className="bg-white p-8 md:p-10 rounded-2xl shadow-2xl max-w-md w-full text-center border-t-8 border-orange-800">
                  <div className="mx-auto bg-orange-100 w-16 h-16 rounded-full flex items-center justify-center mb-6">
                    <i className="ph-fill ph-lock-key text-3xl text-orange-800"></i>
                  </div>
                  <h2 className="text-2xl font-serif font-bold text-slate-800 mb-2">THE LOGIC INTERACTIVE</h2>
                  <p className="text-orange-700 font-bold mb-6 text-sm">The Mosquito</p>
                  
                  <div className="bg-slate-50 border border-slate-200 rounded-lg p-4 mb-6">
                    <p className="text-slate-600 text-sm leading-relaxed">
                      이 콘텐츠는 <strong>Lee 선생님</strong>이 기획하고 제작한<br/>교육용 창작물입니다. (무단 배포 금지)<br/>
                      <span className="inline-block mt-2 font-medium text-slate-700">열람을 위해 선생님이 안내한 암호를 입력해 주세요.</span>
                    </p>
                  </div>

                  <form onSubmit={handleLoginSubmit} className="flex flex-col gap-3">
                    <input type="text" placeholder="접근 암호 (예: Made by Lee)" className="border border-slate-300 p-3 rounded-lg focus:outline-none focus:border-orange-500 focus:ring-2 focus:ring-orange-200 transition-all text-center font-medium text-selectable" value={passwordInput} onChange={(e) => setPasswordInput(e.target.value)} />
                    {loginError && <p className="text-red-500 text-sm font-medium animate-pulse">{loginError}</p>}
                    <button type="submit" className="bg-orange-800 hover:bg-orange-700 text-white font-bold py-3 rounded-lg transition-colors mt-2 shadow-md flex items-center justify-center gap-2">
                      <i className="ph-bold ph-key"></i> 잠금 해제
                    </button>
                  </form>
                </div>
              </div>
            );
          }

          return (
            <div className="flex h-screen overflow-hidden bg-slate-50 font-sans text-slate-800 print:h-auto print:bg-white">
                <aside className="hidden md:flex flex-col w-72 bg-slate-900 text-white shadow-2xl z-20 print:hidden">
                    <div className="p-6 bg-slate-800 border-b border-slate-700">
                        <div className="flex items-center gap-2 mb-2 opacity-80">
                            <i className="ph-fill ph-brain text-xl text-orange-400"></i>
                            <span className="text-xs font-bold tracking-wider text-orange-300">THE LOGIC INTERACTIVE</span>
                        </div>
                        <h1 className="text-2xl font-serif font-bold leading-tight">The Mosquito</h1>
                        <p className="text-slate-400 text-sm mt-2 italic">천재 공통영어2 Lesson 1</p>
                    </div>
                    
                    <nav className="flex-1 py-6 px-4 space-y-2 overflow-y-auto">
                        <p className="text-xs font-bold text-slate-500 uppercase tracking-widest mb-4 ml-2">Navigation</p>
                        <button onClick={() => setActiveTab('text')} className={`w-full flex items-center gap-3 px-4 py-3 rounded-lg text-left transition-all ${activeTab === 'text' ? 'bg-orange-700 text-white font-bold shadow-md' : 'text-slate-300 hover:bg-slate-800'}`}>
                            <i className="ph-fill ph-book-open text-xl"></i> 1. 지문 분석
                        </button>
                        <button onClick={() => setActiveTab('syntax')} className={`w-full flex items-center gap-3 px-4 py-3 rounded-lg text-left transition-all ${activeTab === 'syntax' ? 'bg-orange-700 text-white font-bold shadow-md' : 'text-slate-300 hover:bg-slate-800'}`}>
                            <i className="ph-fill ph-highlighter-circle text-xl"></i> 2. 핵심 구문
                        </button>
                        <button onClick={() => setActiveTab('map')} className={`w-full flex items-center gap-3 px-4 py-3 rounded-lg text-left transition-all ${activeTab === 'map' ? 'bg-orange-700 text-white font-bold shadow-md' : 'text-slate-300 hover:bg-slate-800'}`}>
                            <i className="ph-fill ph-git-merge text-xl"></i> 3. 논리 구조도
                        </button>
                        <button onClick={() => setActiveTab('quiz')} className={`w-full flex items-center gap-3 px-4 py-3 rounded-lg text-left transition-all ${activeTab === 'quiz' ? 'bg-orange-700 text-white font-bold shadow-md' : 'text-slate-300 hover:bg-slate-800'}`}>
                            <i className="ph-fill ph-check-square-offset text-xl"></i> 4. 실전 문제
                        </button>
                    </nav>

                    <div className="p-4 border-t border-slate-700">
                        <button onClick={handlePrint} className="w-full flex items-center justify-center gap-2 bg-slate-700 hover:bg-slate-600 py-3 rounded-lg font-medium transition-colors">
                            <i className="ph-bold ph-printer"></i> 전체 인쇄하기
                        </button>
                    </div>
                </aside>

                <main className="flex-1 overflow-y-auto print:overflow-visible relative pb-20 md:pb-0">
                    <header className="md:hidden bg-slate-900 text-white p-4 sticky top-0 z-20 shadow-md print:hidden flex justify-between items-center">
                        <div>
                            <h1 className="text-xl font-serif font-bold">The Mosquito</h1>
                            <p className="text-orange-300 text-xs">천재 Lesson 1</p>
                        </div>
                        <button onClick={handlePrint} className="bg-slate-800 p-2 rounded-lg">
                            <i className="ph-bold ph-printer text-lg"></i>
                        </button>
                    </header>

                    <div className="p-4 md:p-8 max-w-4xl mx-auto space-y-8 print:p-0 print:space-y-6">
